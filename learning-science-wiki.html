<!DOCTYPE html>
<html lang="ja" data-theme="light" data-accent="forest">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>学習科学Wiki — 脳科学×学習法×時間設計</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700&family=Noto+Serif+JP:wght@500;600;700&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
/* ============================================================
   学習科学Wiki — Stylesheet
   ============================================================ */
:root {
  --bg: oklch(0.985 0.005 85);
  --bg-elev: oklch(0.995 0.003 85);
  --bg-sunken: oklch(0.96 0.006 85);
  --ink: oklch(0.22 0.02 260);
  --ink-soft: oklch(0.42 0.018 260);
  --ink-mute: oklch(0.58 0.014 260);
  --rule: oklch(0.88 0.008 260);
  --rule-soft: oklch(0.93 0.006 260);
  --accent: oklch(0.45 0.10 155);
  --accent-soft: oklch(0.92 0.04 155);
  --accent-ink: oklch(0.32 0.11 155);
  --warn: oklch(0.55 0.14 50);
  --warn-soft: oklch(0.95 0.04 70);
  --ok: oklch(0.55 0.10 155);
  --ok-soft: oklch(0.94 0.04 155);
  --danger: oklch(0.55 0.16 25);
  --danger-soft: oklch(0.95 0.03 25);
  --info: oklch(0.50 0.12 230);
  --info-soft: oklch(0.94 0.04 230);
  --font-serif: "Noto Serif JP", "Hiragino Mincho ProN", serif;
  --font-sans: "Noto Sans JP", "Hiragino Sans", system-ui, sans-serif;
  --font-mono: "JetBrains Mono", "SF Mono", monospace;
  --fs-base: 15px;
  --lh-base: 1.85;
  --sidebar-w: 280px;
  --toc-w: 220px;
  --content-max: 760px;
}
[data-theme="dark"] {
  --bg: oklch(0.18 0.012 260);
  --bg-elev: oklch(0.22 0.012 260);
  --bg-sunken: oklch(0.14 0.012 260);
  --ink: oklch(0.94 0.008 85);
  --ink-soft: oklch(0.78 0.012 260);
  --ink-mute: oklch(0.60 0.014 260);
  --rule: oklch(0.32 0.014 260);
  --rule-soft: oklch(0.26 0.012 260);
  --accent: oklch(0.78 0.12 155);
  --accent-soft: oklch(0.28 0.05 155);
  --accent-ink: oklch(0.86 0.10 155);
  --warn: oklch(0.78 0.14 70);
  --warn-soft: oklch(0.32 0.05 70);
  --ok: oklch(0.78 0.12 155);
  --ok-soft: oklch(0.28 0.05 155);
  --danger: oklch(0.78 0.14 25);
  --danger-soft: oklch(0.32 0.05 25);
  --info: oklch(0.74 0.12 230);
  --info-soft: oklch(0.28 0.05 230);
}
* { box-sizing: border-box; }
html, body {
  margin: 0; padding: 0;
  background: var(--bg); color: var(--ink);
  font-family: var(--font-sans); font-size: var(--fs-base); line-height: var(--lh-base);
  -webkit-font-smoothing: antialiased;
}
a { color: var(--accent-ink); text-decoration: none; }
a:hover { text-decoration: underline; text-underline-offset: 3px; }
/* Layout */
.app { display: grid; grid-template-columns: var(--sidebar-w) 1fr var(--toc-w); min-height: 100vh; }
@media (max-width: 1100px) { .app { grid-template-columns: var(--sidebar-w) 1fr; } .toc { display: none; } }
@media (max-width: 760px) { .app { grid-template-columns: 1fr; } .sidebar { display: none; } }
/* Sidebar */
.sidebar {
  position: sticky; top: 0; height: 100vh; overflow-y: auto;
  border-right: 1px solid var(--rule); background: var(--bg-sunken); padding: 22px 18px 60px;
}
.brand { display: flex; align-items: center; gap: 10px; padding: 4px 4px 18px; border-bottom: 1px solid var(--rule); margin-bottom: 16px; }
.brand-mark {
  width: 36px; height: 36px; border-radius: 6px;
  background: var(--accent); color: #fff;
  display: grid; place-items: center;
  font-family: var(--font-serif); font-weight: 700; font-size: 14px; flex-shrink: 0;
}
.brand-title { font-family: var(--font-serif); font-size: 15px; font-weight: 600; line-height: 1.3; }
.brand-sub { font-size: 11px; color: var(--ink-mute); letter-spacing: 0.05em; text-transform: uppercase; }
.search { position: relative; margin-bottom: 18px; }
.search input {
  width: 100%; padding: 8px 10px 8px 32px;
  border: 1px solid var(--rule); background: var(--bg-elev); border-radius: 5px;
  color: var(--ink); font-family: var(--font-sans); font-size: 13px;
}
.search input::placeholder { color: var(--ink-mute); }
.search input:focus { outline: 2px solid var(--accent); outline-offset: -1px; border-color: transparent; }
.search-icon { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--ink-mute); pointer-events: none; }
.search-results {
  position: absolute; top: calc(100% + 4px); left: 0; right: 0;
  background: var(--bg-elev); border: 1px solid var(--rule); border-radius: 6px;
  max-height: 320px; overflow-y: auto; z-index: 30;
  box-shadow: 0 12px 32px -12px oklch(0.2 0.02 260 / 0.25);
}
.search-result { padding: 9px 12px; border-bottom: 1px solid var(--rule-soft); cursor: pointer; font-size: 13px; }
.search-result:last-child { border-bottom: 0; }
.search-result:hover, .search-result.active { background: var(--accent-soft); }
.search-result-title { font-weight: 600; color: var(--ink); }
.search-result-meta { font-size: 11px; color: var(--ink-mute); margin-top: 2px; }
.search-result mark { background: var(--accent-soft); color: var(--accent-ink); padding: 0 2px; border-radius: 2px; }
.nav-group { margin-bottom: 4px; }
.nav-chapter {
  display: flex; align-items: center; gap: 6px; width: 100%;
  background: transparent; border: 0; padding: 6px 4px; text-align: left; cursor: pointer;
  font-family: var(--font-sans); font-size: 11px; font-weight: 700;
  letter-spacing: 0.08em; text-transform: uppercase; color: var(--ink-mute);
}
.nav-chapter:hover { color: var(--ink); }
.nav-chapter-caret { width: 10px; height: 10px; transition: transform 0.15s; }
.nav-chapter[data-open="false"] .nav-chapter-caret { transform: rotate(-90deg); }
.nav-chapter-num { font-family: var(--font-mono); font-size: 10px; color: var(--ink-mute); margin-left: auto; }
.nav-items { list-style: none; padding: 0; margin: 0 0 6px; border-left: 1px solid var(--rule); margin-left: 8px; }
.nav-items[data-open="false"] { display: none; }
.nav-item {
  display: flex; align-items: baseline; gap: 8px; padding: 4px 10px 4px 14px;
  margin-left: -1px; border-left: 2px solid transparent;
  font-size: 13px; color: var(--ink-soft); cursor: pointer; transition: all 0.12s; line-height: 1.4;
}
.nav-item:hover { color: var(--ink); background: var(--rule-soft); }
.nav-item.active { color: var(--accent-ink); border-left-color: var(--accent); background: var(--accent-soft); font-weight: 600; }
.nav-item-num { font-family: var(--font-mono); font-size: 10px; color: var(--ink-mute); flex-shrink: 0; font-weight: 400; }
.nav-item.active .nav-item-num { color: var(--accent); }
.sidebar-footer { margin-top: 20px; padding-top: 16px; border-top: 1px solid var(--rule); font-size: 11px; color: var(--ink-mute); line-height: 1.6; }
/* Main */
.main { padding: 36px 48px 120px; min-width: 0; }
@media (max-width: 760px) { .main { padding: 24px 20px 80px; } }
/* TOC */
.toc { position: sticky; top: 0; height: 100vh; overflow-y: auto; padding: 40px 18px 60px 12px; border-left: 1px solid var(--rule); background: var(--bg-sunken); }
.toc-label { font-size: 10px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--ink-mute); margin-bottom: 10px; padding-left: 8px; }
.toc-item { display: block; padding: 4px 8px; font-size: 12px; color: var(--ink-soft); border-radius: 4px; margin-bottom: 1px; cursor: pointer; }
.toc-item:hover { color: var(--ink); background: var(--rule-soft); }
.toc-item.active { color: var(--accent-ink); background: var(--accent-soft); font-weight: 600; }
/* Page header */
.page-eyebrow { font-family: var(--font-mono); font-size: 11px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--accent); margin-bottom: 10px; }
.page-title { font-family: var(--font-serif); font-size: clamp(22px, 2.8vw, 32px); font-weight: 700; line-height: 1.25; margin: 0 0 12px; color: var(--ink); }
.page-deck { font-size: 16px; color: var(--ink-soft); line-height: 1.7; margin: 0 0 20px; max-width: 640px; }
.page-meta { display: flex; flex-wrap: wrap; gap: 16px; padding: 12px 0 28px; border-bottom: 1px solid var(--rule); margin-bottom: 32px; }
.page-meta-item { font-size: 12px; }
.page-meta-label { color: var(--ink-mute); display: block; }
.page-meta-value { color: var(--ink); font-weight: 600; font-family: var(--font-mono); font-size: 13px; }
/* Breadcrumbs */
.crumbs { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--ink-mute); margin-bottom: 20px; flex-wrap: wrap; }
.crumb { cursor: pointer; }
.crumb:hover { color: var(--accent-ink); }
.crumb-sep { color: var(--rule); }
/* Content elements */
.content h2 {
  font-family: var(--font-serif); font-size: 19px; font-weight: 700;
  margin: 36px 0 14px; padding-bottom: 8px; border-bottom: 1px solid var(--rule);
  display: flex; align-items: baseline; gap: 10px; color: var(--ink);
}
.content h3 { font-family: var(--font-serif); font-size: 16px; font-weight: 700; margin: 24px 0 10px; color: var(--ink); }
.content p { margin: 0 0 14px; }
.content ul, .content ol { margin: 0 0 14px; padding-left: 1.5em; }
.content li { margin-bottom: 5px; }
.content table { width: 100%; border-collapse: collapse; margin: 16px 0; font-size: 13.5px; }
.content th { background: var(--bg-sunken); font-weight: 700; padding: 8px 12px; border: 1px solid var(--rule); text-align: left; font-size: 12px; }
.content td { padding: 7px 12px; border: 1px solid var(--rule); vertical-align: top; }
.content tr:hover td { background: var(--rule-soft); }
.h-num { font-family: var(--font-mono); font-size: 13px; font-weight: 400; color: var(--ink-mute); flex-shrink: 0; }
.marker { background: oklch(0.94 0.12 90); padding: 0 3px; border-radius: 2px; }
/* Cards */
.card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; margin: 16px 0; }
.card {
  border: 1px solid var(--rule); border-radius: 8px; padding: 16px; background: var(--bg-elev);
  cursor: pointer; transition: all 0.15s;
}
.card:hover { border-color: var(--accent); box-shadow: 0 4px 16px -6px oklch(0.2 0.02 260 / 0.12); transform: translateY(-1px); }
.card-num { font-family: var(--font-mono); font-size: 11px; color: var(--ink-mute); margin-bottom: 6px; }
.card-title { font-weight: 700; font-size: 14px; margin-bottom: 6px; line-height: 1.4; }
.card-deck { font-size: 12px; color: var(--ink-soft); line-height: 1.5; margin-bottom: 8px; }
.card-foot { font-size: 11px; color: var(--accent-ink); font-weight: 600; margin-top: auto; }
/* Admonition */
.adm { border-radius: 6px; padding: 14px 16px; margin: 16px 0; border-left: 3px solid; }
.adm-title { font-weight: 700; font-size: 13px; margin-bottom: 6px; display: flex; align-items: center; gap: 6px; }
.adm-body { font-size: 13.5px; }
.adm-body ul { margin: 6px 0; }
.adm-body p { margin: 0 0 6px; }
.adm-body p:last-child { margin: 0; }
.adm.info { background: var(--info-soft); border-color: var(--info); }
.adm.info .adm-title { color: var(--info); }
.adm.warn { background: var(--warn-soft); border-color: var(--warn); }
.adm.warn .adm-title { color: var(--warn); }
.adm.ok { background: var(--ok-soft); border-color: var(--ok); }
.adm.ok .adm-title { color: var(--ok); }
.adm.danger { background: var(--danger-soft); border-color: var(--danger); }
.adm.danger .adm-title { color: var(--danger); }
/* Stat strip */
.stat-strip { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; margin: 0 0 32px; }
.stat { border: 1px solid var(--rule); border-radius: 8px; padding: 14px 16px; background: var(--bg-elev); }
.stat-label { font-size: 11px; color: var(--ink-mute); margin-bottom: 4px; }
.stat-value { font-family: var(--font-mono); font-size: 18px; font-weight: 700; color: var(--accent-ink); margin-bottom: 2px; }
.stat-sub { font-size: 11px; color: var(--ink-mute); }
/* Badge / chip */
.badge { display: inline-block; font-family: var(--font-mono); font-size: 10px; font-weight: 700; padding: 2px 6px; border-radius: 3px; letter-spacing: 0.03em; }
.badge-g { background: var(--ok-soft); color: var(--ok); }
.badge-y { background: var(--warn-soft); color: var(--warn); }
.badge-r { background: var(--danger-soft); color: var(--danger); }
/* Step list */
.steps { list-style: none; padding: 0; margin: 16px 0; counter-reset: step; }
.steps li { counter-increment: step; display: flex; gap: 14px; margin-bottom: 16px; align-items: flex-start; }
.steps li::before {
  content: counter(step); flex-shrink: 0; width: 26px; height: 26px;
  background: var(--accent); color: #fff; border-radius: 50%;
  display: grid; place-items: center; font-weight: 700; font-size: 13px; font-family: var(--font-mono);
}
/* Theme toggle */
.theme-toggle { display: flex; gap: 6px; margin-top: 14px; }
.theme-btn { font-size: 11px; padding: 4px 9px; border: 1px solid var(--rule); background: var(--bg-elev); color: var(--ink-soft); border-radius: 4px; cursor: pointer; font-family: var(--font-sans); }
.theme-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
/* Mobile hamburger */
.mobile-bar { display: none; position: fixed; top: 0; left: 0; right: 0; z-index: 100; background: var(--bg-elev); border-bottom: 1px solid var(--rule); padding: 10px 16px; align-items: center; gap: 12px; }
@media (max-width: 760px) { .mobile-bar { display: flex; } .main { padding-top: 64px; } }
.hamburger { background: none; border: 1px solid var(--rule); border-radius: 5px; padding: 5px 8px; cursor: pointer; color: var(--ink); }
.mobile-drawer { position: fixed; inset: 0; z-index: 200; display: flex; }
.mobile-drawer-overlay { flex: 1; background: oklch(0 0 0 / 0.45); }
.mobile-drawer-panel { width: 280px; background: var(--bg-sunken); overflow-y: auto; padding: 22px 18px 60px; }
/* Timeline (schedule pages) */
.timeline { position: relative; padding-left: 28px; margin: 16px 0; }
.timeline::before { content: ''; position: absolute; left: 8px; top: 0; bottom: 0; width: 2px; background: var(--rule); }
.tl-item { position: relative; margin-bottom: 18px; }
.tl-dot { position: absolute; left: -24px; top: 4px; width: 12px; height: 12px; border-radius: 50%; background: var(--accent); border: 2px solid var(--bg); }
.tl-time { font-family: var(--font-mono); font-size: 11px; color: var(--ink-mute); margin-bottom: 2px; }
.tl-label { font-weight: 600; font-size: 14px; }
.tl-desc { font-size: 13px; color: var(--ink-soft); }
.tl-item.focus .tl-dot { background: var(--ok); width: 14px; height: 14px; left: -25px; top: 3px; }
.tl-item.rest .tl-dot { background: var(--warn); }
.tl-item.study .tl-dot { background: var(--info); }
  </style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel">
const { useState, useEffect, useMemo, useRef } = React;

/* ============================================================
   WIKI_DATA — 学習科学Wiki コンテンツ定義
   ============================================================ */
window.WIKI_DATA = {
  chapters: [
    { id: "ch1", num: "01", title: "脳科学の基礎", pages: [
      { id: "nou-kasseika",  num: "1.1", title: "脳の可塑性と活性化" },
      { id: "atama-ga-ii",   num: "1.2", title: "「頭が良い」の科学" },
      { id: "brain-speed",   num: "1.3", title: "脳の処理速度" },
      { id: "brain-detox",   num: "1.4", title: "脳デトックス" },
      { id: "brain-fatigue", num: "1.5", title: "脳疲労リカバリー" },
    ]},
    { id: "ch2", num: "02", title: "学習効率の科学", pages: [
      { id: "gakushuu-kouritu", num: "2.1", title: "学習効率を上げる原則" },
      { id: "study-methods",    num: "2.2", title: "科学的勉強法カタログ" },
      { id: "joho-input",       num: "2.3", title: "情報インプットの最適化" },
      { id: "rest-recall-spacing", num: "2.4", title: "休息×想起×間隔の学習法" },
    ]},
    { id: "ch3", num: "03", title: "メタ認知・思考革新", pages: [
      { id: "meta-ninchi", num: "3.1", title: "メタ認知の技術" },
      { id: "unlearning",  num: "3.2", title: "アンラーニング" },
    ]},
    { id: "ch4", num: "04", title: "理想の1日設計", pages: [
      { id: "weekday-schedule", num: "4.1", title: "平日スケジュール設計" },
      { id: "dayoff-rest",      num: "4.2", title: "休日OFF設計" },
      { id: "dayoff-study",     num: "4.3", title: "休日勉強設計" },
    ]},
  ],
};

/* ============================================================
   Shared Components
   ============================================================ */
const Crumbs = ({ items, onNav }) => (
  <nav className="crumbs">
    <span className="crumb" onClick={() => onNav('home')}>ホーム</span>
    {items.map((it, i) => (
      <React.Fragment key={i}>
        <span className="crumb-sep">›</span>
        {it.id ? <span className="crumb" onClick={() => onNav(it.id)}>{it.label}</span>
               : <span>{it.label}</span>}
      </React.Fragment>
    ))}
  </nav>
);

const PageHeader = ({ eyebrow, title, deck, meta }) => (
  <div style={{marginBottom: 8}}>
    {eyebrow && <div className="page-eyebrow">{eyebrow}</div>}
    <h1 className="page-title">{title}</h1>
    {deck && <p className="page-deck">{deck}</p>}
    {meta && (
      <div className="page-meta">
        {meta.map((m, i) => (
          <div key={i} className="page-meta-item">
            <span className="page-meta-label">{m.label}</span>
            <span className="page-meta-value">{m.value}</span>
          </div>
        ))}
      </div>
    )}
  </div>
);

const Adm = ({ type = 'info', title, children }) => {
  const icons = { info: 'ℹ️', warn: '⚠️', ok: '✅', danger: '🚫', tip: '💡' };
  const cls = type === 'tip' ? 'info' : type;
  return (
    <div className={`adm ${cls}`}>
      {title && <div className="adm-title">{icons[type] || 'ℹ️'} {title}</div>}
      <div className="adm-body">{children}</div>
    </div>
  );
};

const Sidebar = ({ chapters, currentPage, onNav }) => {
  const init = {};
  chapters.forEach(c => { init[c.id] = true; });
  const [open, setOpen] = useState(init);
  const [theme, setTheme] = useState('light');
  const toggle = id => setOpen(p => ({ ...p, [id]: !p[id] }));
  const setT = t => { setTheme(t); document.documentElement.dataset.theme = t; };
  return (
    <aside className="sidebar">
      <div className="brand">
        <div className="brand-mark">学</div>
        <div>
          <div className="brand-title">学習科学Wiki</div>
          <div className="brand-sub">Brain × Learning × Time</div>
        </div>
      </div>
      <nav>
        <div className="nav-group">
          <div className={`nav-item ${currentPage === 'home' ? 'active' : ''}`} onClick={() => onNav('home')}>
            <span className="nav-item-num">00</span>ホーム
          </div>
        </div>
        {chapters.map(ch => (
          <div key={ch.id} className="nav-group">
            <button className="nav-chapter" data-open={String(!!open[ch.id])} onClick={() => toggle(ch.id)}>
              <svg className="nav-chapter-caret" viewBox="0 0 10 10" fill="none" stroke="currentColor" strokeWidth="1.8">
                <path d="M2 3.5 5 6.5 8 3.5"/>
              </svg>
              {ch.title}
              <span className="nav-chapter-num">{ch.num}</span>
            </button>
            <ul className="nav-items" data-open={String(!!open[ch.id])}>
              {ch.pages.map(p => (
                <li key={p.id} className={`nav-item ${currentPage === p.id ? 'active' : ''}`} onClick={() => onNav(p.id)}>
                  <span className="nav-item-num">{p.num}</span>{p.title}
                </li>
              ))}
            </ul>
          </div>
        ))}
      </nav>
      <div className="sidebar-footer">
        <div className="theme-toggle">
          <button className={`theme-btn ${theme === 'light' ? 'active' : ''}`} onClick={() => setT('light')}>ライト</button>
          <button className={`theme-btn ${theme === 'dark' ? 'active' : ''}`} onClick={() => setT('dark')}>ダーク</button>
        </div>

    </p>
  </>

const App = () => {
  const data = window.WIKI_DATA;
  const allIds = ['home', ...data.chapters.flatMap(c => c.pages.map(p => p.id))];
  const [page, setPage] = useState(() => {
    const h = location.hash.replace(/^#/, '');
    return allIds.includes(h) ? h : 'home';
  });
  const [mobileOpen, setMobileOpen] = useState(false);

  const navigate = (id) => {
    setPage(id); location.hash = id; window.scrollTo({top:0, behavior:'auto'});
  };
  useEffect(() => {
    const fn = () => { const h = location.hash.replace(/^#/,''); if(allIds.includes(h)) setPage(h); };
    window.addEventListener('hashchange', fn);
    return () => window.removeEventListener('hashchange', fn);
  }, []);

  const renderPage = () => {
    const props = { data, onNav: navigate };
    switch(page) {
      case 'home': return <HomePage {...props} />;
      case 'nou-kasseika': return <NouKasseikaPage {...props} />;
      case 'atama-ga-ii': return <AtamaGaIiPage {...props} />;
      case 'brain-speed': return <BrainSpeedPage {...props} />;
      case 'brain-detox': return <BrainDetoxPage {...props} />;
      case 'brain-fatigue': return <BrainFatiguePage {...props} />;
      case 'gakushuu-kouritu': return <GakushuuKourituPage {...props} />;
      case 'study-methods': return <StudyMethodsPage {...props} />;
      case 'joho-input': return <JohoInputPage {...props} />;
      case 'rest-recall-spacing': return <RestRecallSpacingPage {...props} />;
      case 'meta-ninchi': return <MetaNinchiPage {...props} />;
      case 'unlearning': return <UnlearningPage {...props} />;
      case 'weekday-schedule': return <WeekdaySchedulePage {...props} />;
      case 'dayoff-rest': return <DayoffRestPage {...props} />;
      case 'dayoff-study': return <DayoffStudyPage {...props} />;
      default: return <HomePage {...props} />;
    }
  };

  return (
    <>
      <div className="app">
        <Sidebar chapters={data.chapters} currentPage={page} onNav={navigate} />
        <main className="main">{renderPage()}</main>
      </div>
      {mobileOpen && (
        <div className="mobile-drawer">
          <div className="mobile-drawer-overlay" onClick={() => setMobileOpen(false)} />
          <div className="mobile-drawer-panel">
            <Sidebar chapters={data.chapters} currentPage={page} onNav={(id) => { navigate(id); setMobileOpen(false); }} />
          </div>
        </div>
      )}
    </>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
