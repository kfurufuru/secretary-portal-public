<!DOCTYPE html>
<html lang="ja" data-theme="light" data-accent="forest" data-difficulty="standard">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
  <title>電験3種 理論Wiki — 受験対策・要点まとめ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700&family=Noto+Serif+JP:wght@500;600;700&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
  <style>
/* ============================================================
   電験3種 理論Wiki — Stylesheet
   ============================================================ */

:root {
  --bg: oklch(0.985 0.005 85);
  --bg-elev: oklch(0.995 0.003 85);
  --bg-sunken: oklch(0.96 0.006 85);
  --ink: oklch(0.22 0.02 260);
  --ink-soft: oklch(0.42 0.018 260);
  --ink-mute: oklch(0.58 0.014 260);
  --rule: oklch(0.88 0.008 260);
  --rule-soft: oklch(0.93 0.006 260);
  --accent: oklch(0.45 0.12 260);
  --accent-soft: oklch(0.92 0.04 260);
  --accent-ink: oklch(0.32 0.13 260);
  --warn: oklch(0.50 0.10 50);
  --warn-soft: oklch(0.97 0.012 70);
  --ok: oklch(0.48 0.08 155);
  --ok-soft: oklch(0.97 0.010 155);
  --danger: oklch(0.50 0.12 25);
  --danger-soft: oklch(0.97 0.010 25);

  --font-serif: "Noto Serif JP", "Hiragino Mincho ProN", "Yu Mincho", serif;
  --font-sans: "Noto Sans JP", "Hiragino Sans", "Yu Gothic", system-ui, sans-serif;
  --font-mono: "JetBrains Mono", "SF Mono", "Menlo", monospace;

  --fs-base: 15px;
  --lh-base: 1.85;

  --sidebar-w: 280px;
  --toc-w: 220px;
  --content-max: 760px;
}

[data-theme="dark"] {
  --bg: oklch(0.18 0.012 260);
  --bg-elev: oklch(0.22 0.012 260);
  --bg-sunken: oklch(0.14 0.012 260);
  --ink: oklch(0.94 0.008 85);
  --ink-soft: oklch(0.78 0.012 260);
  --ink-mute: oklch(0.60 0.014 260);
  --rule: oklch(0.32 0.014 260);
  --rule-soft: oklch(0.26 0.012 260);
  --accent: oklch(0.72 0.12 260);
  --accent-soft: oklch(0.30 0.06 260);
  --accent-ink: oklch(0.85 0.10 260);
  --warn: oklch(0.75 0.10 70);
  --warn-soft: oklch(0.28 0.030 70);
  --ok: oklch(0.75 0.09 155);
  --ok-soft: oklch(0.25 0.025 155);
  --danger: oklch(0.75 0.10 25);
  --danger-soft: oklch(0.28 0.028 25);
}

[data-accent="forest"]  { --accent: oklch(0.45 0.12 260); --accent-soft: oklch(0.92 0.04 260); --accent-ink: oklch(0.32 0.13 260); }
[data-accent="forest"]  { --accent: oklch(0.45 0.10 155); --accent-soft: oklch(0.92 0.04 155); --accent-ink: oklch(0.32 0.11 155); }
[data-accent="rust"]    { --accent: oklch(0.50 0.13 35);  --accent-soft: oklch(0.93 0.04 50);  --accent-ink: oklch(0.38 0.14 35);  }
[data-accent="aubergine"] { --accent: oklch(0.40 0.10 320); --accent-soft: oklch(0.92 0.04 320); --accent-ink: oklch(0.30 0.11 320); }

[data-theme="dark"][data-accent="forest"]  { --accent: oklch(0.74 0.12 260); --accent-soft: oklch(0.30 0.06 260); --accent-ink: oklch(0.85 0.10 260); }
[data-theme="dark"][data-accent="forest"]  { --accent: oklch(0.78 0.12 155); --accent-soft: oklch(0.28 0.05 155); --accent-ink: oklch(0.86 0.10 155); }
[data-theme="dark"][data-accent="rust"]    { --accent: oklch(0.78 0.13 50);  --accent-soft: oklch(0.30 0.06 50);  --accent-ink: oklch(0.85 0.12 50);  }
[data-theme="dark"][data-accent="aubergine"] { --accent: oklch(0.74 0.10 320); --accent-soft: oklch(0.28 0.05 320); --accent-ink: oklch(0.85 0.10 320); }

* { box-sizing: border-box; }

html, body {
  margin: 0;
  padding: 0;
  background: var(--bg);
  color: var(--ink);
  font-family: var(--font-sans);
  font-size: var(--fs-base);
  line-height: var(--lh-base);
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}

a { color: var(--accent-ink); text-decoration: none; }
a:hover { text-decoration: underline; text-underline-offset: 3px; }

/* ============================================================ Layout */

.app {
  display: grid;
  grid-template-columns: var(--sidebar-w) 1fr var(--toc-w);
  min-height: 100vh;
}

@media (max-width: 1100px) {
  .app { grid-template-columns: var(--sidebar-w) 1fr; }
  .toc { display: none; }
}

@media (max-width: 760px) {
  .app { grid-template-columns: 1fr; }
  .sidebar { display: none; }
}

/* ============================================================ Sidebar */

.sidebar {
  position: sticky;
  top: 0;
  height: 100vh;
  border-right: 1px solid var(--rule);
  background: var(--bg-sunken);
  overflow-y: auto;
  padding: 22px 18px 60px;
}

.brand {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 4px 4px 18px;
  border-bottom: 1px solid var(--rule);
  margin-bottom: 16px;
}

.brand-mark {
  width: 36px;
  height: 36px;
  border-radius: 6px;
  background: var(--ink);
  color: var(--bg);
  display: grid;
  place-items: center;
  font-family: var(--font-serif);
  font-weight: 700;
  font-size: 18px;
  letter-spacing: -0.02em;
  flex-shrink: 0;
}

.brand-title {
  font-family: var(--font-serif);
  font-size: 16px;
  font-weight: 600;
  line-height: 1.3;
  letter-spacing: 0.01em;
}
.brand-sub {
  font-size: 11px;
  color: var(--ink-mute);
  letter-spacing: 0.05em;
  text-transform: uppercase;
}

.search {
  position: relative;
  margin-bottom: 18px;
}
.search input {
  width: 100%;
  padding: 8px 10px 8px 32px;
  border: 1px solid var(--rule);
  background: var(--bg-elev);
  border-radius: 5px;
  color: var(--ink);
  font-family: var(--font-sans);
  font-size: 13px;
}
.search input::placeholder { color: var(--ink-mute); }
.search input:focus { outline: 2px solid var(--accent); outline-offset: -1px; border-color: transparent; }
.search-icon {
  position: absolute;
  left: 10px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--ink-mute);
  pointer-events: none;
}

.search-kbd {
  position: absolute;
  right: 8px;
  top: 50%;
  transform: translateY(-50%);
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--ink-mute);
  border: 1px solid var(--rule);
  padding: 1px 5px;
  border-radius: 3px;
  background: var(--bg);
}

.search-results {
  position: absolute;
  top: calc(100% + 4px);
  left: 0;
  right: 0;
  background: var(--bg-elev);
  border: 1px solid var(--rule);
  border-radius: 6px;
  max-height: 360px;
  overflow-y: auto;
  z-index: 30;
  box-shadow: 0 12px 32px -12px oklch(0.2 0.02 260 / 0.25);
}
.search-result {
  padding: 9px 12px;
  border-bottom: 1px solid var(--rule-soft);
  cursor: pointer;
  font-size: 13px;
}
.search-result:last-child { border-bottom: 0; }
.search-result:hover, .search-result.active { background: var(--accent-soft); }
.search-result-title { font-weight: 600; color: var(--ink); }
.search-result-meta { font-size: 11px; color: var(--ink-mute); margin-top: 2px; }
.search-result mark { background: var(--accent-soft); color: var(--accent-ink); padding: 0 2px; border-radius: 2px; }

.nav-group {
  margin-bottom: 4px;
}

.nav-chapter {
  display: flex;
  align-items: center;
  gap: 6px;
  width: 100%;
  background: transparent;
  border: 0;
  padding: 6px 4px;
  text-align: left;
  cursor: pointer;
  font-family: var(--font-sans);
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--ink-mute);
}
.nav-chapter:hover { color: var(--ink); }
.nav-chapter-caret {
  width: 10px;
  height: 10px;
  transition: transform 0.15s;
}
.nav-chapter[data-open="false"] .nav-chapter-caret { transform: rotate(-90deg); }
.nav-chapter-num {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--ink-mute);
  margin-left: auto;
}

.nav-items {
  list-style: none;
  padding: 0;
  margin: 0 0 6px;
  border-left: 1px solid var(--rule);
  margin-left: 8px;
}
.nav-items[data-open="false"] { display: none; }

.nav-item {
  display: flex;
  align-items: baseline;
  gap: 8px;
  padding: 4px 10px 4px 14px;
  margin-left: -1px;
  border-left: 2px solid transparent;
  font-size: 13px;
  color: var(--ink-soft);
  cursor: pointer;
  transition: all 0.12s;
  line-height: 1.4;
}
.nav-item:hover { color: var(--ink); background: var(--rule-soft); }
.nav-item.active {
  color: var(--accent-ink);
  border-left-color: var(--accent);
  background: var(--accent-soft);
  font-weight: 600;
}
.nav-item-num {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--ink-mute);
  flex-shrink: 0;
  font-weight: 400;
}
.nav-item.active .nav-item-num { color: var(--accent); }

.nav-badge {
  margin-left: auto;
  font-family: var(--font-mono);
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 0.05em;
  padding: 1px 5px;
  border-radius: 3px;
  background: var(--warn-soft);
  color: var(--warn);
}

.nav-rank {
  font-family: var(--font-mono);
  font-size: 9px;
  font-weight: 800;
  letter-spacing: 0.04em;
  padding: 1px 5px;
  border-radius: 3px;
  min-width: 14px;
  text-align: center;
  margin-left: 4px;
}
.nav-rank.rank-S { background: #fde2e2; color: #b91c1c; }
.nav-rank.rank-A { background: #fef3c7; color: #b45309; }
.nav-rank.rank-B { background: #dbeafe; color: #1d4ed8; }

.sidebar-footer {
  margin-top: 20px;
  padding-top: 16px;
  border-top: 1px solid var(--rule);
  font-size: 11px;
  color: var(--ink-mute);
  line-height: 1.6;
}

/* ============================================================ Main Content */

.main {
  padding: 36px 48px 120px;
  min-width: 0;
}

@media (max-width: 760px) { .main { padding: 24px 18px 80px; } }

.crumbs {
  font-size: 12px;
  color: var(--ink-mute);
  margin-bottom: 22px;
  display: flex;
  align-items: center;
  gap: 6px;
  flex-wrap: wrap;
}
.crumbs a { color: var(--ink-mute); }
.crumbs a:hover { color: var(--ink); }
.crumbs .sep { color: var(--rule); }

.page-header {
  border-bottom: 2px solid var(--rule);
  padding-bottom: 18px;
  margin-bottom: 32px;
}
.page-eyebrow {
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--accent-ink);
  margin-bottom: 8px;
}
.page-title {
  font-family: var(--font-serif);
  font-size: 36px;
  font-weight: 700;
  line-height: 1.25;
  letter-spacing: -0.01em;
  margin: 0 0 10px;
  color: var(--ink);
}
.page-deck {
  font-size: 15px;
  color: var(--ink-soft);
  line-height: 1.75;
  max-width: 640px;
}

.page-meta {
  display: flex;
  flex-wrap: wrap;
  gap: 18px;
  margin-top: 16px;
  font-size: 12px;
  color: var(--ink-mute);
}
.page-meta-item { display: flex; align-items: center; gap: 6px; }
.page-meta-item strong { color: var(--ink-soft); font-weight: 600; }

.content { max-width: var(--content-max); }

.content h2 {
  font-family: var(--font-serif);
  font-size: 24px;
  font-weight: 700;
  letter-spacing: -0.005em;
  line-height: 1.35;
  margin: 48px 0 16px;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--rule);
  scroll-margin-top: 24px;
}
.content h2 .h-num,
.main h2 .h-num {
  font-family: var(--font-mono);
  font-size: 13px;
  color: var(--accent);
  font-weight: 600;
  margin-right: 6px;
  letter-spacing: 0.05em;
}
.content h2 .h-num::after,
.main h2 .h-num::after {
  content: ".";
  margin-left: 1px;
}
.content h3 {
  font-family: var(--font-serif);
  font-size: 18px;
  font-weight: 600;
  margin: 32px 0 10px;
  scroll-margin-top: 24px;
}
.content h4 {
  font-size: 14px;
  font-weight: 700;
  letter-spacing: 0.02em;
  margin: 22px 0 8px;
  color: var(--ink);
}
.content p {
  margin: 0 0 14px;
  text-wrap: pretty;
}
.content p strong { color: var(--ink); font-weight: 700; }

/* 論述で問われるポイント — 黄色マーカー */
.marker {
  background: linear-gradient(transparent 55%, oklch(0.92 0.18 95) 55%);
  padding: 0 2px;
  font-weight: 600;
  color: var(--ink);
}
[data-theme="dark"] .marker {
  background: linear-gradient(transparent 55%, oklch(0.55 0.16 95 / 0.55) 55%);
  color: var(--ink);
}
.content ul, .content ol { padding-left: 22px; margin: 6px 0 16px; }
.content li { margin-bottom: 6px; line-height: 1.75; }
.content code {
  font-family: var(--font-mono);
  font-size: 0.88em;
  background: var(--bg-sunken);
  padding: 1px 5px;
  border-radius: 3px;
  border: 1px solid var(--rule-soft);
}

/* ============================================================ Callouts / boxes */

.box {
  border: 1px solid var(--rule);
  border-radius: 6px;
  padding: 16px 18px;
  margin: 18px 0;
  background: var(--bg-elev);
}
.box-label {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  font-weight: 700;
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.box-label::before {
  content: "";
  width: 14px;
  height: 1px;
  background: currentColor;
}

.box-formula  { background: var(--accent-soft); border-color: color-mix(in oklab, var(--accent) 30%, transparent); }
.box-formula .box-label { color: var(--accent-ink); }
.box-warn     { background: var(--warn-soft); border-color: color-mix(in oklab, var(--warn) 30%, transparent); }
.box-warn .box-label { color: var(--warn); }
.box-tip      { background: var(--ok-soft); border-color: color-mix(in oklab, var(--ok) 30%, transparent); }
.box-tip .box-label { color: var(--ok); }
.box-mistake  { background: var(--danger-soft); border-color: color-mix(in oklab, var(--danger) 30%, transparent); }
.box-mistake .box-label { color: var(--danger); }
.box-example  { background: var(--bg-sunken); }
.box-example .box-label { color: var(--ink-soft); }

.box .katex { font-size: 1.05em; }
.box p:last-child { margin-bottom: 0; }

/* ============================================================ Formula card */

.formula-card {
  display: grid;
  grid-template-columns: 80px 1fr;
  gap: 18px;
  align-items: center;
  border: 1px solid var(--rule);
  border-left: 3px solid var(--accent);
  background: var(--bg-elev);
  padding: 16px 20px;
  margin: 16px 0;
  border-radius: 0 5px 5px 0;
}
.formula-card .num {
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.1em;
  color: var(--ink-mute);
}
.formula-card .body { font-size: 14px; color: var(--ink-soft); line-height: 1.6; }
.formula-card .body strong { color: var(--ink); display: block; font-size: 13px; margin-bottom: 4px; font-family: var(--font-sans); }
.formula-card .eq { font-size: 1.15em; margin: 6px 0; }

/* ============================================================ Tables */

.table-wrap { overflow-x: auto; margin: 16px 0; }
table.data {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
}
table.data th, table.data td {
  border: 1px solid var(--rule);
  padding: 8px 12px;
  text-align: left;
  vertical-align: top;
}
table.data th {
  background: var(--bg-sunken);
  font-weight: 700;
  font-size: 12px;
  letter-spacing: 0.02em;
}
table.data td.num, table.data th.num { font-family: var(--font-mono); text-align: right; }
table.data tr:nth-child(even) td { background: color-mix(in oklab, var(--bg-sunken) 50%, transparent); }
table.data caption {
  caption-side: top;
  text-align: left;
  font-size: 12px;
  font-weight: 600;
  margin-bottom: 6px;
  color: var(--ink-soft);
}
/* data-table は data の別名（JSX側で className="data-table" を統一使用） */
table.data-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
}
table.data-table th, table.data-table td {
  border: 1px solid var(--rule);
  padding: 8px 12px;
  text-align: left;
  vertical-align: top;
}
table.data-table th {
  background: var(--bg-sunken);
  font-weight: 700;
  font-size: 12px;
  letter-spacing: 0.02em;
}
table.data-table td.num, table.data-table th.num { font-family: var(--font-mono); text-align: right; }
table.data-table tr:nth-child(even) td { background: color-mix(in oklab, var(--bg-sunken) 50%, transparent); }

/* ============================================================ TOC (right rail) */

.toc {
  position: sticky;
  top: 0;
  height: 100vh;
  padding: 36px 22px 36px 8px;
  border-left: 1px solid var(--rule);
  font-size: 12px;
  overflow-y: auto;
}
.toc-label {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--ink-mute);
  margin-bottom: 10px;
  font-weight: 700;
}
.toc ul { list-style: none; padding: 0; margin: 0; }
.toc li { margin: 0; }
.toc a {
  display: block;
  padding: 4px 10px;
  border-left: 2px solid var(--rule-soft);
  color: var(--ink-mute);
  font-size: 12px;
  line-height: 1.5;
  transition: all 0.12s;
}
.toc a:hover { color: var(--ink); border-color: var(--ink-mute); text-decoration: none; }
.toc a.active { color: var(--accent-ink); border-color: var(--accent); font-weight: 600; }
.toc li.h3 a { padding-left: 22px; font-size: 11px; }

/* ============================================================ Difficulty badges & filter */

.diff-badge {
  display: inline-block;
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.05em;
  padding: 1px 6px;
  border-radius: 3px;
  font-weight: 700;
  vertical-align: middle;
  margin-left: 6px;
}
.diff-basic    { background: var(--ok-soft);     color: var(--ok); }
.diff-standard { background: var(--accent-soft); color: var(--accent-ink); }
.diff-advanced { background: var(--warn-soft);   color: var(--warn); }

[data-difficulty="basic"]    .diff-only-standard,
[data-difficulty="basic"]    .diff-only-advanced,
[data-difficulty="standard"] .diff-only-advanced {
  display: none !important;
}

/* ============================================================ Cards on home */

.card-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 14px;
  margin: 22px 0 32px;
}

.card {
  background: var(--bg-elev);
  border: 1px solid var(--rule);
  border-radius: 6px;
  padding: 16px 18px;
  cursor: pointer;
  transition: all 0.15s;
  display: flex;
  flex-direction: column;
  min-height: 120px;
}
.card:hover {
  border-color: var(--accent);
  transform: translateY(-1px);
  box-shadow: 0 6px 18px -10px color-mix(in oklab, var(--accent) 60%, transparent);
}
.card-num {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.12em;
  color: var(--ink-mute);
  margin-bottom: 4px;
}
.card-title {
  font-family: var(--font-serif);
  font-size: 17px;
  font-weight: 600;
  color: var(--ink);
  margin-bottom: 6px;
  line-height: 1.3;
}
.card-deck { font-size: 12px; color: var(--ink-soft); line-height: 1.55; flex-grow: 1; }
.card-foot {
  margin-top: 10px;
  padding-top: 8px;
  border-top: 1px solid var(--rule-soft);
  display: flex;
  align-items: center;
  justify-content: space-between;
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--ink-mute);
  letter-spacing: 0.05em;
}
.card-freq { color: var(--accent); font-weight: 700; }

/* ============================================================ Stat strip (home) */

.stat-strip {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 0;
  border: 1px solid var(--rule);
  border-radius: 6px;
  background: var(--bg-elev);
  margin: 18px 0 28px;
  overflow: hidden;
}
@media (max-width: 720px) { .stat-strip { grid-template-columns: repeat(2, 1fr); } }
.stat {
  padding: 14px 18px;
  border-right: 1px solid var(--rule);
}
.stat:last-child { border-right: 0; }
.stat-label {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--ink-mute);
  margin-bottom: 4px;
}
.stat-value {
  font-family: var(--font-serif);
  font-size: 22px;
  font-weight: 700;
  line-height: 1;
  color: var(--ink);
}
.stat-sub { font-size: 11px; color: var(--ink-mute); margin-top: 4px; }

/* ============================================================ Frequency chart */

.freq-chart {
  display: grid;
  grid-template-columns: 100px 1fr 60px;
  gap: 10px;
  align-items: center;
  font-size: 12px;
  margin: 4px 0;
}
.freq-chart .label { color: var(--ink-soft); font-weight: 500; }
.freq-chart .bar { background: var(--bg-sunken); height: 18px; border-radius: 2px; overflow: hidden; }
.freq-chart .bar-fill {
  height: 100%;
  background: var(--accent);
  display: flex;
  align-items: center;
  padding: 0 6px;
  color: var(--bg);
  font-family: var(--font-mono);
  font-size: 10px;
  font-weight: 700;
}
.freq-chart .pct { font-family: var(--font-mono); color: var(--ink-mute); font-size: 11px; text-align: right; }

/* ============================================================ Diagrams */

.diagram {
  background: var(--bg-elev);
  border: 1px solid var(--rule);
  border-radius: 6px;
  padding: 18px;
  margin: 18px 0;
  text-align: center;
}
.diagram svg { max-width: 100%; height: auto; }
.diagram-caption {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--ink-mute);
  margin-top: 10px;
  letter-spacing: 0.04em;
}

.diagram-stroke    { stroke: var(--ink); }
.diagram-fill      { fill: var(--ink); }
.diagram-stroke-soft { stroke: var(--ink-mute); }
.diagram-fill-soft { fill: var(--ink-mute); }
.diagram-fill-bg   { fill: var(--bg-elev); }
.diagram-accent    { stroke: var(--accent); fill: var(--accent); }
.diagram-warn      { stroke: var(--warn); fill: var(--warn); }
.diagram-text      { fill: var(--ink); font-family: var(--font-sans); font-size: 11px; }
.diagram-text-mono { fill: var(--ink-soft); font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.04em; }

/* ============================================================ Past-question rows */

.past-q-row {
  display: grid;
  grid-template-columns: 70px 1fr 90px;
  gap: 14px;
  padding: 10px 12px;
  border-bottom: 1px solid var(--rule-soft);
  font-size: 13px;
  align-items: baseline;
}
.past-q-row:last-child { border-bottom: 0; }
.past-q-row:hover { background: var(--bg-sunken); }
.past-q-year {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--ink-mute);
  letter-spacing: 0.04em;
}
.past-q-topic { color: var(--ink); }
.past-q-tag {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--ink-soft);
  text-align: right;
  letter-spacing: 0.04em;
}

/* ============================================================ Pagination footer */

.page-nav {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-top: 64px;
  padding-top: 24px;
  border-top: 1px solid var(--rule);
}
.page-nav-link {
  display: block;
  padding: 14px 18px;
  border: 1px solid var(--rule);
  border-radius: 5px;
  background: var(--bg-elev);
  cursor: pointer;
  transition: all 0.15s;
  text-decoration: none !important;
}
.page-nav-link:hover { border-color: var(--accent); }
.page-nav-link.next { text-align: right; }
.page-nav-dir {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--ink-mute);
  margin-bottom: 4px;
}
.page-nav-title {
  font-family: var(--font-serif);
  font-size: 15px;
  font-weight: 600;
  color: var(--ink);
}

/* ============================================================ Glossary */

.glossary-toolbar {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin: 18px 0;
}
.glossary-toolbar button {
  font-family: var(--font-mono);
  font-size: 11px;
  padding: 4px 10px;
  border: 1px solid var(--rule);
  background: var(--bg-elev);
  color: var(--ink-soft);
  border-radius: 3px;
  cursor: pointer;
  letter-spacing: 0.05em;
}
.glossary-toolbar button:hover { color: var(--ink); border-color: var(--ink-mute); }
.glossary-toolbar button.active { background: var(--accent); color: var(--bg); border-color: var(--accent); }

.glossary-section { margin-bottom: 24px; }
.glossary-section h3 {
  font-family: var(--font-mono);
  font-size: 14px;
  letter-spacing: 0.1em;
  color: var(--accent);
  border-bottom: 1px solid var(--rule);
  padding-bottom: 4px;
  margin: 16px 0 10px;
}
.glossary-entry {
  display: grid;
  grid-template-columns: 200px 1fr;
  gap: 16px;
  padding: 8px 4px;
  border-bottom: 1px solid var(--rule-soft);
  font-size: 13px;
  line-height: 1.6;
}
.glossary-term { font-weight: 600; color: var(--ink); }
.glossary-reading { font-size: 11px; color: var(--ink-mute); font-family: var(--font-mono); margin-top: 2px; }
.glossary-def { color: var(--ink-soft); }
@media (max-width: 720px) {
  .glossary-entry { grid-template-columns: 1fr; gap: 4px; }
}

/* ============================================================ KaTeX overrides */

.katex { font-size: 1em; }
.katex-display { margin: 8px 0; overflow-x: auto; overflow-y: hidden; }

/* ============================================================ Mobile toggle */

.mobile-menu-btn {
  display: none;
  position: fixed;
  bottom: 20px;
  right: 20px;
  width: 48px;
  height: 48px;
  border-radius: 50%;
  background: var(--ink);
  color: var(--bg);
  border: 0;
  z-index: 50;
  cursor: pointer;
  box-shadow: 0 4px 14px -2px oklch(0.2 0.02 260 / 0.4);
}
@media (max-width: 760px) {
  .mobile-menu-btn { display: grid; place-items: center; }
  .sidebar.mobile-open {
    display: block;
    position: fixed;
    inset: 0;
    z-index: 100;
    width: 100%;
    height: 100%;
  }
}

/* Scrollbar */
::-webkit-scrollbar { width: 10px; height: 10px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--rule); border-radius: 5px; border: 2px solid var(--bg); }
::-webkit-scrollbar-thumb:hover { background: var(--ink-mute); }

// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel"
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">{children}</div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

function TweakColor({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <input type="color" className="twk-swatch" value={value}
             onChange={(e) => onChange(e.target.value)} />
    </div>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});

</script>

/* ============================================================
   0. renderSubSup — 文字列prop内の <sub>/<sup> をReact要素化
   SolveFlow.steps / ExamQuestion / ExamAnswer / Callout.title など
   {string} としてテキスト描画されるpropで <sub> がリテラル表示される
   問題を解消する。HTMLインジェクションはせず <sub>/<sup> のみ対象。
   別babelブロックからも使えるよう window 登録。
   ============================================================ */
const renderSubSup = (text) => {
  if (typeof text !== "string" || !/<(sub|sup)>/.test(text)) return text;
  return text.split(/(<(?:sub|sup)>[\s\S]*?<\/(?:sub|sup)>)/g).map((part, i) => {
    let m = part.match(/^<sub>([\s\S]*?)<\/sub>$/);
    if (m) return <sub key={i}>{m[1]}</sub>;
    m = part.match(/^<sup>([\s\S]*?)<\/sup>$/);
    if (m) return <sup key={i}>{m[1]}</sup>;
    return part;
  });
};
window.renderSubSup = renderSubSup;

/* <sub>/<sup> を LaTeX 下付き/上付き(_{}/^{})へ変換。KaTeX の tex= に渡す
   文字列内で誤って <sub> が使われている場合の保険。 */
const subSupToLatex = (tex) => (typeof tex === "string"
  ? tex.replace(/<sub>([\s\S]*?)<\/sub>/g, "_{$1}").replace(/<sup>([\s\S]*?)<\/sup>/g, "^{$1}")

   - TrapCheckPills: 上3つを trap-patterns 用に組み合わせる thin wrapper
   ============================================================ */

const RIRON_STATUS_DEFS = {
  understood: { label: "理解した", color: "#22c55e", icon: "✓" },
  vague:      { label: "うる覚え", color: "#f59e0b", icon: "?" },
  review:     { label: "要確認",   color: "#f97316", icon: "!" },
  wrong:      { label: "間違えた", color: "#dc2626", icon: "✗" },
};

const RIRON_TRAP_KEY = (num) => `denken_check::riron_trap-patterns::trap-${num}`;

// SRS（間隔反復）閾値: status 別「これだけ経ったら復習すべき」日数
const RIRON_SRS_THRESHOLD_DAYS = {
  wrong: 3,       // 間違えた → 3日後に再確認
  review: 7,      // 要確認 → 1週間後
  vague: 14,      // うる覚え → 2週間後
  understood: 30, // 理解した → 1か月後（定着確認）
};

const rironDaysSince = (isoDate) => {
  if (!isoDate) return null;
  const t = Date.parse(isoDate);
  if (isNaN(t)) return null;
  return Math.floor((Date.now() - t) / (1000 * 60 * 60 * 24));
};
const rironFormatDaysAgo = (isoDate) => {
  const d = rironDaysSince(isoDate);
  if (d === null) return "";
  if (d <= 0) return "今日";
  if (d === 1) return "昨日";
  return d + "日前";
};
const isRironReviewDue = (record) => {
  if (!record || !record.status) return false;
  const threshold = RIRON_SRS_THRESHOLD_DAYS[record.status];
  if (!threshold) return false;
  const d = rironDaysSince(record.updatedAt);
  return d !== null && d >= threshold;
};

const buildTrapMeta = (num, trap, category) => {
  const itemTitleBase = (trap || "").replace(/^[❌✅]\s*/, "").slice(0, 60);
  return {
    articleUrl: "https://kfurufuru.github.io/secretary-portal/denken3-riron-wiki.html#trap-patterns",
    articleTitle: "理論Wiki 引っかけパターン集",
    itemTitle: `#${num} ${category || ""} ${itemTitleBase}`.trim(),
    itemType: "riron-trap",
  };
};

// 汎用 hook: localStorage `denken_check::*` record を read/write
// 返り値: [record, setStatus(s|null), setMemo(text)]
function useCheckRecord(storageKey, buildMeta) {
  const read = () => {
    try {
      const raw = localStorage.getItem(storageKey);
      if (!raw) return null;
      return JSON.parse(raw);
    } catch (e) { return null; }
  };
  const [record, setRecord] = useState(read);

  useEffect(() => {
    const handler = (ev) => {
      if (!ev.key || ev.key === storageKey) setRecord(read());
    };
    window.addEventListener("storage", handler);
    return () => window.removeEventListener("storage", handler);
  }, [storageKey]);

  const write = (updater) => {
    try {
      const cur = read() || {};
      const next = updater(cur);
      if (next === null) {
        localStorage.removeItem(storageKey);
        setRecord(null);
      } else {
        localStorage.setItem(storageKey, JSON.stringify(next));
        setRecord(next);
      }
      try { window.dispatchEvent(new StorageEvent("storage", { key: storageKey })); } catch (e) {}
    } catch (e) { /* localStorage unavailable */ }
  };

  const setStatus = (newStatus) => {
    write((cur) => {
      // status を null にした時は memo が残っていれば record 保持、なければ削除
      if (!newStatus) {
        if (cur.memo) {
          return Object.assign({}, cur, { status: null, updatedAt: new Date().toISOString() });
        }
        return null;
      }
      const now = new Date().toISOString();
      const meta = buildMeta ? buildMeta() : {};
      // status 別の last*At を保持（直近 wrong だった日が status 変更で上書きされないように）
      const lastFieldKey = "last" + newStatus.charAt(0).toUpperCase() + newStatus.slice(1) + "At";
      // 状態遷移を最大 5 件保持。同 status への連打は履歴に追記しない
      const prevHistory = Array.isArray(cur.history) ? cur.history : [];
      const lastEntry = prevHistory[prevHistory.length - 1];
      const shouldAppend = !lastEntry || lastEntry.status !== newStatus;
      const nextHistory = shouldAppend
        ? prevHistory.concat([{ status: newStatus, at: now }]).slice(-5)
        : prevHistory;
      const patch = {
        status: newStatus,
        updatedAt: now,
        firstSeenAt: cur.firstSeenAt || now,
        reviewCount: (cur.reviewCount || 0) + 1,
        history: nextHistory,
      };
      patch[lastFieldKey] = now;
      return Object.assign({}, cur, meta, patch);
    });
  };

  const setMemo = (memoText) => {
    write((cur) => {
      const trimmed = (memoText || "").trim();
      // memo 空 + status なし → 削除
      if (!trimmed && !cur.status) return null;
      const now = new Date().toISOString();
      const meta = buildMeta ? buildMeta() : {};
      return Object.assign({}, cur, meta, {
        memo: trimmed,
        updatedAt: now,
        firstSeenAt: cur.firstSeenAt || now,
      });
    });
  };

  return [record, setStatus, setMemo];
}

// メモ欄（折りたたみ・onBlur保存）
const MemoField = ({ record, onSetMemo }) => {
  const stored = (record && record.memo) || "";
  const [open, setOpen] = useState(!!stored);
  const [draft, setDraft] = useState(stored);

  // 他タブで memo が変わった時の sync（self write の場合も含むが冪等）
  useEffect(() => {
    setDraft(stored);
    if (stored) setOpen(true);
  }, [stored]);

  const dirty = draft !== stored;
  return (
    <div style={{ marginTop: "8px" }}>
      <button
        type="button"
        onClick={() => setOpen((o) => !o)}
        aria-expanded={open}
        style={{
          background: "transparent",
          border: "none",
          color: "var(--ink-mute)",
          fontSize: "11px",
          fontWeight: 600,
          fontFamily: "inherit",
          cursor: "pointer",
          padding: "2px 0",
          letterSpacing: "0.04em",
        }}
      >
        📝 {open ? "メモを閉じる" : stored ? "メモを表示" : "メモを追加"}

   7. TrapPatternsPage
   引っかけパターン集ページ本体（38パターン、分野フィルタ付き）
   ============================================================ */

const TrapPatternsPage = ({ onNav }) => {
  const [filter, setFilter] = useState("全部");
  const [reviewOnly, setReviewOnly] = useState(false);
  const [sortMode, setSortMode] = useState("default"); // "default" | "review-due"
  const [storageVersion, setStorageVersion] = useState(0);
  const categories = ["全部", "電磁気", "直流", "交流", "三相", "電子", "計測"];

  const allPatterns =
    window.WIKI_DATA && window.WIKI_DATA.trapPatterns
      ? window.WIKI_DATA.trapPatterns
      : [];

  useEffect(() => {
    const handler = (ev) => {
      if (!ev.key || ev.key.indexOf("denken_check::riron_trap-patterns::") === 0) {
        setStorageVersion((v) => v + 1);
      }
    };
    window.addEventListener("storage", handler);
    return () => window.removeEventListener("storage", handler);
  }, []);

  // num → record 全体マップ（status/updatedAt/lastWrongAt等を集計・並び替え・CSV出力で参照）
  const recordByNum = useMemo(() => {
    const m = {};
    try {
      for (let i = 0; i < localStorage.length; i++) {
        const k = localStorage.key(i);
        if (!k || k.indexOf("denken_check::riron_trap-patterns::trap-") !== 0) continue;
        try {
          const raw = localStorage.getItem(k);
          if (!raw) continue;
          const parsed = JSON.parse(raw);
          if (!parsed) continue;
          const num = parseInt(k.replace("denken_check::riron_trap-patterns::trap-", ""), 10);
          if (!isNaN(num)) m[num] = parsed;
        } catch (e) { /* skip */ }
      }
    } catch (e) { /* unavailable */ }
    return m;
  }, [storageVersion]);

  const reviewStatuses = ["wrong", "review", "vague"];
  // counts はカテゴリフィルタを反映（reviewOnly は集計の母数を変えないため除外）
  const counts = useMemo(() => {
    const c = { wrong: 0, review: 0, vague: 0, understood: 0, reviewDue: 0 };
    const base = filter === "全部" ? allPatterns : allPatterns.filter((p) => p.category === filter);
    base.forEach((p) => {
      const r = recordByNum[p.num];
      const s = r && r.status;
      if (s && c[s] !== undefined) c[s] += 1;
      if (isRironReviewDue(r)) c.reviewDue += 1;
    });
    return c;
  }, [recordByNum, filter, allPatterns]);
  const reviewTotal = counts.wrong + counts.review + counts.vague;

  const filtered = useMemo(() => {
    let arr = allPatterns;
    if (filter !== "全部") arr = arr.filter((p) => p.category === filter);
    if (reviewOnly) {
      arr = arr.filter((p) => {
        const r = recordByNum[p.num];
        return r && reviewStatuses.indexOf(r.status) >= 0;
      });
    }
    if (sortMode === "review-due") {
      // 復習推奨順: status 優先度（wrong>review>vague>understood>none）× updatedAt 古い順
      const statusPriority = { wrong: 4, review: 3, vague: 2, understood: 1 };
      arr = arr.slice().sort((a, b) => {
        const ra = recordByNum[a.num];
        const rb = recordByNum[b.num];
        const pa = (ra && statusPriority[ra.status]) || 0;
        const pb = (rb && statusPriority[rb.status]) || 0;
        if (pa !== pb) return pb - pa;
        const da = (ra && rironDaysSince(ra.updatedAt)) || -1;
        const db = (rb && rironDaysSince(rb.updatedAt)) || -1;
        return db - da;
      });
    }
    return arr;
  }, [filter, allPatterns, reviewOnly, recordByNum, sortMode]);

  // CSV export: 列 = num, category, status, lastWrongAt, lastReviewAt, lastVagueAt, lastUnderstoodAt, reviewCount, memo, trap
  const handleExportCsv = () => {
    const isoToDate = (iso) => {
      if (!iso) return "";
      const d = new Date(iso);
      if (isNaN(d.getTime())) return "";
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, "0");
      const dd = String(d.getDate()).padStart(2, "0");
      return y + "-" + m + "-" + dd;
    };
    const esc = (v) => {
      const s = v === null || v === undefined ? "" : String(v);
      return '"' + s.replace(/"/g, '""') + '"';
    };
    const header = ["num", "category", "status", "lastWrongAt", "lastReviewAt", "lastVagueAt", "lastUnderstoodAt", "reviewCount", "memo", "trap"];
    const rows = allPatterns.map((p) => {
      const r = recordByNum[p.num] || {};
      return [
        p.num,
        p.category || "",
        r.status || "",
        isoToDate(r.lastWrongAt),
        isoToDate(r.lastReviewAt),
        isoToDate(r.lastVagueAt),
        isoToDate(r.lastUnderstoodAt),
        r.reviewCount || 0,
        (r.memo || "").replace(/\r?\n/g, " "),
        (p.trap || "").replace(/\r?\n/g, " "),
      ].map(esc).join(",");
    });
    const csv = "﻿" + header.join(",") + "\n" + rows.join("\n");
    const today = new Date();
    const ymd = today.getFullYear() + String(today.getMonth() + 1).padStart(2, "0") + String(today.getDate()).padStart(2, "0");
    const blob = new Blob([csv], { type: "text/csv;charset=utf-8" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = "riron-trap-patterns-" + ymd + ".csv";
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 1000);
  };

  const chipBase = {
    display: "inline-block",
    padding: "5px 14px",
    borderRadius: "999px",
    fontSize: "13px",
    fontWeight: 600,
    cursor: "pointer",
    border: "1px solid var(--rule)",
    background: "var(--bg-sunken)",
    color: "var(--ink-soft)",
    transition: "background 0.15s, color 0.15s",
    userSelect: "none",
  };

  const chipActive = {
    ...chipBase,
    background: "var(--accent)",
    color: "var(--bg)",
    border: "1px solid var(--accent)",
  };

  return (
    <>
      <PageHeader
        eyebrow="ELECTRICAL ENGINEER 3RD CLASS — THEORY"
        title="引っかけパターン集"
        deck="電験3種 理論科目で頻出の引っかけパターンを網羅。試験直前の総点検に活用する。"
      />

      <div className="content">
        <LearningMap

            <text x="140" y="100" textAnchor="middle" fontSize="11" fill="var(--ink-mute)">QV（長方形）</text>
            <text x="218" y="150" textAnchor="middle" fontSize="16" fontWeight="700" fill="var(--accent-ink)">W = ½QV</text>
            <text x="218" y="169" textAnchor="middle" fontSize="10.5" fill="var(--ink-mute)">たくわえたエネルギー</text>
          </svg>
          <figcaption style={{ fontSize: "12px", color: "var(--ink-mute)", textAlign: "center", marginTop: "6px", lineHeight: 1.6 }}>
            図：たて＝電圧、よこ＝電荷。色をぬった三角形がたくわえたエネルギー W で、点線の長方形 QV のちょうど半分。
          </figcaption>
        </figure>
        <p>たて＝電圧・よこ＝電荷の直線の下は<strong>三角形</strong>。その面積は「底辺 × 高さ ÷ 2」で、この<strong>÷2</strong>こそが <Eq tex="1/2" /> の正体。長方形 <Eq tex="QV" />（電圧がずっと V だったと仮定した値）のちょうど半分が、<Eq tex="W = \tfrac{1}{2}QV = \tfrac{1}{2}CV^2 = \tfrac{Q^2}{2C}" /> となる。</p>
      </Callout>
      <DetailLink to="capacitor" onNav={onNav} />

      <p><strong>確認事項：</strong></p>
      <ul>
        <li><Eq tex="W = Q^2/(2C) = CV^2/2 = QV/2" /> の3形式を切り替えられるか → パターン3</li>
        <li>直列接続で各コンデンサの電荷が等しい理由を説明できるか</li>
      </ul>

      <h3>磁気・電磁力</h3>
      <Callout variant="info" title="フレミング左手（モーター）と右手（発電機）の選び方">
        <p>「何が欲しいか」で手を選ぶ。<strong>力Fが欲しい→左手（モーター）</strong>、<strong>起電力eが欲しい→右手（発電機）</strong>。</p>
        <p>左手：中指=電流 I、人差し指=磁束密度 B、親指=力 F（IBF の順）。<br/>右手：中指=誘起起電力 e、人差し指=磁束密度 B、親指=速度 v（eBv の順）。</p>
      </Callout>
      <DetailLink to="electromagnetic-force" onNav={onNav} />

      <p><strong>確認事項：</strong></p>
      <ul>
        <li><Eq tex="F = BIL\sin\theta" /> の <Eq tex="\theta" /> が「電流と磁界の角」であることを確認できるか → パターン4</li>
        <li>誘導起電力 <Eq tex="e = BLv\sin\theta" /> の <Eq tex="\theta" /> が「速度と磁界の角」であることを確認できるか</li>
        <li>磁気回路の起磁力 <Eq tex="NI = Hl = \phi R_m" /> と電気回路のオームの法則の対応を説明できるか</li>
      </ul>

      <Callout variant="info" title="磁気抵抗 Rₘ = l/(μA) の意味">
        <p>電気抵抗 <Eq tex="R = \rho l/A" /> と対応。<Eq tex="\mu = \mu_0\mu_r" />（鉄心では <Eq tex="\mu_r" /> は数百〜数千）。空隙では <Eq tex="\mu_r = 1" /> なので磁気抵抗が急増する。鉄心区間と空隙区間で材料を必ず確認する。</p>
      </Callout>
      <DetailLink to="magnetic-circuit" onNav={onNav} />

      <p><strong>確認事項：</strong></p>
      <ul>
        <li>空隙の磁気抵抗 &gt; 鉄心の磁気抵抗（<Eq tex="\mu_r" />倍の差）を即答できるか → パターン5</li>
        <li>環状鉄心の起磁力計算（空隙あり・なし）を手順通り解けるか</li>
      </ul>

      <h3>直流回路</h3>
      <Callout variant="info" title="テブナンの定理の手順">
        <ol>
          <li>求めたい端子を開放し、開放電圧 <Eq tex="V_{oc}" /> を計算</li>
          <li>電源を短絡（電圧源→短絡、電流源→開放）して等価抵抗 <Eq tex="R_{th}" /> を計算</li>
          <li><Eq tex="I = V_{oc}/(R_{th} + R_L)" /> で負荷電流を求める</li>
        </ol>
      </Callout>
      <DetailLink to="dc-circuit" onNav={onNav} />

      <p><strong>確認事項：</strong></p>
      <ul>
        <li>キルヒホッフの電圧則（KVL）・電流則（KCL）の符号を正しく扱えるか</li>
        <li>最大電力伝達条件 <Eq tex="R_L = R_{th}" /> のときの最大電力 <Eq tex="P_{max} = V_{oc}^2/(4R_{th})" /> を導けるか → パターン9</li>
        <li>並列抵抗の合成で「逆数を戻す」ステップを忘れないか → パターン7</li>
      </ul>

      <hr/>

      <h2 id="day2"><span className="h-num">2</span>Day 2（試験2日前）— B問題の計算パターン確認</h2>

      <h3>三相交流</h3>
      <Callout variant="info" title="Y結線とΔ結線の√3の出る場所">
        <ul>
          <li><strong>Y結線</strong>: 線電圧 = <Eq tex="\sqrt{3}" /> × 相電圧 / 線電流 = 相電流（√3なし）</li>
          <li><strong>Δ結線</strong>: 線電圧 = 相電圧（√3なし） / 線電流 = <Eq tex="\sqrt{3}" /> × 相電流</li>
        </ul>
        <p><strong>「Y→電圧に√3、Δ→電流に√3」</strong> と整理する。混乱したら相回路を描いて、1相分の電圧・電流を基準に考え直す。</p>
      </Callout>
      <DetailLink to="three-phase" onNav={onNav} />

      <p><strong>確認事項：</strong></p>
      <ul>
        <li>Y-Δ変換時の相電圧・線電圧の関係を図なしで説明できるか → パターン13</li>
        <li>三相電力 <Eq tex="P = \sqrt{3}V_LI_L\cos\phi = 3V_PI_P\cos\phi" /> の2形式を使い分けられるか → パターン14</li>
        <li>三相不平衡時に中性点電流が発生する理由を説明できるか</li>
      </ul>

      <h3>RLC直列回路・共振</h3>
      <Callout variant="info" title="インピーダンス合成はベクトルで行う">
        <p><Eq tex="Z = \sqrt{R^2 + (X_L - X_C)^2}" />。直角三角形のベクトル合成。スカラー加算 <Eq tex="Z = R + X_L + X_C" /> は絶対に誤り。</p>
        <p>共振条件 <Eq tex="X_L = X_C \Rightarrow \omega L = 1/(\omega C) \Rightarrow \omega_0 = 1/\sqrt{LC}" />。</p>
      </Callout>
      <DetailLink to="rlc-resonance" onNav={onNav} />

      <p><strong>確認事項：</strong></p>
      <ul>
        <li>直列共振時の電流最大・インピーダンス最小（<Eq tex="Z = R" />）を説明できるか</li>
        <li>Q値（尖鋭度）<Eq tex="Q = \omega_0 L / R" /> の大小が帯域幅に与える影響を説明できるか</li>
        <li>位相角 <Eq tex="\theta = \arctan\{(X_L - X_C)/R\}" /> の符号（誘導性か容量性か）を判定できるか</li>
      </ul>

      <h3>過渡現象</h3>
      <Callout variant="info" title="スイッチ投入直後のコンデンサ・インダクタの扱い">
        <ul>
          <li><strong>コンデンサ（初期電荷ゼロ）</strong>: <Eq tex="t=0^+" /> では<strong>短絡</strong>（電圧維持が不可→電流最大）</li>
          <li><strong>インダクタ（初期電流ゼロ）</strong>: <Eq tex="t=0^+" /> では<strong>開放</strong>（電流維持が不可→電流ゼロ）</li>
          <li>定常状態では逆転：コンデンサ→開放（充電完了）、インダクタ→短絡（電流一定）</li>
        </ul>
      </Callout>
      <DetailLink to="transient" onNav={onNav} />

      <p><strong>確認事項：</strong></p>
      <ul>
        <li>時定数 <Eq tex="\tau = RC" />（CR回路）/ <Eq tex="\tau = L/R" />（LR回路）を即答できるか</li>
        <li><Eq tex="\tau" /> 後に「約63%」定常値に達する（≒100%ではない）ことを説明できるか → パターン19</li>
        <li>過渡応答の式 <Eq tex="i(t) = I_\infty + (I_0 - I_\infty)e^{-t/\tau}" /> を任意の初期値・定常値で使えるか</li>
      </ul>

      <hr/>

      <h2 id="day1"><span className="h-num">3</span>Day 1（試験前日）— R08予測テーマの重点確認</h2>

      <h3>磁気回路（最優先：R06上〜R07上 3回連続空白）</h3>
      <Callout variant="warn" title="R08（2026年8月）最高確率テーマ">
        波分析より、磁気回路は直近3回連続で出題なし。環状鉄心の磁束密度・起磁力計算、またはヒステリシス特性の論述が出題候補。
      </Callout>
      <DetailLink to="magnetic-circuit" onNav={onNav} />

      <p><strong>確認事項：</strong></p>
      <ul>
        <li>環状鉄心（空隙あり）の計算手順：<Eq tex="NI = H_{\text{iron}}l_{\text{iron}} + H_{\text{gap}}l_{\text{gap}}" /> を適用できるか</li>
        <li>ヒステリシス損 <Eq tex="P_h \propto f B_m^{1.6}" />、渦電流損 <Eq tex="P_e \propto f^2 B_m^2" /> の周波数依存性を説明できるか</li>
        <li>残留磁気・保磁力の意味と用途（ハードとソフト磁性材料の使い分け）を説明できるか</li>
      </ul>

      <h3>オペアンプ（高確率：R07上空白）</h3>
      <Callout variant="info" title="仮想短絡（仮想接地）の適用条件">
        <p>負帰還がかかっているとき、差動入力電圧は限りなくゼロ。</p>
        <ul>
          <li>反転増幅: <Eq tex="V_{out} = -\frac{R_f}{R_i}V_{in}" />（マイナス符号を忘れない）</li>
          <li>非反転増幅: <Eq tex="V_{out} = \left(1 + \frac{R_f}{R_i}\right)V_{in}" /></li>
          <li>積分回路: 入力を時間積分した出力。<Eq tex="V_{out} = -\frac{1}{RC}\int V_{in}\,dt" /></li>
        </ul>
      </Callout>
      <DetailLink to="op-amp" onNav={onNav} />

      <p><strong>確認事項：</strong></p>
      <ul>
        <li>反転・非反転増幅のゲイン式を抵抗値から直接導けるか（仮想接地を使った導出で）→ パターン17</li>
        <li>開ループゲインが有限の場合に「仮想接地が成立しない」条件を説明できるか</li>
      </ul>

      <h3>ブリッジ回路（中高確率：R07上空白）</h3>
      <Callout variant="info" title="ホイートストンブリッジの平衡条件の導出">
        <p>菱形回路で検流計電流ゼロ → 向かい合う辺の積が等しい：<Eq tex="R_1 R_4 = R_2 R_3" />。「覚える」より「キルヒホッフで計算すると平衡条件が出てくる」流れを追えること。平衡時は電源を含む経路で電流が流れ、検流計のみ電流ゼロ（全体がゼロではない）。</p>
      </Callout>
      <DetailLink to="bridge-circuit" onNav={onNav} />

      <p><strong>確認事項：</strong></p>
      <ul>
        <li>平衡条件の「向かい合う辺の積」が指す辺を、菱形を描いて確認できるか</li>
        <li>「平衡=全電流ゼロ」の誤解を修正できるか（電流は流れる、検流計のみゼロ）</li>
        <li>未知抵抗を求める計算（<Eq tex="R_x = R_2 R_3/R_1" />）を平衡条件から導けるか</li>
      </ul>

      <hr/>

      <h2 id="morning"><span className="h-num">4</span>当日朝 — 最重要確認表（5分で黙読）</h2>

      <table>
        <thead>
          <tr><th>項目</th><th>式・値</th></tr>

        <tbody>

const ExamTimer = () => {
  const PRESETS = [
    { label: "A問題 3分", sec: 180 },
    { label: "B問題 10分", sec: 600 },
    { label: "30秒チェック", sec: 30 },
  ];
  const [left, setLeft] = React.useState(180);
  const [running, setRunning] = React.useState(false);
  const [picked, setPicked] = React.useState(180);

  React.useEffect(() => {
    if (!running || left <= 0) return;
    const t = setTimeout(() => setLeft((s) => s - 1), 1000);
    return () => clearTimeout(t);
  }, [running, left]);

  const choose = (sec) => { setPicked(sec); setLeft(sec); setRunning(false); };
  const safe = Math.max(left, 0);
  const mm = String(Math.floor(safe / 60)).padStart(2, "0");
  const ss = String(safe % 60).padStart(2, "0");
  const done = left <= 0;

  const btn = (bg) => ({ padding: "6px 16px", borderRadius: 6, border: "none", background: bg, color: "#fff", cursor: "pointer", fontSize: 13, fontWeight: 600 });
  const chip = (active) => ({ padding: "4px 12px", borderRadius: 999, border: "1px solid var(--rule)", background: active ? "#2563eb" : "transparent", color: active ? "#fff" : "var(--ink-soft)", cursor: "pointer", fontSize: 12 });

  return (
    <div style={{ border: "1px solid var(--rule)", borderRadius: 8, padding: "14px 16px", background: "var(--bg-elev)", margin: "10px 0" }}>
      <div style={{ display: "flex", gap: 8, flexWrap: "wrap", marginBottom: 10 }}>
        {PRESETS.map((p) => (
          <button key={p.sec} style={chip(picked === p.sec)} onClick={() => choose(p.sec)}>{p.label}</button>
        ))}
      </div>
      <div style={{ fontSize: 40, fontWeight: 700, fontVariantNumeric: "tabular-nums", textAlign: "center", color: done ? "#dc2626" : "var(--ink)", letterSpacing: 1 }}>{mm}:{ss}</div>
      <div style={{ display: "flex", gap: 8, justifyContent: "center", marginTop: 10 }}>
        <button style={btn(running ? "#6b7280" : "#16a34a")} onClick={() => setRunning((r) => !r)} disabled={done}>{running ? "一時停止" : "スタート"}</button>
        <button style={btn("#6b7280")} onClick={() => { setRunning(false); setLeft(picked); }}>リセット</button>
      </div>
      {done && <p style={{ textAlign: "center", color: "#dc2626", fontWeight: 600, marginTop: 8, fontSize: 13 }}>⏰ 時間切れ — 本番ならここで印をつけて次の問題へ</p>}
    </div>
  );
};

      <p>フレミングの左手・右手の使い分け。電磁誘導・ファラデーの法則。「左手 = 力、右手 = 起電力」で覚える。</p>

      <h4>STEP 9 — 磁気回路（目安: 1〜2日）</h4>
      <p>電気回路との対応関係で理解する（起磁力 ↔ 電圧、磁束 ↔ 電流、磁気抵抗 ↔ 抵抗）。この対応を頭に入れると、電気回路の計算テクニックをそのまま転用できる。</p>

      <h4>STEP 10 — インダクタンス（目安: 1〜2日）</h4>
      <p>自己インダクタンスと相互インダクタンス。コイルのエネルギー蓄積式（W = LI²/2）まで。RLC回路での XL = ωL と接続して理解する。</p>

      <h4>STEP 11 — 過渡現象（目安: 2〜3日）</h4>
      <p>RC回路とRL回路の充放電。時定数 τ = RC または τ = L/R。「時定数の時間で63%まで変化する」だけ覚えれば計算パターンは決まっている。</p>

      <h4>STEP 12 — 半導体（目安: 1日）</h4>
      <p>N型・P型の違い、PN接合・ダイオードの整流作用。概念整理が中心。計算よりも用語の定義問題が多い。</p>

      <h4>STEP 13 — トランジスタ（目安: 2日）</h4>
      <p>バイポーラトランジスタの動作原理と電流増幅率（hFE）。IC = hFE × IB、IE = IB + IC の2式が基本。</p>

      <h4>STEP 14 — オペアンプ（目安: 1日）</h4>
      <p>反転増幅・非反転増幅の利得計算。仮想短絡（イマジナリショート）の概念を理解すれば計算は公式に当てはめるだけ。</p>

      <h4>STEP 15 — 計器の原理（目安: 1日）</h4>
      <p>可動コイル・可動鉄片・整流型の特徴と適用範囲。「可動コイル = 直流専用、可動鉄片 = 交直両用」が頻出。</p>

      <h4>STEP 16 — ブリッジ回路（目安: 1日）</h4>
      <p>ホイートストンブリッジの平衡条件（R1R4 = R2R3）。平衡・不平衡の両方の計算パターンを押さえる。</p>

      <h2 id="weakness"><span className="h-num">2</span>弱点別・過去問逆引き</h2>
      <p>過去問を解いて間違えた問題を、対応テーマに紐付けて集中学習するためのパス。「どこを直せばいいか」を素早く特定し、無駄なく弱点を潰す。</p>

      <h3>「位相差の±符号でいつも迷う」人向け</h3>
      <p><strong>原因</strong>: ELIのICEを丸暗記しているが、フェーザー図との対応で「進む＝角度が大きい＝正」なのか混乱している。</p>
      <p><strong>対策</strong>: 交流回路基礎の「フェーザー図の読み方」で「反時計回りが正の位相（進み）」を確認 → ELIのICEを図で確認（暗記ではなく原理から追う）。</p>
      <Callout variant="tip" title="判定基準">
        フェーザー図で「基準ベクトルより反時計回り＝進み位相＝正の位相角」。「進む」「遅れる」は常に電圧を基準に表現される点に注意。
      </Callout>

      <h3>「インピーダンスでスカラー加算してしまう」人向け</h3>
      <p><strong>原因</strong>: 抵抗・コイル・コンデンサのインピーダンスをベクトル量ではなくスカラー量として扱っている。RとXL、XCは90°位相がずれているため、単純加算は不可。</p>
      <Callout variant="warn" title="絶対に誤りの式">
        Z = R + XL + XC はスカラー加算であり、<strong>常に誤り</strong>。R と (XL − XC) は互いに直交するベクトルなので、合成はピタゴラスで行う。
      </Callout>

      <h3>「過渡現象の初期値・最終値の設定が苦手」人向け</h3>
      <table>
        <thead>
          <tr><th>素子</th><th>t=0⁺（初期電荷/電流ゼロの場合）</th><th>t=∞（定常状態）</th></tr>
        </thead>
        <tbody>
          <tr><td>コンデンサ</td><td>短絡（電流が流れる）</td><td>開放（充電完了）</td></tr>
          <tr><td>インダクタ</td><td>開放（電流が流れない）</td><td>短絡（電流一定）</td></tr>
        </tbody>
      </table>
      <Callout variant="tip" title="覚え方ではなく理解">
        コンデンサは「電圧を急変できない」→ t=0⁺では電圧ゼロ＝短絡と等価。インダクタは「電流を急変できない」→ t=0⁺では電流ゼロ＝開放と等価。
      </Callout>

      <h3>「三相交流の√3がわからない」人向け</h3>
      <table>
        <thead>
          <tr><th>結線</th><th>電圧の関係</th><th>電流の関係</th></tr>
        </thead>
        <tbody>
          <tr><td>Y結線</td><td>線電圧 = <strong>√3</strong> × 相電圧</td><td>線電流 = 相電流</td></tr>
          <tr><td>Δ結線</td><td>線電圧 = 相電圧</td><td>線電流 = <strong>√3</strong> × 相電流</td></tr>
        </tbody>
      </table>
      <Callout variant="tip" title="確認の仕方">
        「√3はどこか？」→ Y結線なら「電圧側」、Δ結線なら「電流側」と即答できるまで反復。
      </Callout>

      <h3>「コンデンサと直流の関係が混乱する」人向け</h3>
      <table>
        <thead>
          <tr><th>状況</th><th>コンデンサの扱い</th></tr>
        </thead>
        <tbody>
          <tr><td>定常状態（直流が十分流れた後）</td><td><strong>開放</strong>（充電完了で電流ゼロ）</td></tr>
          <tr><td>スイッチ投入直後（初期電荷ゼロ）</td><td><strong>短絡</strong>（電圧がゼロ、電流最大）</td></tr>
          <tr><td>交流回路</td><td>インピーダンス XC = 1/(2πfC) をもつ素子</td></tr>
        </tbody>
      </table>

      <h3>「磁気回路の出発点がわからない」人向け</h3>
      <table>
        <thead>
          <tr><th>電気回路</th><th>磁気回路</th><th>対応</th></tr>
        </thead>
        <tbody>
          <tr><td>電流 I [A]</td><td>磁束 φ [Wb]</td><td>流れるもの</td></tr>
          <tr><td>起電力 V [V]</td><td>起磁力 NI [A]</td><td>駆動力</td></tr>
          <tr><td>抵抗 R [Ω]</td><td>磁気抵抗 Rm [A/Wb]</td><td>流れにくさ</td></tr>
          <tr><td>オームの法則 V = IR</td><td>NI = φ × Rm</td><td>同じ構造</td></tr>
        </tbody>
      </table>
      <Callout variant="tip" title="解き方の手順">
        磁気回路の問題は「電気回路の問題に置き換えて解く」だけ。Rm = l/(μA) で磁気抵抗を求めたら、あとは電気回路と同じ手順で計算できる。
      </Callout>

      <h3>「Q値の式を直列・並列で間違える」人向け</h3>
      <table>
        <thead>
          <tr><th>回路</th><th>Q値の式</th><th>物理的意味</th></tr>
        </thead>
        <tbody>
          <tr><td>直列RLC</td><td>Q = ωL/R = 1/(ωCR)</td><td>電流が最大のとき電圧拡大率</td></tr>
          <tr><td>並列RLC</td><td>Q = R/(ωL) = ωCR</td><td>電圧が最大のとき電流拡大率</td></tr>
        </tbody>
      </table>
      <Callout variant="tip" title="混同しない方法">
        「直列のQ」は「Rが分母（Rが大きいと損失が多くQが下がる）」。「並列のQ」は「Rが分子（Rが大きいと電流が分散しにくくQが上がる）」。直並列での「Rの役割の逆転」を理解すると間違えにくい。
      </Callout>

      <h3>「オペアンプの仮想接地をいつ使えばいいかわからない」人向け</h3>
      <p><strong>仮想接地の適用手順：</strong></p>
      <ol>
        <li>負帰還があるか確認（出力から入力の－端子への帰還経路があるか）</li>
        <li>ある場合：V+ = V−（差動入力電圧＝0）と置く</li>
        <li>ない場合：仮想接地は使えない（オープンループ動作）</li>
      </ol>
      <Callout variant="info" title="電験3種の試験では">
        出題されるオペアンプ回路はほぼすべて負帰還あり。仮想接地を使ってKCLを立てれば、ゲイン式は必ず導出できる。
      </Callout>

      <h3>「力率改善でtanφとsinφを使い分けられない」人向け</h3>
      <p><strong>力率改善の計算ルート：</strong></p>
      <pre style={{background: "#f5f5f5", padding: "12px", borderRadius: "4px", fontSize: "0.9em"}}>
{`改善前: tanφ1 = Q1/P, sinφ1 = Q1/S1
改善後: tanφ2 = Q2/P
補償無効電力: ΔQ = Q1 − Q2 = P(tanφ1 − tanφ2)
コンデンサ容量: C = ΔQ/(ωV²) または ΔQ = V²ωC`}
      </pre>
      <Callout variant="tip" title="tanφとsinφのどちらを使うか">
        有効電力Pが既知のとき → <strong>tanφを使う</strong>（Q = P tanφ）。皮相電力Sが既知のとき → <strong>sinφを使う</strong>（Q = S sinφ）。力率改善の問題では有効電力Pが与えられることが多いのでtanφが主役。
      </Callout>

      <h2 id="last-minute"><span className="h-num">3</span>直前対策（圧縮版）</h2>
      <p>試験前日〜当日朝に「5秒で思い出す」だけ確認するためのページ。新しいことを学ぶ場所ではない。知っていることを「頭から取り出しやすい状態」にするために使う。</p>

      <Callout variant="warn" title="このページの使い方">
        前日に全部読んでも逆効果。自分が不安なテーマだけピンポイントで確認すること。「あ、そうだった」と思えればOK。「全然わからない」なら今更やっても間に合わない。
      </Callout>

      <h3>電気回路（5秒で思い出す）</h3>
      <Callout variant="tip" title="直流回路">
        <strong>V = IR、KCL（電流の和=0）、KVL（電圧の和=0）、テブナン（1つの電源+1つの抵抗に等価変換）</strong>
      </Callout>
      <Callout variant="tip" title="交流回路基礎">
        <strong>V = Vm/√2（実効値）、ELIのICE（コイルは電圧が進む、コンデンサは電流が進む）</strong>
      </Callout>
      <Callout variant="tip" title="RLC回路">
        <strong>Z = √(R² + (XL - XC)²)、共振条件 = XL = XC（そのとき Z = R が最小）</strong>
      </Callout>
      <Callout variant="tip" title="交流電力">
        <strong>P = VIcosφ（有効電力）、Q = VIsinφ（無効電力）、S² = P² + Q²（皮相電力）</strong>
      </Callout>
      <Callout variant="tip" title="三相交流">
        <strong>Y結線: 線間電圧 = √3 × 相電圧、線電流 = 相電流</strong><br/>
        <strong>Δ結線: 線間電圧 = 相電圧、線電流 = √3 × 相電流</strong>
      </Callout>
      <Callout variant="tip" title="過渡現象">
        <strong>τ = RC または τ = L/R（時定数）、時定数の時間で63%まで変化する</strong>
      </Callout>
      <Callout variant="tip" title="ブリッジ回路">
        <strong>平衡条件: R1R4 = R2R3（対角の積が等しい）、平衡時は中間抵抗に電流が流れない</strong>
      </Callout>

      <h3>電磁気（5秒で思い出す）</h3>
      <Callout variant="tip" title="静電気">
        <strong>F = Q1Q2/(4πε₀r²)（クーロンの法則）、平行平板: E = V/d、C = ε₀εrS/d</strong>
      </Callout>
      <Callout variant="tip" title="コンデンサ">
        <strong>C = ε₀εrS/d、直列は逆数の和の逆数（抵抗の並列と同じ計算）、並列は足し算</strong><br/>
        <strong>エネルギー W = CV²/2 = Q²/(2C)</strong>
      </Callout>
      <Callout variant="tip" title="電磁力">
        <strong>F = BIL（電磁力）、e = BLv（誘導起電力）、左手 = 力（モータ）、右手 = 起電力（発電）</strong>
      </Callout>
      <Callout variant="tip" title="磁気回路">
        <strong>φ = NI/Rm（磁束 = 起磁力/磁気抵抗）、電気回路との対応（φ↔I、NI↔V、Rm↔R）</strong>
      </Callout>
      <Callout variant="tip" title="インダクタンス">
        <strong>e = -L × dI/dt（自己誘導起電力）、W = LI²/2（コイルのエネルギー）</strong><br/>
        <strong>相互インダクタンス M = k√(L1L2)（k: 結合係数）</strong>
      </Callout>

      <h3>電子理論・電気計測（5秒で思い出す）</h3>
      <Callout variant="tip" title="半導体">
        <strong>N型 = 電子が多数キャリア（ドナー添加）、P型 = 正孔が多数キャリア（アクセプタ添加）</strong><br/>
        <strong>PN接合の順方向 = 電流が流れる、逆方向 = 電流がほぼ流れない</strong>
      </Callout>
      <Callout variant="tip" title="トランジスタ">
        <strong>IC = hFE × IB（コレクタ電流 = 電流増幅率 × ベース電流）、IE = IB + IC</strong>
      </Callout>
      <Callout variant="tip" title="オペアンプ">
        <strong>反転増幅: Av = -Rf/Ri（マイナスは位相反転）</strong><br/>
        <strong>非反転増幅: Av = 1 + Rf/Ri（常に1以上）</strong>
      </Callout>
      <Callout variant="tip" title="計器の原理">
        <strong>可動コイル形 = 直流専用（永久磁石で動く）</strong><br/>
        <strong>可動鉄片形 = 交直両用（実効値を指示）</strong><br/>
        <strong>倍率器 = 電圧計の直列抵抗、分流器 = 電流計の並列抵抗</strong>
      </Callout>

        <li><strong>縦/横の見分けミス</strong>: 厚さ方向積層=直列。誘電体が「左右に並ぶ」のは並列。図を見て即判定すること</li>
        <li><strong>直列なのに各層で Q が違うと誤解</strong>: 直列接続では Q が等しい（電荷保存）。配分するのは V（電圧分担）</li>

        <li><strong>単位確認漏れ</strong>: ε₀ [F/m]・S [m²]・d [m] → ε₀S/d [F]・cm² や mm が来たら換算必須</li>
        <li><strong>定電圧 vs 定電荷の混同</strong>: 「電源電圧を印加」=定電圧状態・Q は CV で計算（Q 一定として解くと誤り）</li>
      </ol>

            <td><strong>③ 位相（電流分解）</strong></td>
            <td><Eq tex="\cos\varphi = I_{\text{有効}} / I" inline /></td>
            <td>電流ベクトルのうち電圧と同位相な成分の割合。電流を電圧軸に射影した長さ÷電流大きさ</td>
          </tr>
          <tr>
            <td><strong>④ 時間平均（瞬時電力）</strong></td>
            <td><Eq tex="\cos\varphi = \langle v(t) i(t) \rangle / (VI)" inline /></td>
            <td>瞬時電力の時間平均 ÷ 電圧電流実効値の積。1秒間に運ばれた純エネルギー比</td>
          </tr>
        </tbody>
      </table>
      <p style={{ marginTop: 10 }}>
        <strong>本質を 1 行で</strong>: cosφ ＝ <strong>「電流のうち電圧と同位相な成分の割合」</strong>。<strong>幾何・電力・位相・時間平均</strong>のどれで測っても同じ値。<strong>力率改善とは「電流分解で sin成分（直交）を C で打ち消し、cos成分（同位相）の比率を上げる」</strong>こと。
      </p>
      <p style={{ marginTop: 8, fontSize: 12, color: "var(--ink-soft)" }}>
        ※ 試験問題は4視点のどれかで聞いてくる。「電力比 cosφ=P/S」だけ覚えると、インピーダンス比 R/Z で出題されたとき公式が出てこない。
      </p>
    </Callout>

    <h2 id="power-factor-improvement"><span className="h-num">5</span>力率改善：原理・計算手順・過補償</h2>
    <p>
      誘導性負荷（モータ等）に並列にコンデンサを接続すると、Cの進相無効電力で負荷の遅相無効電力を打ち消す。<strong>P には触らず Q だけ減らす</strong>ことで、S = √(P² + Q²) が小さくなる ⇒ 契約 kVA が下がる ⇒ 電気代が下がる。
    </p>
    <Callout variant="info" title="計算手順（4ステップ）">
      <p>1. <strong>改善前の無効電力</strong>：<Eq tex="Q_1 = P\tan\varphi_1" /></p>
      <p>2. <strong>改善後の無効電力</strong>：<Eq tex="Q_2 = P\tan\varphi_2" />（目標力率 cosφ₂ から tanφ₂ = sinφ₂/cosφ₂）</p>
      <p>3. <strong>必要な補償容量</strong>：<Eq tex="Q_C = Q_1 - Q_2 = P(\tan\varphi_1 - \tan\varphi_2)" /> [var]</p>
      <p>4. <strong>コンデンサ容量</strong>：<Eq tex="C = \dfrac{Q_C}{\omega V^2}" /> [F]</p>
    </Callout>
    <Callout variant="warn" title="過補償（H22 問8 頻出）">
      <p><strong>Q_C を Q₁ より大きく取ると Q₂ &lt; 0</strong> となり、進相力率（容量性）に振れる。「力率を改善したつもりが逆方向に行った」という引っかけ。<strong>目標 cosφ₂ = 1（Q₂ = 0）</strong> が最も計算しやすい目安。実務では cosφ = 0.95〜0.99 程度を目標にする（完全に1にすると共振リスク）。</p>
    </Callout>

    <h2 id="distortion-and-rc"><span className="h-num">6</span>ひずみ波・RC直列・周波数特性（R06上・R04下・H19 頻出）</h2>
    <h3>ひずみ波の電力（R06上 問9）</h3>
    <p>
      高調波を含む交流（ひずみ波）の有効電力は<strong>周波数ごとに個別計算して合算</strong>する：
    </p>
    <p style={{ textAlign: "center", margin: "10px 0" }}>
      <Eq tex="P = V_1 I_1 \cos\varphi_1 + V_3 I_3 \cos\varphi_3 + V_5 I_5 \cos\varphi_5 + \cdots" />
    </p>
    <p>
      実効値は <Eq tex="I = \sqrt{I_1^2 + I_3^2 + I_5^2 + \cdots}" inline />・<Eq tex="V = \sqrt{V_1^2 + V_3^2 + \cdots}" inline />。<strong>異なる周波数成分間では平均電力の積分がゼロ</strong>（直交）なので個別合算でよい。<strong>P = VI cosφ（基本波の値だけ）はひずみ波には使えない</strong>。
    </p>

    <h3>RC直列回路の消費電力（R04下 問9）</h3>
    <p>
      コンデンサは電力を消費しない。有効電力は抵抗 R のみ：
    </p>
    <p style={{ textAlign: "center", margin: "10px 0" }}>
      <Eq tex="Z = \sqrt{R^2 + X_C^2}, \quad I = V/Z, \quad P = I^2 R = \dfrac{V^2 R}{R^2 + X_C^2}" />
    </p>
    <p>
      <strong>P = V²/R を使ってはいけない</strong>：この式は「電源電圧 V が全部 R にかかる」純抵抗回路のみ。直列では V_R &lt; V（R と X_C で分圧）。
    </p>

    <h3>周波数変化と力率（H19 問8）</h3>
    <table className="data-table">
      <thead>
        <tr><th>回路</th><th>周波数 ↑ のとき</th><th>力率の変化</th></tr>
      </thead>
      <tbody>
        <tr><td>RL 直列</td><td>X_L = ωL ↑ → Z ↑</td><td>cosφ = R/Z <strong>減少</strong>（力率悪化）</td></tr>
        <tr><td>RC 直列</td><td>X_C = 1/(ωC) ↓ → Z ↓</td><td>cosφ = R/Z <strong>増加</strong>（力率改善）</td></tr>
      </tbody>
    </table>
    <p style={{ fontSize: "13px" }}>
      <strong>共振条件（RLC直列・X_L = X_C）では cosφ = 1（最大）</strong>。この周波数が共振周波数 f₀ = 1/(2π√(LC))。
    </p>

    <h2 id="traps"><span className="h-num">7</span>よくある勘違い（引っかけ集 7項目）</h2>
    <Callout variant="warn" title="① 無効電力の単位を [W] と書く">
      <p>❌ 単位を全部 [W] にしてしまう。✅ <strong>P=W・Q=var・S=VA</strong>。3つとも物理次元は J/s で同じだが、意味が違うため単位を書き分ける（IEC 規格）。試験では選択肢に単位違いの罠が混入する。</p>
    </Callout>
    <Callout variant="warn" title="② 力率計算で cosφ と sinφ を逆に使う">
      <p>❌ 「P = VI sinφ」「Q = VI cosφ」と書く。✅ <strong>P = VI cosφ（コサインが有効・コ＝ショウヒ）</strong>・<strong>Q = VI sinφ</strong>。電流ベクトルを電圧軸に射影した cos成分が「仕事をする部分」と覚える。</p>
    </Callout>
    <Callout variant="warn" title="③ P + Q = S と足し算する（パターン29 / H21問11・R03下問11 類出）">
      <p>❌ 「3つとも電力なら足せる」。✅ P と Q は<strong>直交ベクトル</strong>。<strong>S² = P² + Q²</strong>（電力三角形・S が斜辺）。<strong>Q の符号は負荷で変わる</strong>（誘導性で正・容量性で負）。符号を誤ると力率改善の補償方向が逆になる致命ミス。</p>
    </Callout>
    <Callout variant="warn" title="④ 単相3線式の消費電力を「電源電圧 × 2」で計算（H22 問7 類出）">
      <p>❌ 線間 200V × 2 で計算する。✅ <strong>単相3線式は中性線を共有する2つの単相回路の組合せ</strong>。各負荷が線間電圧（200V）か中性線間電圧（100V）のどちらに接続されているかを<strong>回路図で確認</strong>。平衡負荷なら中性線電流ゼロ。消費電力は<strong>P = I₁²R₁ + I₂²R₂</strong> で合算。</p>
    </Callout>
    <Callout variant="warn" title="⑤ 過補償で進相側に振れる（H22 問8 類出）">
      <p>❌ コンデンサ容量を大きくすれば力率は1に近づくと思い込む。✅ <strong>Q_C &gt; Q₁ になると Q₂ &lt; 0</strong>（進相側）。「力率改善したのに方向が逆」になる。<strong>目標 Q₂ = 0（cosφ₂ = 1）</strong> が最も安全。</p>
    </Callout>
    <Callout variant="warn" title="⑥ RC直列で P = V²/R を使う（R04下 問9）">
      <p>❌ 「P = V²/R は公式だから使える」。✅ <strong>P = V²/R は純抵抗回路のみ</strong>（V が全部 R にかかる前提）。直列では V_R &lt; V。<strong>正解は P = I²R = V²R/(R² + X_C²)</strong> または P = VI cosφ（cosφ = R/Z）。</p>
    </Callout>
    <Callout variant="warn" title="⑦ ひずみ波で P = VI cosφ をそのまま使う（R06上 問9）">
      <p>❌ 「公式は1個だから OK」。✅ ひずみ波は<strong>各次数（基本波・3次・5次...）で個別計算して合算</strong>：<strong>P = ΣV_n I_n cosφ_n</strong>。実効値も <Eq tex="I = \sqrt{\sum I_n^2}" inline />。<strong>力率も「cosφ」という単純角度関係にならない</strong>。</p>
    </Callout>

    <h2 id="complex-power"><span className="h-num">8</span>拡張：複素電力 S = V·I*（参考・Level 2）</h2>
    <details style={{ marginTop: 12, padding: "10px 14px", background: "var(--bg-elev)", border: "1px solid var(--rule)", borderRadius: "6px" }}>
      <summary style={{ cursor: "pointer", fontWeight: 600 }}>🔬 Level 2：複素電力の定義となぜ電流の共役をとるか（R02 問題で出題）</summary>
      <p style={{ marginTop: 8 }}>
        電圧フェーザ <Eq tex="\dot{V} = V e^{j\theta_V}" inline />・電流フェーザ <Eq tex="\dot{I} = I e^{j\theta_I}" inline /> とするとき、複素電力：
      </p>
      <p style={{ textAlign: "center", margin: "10px 0" }}>
        <Eq tex="\dot{S} = \dot{V}\dot{I}^* = VI e^{j(\theta_V - \theta_I)} = VI(\cos\varphi + j\sin\varphi)" />
      </p>
      <p>
        <strong>なぜ共役 İ*</strong>：そのまま V̇İ を計算すると位相が θ_V + θ_I の二重加算になり、欲しい位相差 φ = θ_V − θ_I が出ない。共役で正しく位相差が抽出される。
      </p>
      <p style={{ textAlign: "center", margin: "10px 0" }}>
        <Eq tex="P = \text{Re}[\dot{S}] = VI\cos\varphi, \quad Q = \text{Im}[\dot{S}] = VI\sin\varphi" />
      </p>
      <p style={{ fontSize: "13px" }}>
        実部が有効電力・虚部が無効電力に自動対応。電力三角形 S² = P² + Q² が複素平面上で自然に成立。
      </p>
    </details>
  </>
);

        ① Va (上) と Vb (右下・120°差) → ② Vb を反転して −Vb (Va と 60° の角度) → ③ Va と −Vb の合成が Vab。|Vab| = √3 × V<sub>p</sub>（120°差の余弦定理が必然）。
      </figcaption>
