const TOC = ({ page }) => {
  const [items, setItems] = useState([]);
  const [active, setActive] = useState(null);
  useEffect(() => {
    let cancelled = false;
    const update = () => {
      if (cancelled) return;
      const heads = document.querySelectorAll('.content h2[id], .content h3[id]');
      const next = [...heads].map(h => ({
        id: h.id,
        text: h.textContent.replace(/^\d+\.?\s*/, '').trim(),
        level: h.tagName === 'H2' ? 2 : 3,
      }));
      setItems(prev => {
        if (prev.length === next.length && prev.every((p, i) => p.id === next[i].id)) return prev;
        return next;
      });
    };
    update();
    const t = setTimeout(update, 200);
    return () => { cancelled = true; clearTimeout(t); };
  }, [page]);
  useEffect(() => {
    const onScroll = () => {
      const heads = [...document.querySelectorAll('.content h2[id], .content h3[id]')];
      let cur = null;
      for (const h of heads) {
        if (h.getBoundingClientRect().top < 80) cur = h.id;
      }
      setActive(prev => prev === cur ? prev : cur);
    };
    window.addEventListener('scroll', onScroll, { passive: true });
    onScroll();
    return () => window.removeEventListener('scroll', onScroll);
  }, [page]);
  if (items.length === 0) return <aside className="toc" />;
  return (
    <aside className="toc">
      <div className="toc-label">On this page</div>
      <ul>
        {items.map(it => (
          <li key={it.id} className={it.level === 3 ? 'h3' : ''}>
            <a href={`#${it.id}`} className={active === it.id ? 'active' : ''}>{it.text}</a>
          </li>
        ))}
      </ul>
    </aside>
  );
};

  return items;
}

function searchIndex(idx, q) {
  if (!q || !q.trim()) return [];
  const lower = q.toLowerCase();
  return idx.filter(i => i.terms.toLowerCase().includes(lower)).slice(0, 12).map(i => {
    const re = new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'i');

/* ─── PDCA ヘルパー（riron_ namespace） ─── */
function _rironDailyTodayStr() {
  const d = new Date();
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return y + '-' + m + '-' + day;
}
function _rironDailyDateOffset(baseStr, days) {
  const d = new Date(baseStr + 'T00:00:00');
  d.setDate(d.getDate() + days);
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return y + '-' + m + '-' + day;
}
function _rironDailyGetLog(qid) {
  try {
    const raw = localStorage.getItem('riron_daily_pool_log::' + qid);
    return raw ? JSON.parse(raw) : null;
  } catch (e) { return null; }
}
function _rironDailySetLog(qid, log) {
  try { localStorage.setItem('riron_daily_pool_log::' + qid, JSON.stringify(log)); } catch (e) {}
}
function _rironDailyGetHistory() {
  try {
    const raw = localStorage.getItem('riron_daily_history');
    return raw ? JSON.parse(raw) : [];
  } catch (e) { return []; }
}
function _rironDailyPushHistory(entry) {
  try {
    const arr = _rironDailyGetHistory();
    arr.unshift(entry);
    if (arr.length > 30) arr.length = 30;
    localStorage.setItem('riron_daily_history', JSON.stringify(arr));
  } catch (e) {}
}
function _rironDailyGetServed() {
  try {
    const raw = localStorage.getItem('riron_daily_today');
    const today = _rironDailyTodayStr();
    if (!raw) return { date: today, served: [] };
    const parsed = JSON.parse(raw);
    if (parsed && parsed.date === today && Array.isArray(parsed.served)) return parsed;
    return { date: today, served: [] };
  } catch (e) { return { date: _rironDailyTodayStr(), served: [] }; }
}
function _rironDailyMarkServed(qid) {
  const cur = _rironDailyGetServed();
  if (cur.served.indexOf(qid) < 0) cur.served.push(qid);
  cur.date = _rironDailyTodayStr();
  try { localStorage.setItem('riron_daily_today', JSON.stringify(cur)); } catch (e) {}
}
function _rironDailySelectQuestion(pool, attemptN) {
  const today = _rironDailyTodayStr();
  const served = _rironDailyGetServed().served;
  const servedSet = new Set(served);
  const servedTopics = new Set(pool.filter(p => servedSet.has(p.id)).map(p => p.topic));
  const scored = pool.map(q => {
    const log = _rironDailyGetLog(q.id);
    let priority;
    if (!log) priority = 2;
    else if (log.next_due && log.next_due > today) priority = 9;
    else if (log.last_result === 'wrong') priority = 0;
    else if (log.last_result === 'vague') priority = 1;
    else priority = 3;
    return { q: q, priority: priority, lastSeen: (log && log.last_seen) || '' };
  });
  let candidates = scored.filter(s => s.priority < 9);
  if (attemptN > 0) {
    const notYet = candidates.filter(s => !servedSet.has(s.q.id));
    if (notYet.length > 0) candidates = notYet;
    const diffTopic = candidates.filter(s => !servedTopics.has(s.q.topic));
    if (diffTopic.length > 0) candidates = diffTopic;
  }
  if (candidates.length === 0) {
    candidates = scored.filter(s => attemptN === 0 || !servedSet.has(s.q.id));
    if (candidates.length === 0) candidates = scored;
  }
  candidates.sort((a, b) => {
    if (a.priority !== b.priority) return a.priority - b.priority;
    return (a.lastSeen || '').localeCompare(b.lastSeen || '');
  });
  return candidates[0].q;
}
function _rironDailyRecordAnswer(q, result) {
  const today = _rironDailyTodayStr();
  const log = _rironDailyGetLog(q.id) || { correct_count: 0, wrong_count: 0, vague_count: 0, streak: 0 };
  log.last_result = result;
  log.last_seen = today;
  let dueDays;
  if (result === 'correct') {
    log.correct_count = (log.correct_count || 0) + 1;
    log.streak = (log.streak || 0) + 1;
    dueDays = Math.min(7 * log.streak, 30);
  } else if (result === 'vague') {
    log.vague_count = (log.vague_count || 0) + 1;
    log.streak = 0;
    dueDays = 2;
  } else {
    log.wrong_count = (log.wrong_count || 0) + 1;
    log.streak = 0;
    dueDays = 1;
  }
  log.next_due = _rironDailyDateOffset(today, dueDays);
  _rironDailySetLog(q.id, log);
  _rironDailyPushHistory({
    date: today,
    qid: q.id,
    topic: q.topic,
    result: result,
    qShort: q.q.length > 36 ? q.q.slice(0, 36) + '…' : q.q,
  });
  try {
    const mnKey = 'denken_check::riron_daily_' + q.id;
    const status = result === 'correct' ? 'understood' : result;
    const existing = localStorage.getItem(mnKey);
    const base = existing ? (JSON.parse(existing) || {}) : {};
    const now = new Date().toISOString();
    const updated = Object.assign({}, base, {
      status: status,
      updatedAt: now,
      firstSeenAt: base.firstSeenAt || now,
      reviewCount: (base.reviewCount || 0) + 1,
      source: 'riron-daily-pool',
      qShort: q.q.length > 36 ? q.q.slice(0, 36) + '…' : q.q,
      topic: q.topic,
    });
    localStorage.setItem(mnKey, JSON.stringify(updated));
  } catch (e) {}
}
function _rironDailyGetTopicStats(pool, labels) {
  const byTopic = {};
  for (const q of pool) {
    if (!byTopic[q.topic]) {
      byTopic[q.topic] = { topic: q.topic, label: (labels && labels[q.topic]) || q.topic, total: 0, correct: 0 };
    }
    const log = _rironDailyGetLog(q.id);
    if (!log) continue;
    const c = log.correct_count || 0;
    const w = log.wrong_count || 0;
    const v = log.vague_count || 0;
    byTopic[q.topic].total += (c + w + v);
    byTopic[q.topic].correct += c;
  }
  return Object.values(byTopic).filter(t => t.total > 0);
}

const RironDailyQuestion = ({ onNav }) => {
  const [answered, setAnswered] = React.useState(null);
  const [currentQ, setCurrentQ] = React.useState(null);
  const [attemptN, setAttemptN] = React.useState(0);
  const [historyOpen, setHistoryOpen] = React.useState(false);
  const [dailyVersion, setDailyVersion] = React.useState(0);

  React.useEffect(() => {
    if (!currentQ && RIRON_DAILY_POOL.length > 0) {
      const q = _rironDailySelectQuestion(RIRON_DAILY_POOL, 0);
      setCurrentQ(q);
      _rironDailyMarkServed(q.id);
    }
  // eslint-disable-next-line react-hooks/exhaustive-deps
  }, []);

  const dailyHistory = React.useMemo(() => _rironDailyGetHistory(), [dailyVersion, historyOpen]);
  const topicWeakSpots = React.useMemo(() => {
    const stats = _rironDailyGetTopicStats(RIRON_DAILY_POOL, RIRON_DAILY_TOPIC_LABEL);
    return stats
      .map(t => ({ ...t, rate: t.total === 0 ? 1 : t.correct / t.total }))
      .sort((a, b) => a.rate - b.rate);
  }, [dailyVersion]);

  const todayJpStr = () => {
    const d = new Date();
    return d.getFullYear() + '年' + (d.getMonth() + 1) + '月' + d.getDate() + '日';
  };

  const handleChoice = (correct) => {
    if (answered !== null || !currentQ) return;
    const result = correct ? 'correct' : 'wrong';
    setAnswered(result);
    _rironDailyRecordAnswer(currentQ, result);
    setDailyVersion(v => v + 1);
  };
  const handleVague = () => {
    if (answered !== null || !currentQ) return;
    setAnswered('vague');
    _rironDailyRecordAnswer(currentQ, 'vague');
    setDailyVersion(v => v + 1);
  };
  const handleNext = () => {
    if (!currentQ) return;
    const next = attemptN + 1;
    const q = _rironDailySelectQuestion(RIRON_DAILY_POOL, next);
    setCurrentQ(q);
    _rironDailyMarkServed(q.id);
    setAttemptN(next);
    setAnswered(null);
  };

  return (
    <div id="riron-daily" style={{ margin: '24px 0', padding: '20px', border: '1px solid var(--rule)', borderRadius: 10, background: 'var(--bg-elev)' }}>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: 12 }}>
        <div>
          <div style={{ fontSize: 11, color: 'var(--ink-mute)', fontWeight: 700, letterSpacing: '0.08em', marginBottom: 4 }}>DAILY · 1問1分</div>
          <h3 style={{ margin: 0, fontSize: 16, fontWeight: 700 }}>今日の一問（理論）</h3>
          <p style={{ margin: '4px 0 0', fontSize: 12, color: 'var(--ink-soft)' }}>
            考え方・公式・穴埋め型の53問プール。間違い/うろ覚えは <strong>翌日〜2日後</strong> に再出題、正解は <strong>+7日</strong> から間隔を延ばします。
          </p>
        </div>
        <button onClick={() => setHistoryOpen(true)} style={{ background: 'none', border: 'none', color: 'var(--accent)', cursor: 'pointer', fontSize: 12, padding: 0 }}>過去の一問 →</button>
      </div>
      {!currentQ ? (
        <div style={{ fontSize: 12, color: 'var(--ink-mute)' }}>問題プール読み込み中…</div>
      ) : (
        <div>
          <div style={{ fontSize: 11, color: 'var(--ink-mute)', marginBottom: 6 }}>{todayJpStr()}</div>
          <p style={{ margin: '0 0 8px', fontWeight: 600, lineHeight: 1.6, fontSize: 14 }}>{currentQ.q}</p>
          <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap', marginBottom: 12, fontSize: 11 }}>
            <span style={{ padding: '1px 6px', background: currentQ.rank==='S' ? '#fef3c7' : currentQ.rank==='A' ? '#dbeafe' : '#e5e7eb', borderRadius: 3, fontWeight: 700 }}>{currentQ.rank}</span>
            <span style={{ padding: '1px 6px', background: 'var(--bg-sunken)', borderRadius: 3 }}>#{RIRON_DAILY_TOPIC_LABEL[currentQ.topic] || currentQ.topic}</span>
            {(currentQ.tags || []).map(t => <span key={t} style={{ padding: '1px 6px', background: 'var(--bg-sunken)', borderRadius: 3 }}>{t}</span>)}
            <span style={{ color: 'var(--ink-mute)' }}>· 平均正答率 {currentQ.avgRate}</span>
          </div>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
            {currentQ.choices.map((c) => {
              let bg = 'var(--bg)';
              let border = '1px solid var(--rule)';
              let color = 'var(--ink)';
              if (answered !== null) {
                if (c.correct) { bg = '#d4f0d4'; border = '1px solid #52a952'; color = '#1a6b1a'; }
                else if (!c.correct && answered === 'wrong') { bg = '#fde8e8'; border = '1px solid #d95454'; color = '#9b2020'; }
              }
              return (
                <button key={c.key} onClick={() => handleChoice(c.correct)} style={{
                  display: 'flex', alignItems: 'center', gap: 8,
                  background: bg, border, borderRadius: 6, padding: '8px 12px',
                  cursor: answered !== null ? 'default' : 'pointer',
                  color, fontSize: 13, textAlign: 'left', fontFamily: 'inherit',
                }}>
                  <span style={{ fontWeight: 700, minWidth: 18 }}>{c.key}</span>
                  <span>{c.label}</span>
                </button>
              );
            })}
          </div>
          {answered === null && (
            <div style={{ marginTop: 8 }}>
              <button onClick={handleVague} style={{
                padding: '5px 10px', background: 'transparent', border: '1px dashed var(--rule)',
                borderRadius: 6, cursor: 'pointer', color: 'var(--ink-mute)', fontSize: 11, fontFamily: 'inherit',
              }}>うろ覚え（自信なし）として記録</button>
              <span style={{ marginLeft: 8, fontSize: 10, color: 'var(--ink-mute)' }}>→ 2日後に再出題されます</span>
            </div>
          )}
          {answered !== null && (
            <>
              <div style={{
                marginTop: 10, padding: '8px 12px', borderRadius: 6,
                background: answered === 'correct' ? '#d4f0d4' : answered === 'vague' ? '#fff4dc' : '#fde8e8',
                color: answered === 'correct' ? '#1a6b1a' : answered === 'vague' ? '#8a6914' : '#9b2020',
                fontSize: 12, lineHeight: 1.6,
              }}>
                <strong>{answered === 'correct' ? '✓ 正解 ' : answered === 'vague' ? '? うろ覚え記録 ' : '✗ 不正解 '}</strong>
                <span style={{ fontWeight: 400 }}>{currentQ.explanation}</span>
                {Array.isArray(currentQ.evidence) && currentQ.evidence.length > 0 && (
                  <div style={{ marginTop: 4, fontSize: 10, opacity: 0.85 }}>
                    根拠: {currentQ.evidence.join(' / ')}
                    {currentQ.verified === 'pending' && (
                      <span style={{ marginLeft: 6, padding: '1px 5px', background: 'rgba(0,0,0,0.06)', borderRadius: 3 }}>⚠ 要レビュー</span>
                    )}
                  </div>
                )}
              </div>
              <div style={{ display: 'flex', gap: 6, marginTop: 10, flexWrap: 'wrap' }}>
                {currentQ.wikiPageId && (
                  <button onClick={() => onNav && onNav(currentQ.wikiPageId)} style={{
                    padding: '6px 12px', background: 'var(--accent)', color: 'var(--bg)', border: 'none',
                    borderRadius: 6, cursor: 'pointer', fontSize: 12, fontWeight: 700, fontFamily: 'inherit',
                  }}>→ 詳しく学ぶ</button>
                )}
                <button onClick={handleNext} style={{
                  padding: '6px 12px', background: 'var(--bg)', color: 'var(--ink)', border: '1px solid var(--rule)',
                  borderRadius: 6, cursor: 'pointer', fontSize: 12, fontWeight: 700, fontFamily: 'inherit',
                }}>もう1問やる →</button>
              </div>
            </>
          )}
          {topicWeakSpots.length > 0 && (
            <div style={{ marginTop: 12, padding: '8px 12px', background: 'var(--bg-sunken)', border: '1px solid var(--rule)', borderRadius: 6 }}>
              <div style={{ fontSize: 10, color: 'var(--ink-mute)', fontWeight: 700, letterSpacing: '0.06em', marginBottom: 6 }}>分野別正答率（弱点順 · 累計）</div>
              <div style={{ display: 'flex', gap: 12, flexWrap: 'wrap' }}>
                {topicWeakSpots.map(t => {
                  const color = t.rate < 0.5 ? '#d95454' : t.rate < 0.75 ? '#e6a817' : '#1a6b1a';
                  return (
                    <div key={t.topic} style={{ fontSize: 12 }}>
                      <strong>{t.label}</strong>
                      <span style={{ color: color, marginLeft: 4, fontWeight: 600 }}>{Math.round(t.rate * 100)}%</span>
                      <span style={{ color: 'var(--ink-mute)', fontSize: 10, marginLeft: 3 }}>({t.correct}/{t.total})</span>
                    </div>
                  );
                })}
              </div>
            </div>
          )}
        </div>
      )}
      {historyOpen && (
        <div onClick={() => setHistoryOpen(false)} style={{
          position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.45)',
          display: 'flex', alignItems: 'center', justifyContent: 'center', zIndex: 1000, padding: 20,
        }}>
          <div onClick={(e) => e.stopPropagation()} style={{
            background: 'var(--bg)', borderRadius: 8, padding: 20,
            maxWidth: 600, width: '100%', maxHeight: '80vh', overflow: 'auto',
            border: '1px solid var(--rule)',
          }}>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 12 }}>
              <h4 style={{ margin: 0, fontSize: 14, fontWeight: 700 }}>過去の一問（直近30件）</h4>
              <button onClick={() => setHistoryOpen(false)} style={{ background: 'none', border: 'none', cursor: 'pointer', fontSize: 18, color: 'var(--ink-mute)', padding: 0 }}>×</button>
            </div>
            {dailyHistory.length === 0 ? (
              <div style={{ fontSize: 12, color: 'var(--ink-mute)' }}>まだ解答履歴がありません。</div>
            ) : (
              <>
                {(() => {
                  const total = dailyHistory.length;
                  const cc = dailyHistory.filter(h => h.result === 'correct').length;
                  const vv = dailyHistory.filter(h => h.result === 'vague').length;
                  const ww = dailyHistory.filter(h => h.result === 'wrong').length;
                  return (
                    <div style={{ marginBottom: 10, fontSize: 11, color: 'var(--ink-mute)' }}>
                      合計 <strong>{total}</strong> 件 · 正答率 <strong style={{ color: '#1a6b1a' }}>{Math.round(cc/total*100)}%</strong>{' '}
                      (✓ {cc} / ? {vv} / ✗ {ww})
                    </div>
                  );
                })()}
                <table style={{ width: '100%', fontSize: 11, borderCollapse: 'collapse' }}>
                  <thead>
                    <tr style={{ borderBottom: '1px solid var(--rule)', color: 'var(--ink-mute)' }}>
                      <th style={{ textAlign: 'left', padding: '4px 6px' }}>日付</th>
                      <th style={{ textAlign: 'left', padding: '4px 6px' }}>分野</th>
                      <th style={{ textAlign: 'left', padding: '4px 6px' }}>問題</th>
                      <th style={{ textAlign: 'center', padding: '4px 6px' }}>結果</th>
                    </tr>
                  </thead>
                  <tbody>
                    {dailyHistory.map((h, i) => (
                      <tr key={i} style={{ borderBottom: '1px solid var(--rule)' }}>
                        <td style={{ padding: '4px 6px', color: 'var(--ink-mute)' }}>{(h.date || '').slice(5)}</td>
                        <td style={{ padding: '4px 6px' }}>{RIRON_DAILY_TOPIC_LABEL[h.topic] || h.topic}</td>
                        <td style={{ padding: '4px 6px', color: 'var(--ink-soft)' }}>{h.qShort}</td>
                        <td style={{
                          padding: '4px 6px', textAlign: 'center', fontWeight: 700,
                          color: h.result === 'correct' ? '#1a6b1a' : h.result === 'vague' ? '#8a6914' : '#d95454',
                        }}>{h.result === 'correct' ? '✓' : h.result === 'vague' ? '?' : '✗'}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </>
            )}
          </div>
        </div>
      )}
    </div>
  );
};

/* ---------- App ---------- */
const App = () => {
  const data = window.WIKI_DATA;
  const [tweaks, setTweak] = window.useTweaks ? window.useTweaks(TWEAK_DEFAULTS) : [TWEAK_DEFAULTS, () => {}];

  const [page, setPage] = useState(() => {
    const h = location.hash.replace(/^#/, '').split(':')[0];
    return h && pageIds().includes(h) ? h : 'home';
  });
  const [mobileOpen, setMobileOpen] = useState(false);
  const [searchQuery, setSearchQuery] = useState('');
  const searchIdx = useMemo(() => buildSearchIndex(data), [data]);
  const searchResults = useMemo(() => searchIndex(searchIdx, searchQuery), [searchIdx, searchQuery]);

  // Apply tweaks to root
  useEffect(() => {
    document.documentElement.dataset.theme = tweaks.theme;
    document.documentElement.dataset.accent = tweaks.accent;
    document.documentElement.dataset.difficulty = tweaks.difficulty;
    document.documentElement.style.setProperty('--fs-base', tweaks.fontSize + 'px');
    document.documentElement.style.setProperty('--lh-base', tweaks.lineHeight);
  }, [tweaks]);

  const navigate = (id) => {
    setPage(id);
    location.hash = id;
    window.scrollTo({ top: 0, behavior: 'auto' });
  };
  useEffect(() => {
    const onHash = () => {
      const h = location.hash.replace(/^#/, '').split(':')[0];
      if (h && pageIds().includes(h)) setPage(h);
    };
    window.addEventListener('hashchange', onHash);
    return () => window.removeEventListener('hashchange', onHash);
  }, []);

  function pageIds() {
    return ['home', ...data.chapters.flatMap(c => c.pages.map(p => p.id))];
  }

  const renderPage = () => {
    const props = { data, onNav: navigate };
    switch (page) {
      case 'home':               return <HomePage {...props} />;
      case 'coulomb-field':      return <CoulombFieldPage {...props} />;
      case 'capacitor':          return <CapacitorPage {...props} />;
      case 'electromagnetic-force': return <ElectromagneticForcePage {...props} />;
      case 'magnetic-circuit':   return <MagneticCircuitPage {...props} />;
      case 'dc-circuit':         return <DcCircuitPage {...props} />;
      case 'ac-basics':          return <AcBasicsPage {...props} />;
      case 'ac-power':           return <AcPowerPage {...props} />;
      case 'rlc-resonance':      return <RlcResonancePage {...props} />;
      case 'bridge-circuit':     return <BridgeCircuitPage {...props} />;
      case 'radian-measure':     return <RadianMeasurePage {...props} />;
      case 'phase-difference':   return <PhaseDifferencePage {...props} />;
      case 'inductance':         return <InductancePage {...props} />;
      case 'transient':          return <TransientPage {...props} />;
      case 'three-phase':        return <ThreePhasePage {...props} />;
      case 'semiconductor':      return <SemiconductorPage {...props} />;
      case 'transistor':         return <TransistorPage {...props} />;
      case 'op-amp':             return <OpAmpPage {...props} />;
      case 'electron-motion':    return <ElectronMotionPage {...props} />;
      case 'measurement':        return <MeasurementPage {...props} />;
      case 'trap-patterns':      return <TrapPatternsPage {...props} />;
      case 'last-3days':         return <Last3DaysPage {...props} />;
      case 'retake-strategy':    return <RetakeStrategyPage {...props} />;
      case 'exam-operation':     return <ExamOperationPage {...props} />;
      case 'trends':             return <TrendsPage {...props} />;
      case 'glossary':           return <GlossaryPage {...props} />;
      case 'guide':              return <GuidePage {...props} />;
      case 'formulas':           return <FormulaListPage {...props} />;
      case 'circuit-patterns':   return <CircuitPatternsPage {...props} />;
      case 'dual-map':           return <DualMapPage {...props} />;
      default:                   return <HomePage {...props} />;
    }
  };

  return (
    <>
      <div className="app">
        <Sidebar chapters={data.chapters} currentPage={page} onNav={navigate}
                 mobileOpen={mobileOpen} onCloseMobile={() => setMobileOpen(false)}
                 searchQuery={searchQuery} onSearchChange={setSearchQuery}
                 searchResults={searchResults}
                 onSearchSelect={(r) => { navigate(r.id); setSearchQuery(''); }} />
        <main className="main" key={page}>{renderPage()}</main>
        <TOC key={`toc-${page}`} page={page} />
      </div>
      <button className="mobile-menu-btn" onClick={() => setMobileOpen(o => !o)} aria-label="メニュー">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
          <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
      </button>

      {window.TweaksPanel && (
        <window.TweaksPanel title="Tweaks">
          <window.TweakSection title="表示">
            <window.TweakRadio label="テーマ" value={tweaks.theme} onChange={(v) => setTweak('theme', v)}
              options={[{ value: 'light', label: 'ライト' }, { value: 'dark', label: 'ダーク' }]} />
            <window.TweakRadio label="アクセント" value={tweaks.accent} onChange={(v) => setTweak('accent', v)}
              options={[
                { value: 'indigo', label: 'インディゴ' },
                { value: 'forest', label: 'フォレスト' },
                { value: 'rust', label: 'ラスト' },
                { value: 'aubergine', label: 'オーベルジン' },
              ]} />
          </window.TweakSection>
          <window.TweakSection title="タイポグラフィ">
            <window.TweakSlider label="フォントサイズ" value={tweaks.fontSize} onChange={(v) => setTweak('fontSize', v)}
              min={13} max={19} step={1} suffix="px" />
            <window.TweakSlider label="行間" value={tweaks.lineHeight} onChange={(v) => setTweak('lineHeight', v)}
              min={1.5} max={2.2} step={0.05} />
          </window.TweakSection>
          <window.TweakSection title="コンテンツ">
            <window.TweakRadio label="難易度フィルタ" value={tweaks.difficulty} onChange={(v) => setTweak('difficulty', v)}
              options={[
                { value: 'basic', label: '基礎' },
                { value: 'standard', label: '標準' },
                { value: 'advanced', label: '応用' },
              ]} />
          </window.TweakSection>
        </window.TweaksPanel>
      )}
    </>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);

</script>
</body>
</html>
