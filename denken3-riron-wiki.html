    <Callout variant="tip" title="👁️ 余弦定理の腑落ち（監修者 input 反映・2026-05-29）">
      <p>監修者さん指摘 (PR #85): 「√3 の余弦定理導出が暗記止まり」。上のステップ図解で <strong>「なぜ √3 が必然か」</strong> を視覚的に確認:</p>
      <ol style={{ margin: "6px 0", paddingLeft: 22, lineHeight: 1.8 }}>
        <li><strong>Va と Vb は 120° 開いた等大ベクトル</strong>（どちらも長さ V<sub>p</sub>）</li>
        <li><strong>−Vb は Vb の反対方向</strong>（長さ V<sub>p</sub> のまま・180° 回転）</li>
        <li><strong>Va と −Vb のなす角は 60°</strong>（180°−120°＝60°）</li>
        <li><strong>余弦定理</strong>: <Eq tex="|V_{ab}|^2 = V_p^2 + V_p^2 - 2 V_p^2 \cos(60°) \cdot (-1) \cdot \text{(...式変形)}" inline /> ⇒ 結局 <Eq tex="3 V_p^2" inline /></li>
        <li><strong>∴ |Vab| = √3 V<sub>p</sub></strong> — 120° 等大ベクトル差は <strong>「必ず √3 倍」</strong></li>
      </ol>
      <p style={{ marginTop: 8, fontSize: 12, color: "var(--ink-soft)" }}>※ <strong>Va + (−Vb) = Va − Vb</strong> と等価。図ではベクトル合成として「Va 先端から −Vb 方向」に並べた。</p>
    </Callout>

    <h3>Δ結線：I<sub>L</sub> = √3 I<sub>P</sub> の理由</h3>
    <p>Δ結線の各相電流はループ内を流れる。線電流 I_a は<strong>隣接する 2 つの相電流の差</strong>：</p>
    <p style={{ textAlign: "center", margin: "10px 0" }}>
      <Eq tex="I_a = I_{ab} - I_{ca}" />
    </p>
    <p>同じく 120° ずれた等大ベクトルの差なので、全く同じ余弦定理計算で：</p>
    <p style={{ textAlign: "center", margin: "10px 0" }}>
      <Eq tex="|I_a| = \sqrt{3}\,I_P" />
    </p>
    <Callout variant="tip" title="本質">
      <p>Y も Δ も <strong>√3 の出る理由は同じ</strong>（120° ベクトル差）。違うのは「差を取る対象」が電圧か電流か。Y は中性点があるから相電圧 ⇒ 線間電圧は<strong>電圧差</strong>。Δ は電源側が線間に直結し、相電流がループを流れるから線電流は<strong>電流差</strong>。</p>
    </Callout>

    <h2 id="three-phase-power"><span className="h-num">5</span>三相電力 P = √3 V<sub>L</sub> I<sub>L</sub> cosφ の導出</h2>
    <SectionCheck pageId="three-phase" sectionId="three-phase-power" />
    <p>
      平衡三相の有効電力は単純に「1 相分の電力 × 3」：
    </p>
    <p style={{ textAlign: "center", margin: "10px 0" }}>
      <Eq tex="P = 3\,V_P I_P \cos\varphi" />
    </p>
    <p>これを線間電圧・線電流で書き換える。Y結線の場合、<Eq tex="V_P = V_L/\sqrt{3}" inline />、<Eq tex="I_P = I_L" inline /> を代入：</p>
    <p style={{ textAlign: "center", margin: "10px 0" }}>
      <Eq tex="P = 3 \cdot \frac{V_L}{\sqrt{3}} \cdot I_L \cdot \cos\varphi = \sqrt{3}\,V_L I_L \cos\varphi" />
    </p>
    <p>Δ結線でも <Eq tex="V_P = V_L" inline />、<Eq tex="I_P = I_L/\sqrt{3}" inline /> で同じ結果になる。<strong>つまり線間で書けば結線によらず共通形</strong>。</p>
    <Callout variant="warn" title="cosφ の適用条件">
      <p>cosφ は<strong>負荷側の力率</strong>（電圧と電流の位相差の余弦）。系統全体の力率と混同しない。問題文で「力率 cosφ = 0.8 遅れ」と与えられたら、その負荷の電圧・電流の位相差から決まる値。</p>
    </Callout>

    <h2 id="y-delta-transform"><span className="h-num">6</span>Y-Δ等価変換の使いどころ</h2>
    <SectionCheck pageId="three-phase" sectionId="y-delta-transform" />
    <p>平衡三相負荷の Y-Δ 等価変換は係数 <strong>3</strong> 倍の単純式：</p>
    <p style={{ textAlign: "center", margin: "10px 0" }}>
      <Eq tex="Z_Y = \frac{Z_\Delta}{3} \quad \Leftrightarrow \quad Z_\Delta = 3\,Z_Y" />
    </p>
    <p>使いどころは「電源 Y・負荷 Δ」または「電源 Δ・負荷 Y」の混在回路。<strong>Δ 負荷を Y 等価に変換すれば Y-Y 形になり、1 相分の等価回路で解ける</strong>。</p>
    <Callout variant="tip" title="覚え方">
      <p><strong>Y 側が小さい</strong>（÷3）。Δ は 3 個並列に見えるので合成抵抗が大きく見えるイメージ。逆向きは ×3。「Y → Δ なら ×3、Δ → Y なら ÷3」と方向で覚える。</p>
    </Callout>
    <Callout variant="warn" title="不平衡では使えない">
      <p>Z_Y = Z_Δ / 3 は<strong>平衡三相専用</strong>。各相のインピーダンスが異なる不平衡負荷には一般の Y-Δ 変換式（3 抵抗の積/和）が必要だが、電験 3 種ではほぼ出ない。</p>
    </Callout>

    <Callout variant="info" title="🧑 2 電力計法の原理（Blondel定理→公式導出・監修者 input 反映 2026-05-29）">
      <p>監修者さん指摘 (PR #85): 「2電力計法は理解が足りない・公式機械暗記」。<strong>Blondel 定理</strong>から導出すれば「なぜ 2 つで足りるか」「なぜ √3 が出るか」が一本道で繋がる。</p>

      <p style={{ marginTop: 10 }}><strong>① Blondel 定理</strong>: n 本の電線がある回路の総電力は、(n−1) 個の電力計で測定できる。三相 3 線式 (n=3) なら <strong>2 個の電力計で完全測定可能</strong>。</p>

      <p style={{ marginTop: 10 }}><strong>② 接続方法</strong>: 線 c を電圧基準点として、W₁ は <strong>V<sub>ac</sub> × I<sub>a</sub></strong>、W₂ は <strong>V<sub>bc</sub> × I<sub>b</sub></strong> を測る（c 線には電力計を入れない）。</p>
      <p style={{ textAlign: "center", margin: "8px 0" }}>
        <Eq tex="W_1 = V_{ac} I_a \cos\theta_1, \quad W_2 = V_{bc} I_b \cos\theta_2" />
      </p>

      <p style={{ marginTop: 10 }}><strong>③ 有効電力の和 P = W₁ + W₂ の導出</strong>: 瞬時電力 <Eq tex="p_a + p_b + p_c" inline /> を c 基準で書き換えると、c の項がキルヒホッフ電流則 <Eq tex="i_a + i_b + i_c = 0" inline /> で消える:</p>
      <p style={{ textAlign: "center", margin: "8px 0" }}>
        <Eq tex="P = W_1 + W_2 = \sqrt{3}\,V_L I_L \cos\varphi" />
      </p>

      <p style={{ marginTop: 10 }}><strong>④ 力率角の導出 tan φ = √3(W₁−W₂)/(W₁+W₂)</strong>: 平衡三相では位相関係から:</p>
      <p style={{ textAlign: "center", margin: "8px 0" }}>
        <Eq tex="W_1 - W_2 = V_L I_L \sin\varphi" />
      </p>
      <p>これを <Eq tex="W_1 + W_2 = \sqrt{3} V_L I_L \cos\varphi" inline /> で割ると:</p>
      <p style={{ textAlign: "center", margin: "8px 0" }}>
        <Eq tex="\frac{W_1 - W_2}{W_1 + W_2} = \frac{\tan\varphi}{\sqrt{3}} \;\;\Rightarrow\;\; \tan\varphi = \frac{\sqrt{3}(W_1 - W_2)}{W_1 + W_2}" />
      </p>

      <p style={{ marginTop: 10, fontSize: 13 }}><strong>特殊ケース表</strong>（暗記回避用）:</p>
      <table className="data-table" style={{ marginTop: 4 }}>
        <thead><tr><th>力率 cosφ</th><th>W₁ と W₂ の関係</th><th>解釈</th></tr></thead>
        <tbody>
          <tr><td>1.0（純抵抗）</td><td>W₁ = W₂</td><td>tan φ = 0・両電力計が等しく振れる</td></tr>
          <tr><td>0.5（60° 遅れ）</td><td>W₂ = 0</td><td>tan φ = √3・W₂ がゼロ</td></tr>
          <tr><td>&lt; 0.5</td><td>W₂ &lt; 0</td><td>tan φ &gt; √3・W₂ が逆振れ → 端子を入替え<strong>負値として代入</strong></td></tr>
        </tbody>
      </table>

      <p style={{ marginTop: 10, fontSize: 12, color: "var(--ink-soft)" }}>※ 監修者さんの暗記回避方針: tan φ の公式は <strong>「sin/cos = (W₁−W₂)/(W₁+W₂) を √3 倍」</strong>と関係式で記憶する（公式そのものを丸暗記しない）。</p>
    </Callout>

    <h2 id="traps"><span className="h-num">7</span>引っかけポイント（よくある勘違い）</h2>
    <SectionCheck pageId="three-phase" sectionId="traps" />
    <Callout variant="warn" title="① Y結線で I<sub>L</sub> = √3 I<sub>P</sub> としてしまう（Δ と Y の混同）">
      <p>Y結線は <Eq tex="I_L = I_P" inline />。√3 が出るのは <strong>Δ 結線の電流</strong>と <strong>Y 結線の電圧</strong>。「Y は電圧、Δ は電流」と覚える。</p>
    </Callout>
    <Callout variant="warn" title="② 三相電力を相表記 3V_P I<sub>P</sub> と線間表記 √3 V<sub>L</sub> I<sub>L</sub> で混在">
      <p>線間表記なら <strong>√3</strong>、相表記なら <strong>3</strong>。両者を混ぜて P = 3 V<sub>L</sub> I<sub>L</sub> cosφ と書くと値が √3 倍ズレる。式に入れる V と I がどちら表記かを毎回確認。</p>
    </Callout>
    <Callout variant="warn" title="③ Y-Δ 変換で 1/3 と 3 を逆にする">
      <p><strong>Y 側が小さい：</strong>Z_Y = Z_Δ / 3。Δ → Y なら÷3、Y → Δ なら×3。方向で覚えて係数を間違えない。</p>
    </Callout>
    <Callout variant="warn" title="④ 不平衡負荷で「1 相分×3」で計算（R04上 問15 型）">
      <p>1 相分×3 が使えるのは<strong>平衡三相</strong>のみ。不平衡では各相を個別に計算してベクトル合成。中性線電流も 0 にならない。</p>
    </Callout>
    <Callout variant="warn" title="⑤ 電源Δ・負荷Y の混在で「Δ電源だから電圧に √3」と誤適用">
      <p>線間電圧は結線によらず共通の基準。√3 が入るのは<strong>Y 結線の相電圧を出すとき（÷√3）</strong>だけ。Δ 電源 → 線間電圧そのまま → Y 負荷の相電圧は V<sub>L</sub> / √3。</p>
    </Callout>
    <Callout variant="warn" title="⑥ 2 電力計法で W₂ &lt; 0 のとき正のまま計算（R02 関連）">
      <p>力率 &lt; 0.5 のとき電力計が逆振れ。「逆接続で測定した」と認識し、<strong>W₂ を負値として公式に代入</strong>する。<Eq tex="P = W_1 + W_2" inline /> のとき W₂ = −|W₂|。tanφ も <Eq tex="\tan\varphi = \sqrt{3}(W_1-W_2)/(W_1+W_2)" inline /> で W₂ &lt; 0 を反映。</p>
    </Callout>

    <h2 id="diffuse"><span className="h-num">8</span>拡張問い（思考を広げる）</h2>
    <SectionCheck pageId="three-phase" sectionId="diffuse" />
    <Callout variant="info" title="🧐 なぜ三相が単相より効率的か？（diffuse mode 起動）">
      <p>三相 3 線式は単相 2 線式と同じ電力を運ぶのに必要な銅量がおよそ <strong>75%</strong> で済む。さらに瞬時電力が時間変動しないため、モータの回転トルクが脈動せず<strong>回転磁界を自然に作れる</strong>。</p>
      <details>
        <summary>もう一段深く（不平衡・V 結線・捨て問題判断）</summary>
        <ul style={{ marginTop: 8 }}>
          <li><strong>不平衡三相</strong>：4 線式（中性線あり）なら各相を独立した単相回路として扱える。3 線式不平衡は中性点電位が浮き、電験 3 種では基本的に出題されない</li>
          <li><strong>V 結線</strong>：Δ 結線の 1 相分を取り外した形。容量は √3 / 2 ≈ 86.6% に減る。中小容量変圧器で多用</li>
          <li><strong>対称座標法</strong>：不平衡を「正相・逆相・零相」の 3 対称成分に分解。電力（電験 2 種以上）の地絡故障解析で使うが、3 種では出ない → 捨て問題判断 OK</li>
        </ul>
      </details>
    </Callout>
    <p style={{ fontSize: "12px", color: "var(--ink-soft)" }}>
      ▶ 解法手順（汎用 5 ステップ）と過去問は <a href="#" onClick={(e) => { e.preventDefault(); switchTab('learn'); }} style={{ textDecoration: "underline" }}>学習タブ セクション1</a> へ
    </p>
  </>
);

    <h2 id="r07-q15"><span className="h-num">3</span>R07上問15 解法カード — Δ電源・Y負荷の混在三相回路</h2>
    <SectionCheck pageId="three-phase" sectionId="r07-q15" />
    <ExamQuestion
      year="令和7年上期"
      qNum="15"
      question="相電圧 200 V の対称三相交流電源（Δ結線）に、1 相あたり複素インピーダンス Z = 5√3 + j5 Ω の平衡三相負荷を Y 結線で接続した。線間電圧 V_ab を基準（∠0）として、(a) 負荷に流れる線電流 İ_1 [A]、(b) 電源（Δ結線）の相電流 İ_ab [A] を、それぞれ極形式で求めよ。"
      choices={[
        "(a) 線電流 İ_1 [A]：(1) 20.00∠(−π/3)　(2) 11.55∠(−π/3)〔正解〕　(3) 16.51∠(−π/6)　(4) 20.00∠(−π/6)　(5) 11.55∠(−π/6)",
        "(b) 電源（Δ）相電流 İ_ab [A]：(1) 20.00∠(−π/6)　(2) 6.67∠(−π/6)〔正解〕　(3) 11.55∠(−π/6)　(4) 6.67∠(−π/3)　(5) 11.55∠(−π/3)",
      ]}
      note="Δ電源は相電圧＝線間電圧（V_L = 200 V をそのまま使う）。Y負荷の相電圧は V_L/√3 ≈ 115.5 V。|Z| = √((5√3)²+5²) = 10 Ω・偏角 π/6。(a)→(b) は İ_線 = √3 İ_相 と 30°位相差で変換。平成24年問16の再出題。"
    />
    <SolveFlow
      type="Δ電源・Y負荷 混在（極形式・√3 と 30°位相）"
      steps={[
        "① 結線と基準の確認：電源 Δ → 相電圧＝線間電圧 V_L = 200 V。負荷 Y。線間電圧 V_ab = 200∠0° V を基準にとる",
        "② インピーダンスを極形式へ：Z = 5√3 + j5 → |Z| = √((5√3)² + 5²) = √(75 + 25) = √100 = 10 Ω、偏角 θ = arctan(5 / (5√3)) = arctan(1/√3) = π/6（30°）。∴ Z = 10∠(π/6) Ω。力率 cosθ = 5√3/10 = √3/2 ≈ 0.866",
        "③ Y負荷の相電圧：Y結線では相電圧が線間電圧より 30°遅れる。V_an = (V_L/√3)∠(−π/6) = (200/√3)∠(−30°) ≈ 115.5∠(−π/6) V",
        "④ (a) 線電流 İ_1（Y負荷では線電流＝相電流）：İ_1 = V_an / Z = 115.5∠(−π/6) ÷ 10∠(π/6) = 11.55∠(−π/3) A（大きさ 115.5/10、角 −π/6 − π/6 = −π/3）→ 選択肢(2)",
        "⑤ (b) Δ電源の相電流 İ_ab：Δ では I_線 = √3 I_相、線電流は相電流より 30°遅れる。∴ İ_ab = (İ_1/√3)∠(+π/6) = (11.55/√3)∠(−π/3 + π/6) = 6.67∠(−π/6) A → 選択肢(2)",
        "⑥ 検算：負荷の相電流 11.55 A に対し Δ電源の相電流は 11.55/√3 ≈ 6.67 A（大きさ比 √3・位相 30°回転）で整合。本問では電力 P は問われていない",
      ]}
    />
    <ExamAnswer
      correct="(a) İ_1 ≈ 11.55∠(−π/3) A〔選択肢(2)〕　／　(b) İ_ab ≈ 6.67∠(−π/6) A〔選択肢(2)〕"
      explanations={[
        { choice: "(a)(2)", mark: "○", reason: "İ_1 = V_an / Z = (200/√3)∠(−π/6) ÷ 10∠(π/6) = 11.55∠(−π/3) A。Y負荷では線電流＝相電流" },

        { choice: "(a)(5)", mark: "×", reason: "大きさ 11.55 A は正しいが角度 −π/6 が誤り。İ_1 の偏角は V_an の −π/6 から Z の偏角 +π/6 を引いて −π/3" },
        { choice: "(b)(2)", mark: "○", reason: "Δ電源の相電流＝線電流 ÷ √3、位相は +30°回す。İ_ab = (11.55/√3)∠(−π/3 + π/6) = 6.67∠(−π/6) A" },
        { choice: "(b)(5)", mark: "×", reason: "11.55∠(−π/3) は線電流 İ_1 そのもの。Δ相電流へ √3 で割り 30°回す変換を忘れた誤り" },
        { choice: "(b)(1)", mark: "×", reason: "大きさ 20.00 は (a) の誤答 20 A の流用。√3 分の 1（≈ 6.67 A）にしていない" },

    />
    <Callout variant="warn" title="本問のひっかけポイント（5項目）">
      <ol>
        <li><strong>Δ電源の「相電圧」＝線間電圧</strong>: Δ結線は相電圧と線間電圧が等しい（V_L = 200 V をそのまま使う）。「電源だから √3 倍／除」は誤り。Y電源で相電圧 200 V なら線間 200√3 V となり別問題</li>
        <li><strong>Y負荷の相電圧は V_L/√3</strong>: 混在型では必ずこの 1 段を挟む（200/√3 ≈ 115.5 V）。Δ負荷なら相電圧＝線間電圧でこの段は不要</li>
        <li><strong>30°の位相ずれを落とさない</strong>: Y結線で相電圧は線間電圧より 30°遅れ、Δ結線で線電流は相電流より 30°遅れる。極形式の角度はこの ±π/6 の積み重ね</li>
        <li><strong>İ_1（線電流）と İ_ab（電源相電流）の取り違え</strong>: Y負荷側は線電流＝相電流、Δ電源側は線電流＝√3 × 相電流。大きさが √3 倍（11.55 ↔ 6.67）違う</li>
        <li><strong>|Z| と偏角を混同しない</strong>: |Z| = √((5√3)² + 5²) = 10 Ω、偏角 θ = arctan(1/√3) = π/6。力率 cosθ = 5√3/10 = √3/2 ≈ 0.866（≒30°）</li>
      </ol>
    </Callout>

    <h2 id="z-3conditions"><span className="h-num">4</span>3条件P即答チェック（限界的練習ゾーン）</h2>

    <Callout variant="info" title="共通設定">

      <p style={{ marginTop: 8 }}><strong>① cosφ = 1.0</strong>: P = √3 × 200 × 10 × 1.0 = 2000√3 ≈ 3464 W。皮相と一致（S = P・Q = 0）</p>
      <p><strong>② cosφ = 0.8</strong>: P = √3 × 200 × 10 × 0.8 = 1600√3 ≈ 2771 W。Q = √3 × 200 × 10 × 0.6 ≈ 2078 var</p>
      <p><strong>③ cosφ = 0.6</strong>: P = √3 × 200 × 10 × 0.6 = 1200√3 ≈ 2078 W。Q = √3 × 200 × 10 × 0.8 ≈ 2771 W（P と Q が逆転）</p>
      <p style={{ fontSize: "12px", color: "var(--ink-soft)", marginTop: 8 }}>※ <strong>P は cosφ に比例</strong>。力率が 1.0 → 0.6 で電力が 60% に減る。力率改善（cosφ を 1 に近づける）の重要性が数値で見える。</p>

    <Callout variant="warn" title="典型誤答3択（自己採点用）">

      <strong>FET（電界効果型）</strong>は「電圧で電流を制御」するゲート弁。ゲートに電圧を加えるだけでチャネルが形成され、ドレイン電流が流れる。入力電流はほぼゼロ。

    <h2 id="z-3conditions"><span className="h-num">4</span>3条件即答チェック（限界的練習ゾーン）</h2>
    <SectionCheck pageId="coulomb-field" sectionId="z-3conditions" />
    <p style={{ fontSize: 13, color: "var(--ink-soft)", marginBottom: 10 }}>
      「解ける／解けない」の境界を強制発火させる練習。<strong>同一の点電荷で F・E・V の3量</strong>を即答し、典型誤答3択でセルフ判定。<strong>3条件すべて正答できれば A 問題対応 OK</strong> の目安。
    </p>
    <Callout variant="info" title="共通設定">
      <p><strong>真空中に点電荷 Q = 4μC。距離 r = 0.3 m の点 P を考える。k = 9×10⁹ N·m²/C²。</strong></p>
    </Callout>
    <p style={{ marginTop: 12 }}><strong>即答してから下の解答を開くこと</strong>（暗算 30 秒目安）。</p>
    <table className="data-table">
      <thead><tr><th>条件</th><th>求める量</th><th>使う式</th></tr></thead>
      <tbody>
        <tr><td><strong>① 電界</strong></td><td>P 点の電界の強さ E [V/m]</td><td>E = kQ/r²</td></tr>
        <tr><td><strong>② 電位</strong></td><td>P 点の電位 V [V]</td><td>V = kQ/r</td></tr>
        <tr><td><strong>③ 力</strong></td><td>P 点に q = 1μC を置いたとき受ける力 F [N]</td><td>F = qE</td></tr>
      </tbody>
    </table>
    <details style={{ marginTop: 10, padding: "10px 14px", background: "var(--bg-elev)", border: "1px solid var(--rule)", borderRadius: 6 }}>
      <summary style={{ cursor: "pointer", fontWeight: 600 }}>解答の導出（3条件まとめて）</summary>
      <p><strong>① 電界</strong>: E = 9×10⁹ × 4×10⁻⁶ / 0.3² = 3.6×10⁴ / 0.09 = <strong>4×10⁵ V/m</strong></p>
      <p><strong>② 電位</strong>: V = 9×10⁹ × 4×10⁻⁶ / 0.3 = 3.6×10⁴ / 0.3 = <strong>1.2×10⁵ V</strong></p>
      <p><strong>③ 力</strong>: F = qE = 1×10⁻⁶ × 4×10⁵ = <strong>0.4 N</strong>（検算: F = kQq/r² = 9×10⁹×4×10⁻¹²/0.09 = 0.4 N で一致）</p>
    </details>
    <Callout variant="warn" title="典型誤答3択（自己採点用）">
      <ol style={{ margin: "6px 0", paddingLeft: 22, lineHeight: 1.8 }}>
        <li><strong>② で「V = 4×10⁵ V」と答えた</strong>（誤）⇒ それは E の値。V = kQ/r は <strong>r の1乗</strong>で割る（E だけが r²）</li>
        <li><strong>桁が10⁶ ずれた</strong>（誤）⇒ μC の変換忘れ。代入前に 4μC = 4×10⁻⁶ C へ直す習慣をつける</li>
        <li><strong>③ で「F = 1.6 N」と答えた</strong>（誤）⇒ F = qE の q に源の 4μC を入れている。力を受けるのは<strong>置かれた電荷 q = 1μC</strong></li>
      </ol>
    </Callout>

    <h2 id="examples"><span className="h-num">2</span>基本例題：F = BIL の典型</h2>
    <SectionCheck pageId="electromagnetic-force" sectionId="examples" />
    <p><strong>問:</strong> 磁束密度 B=0.5T 中で、有効長 L=0.2m の導体に電流 I=10A が流れている。B と I が直角のとき、電磁力 F を求めよ。</p>
    <details open style={{ marginTop: 8, padding: "10px 14px", background: "var(--bg-elev)", border: "1px solid var(--rule)", borderRadius: "6px" }}>
      <summary style={{ cursor: "pointer", fontWeight: 600 }}>解答</summary>
      <p style={{ marginTop: 8 }}><Eq tex="F = BIL\sin\theta = 0.5 \times 10 \times 0.2 \times 1 = 1\text{ N}" /></p>
      <p><strong>ポイント</strong>: B と I が直交（θ=90°）なら sinθ=1 で最大の力。方向は<strong>左手モーター則</strong>で：中指=I・人差し指=B → 親指=F の向き。</p>
    </details>

    <h2 id="r06s-q4"><span className="h-num">3</span>R06下 問4 解法カード — 同方向平行導体の力の方向（featured）</h2>
    <SectionCheck pageId="electromagnetic-force" sectionId="r06s-q4" />
    <ExamQuestion
      year="令和6年下期"
      qNum="4"
      question="2本の長い平行直線導体 A、B に同じ方向に電流 I が流れている。導体 A が導体 B から受ける力の向きとして、最も近いものはどれか。"
      choices={[
        "① A から B に向かう向き（吸引） ← 正解",
        "② B から A に離れる向き（反発）",
        "③ A の電流方向と同じ向き",
        "④ A の電流方向と逆向き",
      ]}
      note="ヒント：平行導体の同方向電流は『直感と逆』の吸引。理由は2導体間で磁界が打ち消し合うため。"
    />
    <SolveFlow
      type="平行導体の力の方向（同方向＝吸引）"
      steps={[
        "① 条件確認：2本の長い平行導体・同方向電流・A が B から受ける力の向き",
        "② 公式選定：F/l = μ₀I₁I₂/(2πd)・方向は『同方向＝吸引・逆方向＝反発』ルール",
        "③ 磁界確認：B の電流が A の位置に作る磁界の方向（右ねじの法則）",
        "④ 力の方向：左手モーター則で A の電流と B が A に作る磁界から力の方向を出す ⇒ B に向かう",
        "⑤ 選択肢照合：『A から B に向かう（吸引）』= ①・直感と逆（『反対が引き合う』Coulomb 感覚と逆）",
      ]}
    />
    <ExamAnswer
      correct="① A から B に向かう向き（吸引）"
      explanations={[
        { choice: "①", mark: "○", reason: "同方向電流の平行導体は吸引。2導体間で磁界が打ち消し合い外側で強め合うため、外から圧縮する力が働く（解説タブ 6節）" },
        { choice: "②", mark: "×", reason: "反発は逆方向電流のとき。Coulomb 力（反対が引き合う）の感覚で誤答しやすい典型" },
        { choice: "③", mark: "×", reason: "電流方向と力の方向は一般に違う。フレミング左手で電流（中指）と磁界（人差し指）から力（親指）を出す" },
        { choice: "④", mark: "×", reason: "電流方向の逆方向も間違い。力の方向は磁界に依存（右手の法則で磁界、左手の法則で力）" },
      ]}
    />
    <Callout variant="warn" title="本問のひっかけポイント（5項目）">
      <ol style={{ margin: "6px 0", paddingLeft: 22, lineHeight: 1.8 }}>
        <li><strong>「反対が引き合う」Coulomb 力の感覚を電流に適用</strong>：電流は<strong>同方向＝吸引・逆方向＝反発</strong>（直感と逆）</li>
        <li><strong>力の方向を電流方向と混同</strong>：力は磁界 B と電流 I のベクトル積（F=IL×B）の方向。<strong>電流方向そのものではない</strong></li>
        <li><strong>F/l を F と勘違い</strong>：公式は単位長さ当たりの力 [N/m]。<strong>導体全長 l を掛けて F = (μ₀I₁I₂/(2πd))·l</strong> にする</li>
        <li><strong>μ₀ の代入を忘れる</strong>：<Eq tex="\mu_0 = 4\pi \times 10^{-7}" inline /> [H/m]。SI 単位系で必須</li>
        <li><strong>3本以上の問題で2本ペアの結果を単純足し算</strong>：3本ならベクトル和（R04下問4 タイプ）。方向と大きさを個別に出してから合成</li>
      </ol>
    </Callout>

    <h2 id="r06j-q4"><span className="h-num">4</span>R06上 問4 解法カード — 合成磁界ゼロの条件</h2>
    <SectionCheck pageId="electromagnetic-force" sectionId="r06j-q4" />
    <ExamQuestion
      year="令和6年上期"
      qNum="4"
      question="無限長の平行直線導体 A、B に同方向に電流 I_A=3 A、I_B=6 A が流れている。導体間距離は d=9 m である。合成磁界が零となる点の A からの距離 [m] として最も近い値はどれか。"
      choices={[
        "① 1",
        "② 2",
        "③ 3 ← 正解",
        "④ 6",
      ]}
      note="ヒント：同方向電流なら合成ゼロ点は2導体の間。電流比 I_A:I_B = r_A:r_B（電流の大きい側から遠い点）。"
    />
    <SolveFlow
      type="合成磁界ゼロ（同方向電流の間）"
      steps={[
        "① 条件確認：同方向電流（I_A=3, I_B=6） → 合成ゼロ点は2導体の『間』に存在",
        "② 公式選定：各導体からの磁界 H=I/(2πr)・方向逆向きで大きさ等しくなる点を探す",
        "③ 関係式：H_A = H_B ⇒ I_A/(2πr_A) = I_B/(2πr_B) ⇒ I_A/r_A = I_B/r_B",
        "④ 連立式：3/r_A = 6/r_B かつ r_A + r_B = 9 ⇒ r_B = 2 r_A ⇒ r_A + 2 r_A = 9 ⇒ r_A = 3, r_B = 6",
        "⑤ 選択肢照合：A からの距離 = r_A = 3 m = ③・電流の小さい A 側（弱い磁界）に近い点にゼロ点",
      ]}
    />
    <ExamAnswer
      correct="③ 3"
      explanations={[
        { choice: "①", mark: "×", reason: "1 m は r_A の誤算（r_A:r_B = 1:2 を 1:1 と取り違え）" },
        { choice: "②", mark: "×", reason: "2 m は I_A:I_B を逆比で取った誤答（電流大きい側に近いと勘違い）" },
        { choice: "③", mark: "○", reason: "電流小さい A 側に近い点にゼロ点。r_A = I_A·d/(I_A+I_B) = 3×9/9 = 3 m" },
        { choice: "④", mark: "×", reason: "6 m は r_B（B からの距離）。問われたのは A からの距離なので 9−6=3 が正解" },
      ]}
    />
    <Callout variant="warn" title="本問のひっかけポイント（5項目）">
      <ol style={{ margin: "6px 0", paddingLeft: 22, lineHeight: 1.8 }}>
        <li><strong>同方向 vs 逆方向の判定を間違える</strong>：同方向＝間にゼロ点・逆方向＝外側にゼロ点（電流小さい方の外側）</li>
        <li><strong>電流比と距離比を逆に取る</strong>：H が同じになるので <strong>I_A/r_A = I_B/r_B</strong>（電流大なら距離大）</li>
        <li><strong>A からの距離か B からの距離か聞かれた方を取り違える</strong>：問題文を再読・本問は A から</li>
        <li><strong>r_A + r_B = d の条件を忘れる</strong>：2導体間に点がある場合の幾何条件。連立式に必須</li>
        <li><strong>逆方向電流のとき間にゼロ点を探す</strong>：逆方向は<strong>外側</strong>。間では磁界が同方向に重なりゼロにならない</li>
      </ol>
    </Callout>

    <h2 id="z-3conditions"><span className="h-num">5</span>3条件即答チェック（限界的練習ゾーン）</h2>
    <SectionCheck pageId="electromagnetic-force" sectionId="z-3conditions" />
    <p style={{ fontSize: "13px", color: "var(--ink-soft)", marginBottom: "10px" }}>
      「解ける／解けない」の境界を強制発火させる練習。<strong>B=1 T・I=10 A・L=0.5 m 固定 × θ 3条件（30° / 60° / 90°）</strong>で F を即答し、典型誤答3択でセルフ判定。<strong>3条件すべて正答できれば B 問題対応 OK</strong> の目安。
    </p>
    <Callout variant="info" title="共通設定">
      <p><strong>B = 1 T・I = 10 A・L = 0.5 m 固定</strong>。B と I のなす角 θ を 30° / 60° / 90° で振り、F = BIL sinθ を即答。sin 30° = 0.5・sin 60° ≈ 0.866・sin 90° = 1。</p>
    </Callout>
    <p style={{ marginTop: 12 }}><strong>即答してから下の解答を開くこと</strong>（暗算 30 秒目安）。</p>
    <table className="data-table">
      <thead>
        <tr><th>条件</th><th>sinθ</th><th>F = BIL sinθ [N]</th></tr>
      </thead>
      <tbody>
        <tr><td><strong>① θ = 30°</strong></td><td>0.5</td><td>1 × 10 × 0.5 × 0.5 = <strong>2.5 N</strong></td></tr>
        <tr><td><strong>② θ = 60°</strong></td><td>√3/2 ≈ 0.866</td><td>1 × 10 × 0.5 × 0.866 ≈ <strong>4.33 N</strong></td></tr>
        <tr><td><strong>③ θ = 90°</strong></td><td>1</td><td>1 × 10 × 0.5 × 1 = <strong>5 N</strong></td></tr>
      </tbody>
    </table>
    <details style={{ marginTop: 10, padding: "10px 14px", background: "var(--bg-elev)", border: "1px solid var(--rule)", borderRadius: "6px" }}>
      <summary style={{ cursor: "pointer", fontWeight: 600 }}>解答の導出（3条件まとめて）</summary>
      <p style={{ marginTop: 8 }}><strong>① θ = 30°</strong>: F = 1 × 10 × 0.5 × sin 30° = 5 × 0.5 = 2.5 N</p>
      <p><strong>② θ = 60°</strong>: F = 1 × 10 × 0.5 × sin 60° = 5 × (√3/2) ≈ 5 × 0.866 ≈ 4.33 N</p>
      <p><strong>③ θ = 90°</strong>: F = 1 × 10 × 0.5 × sin 90° = 5 × 1 = 5 N（最大）</p>
      <p style={{ fontSize: "12px", color: "var(--ink-soft)", marginTop: 8 }}>※ <strong>θ=90° が最大・θ=0° がゼロ</strong>（B と I が平行で力なし）。sin 30°=0.5・sin 45°=√2/2≈0.707・sin 60°=√3/2≈0.866 の典型値を覚えておくと即答できる。</p>
    </details>
    <Callout variant="warn" title="典型誤答3択（自己採点用）">
      <ol style={{ margin: "6px 0", paddingLeft: 22, lineHeight: 1.8 }}>
        <li><strong>sinθ ではなく cosθ を使う</strong>（誤）⇒ F = BIL の sinθ は<strong>B と I のなす角の sin</strong>。cosθ にすると θ=90° で F=0 になる致命誤答</li>
        <li><strong>θ=0° で F が最大と思う</strong>（誤）⇒ <strong>θ=90°（B⊥I）で F 最大・θ=0°（B∥I）で F=0</strong>。直線導体が磁界と平行なら力を受けない</li>
        <li><strong>sin 60°=0.5、sin 30°=0.866 と逆に覚える</strong>（誤）⇒ <strong>sin 30°=0.5・sin 60°=√3/2≈0.866</strong>。三角関数の基本値</li>
      </ol>
    </Callout>
    <Callout variant="tip" title="セルフ判定">
      <p><strong>3条件すべて即答できた</strong> ⇒ B 問題（電磁力＋誘導起電力連鎖）でも止まらない。<strong>1問でも誤答</strong> ⇒ <a href="#" onClick={(e) => { e.preventDefault(); switchTab('explain'); }} style={{ textDecoration: "underline" }}>解説タブ 3〜4節 フレミングと4視点</a>で復習。</p>
    </Callout>

        "符号確認: 電圧源・電流源の方向設定で I₁ と I₂ の符号が決まる（問題図で確認）",
      ]}
    />
    <ExamAnswer
      correct="③"
      explanations={[
        { choice: "①", mark: "×", reason: "電流源 I_s の寄与を無視。電流源が並列にあれば必ず分担される" },
        { choice: "②", mark: "×", reason: "電圧源 E の寄与を無視。電圧源が並列にあれば R に電圧を直接印加" },
        { choice: "③", mark: "○", reason: "重ね合わせの原理 ── 電圧源単独 I₁=E/R と電流源単独 I₂=I_s を加算" },
        { choice: "④", mark: "×", reason: "方向逆設定が必要な特殊条件。基本問題では加算（同方向）が正解" },
      ]}
    />
    <Callout variant="warn" title="本問のひっかけポイント（5項目）">
      <ol>
        <li><strong>電流源・電圧源のゼロ化を逆にする</strong>: 電流源 → 開放（切り離す）/ 電圧源 → 短絡（導線置換）。逆にすると符号も値も全部破綻</li>
        <li><strong>電流源に直列の抵抗を考えてしまう</strong>: 電流源は直列抵抗の値に関係なく一定電流を流す。電圧源と全く違う挙動</li>
        <li><strong>重ね合わせの符号</strong>: 各電源単独計算で「I₁ と I₂ の電流方向が同じか逆か」を図で必ず確認。逆向きなら I = I₁ − I₂</li>
        <li><strong>線形性の前提</strong>: ダイオードなど非線形素子が混じる回路には重ね合わせ NG。問題文で「線形」「抵抗のみ」を確認</li>
        <li><strong>計算順序</strong>: 「電源を 1 つずつ分解 → 各回独立に計算 → 最後に加算」を機械的に。分解せずに同時に解こうとして連立崩壊が典型</li>
      </ol>
    </Callout>

    <Callout variant="tip" title="なぜ R = r（内部抵抗）で消費電力が最大になるか — 微分なしの導出">
      <p style={{ marginBottom: 8 }}>
        起電力 <Eq tex="E" inline />・内部抵抗 <Eq tex="r" inline /> の電源に可変抵抗 <Eq tex="R" inline /> を直列接続した素の回路で考える（テブナン等価では <Eq tex="V_{th}=E,\ R_{th}=r" inline />）。
      </p>
      <ol style={{ margin: "6px 0", paddingLeft: 22, lineHeight: 2.0 }}>
        <li>電流は <Eq tex="I = \dfrac{E}{R+r}" inline />、R の消費電力は <Eq tex="P = R I^2 = \dfrac{E^2 R}{(R+r)^2}" inline /></li>
        <li>分子・分母を <Eq tex="R" inline /> で割ると <Eq tex="P = \dfrac{E^2}{\ R + \dfrac{r^2}{R} + 2r\ }" inline /> → <strong>分母が最小なら P 最大</strong></li>
        <li>相加相乗平均より <Eq tex="R + \dfrac{r^2}{R} \ge 2\sqrt{R\cdot\dfrac{r^2}{R}} = 2r" inline />（等号は <Eq tex="R = r" inline /> のとき）</li>
        <li>よって分母の最小値は <Eq tex="2r + 2r = 4r" inline />、このとき <Eq tex="P_{max} = \dfrac{E^2}{4r}" inline /></li>
      </ol>
      <p style={{ marginTop: 8, fontSize: 13 }}>
        一般のテブナン回路は <Eq tex="E \to V_{th},\ r \to R_{th}" inline /> と読み替えれば <Eq tex="R_L = R_{th}" inline />・<Eq tex="P_{max} = \dfrac{V_{th}^2}{4R_{th}}" inline /> と同形。<strong>単電源の素の回路なら「R<sub>th</sub> ＝ 内部抵抗 r」</strong>なので、R03問7のような電池＋可変抵抗でも最大条件は <strong>R = r</strong>。微分が苦手でも相加相乗平均で同じ結論に到達できる。
      </p>
    </Callout>

    <h2 id="z-3conditions"><span className="h-num">4</span>3条件即答チェック（限界的練習ゾーン）— 最大電力 vs 効率</h2>

    <p style={{ fontSize: 13, color: "var(--ink-soft)", marginBottom: 10 }}>
      「解ける／解けない」の境界を強制発火させる練習。<strong>同一テブナン等価（V<sub>th</sub>=12V, R<sub>th</sub>=4Ω）で負荷 R<sub>L</sub> を3条件</strong>変えて即答し、典型誤答3択でセルフ判定。<strong>3条件すべて正答できれば最大電力定理 B 問題対応 OK</strong>の目安。
    </p>
    <Callout variant="info" title="共通設定">
      <p><strong>テブナン等価電圧 V<sub>th</sub> = 12 V</strong>・<strong>テブナン等価抵抗 R<sub>th</sub> = 4 Ω</strong>・負荷 R<sub>L</sub> を変化させる</p>
    </Callout>
    <p style={{ marginTop: 12 }}><strong>即答してから下の解答を開くこと</strong>（暗算 30 秒目安）。</p>

      <thead>
        <tr><th>条件</th><th>負荷電流 I</th><th>負荷電力 P<sub>L</sub></th><th>効率 η</th></tr>

        <tr><td><strong>① R<sub>L</sub> = 4 Ω（=R<sub>th</sub>・最大電力）</strong></td><td>1.5 A</td><td>9 W（最大）</td><td>50 %</td></tr>
        <tr><td><strong>② R<sub>L</sub> = 2 Ω（&lt;R<sub>th</sub>）</strong></td><td>2 A</td><td>8 W</td><td>33.3 %</td></tr>
        <tr><td><strong>③ R<sub>L</sub> = 12 Ω（&gt;R<sub>th</sub>）</strong></td><td>0.75 A</td><td>6.75 W</td><td>75 %</td></tr>
      </tbody>
    </table>
    <details style={{ marginTop: 10, padding: "10px 14px", background: "var(--bg-elev)", border: "1px solid var(--rule)", borderRadius: 6 }}>
      <summary style={{ cursor: "pointer", fontWeight: 600 }}>解答の導出（3条件まとめて）</summary>
      <p><strong>① R<sub>L</sub>=4Ω</strong>: I = V<sub>th</sub>/(R<sub>th</sub>+R<sub>L</sub>) = 12/8 = 1.5A・P<sub>L</sub> = I²R<sub>L</sub> = 1.5²×4 = 9W・η = R<sub>L</sub>/(R<sub>th</sub>+R<sub>L</sub>) = 4/8 = 50%</p>
      <p><strong>② R<sub>L</sub>=2Ω</strong>: I = 12/6 = 2A・P<sub>L</sub> = 2²×2 = 8W・η = 2/6 ≒ 33.3%</p>
      <p><strong>③ R<sub>L</sub>=12Ω</strong>: I = 12/16 = 0.75A・P<sub>L</sub> = 0.75²×12 = 6.75W・η = 12/16 = 75%</p>
      <p style={{ marginTop: 8, fontSize: 12, color: "var(--ink-soft)" }}>※ 効率 η は「負荷消費電力 / 全電源供給電力」。η = R<sub>L</sub>/(R<sub>th</sub>+R<sub>L</sub>) は分圧と同じ形。</p>
    </details>
    <Callout variant="warn" title="典型誤答3択（自己採点用）">
      <ol style={{ margin: "6px 0", paddingLeft: 22, lineHeight: 1.8 }}>
        <li><strong>① で「最大電力時は効率も最大」と答える</strong>（誤）⇒ R<sub>L</sub>=R<sub>th</sub> は<strong>電力最大</strong>条件・効率は 50% 固定。電力最大≠効率最大</li>

        <li><strong>P<sub>L</sub> = V<sub>th</sub>²/R<sub>L</sub> で計算</strong>（誤）⇒ V<sub>th</sub> はテブナン側の電圧で R<sub>L</sub> にかかる電圧ではない。I = V<sub>th</sub>/(R<sub>th</sub>+R<sub>L</sub>) から P<sub>L</sub>=I²R<sub>L</sub> が正</li>
      </ol>
    </Callout>

    </Callout>

    <h3 id="parallel-equivalent" style={{ marginTop: 18 }}>並列RLC：共振時の等価抵抗（R06上 問13 頻出）</h3>
    <p>
      並列回路はアドミタンス <Eq tex="Y = G + jB" inline /> で考える方が自然：
    </p>
    <p style={{ textAlign: "center", margin: "10px 0" }}>
      <Eq tex="Y = \frac{1}{R} + j\left(\omega C - \frac{1}{\omega L}\right)" />
    </p>
    <p>
      共振条件は <Eq tex="B = 0" inline />、つまり <Eq tex="\omega C = 1/(\omega L)" inline />（直列と同じ ω₀ = 1/√(LC)）。共振時は <Eq tex="Y = G = 1/R" inline /> だけ残るので <Eq tex="Z_{共振} = R" inline />（最大）。
    </p>
    <p>
      コイルに巻線抵抗 r が直列に入っている実回路（コイルが r + jωL）では、高Q近似で：
    </p>
    <p style={{ textAlign: "center", margin: "10px 0" }}>
      <Eq tex="Z_{共振} \approx \frac{L}{Cr}" />
    </p>
    <p>
      <strong>r が小さいほど Z が大きく、電源電流が最小</strong>。この L/(Cr) は電力問題でも頻出。
    </p>

    <h3 id="series-voltage" style={{ marginTop: 18 }}>直列共振時の各素子電圧（R04上 問9 頻出）</h3>
    <p>
      共振時 X_L = X_C ⇒ I = V_s/R（最大）。このとき：
    </p>
    <p style={{ textAlign: "center", margin: "10px 0" }}>
      <Eq tex="V_R = IR = V_s, \quad V_L = IX_L = \frac{V_s}{R}\cdot\omega_0 L = Q\,V_s" />
    </p>
    <p>
      よって <Eq tex="V_L/V_R = Q" inline />。<strong>コイルと抵抗の電圧比がそのまま Q 値</strong>。V_C も同じ大きさだが位相が V_L と逆なので合計 V_L + V_C は実部上ゼロ（直列合計が V_s に等しく整合）。
    </p>
    <Callout variant="warn" title="共振時でも V_L・V_C は消えていない">
      <p>大きさは V_L = V_C = QV_s（電源の Q 倍）。<strong>位相が逆なので回路全体としては純抵抗的に見える</strong>だけで、各素子には Q 倍の電圧がかかっている。<strong>Q=10 なら入力 100V に対して 1000V</strong>。高Q電力回路では過電圧破損リスクがある。</p>
    </Callout>

    <h2 id="q-factor"><span className="h-num">6</span>Q値・帯域幅・選択度</h2>
    <p>
      Q値は<strong>共振の鋭さ</strong>を表す無次元量。物理的には「1周期あたりの蓄積エネルギー / 損失エネルギー」の比率。
    </p>
    <p style={{ textAlign: "center", margin: "10px 0" }}>
      <Eq tex="Q = 2\pi \cdot \frac{\text{1周期あたりの蓄積エネルギー}}{\text{1周期あたりの損失エネルギー}}" />
    </p>
    <table className="data-table">
      <thead>
        <tr><th>回路</th><th>Q の式</th><th>R が大きくなると Q は</th></tr>
      </thead>
      <tbody>
        <tr><td>直列RLC</td><td><Eq tex="Q = \omega_0 L / R = 1/(\omega_0 CR)" inline /></td><td><strong>下がる</strong>（損失増）</td></tr>
        <tr><td>並列RLC</td><td><Eq tex="Q = R/(\omega_0 L) = \omega_0 CR" inline /></td><td><strong>上がる</strong>（並列損失減）</td></tr>
      </tbody>
    </table>
    <p>
      <strong>帯域幅 BW</strong>（共振点で電力が半分になる周波数幅・−3dB 帯域）：
    </p>
    <p style={{ textAlign: "center", margin: "10px 0" }}>
      <Eq tex="BW = f_0/Q \quad [\text{Hz}]" />
    </p>
    <p>
      <strong>Q が大きい ⇒ BW が狭い ⇒ 選択度が高い</strong>。ラジオの選局のように特定周波数だけ抜き出す用途では Q を大きくする。電力フィルタでは Q を程よく設定し過電圧と帯域を両立させる。
    </p>

    <Callout variant="tip" title="🧐 Q値の4視点まとめ（監修者 input 反映「Q値とは何か」・2026-05-29 追加）">
      <p>監修者さん指摘 (PR #85 同型): 「Q値の定義式は知っているが本質理解未到達」。Q値は<strong>同じ無次元量を 4 つの異なる側面で表現</strong>している。1つでも腑に落ちれば全て繋がる。</p>
      <table className="data-table" style={{ marginTop: 8 }}>
        <thead>
          <tr><th>視点</th><th>表現</th><th>直感イメージ</th></tr>
        </thead>
        <tbody>
          <tr>
            <td><strong>① 共振の鋭さ</strong></td>
            <td><Eq tex="Q = f_0 / BW" inline /></td>
            <td>共振曲線の山が高く幅が狭い ⇒ Q 大。ラジオの選局精度</td>
          </tr>
          <tr>
            <td><strong>② 電圧拡大率 (直列)</strong></td>
            <td><Eq tex="Q = V_L / V_s = V_C / V_s" inline /></td>
            <td>共振時、L と C に印加電圧の Q 倍が現れる。Q=10 → 100V 入力で 1000V</td>
          </tr>
          <tr>
            <td><strong>③ 蓄積/損失エネルギー比</strong></td>
            <td><Eq tex="Q = 2\pi \cdot \frac{W_{\text{蓄積}}}{W_{\text{損失}}}" inline /></td>
            <td>L と C 間を行き来するエネルギーが、R で消費される量より何倍多いか</td>
          </tr>
          <tr>
            <td><strong>④ 振動の持続性</strong></td>
            <td>Q 周期で振幅 1/e に減衰</td>
            <td>鐘・ピアノ弦が長く鳴る ⇔ Q 大。電気でも同じ</td>
          </tr>
        </tbody>
      </table>
      <p style={{ marginTop: 10 }}>
        <strong>本質を 1 行で</strong>: Q値 ＝ <strong>「共振状態の良さの度合い」</strong>。<strong>鋭さ・拡大率・エネルギー比・持続性</strong>のどれで測っても同じ値。直列 <Eq tex="Q = \omega_0 L/R" inline />、並列 <Eq tex="Q = R/(\omega_0 L)" inline /> は「<strong>R の影響を直列と並列で逆方向に効かせる</strong>」だけ（直列は R 大で損失増 → Q 下がる、並列は R 大で電流制限 → Q 上がる）。
      </p>
      <p style={{ marginTop: 8, fontSize: 12, color: "var(--ink-soft)" }}>
        ※ 監修者さんの暗記回避: 公式そのものより「<strong>4視点はすべて同じ Q を別角度で測っている</strong>」を脳に刷り込む。試験問題は4視点のどれかで聞いてくる。
      </p>
    </Callout>

    <h2 id="traps"><span className="h-num">7</span>よくある勘違い（引っかけ集）</h2>
    <Callout variant="warn" title="① 直列インピーダンスをスカラー和で計算">
      <p>❌ Z = R + X_L + X_C と単純加算。✅ R とリアクタンスは直交ベクトル。<strong>Z = √(R² + (X_L − X_C)²)</strong>（直角三角形で考える）。</p>
    </Callout>
    <Callout variant="warn" title="② 並列共振でも直列と同じ Q = ω₀L/R を使う（パターン28）">
      <p>❌ 並列共振でも Q = ω₀L/R と書く。✅ <strong>並列共振では Q = R/(ω₀L)</strong>（直列と逆数の関係）。並列回路では R が大きいほど電流を制限して Q が上がる。問題文で「並列」とあれば必ず確認する。（H26問10・R04上問10 類出）</p>
    </Callout>
    <Callout variant="warn" title="③ 直列共振で Z が「最大」と誤解（パターン27）">
      <p>❌ 「打ち消し合うから Z 最大」。✅ <strong>打ち消し合い ⇒ リアクタンス消失 ⇒ Z = R（最小） ⇒ I 最大</strong>。「共振 ＝ 打ち消し合い ＝ 最小インピーダンス ＝ 最大電流」の因果を押さえる。（H24問9・R02下問9 類出）</p>
    </Callout>
    <Callout variant="warn" title="④ 並列共振で Z が「最小」と誤解（パターン28）">
      <p>❌ 直列と同じく Z 最小・電流最大。✅ <strong>並列共振は Y 最小 ⇒ Z 最大 ⇒ 電源電流最小</strong>。ただし L・C 間では大きな循環電流が流れている。</p>
    </Callout>
    <Callout variant="warn" title="⑤ RC 回路に共振があると思う">
      <p>❌ 「リアクタンスがあるから共振する」。✅ <strong>共振は L と C の両方</strong>がないと起きない。RC 回路は X_C = 1/(ωC) の周波数応答（電流が周波数で変わる）のみ。R06下 問9 の論点はこの違い。</p>
    </Callout>
    <Callout variant="warn" title="⑥ 共振時に V_L・V_C が「消える」と誤解">
      <p>❌ 「打ち消し合うから両方ゼロ」。✅ <strong>大きさは V_L = V_C = QV_s</strong>（電源の Q 倍）。位相が逆なので合計だけがゼロになる。高Q では実装上の過電圧リスクあり。</p>
    </Callout>

    <h2 id="diffuse"><span className="h-num">8</span>拡張問い：電力品質とフィルタ応用</h2>
    <Callout variant="info" title="🧐 RLC共振の現場応用（diffuse mode 起動）">
      <p>電力系統の<strong>高調波フィルタ</strong>は RLC 共振の直接応用。工場のインバータが発生する第5・第7高調波を、LC を選んで f₀ をその周波数に合わせて<strong>選択的に吸収</strong>する。タンク回路（並列共振）は逆に「特定周波数だけ通さない（ブロック）」用途で使われる。</p>
      <details>
        <summary>機械振動との対応（暗記不要の物理アナロジー）</summary>
        <ul style={{ marginTop: 8 }}>
          <li><strong>L ↔ 質量 m</strong>（運動エネルギー＝磁気エネルギー）</li>
          <li><strong>C ↔ バネ定数の逆数 1/k</strong>（位置エネルギー＝静電エネルギー）</li>
          <li><strong>R ↔ ダンパー</strong>（散逸＝抵抗損失）</li>
          <li><strong>共振角周波数</strong> ω₀ = √(k/m) ↔ ω₀ = 1/√(LC)</li>
          <li><strong>Q値</strong> ＝ 振動が何周期続くかの目安（Q=10 なら約10周期で振幅 1/e）</li>
        </ul>
        <p style={{ marginTop: 8, fontSize: "13px" }}>機械系では Q 大 ＝ 鐘・ピアノ弦のように長く鳴り続ける。電気系の Q 大 ＝ 選択度が鋭いラジオフィルタ。同じ物理を別の道具で見ているだけ。</p>
      </details>
    </Callout>

    <details style={{ marginTop: 16, padding: "10px 14px", background: "var(--bg-elev)", border: "1px solid var(--rule)", borderRadius: "6px" }}>
      <summary style={{ cursor: "pointer", fontWeight: 600 }}>🔬 Level 2：共振と微分方程式（試験範囲外・参考）</summary>
      <p style={{ fontSize: "13px", color: "var(--ink-soft)", margin: "8px 0" }}>
        直列RLC回路の微分方程式：<Eq tex="L\frac{d^2i}{dt^2} + R\frac{di}{dt} + \frac{1}{C}i = \frac{dv}{dt}" inline />。特性方程式の解は減衰係数 <Eq tex="\alpha = R/(2L)" inline /> と共振角周波数 <Eq tex="\omega_0 = 1/\sqrt{LC}" inline /> で決まる。
      </p>
      <ul style={{ fontSize: "13px", lineHeight: 1.8 }}>

      </ul>
      <p style={{ fontSize: "13px" }}>Q値は <Eq tex="Q = \omega_0/(2\alpha) = \omega_0 L/R" inline />。Q 大 ＝ 共振が鋭く、過渡振動が長く続く。</p>
    </details>
  </>
);

        { choice: "④", mark: "×", reason: "ω₀CR は直列共振では 1/Q に相当。V_L/V_R は Q（拡大）であり 1/Q（縮小）ではない" },
      ]}
    />
    <Callout variant="warn" title="本問のひっかけポイント（5項目）">
      <ol style={{ margin: "6px 0", paddingLeft: 22, lineHeight: 1.8 }}>
        <li><strong>直列と並列の Q を取り違える</strong>：直列 Q=ω₀L/R、並列 Q=R/(ω₀L)（逆数）</li>
        <li><strong>「共振で V_L が消える」と誤解</strong>：大きさは QV_s で残る・位相が逆だから合計だけ打ち消し</li>
        <li><strong>1/(ω₀CR) と ω₀L/R を別公式と思う</strong>：共振条件 ω₀²LC=1 から両者は等価（同じ Q）</li>
        <li><strong>V_R = V_s に気づかず V_L/V_R の比が取れない</strong>：共振時は I=V_s/R なので V_R=IR=V_s（電源そのもの）</li>
        <li><strong>選択肢④ ω₀CR を Q と勘違い</strong>：これは並列共振の Q（直列の 1/Q）。境界条件で必ず逆数になる</li>

const TestWidget = ({ questionId }) => {
  const q = CONCEPT_QUESTIONS[questionId];
  if (!q) return null;

  const storageKey = `concept-test:${questionId}`;
  const [confidence, setConfidence] = React.useState(3);
  const [answer, setAnswer] = React.useState("");
  const [revealed, setRevealed] = React.useState(false);
  const [countdown, setCountdown] = React.useState(30);
  const [copied, setCopied] = React.useState(false);
  const [previousAttempt, setPreviousAttempt] = React.useState(null);

  React.useEffect(() => {
    try {
      const raw = localStorage.getItem(storageKey);
      if (raw) setPreviousAttempt(JSON.parse(raw));
    } catch (e) {}
  }, [storageKey]);

  React.useEffect(() => {
    if (revealed || countdown <= 0) return;
    const t = setTimeout(() => setCountdown(c => c - 1), 1000);
    return () => clearTimeout(t);
  }, [revealed, countdown]);

  const handleCopy = () => {
    const payload = `/concept-grade\nv: 1\nquestion_id: ${questionId}\nconfidence_pre: ${confidence}\nanswer: ${answer}`;
    const save = () => {
      try {
        localStorage.setItem(storageKey, JSON.stringify({
          date: new Date().toISOString().slice(0, 10),
          confidence,
          answer,
        }));
      } catch (e) {}
      setCopied(true);
      setTimeout(() => setCopied(false), 3000);
    };
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(payload).then(save).catch(() => {
        alert("clipboard失敗。textareaの内容を手動コピーしてClaudeに貼り付けてください。\n\npayload:\n" + payload);
        save();
      });
    } else {
      alert("clipboard未対応。以下をコピーしてClaudeに貼り付けてください。\n\n" + payload);
      save();
    }
  };

  return (
    <div style={{
      border: "2px solid var(--accent)",
      borderRadius: "12px",
      padding: "20px",
      margin: "2rem 0",
      background: "var(--bg-elev)",
    }}>
      <div style={{ display: "flex", alignItems: "center", gap: "8px", marginBottom: "12px" }}>
        <span style={{ fontSize: "20px" }}>🎯</span>
        <h3 style={{ margin: 0, fontSize: "16px" }}>学習窓口: 概念問題 #{q.seq} ({q.difficulty})</h3>
      </div>

      {previousAttempt && (
        <div style={{
          fontSize: "12px",
          color: "var(--ink-mute)",
          background: "var(--bg-sunken)",
          padding: "8px 12px",
          borderRadius: "6px",
          marginBottom: "12px",
        }}>
          📜 前回 ({previousAttempt.date}): confidence={previousAttempt.confidence}/5 ·
          解答「{previousAttempt.answer.slice(0, 60)}{previousAttempt.answer.length > 60 ? "..." : ""}」
        </div>
      )}

      <div style={{
        background: "var(--bg)",
        padding: "12px",
        borderRadius: "6px",
        marginBottom: "16px",
        lineHeight: "1.7",
      }}>
        <strong>Q.</strong> {q.question}
      </div>

      <div style={{ marginBottom: "12px" }}>
        <label style={{ fontSize: "13px", color: "var(--ink-soft)", display: "block", marginBottom: "4px" }}>
          自信度（解答前）: <strong>{confidence}/5</strong>
        </label>
        <input
          type="range"
          min="1"
          max="5"
          value={confidence}
          onChange={(e) => setConfidence(Number(e.target.value))}
          style={{ width: "200px" }}
        />
        <span style={{ fontSize: "11px", color: "var(--ink-mute)", marginLeft: "8px" }}>
          1=全くわからない / 5=完璧に説明できる
        </span>
      </div>

      {!revealed ? (
        <button
          onClick={() => setRevealed(true)}
          disabled={countdown > 0}
          style={{
            background: countdown > 0 ? "var(--bg-sunken)" : "var(--accent)",
            color: countdown > 0 ? "var(--ink-mute)" : "var(--bg)",
            border: "none",
            borderRadius: "6px",
            padding: "10px 16px",
            fontSize: "14px",
            fontWeight: 700,
            cursor: countdown > 0 ? "not-allowed" : "pointer",
          }}
        >
          {countdown > 0 ? `🧠 ${countdown}秒考えてから解答欄を開く` : "✏️ 解答欄を開く"}
        </button>
      ) : (
        <>
          <textarea
            value={answer}
            onChange={(e) => setAnswer(e.target.value)}
            placeholder="解答を入力（わからない場合は空欄でも可・解説モードになります）"
            rows="6"
            style={{
              width: "100%",
              padding: "10px",
              fontSize: "14px",
              fontFamily: "inherit",
              borderRadius: "6px",
              border: "1px solid var(--rule)",
              background: "var(--bg)",
              color: "var(--ink)",
              boxSizing: "border-box",
              marginBottom: "12px",
              resize: "vertical",
            }}
          />
          <div style={{ display: "flex", gap: "8px", alignItems: "center", flexWrap: "wrap" }}>
            <button
              onClick={handleCopy}
              style={{
                background: "var(--accent)",
                color: "var(--bg)",
                border: "none",
                borderRadius: "6px",
                padding: "10px 16px",
                fontSize: "14px",
                fontWeight: 700,
                cursor: "pointer",
              }}
            >
              📋 Claudeで採点（clipboardコピー）
            </button>
            {copied && (
              <span style={{ color: "var(--accent)", fontSize: "13px", fontWeight: 600 }}>
                ✅ コピー完了 → Claude Codeに貼り付けてEnter
              </span>
            )}
          </div>
          <details style={{ marginTop: "12px", fontSize: "12px", color: "var(--ink-mute)" }}>
            <summary style={{ cursor: "pointer" }}>使い方</summary>
            <ol style={{ paddingLeft: "20px", lineHeight: "1.6" }}>
              <li>自信度（1-5）をスライダーで選択</li>
              <li>30秒考える → 解答欄を開く（Generation effect）</li>
              <li>解答を入力（わからなければ空欄でもOK）</li>
              <li>「Claudeで採点」ボタンでclipboardにコピー</li>
              <li>Claude Codeを開いて貼り付け → Enter</li>
              <li>採点・解説が表示され、records.jsonに自動追記される</li>
            </ol>
          </details>
        </>
      )}
    </div>
  );
};

      const candidates = [];
      for (let i = 0; i < localStorage.length; i++) {
        const key = localStorage.key(i);
        if (key && key.startsWith("concept-test:")) {
          try {
            const value = JSON.parse(localStorage.getItem(key));
            candidates.push({ key, qid: key.slice("concept-test:".length), ...value });
          } catch (innerErr) {}
        }
      }
      candidates.sort((a, b) => (b.date || "").localeCompare(a.date || ""));
      if (candidates.length > 0) setLatestAttempt(candidates[0]);
    } catch (e) {}
  }, []);

  if (!latestAttempt) return null;

  // "riron_inductance_001" → section: "inductance"
  const parts = latestAttempt.qid.split("_");
  const targetSection = parts.length >= 2 ? parts[1] : "home";
  const q = CONCEPT_QUESTIONS[latestAttempt.qid];

  return (
    <div style={{
      border: "2px solid var(--warn)",
      background: "var(--warn-soft)",
      borderRadius: "12px",
      padding: "16px 20px",
      margin: "1.5rem 0",
    }}>
      <div style={{ display: "flex", alignItems: "center", gap: "8px", marginBottom: "8px" }}>
        <span style={{ fontSize: "20px" }}>📌</span>
        <h3 style={{ margin: 0, fontSize: "15px" }}>前回の挑戦（再テスト推奨）</h3>
      </div>
      <p style={{ fontSize: "13px", margin: "4px 0", color: "var(--ink-soft)" }}>
        <strong>{latestAttempt.date}</strong> · 自信度 <strong>{latestAttempt.confidence}/5</strong>
        {q && <> · {q.theme} #{q.seq}</>}
      </p>
      {latestAttempt.answer && (
        <p style={{ fontSize: "12px", color: "var(--ink-mute)", margin: "4px 0 12px", fontStyle: "italic" }}>
          「{latestAttempt.answer.slice(0, 100)}{latestAttempt.answer.length > 100 ? "..." : ""}」
        </p>
      )}
      <button
        onClick={() => onNav(targetSection)}
        style={{
          background: "var(--warn)",
          color: "var(--bg)",
          border: "none",
          borderRadius: "6px",
          padding: "8px 14px",
          fontSize: "13px",
          fontWeight: 700,
          cursor: "pointer",
        }}
      >
        🎯 学習窓口で再挑戦する
      </button>
    </div>
  );
};

const SectionCheck = ({ pageId, sectionId, compact = false }) => {
  const key = `denken_check::riron_${pageId}::section::${sectionId}`;
  const [status, setStatus] = useState(() => {
    try { return localStorage.getItem(key) || ''; } catch (e) { return ''; }
  });
  const update = (newStatus) => {
    const next = newStatus === status ? '' : newStatus;
    setStatus(next);
    try {
      if (next) localStorage.setItem(key, next);
      else localStorage.removeItem(key);
      window.dispatchEvent(new CustomEvent('section-check-changed', { detail: { key, status: next } }));
    } catch (e) { /* noop */ }
  };
  const buttons = [
    { mark: '◎', label: '完璧', color: '#16a34a' },
    { mark: '○', label: 'OK',   color: '#3b82f6' },
    { mark: '△', label: '微妙', color: '#f59e0b' },
    { mark: '×', label: '未',   color: '#dc2626' },
  ];
  return (
    <div style={{
      margin: compact ? '4px 0 12px' : '6px 0 18px',
      padding: '8px 12px',
      background: 'var(--bg-elev)',
      border: '1px solid var(--rule)',
      borderRadius: 6,
      display: 'flex',
      alignItems: 'center',
      gap: 8,
      flexWrap: 'wrap',
    }}>
      <span style={{ fontSize: 11, fontWeight: 600, color: 'var(--ink-soft)' }}>📊 このセクションの理解度:</span>
      {buttons.map(b => (
        <button
          key={b.mark}
          onClick={() => update(b.mark)}
          aria-label={`理解度 ${b.label}`}
          style={{
            padding: '4px 10px',
            minWidth: 36,
            background: status === b.mark ? b.color : 'transparent',
            color: status === b.mark ? '#fff' : 'var(--ink)',
            border: status === b.mark ? `1px solid ${b.color}` : '1px solid var(--rule)',
            borderRadius: 4,
            cursor: 'pointer',
            fontWeight: 700,
            fontSize: 14,
            transition: 'all 0.1s',
          }}
        >{b.mark}</button>
      ))}
      {status && (
        <span style={{ fontSize: 11, color: 'var(--ink-soft)' }}>前回: <strong style={{ color: 'var(--ink)' }}>{status}</strong></span>
      )}
    </div>
  );
};

const SectionCheckSummary = ({ pageId, sections, onJump }) => {
  const [scores, setScores] = useState({});
  useEffect(() => {
    const refresh = () => {
      const result = {};
      sections.forEach(s => {
        const k = `denken_check::riron_${pageId}::section::${s.id}`;
        try { result[s.id] = localStorage.getItem(k) || ''; } catch (e) { result[s.id] = ''; }
      });
      setScores(result);
    };
    refresh();
    window.addEventListener('section-check-changed', refresh);
    return () => window.removeEventListener('section-check-changed', refresh);
  }, [pageId, sections]);

  const total = sections.length;
  const counts = { '◎': 0, '○': 0, '△': 0, '×': 0, '未': 0 };
  sections.forEach(s => {
    const v = scores[s.id];
    if (v && counts[v] !== undefined) counts[v]++; else counts['未']++;
  });
  const weak = sections.filter(s => ['△', '×'].includes(scores[s.id]) || !scores[s.id]);

  return (
    <div style={{
      background: 'var(--bg-elev)',
      border: '1px solid var(--rule)',
      borderRadius: 6,
      padding: '14px 18px',
      marginBottom: 16,
    }}>
      <div style={{ fontSize: 13, fontWeight: 700, color: 'var(--ink)', marginBottom: 10 }}>
        📊 理解度サマリ（{total} セクション中）
      </div>
      <div style={{ display: 'flex', gap: 14, flexWrap: 'wrap', marginBottom: 12, fontSize: 12 }}>
        <span><strong style={{ color: '#16a34a' }}>◎ {counts['◎']}</strong></span>
        <span><strong style={{ color: '#3b82f6' }}>○ {counts['○']}</strong></span>
        <span><strong style={{ color: '#f59e0b' }}>△ {counts['△']}</strong></span>
        <span><strong style={{ color: '#dc2626' }}>× {counts['×']}</strong></span>
        <span><strong style={{ color: 'var(--ink-soft)' }}>未 {counts['未']}</strong></span>
      </div>
      {weak.length > 0 ? (
        <>
          <div style={{ fontSize: 12, color: 'var(--warn)', marginBottom: 6, fontWeight: 600 }}>
            🔁 弱点セクション（△・×・未） — 再読推奨
          </div>
          <ul style={{ margin: 0, paddingLeft: 18, fontSize: 12, lineHeight: 1.8 }}>
            {weak.map(s => (
              <li key={s.id}>
                <a
                  href={`#${s.id}`}
                  onClick={(e) => { e.preventDefault(); if (onJump) onJump(s.id); else { location.hash = s.id; } }}
                  style={{ color: 'var(--accent-ink)', textDecoration: 'underline' }}

                {scores[s.id] && <span style={{ marginLeft: 8, color: 'var(--ink-soft)' }}>（{scores[s.id]}）</span>}
              </li>
            ))}
          </ul>
        </>
      ) : (
        <div style={{ fontSize: 12, color: '#16a34a', fontWeight: 600 }}>
          ✨ すべてのセクションが ◎ または ○ です。お疲れさまでした！
        </div>
      )}
    </div>
  );
};

/* ============================================================
   PageTabs — 公式/解説/学習 タブUI共通component
   URL: #pageId:tab 形式 / localStorage: denken_tab::<pageId>
   ============================================================ */
const PageTabs = ({ pageId, tabs, defaultTab, children }) => {
  const tabIds = tabs.map(t => t.id);
  const [activeTab, setActiveTab] = useState(() => {
    const h = location.hash.replace(/^#/, '');
    const hashTab = h.includes(':') ? h.split(':')[1] : null;
    if (hashTab && tabIds.includes(hashTab)) return hashTab;
    try {
      const stored = localStorage.getItem(`denken_tab::${pageId}`);
      if (stored && tabIds.includes(stored)) return stored;
    } catch (e) { /* localStorage unavailable */ }
    return defaultTab || tabIds[0];
  });

  const switchTab = (tabId) => {
    if (!tabIds.includes(tabId)) return;
    setActiveTab(tabId);
    try { localStorage.setItem(`denken_tab::${pageId}`, tabId); } catch (e) { /* noop */ }
    history.replaceState(null, '', `#${pageId}:${tabId}`);
  };

  useEffect(() => {
    const onHash = () => {
      const h = location.hash.replace(/^#/, '');
      const parts = h.split(':');
      if (parts[0] === pageId && parts[1] && tabIds.includes(parts[1])) {
        setActiveTab(parts[1]);
      }
    };
    window.addEventListener('hashchange', onHash);
    return () => window.removeEventListener('hashchange', onHash);
  }, [pageId]);

  return (
    <div className="page-tabs-container" style={{ margin: "20px 0 0 0" }}>
      <div role="tablist" style={{
        display: "flex",
        gap: "4px",
        borderBottom: "2px solid var(--rule)",
        margin: 0,
        padding: 0,
        flexWrap: "wrap",
      }}>
        {tabs.map(tab => {
          const isActive = activeTab === tab.id;
          return (
            <button
              key={tab.id}
              role="tab"
              aria-selected={isActive}
              onClick={() => switchTab(tab.id)}
              style={{
                appearance: "none",
                border: "none",
                background: isActive ? "var(--bg-elev)" : "transparent",
                color: isActive ? "var(--ink)" : "var(--ink-soft)",
                fontWeight: isActive ? 700 : 500,
                padding: "10px 18px",
                fontSize: "15px",
                cursor: "pointer",
                borderRadius: "6px 6px 0 0",
                borderBottom: isActive ? "2px solid var(--accent-ink)" : "2px solid transparent",
                marginBottom: "-2px",
                fontFamily: "var(--font-sans)",
                transition: "background 0.15s, color 0.15s",
              }}
            >
              {tab.icon && <span style={{ marginRight: 6 }}>{tab.icon}</span>}
              {tab.label}
            </button>
          );
        })}
      </div>
      <div role="tabpanel" style={{ paddingTop: "20px" }}>
        {typeof children === 'function' ? children(activeTab, switchTab) : children}
      </div>
    </div>
  );
};

          <ellipse cx="210" cy="132" rx="5" ry="36" />
          <ellipse cx="230" cy="132" rx="5" ry="36" />
        </g>
        {/* ②軸を貫く磁束（緑） */}
        <line x1="96" y1="132" x2="276" y2="132" stroke="var(--ok)" strokeWidth="2.5" strokeLinecap="round" markerEnd="url(#ind-arrPhi)" />
        <text x="184" y="200" fontSize="12" fill="var(--ok)" fontWeight="bold" textAnchor="middle">② コイルを貫く磁束 Φ が増加</text>
        {/* 端子と逆起電力の式 */}
        <line x1="250" y1="110" x2="296" y2="110" stroke="var(--warn)" strokeWidth="1.3" />
        <line x1="250" y1="154" x2="296" y2="154" stroke="var(--warn)" strokeWidth="1.3" />
        <circle cx="300" cy="110" r="10" fill="none" stroke="var(--warn)" strokeWidth="1.8" />
        <text x="296.5" y="114.5" fontSize="13" fill="var(--warn)">+</text>
        <circle cx="300" cy="154" r="10" fill="none" stroke="var(--warn)" strokeWidth="1.8" />
        <text x="297" y="159" fontSize="13" fill="var(--warn)">−</text>
        <text x="316" y="126" fontSize="12" fill="var(--warn)" fontWeight="bold">e = −L</text>
        <text x="316" y="142" fontSize="11" fill="var(--warn)">(dI/dt)</text>
        <text x="190" y="222" fontSize="11" fill="var(--ink-mute)" textAnchor="middle">マイナス符号 ＝ レンツの法則（変化を嫌う）</text>
      </svg>
      <figcaption style={{ fontSize: "12px", color: "var(--ink-mute)", textAlign: "center", marginTop: "6px", lineHeight: 1.6 }}>
        自己誘導：電流 I の増加が磁束 Φ を増やし、その変化を妨げる向きに逆起電力 e = −L(dI/dt) が誘起される（レンツの法則）。
      </figcaption>
    </figure>
    <p>
      ここで重要なのは、コイルは <strong>電流そのもの</strong> を嫌がるのではなく、<strong>電流が変化すること</strong>（di/dt ≠ 0）を嫌がるという点。<strong>抵抗 R は電流そのものを妨げる</strong>が、<strong>コイル L は電流の変化を妨げる</strong>。この違いがインダクタンスの本質。
    </p>

    <div style={{ background: "var(--accent-soft)", borderRadius: "6px", padding: "12px 14px", margin: "14px 0" }}>
      <div style={{ fontSize: "12px", fontWeight: 700, color: "var(--accent-ink)", marginBottom: 8, letterSpacing: "0.04em" }}>🔁 現象の流れ（因果ladder）</div>
      <ol style={{ margin: 0, paddingLeft: 24, lineHeight: 1.9 }}>
        <li><strong>電流が変化する</strong>（di/dt ≠ 0）</li>
        <li><strong>磁束が変化する</strong>（Φ は i に比例して生成されるため、i 変化 → Φ 変化）</li>
        <li><strong>誘導起電力が発生する</strong>（<Eq tex="e = -N\,d\Phi/dt = -L\,di/dt" inline />）</li>
        <li><strong>電流変化を妨げる向きに作用する</strong>（レンツの法則）</li>
      </ol>
    </div>

    <h3 id="rcl-comparison" style={{ marginTop: 18 }}>R・C・L のエネルギー視点で本質を整理</h3>
    <p>
      回路素子の本質は「エネルギーをどう扱うか」で見ると一目瞭然。
    </p>
    <table className="data-table">
      <thead>
        <tr><th>要素</th><th>エネルギーとの関係</th><th>「嫌がる」もの</th><th>直流定常での挙動</th></tr>
      </thead>
      <tbody>
        <tr>
          <td><strong>抵抗 R</strong></td>
          <td>エネルギーを<strong>熱として消費</strong>（不可逆）</td>
          <td>電流そのもの</td>
          <td>通常通り（オームの法則）</td>
        </tr>
        <tr>
          <td><strong>コンデンサ C</strong></td>
          <td><strong>電界</strong>にエネルギーを蓄える（可逆）</td>
          <td>電圧の変化（dv/dt）</td>
          <td>開放（電流ゼロ）</td>
        </tr>
        <tr>
          <td><strong>コイル L</strong></td>
          <td><strong>磁界</strong>にエネルギーを蓄える（可逆）</td>
          <td>電流の変化（di/dt）</td>
          <td>短絡（電圧降下ゼロ）</td>
        </tr>
      </tbody>
    </table>
    <Callout variant="tip" title="一言で押さえる">
      <p><strong>コイルは「流れている電流を維持したがる部品」</strong>。コンデンサとは双対関係（電界↔磁界、電圧の変化↔電流の変化、開放↔短絡）。R は熱消費（消費型）、C と L は蓄積型（リアクタンス）という大区分でも整理できる。</p>
    </Callout>

    <h2 id="why-confuse"><span className="h-num">2</span>なぜインダクタンスで詰まりやすいか（メタ認知）</h2>
    <p style={{ fontSize: "13px", color: "var(--ink-soft)" }}>
      インダクタンスは電験3種で「公式は知っているのに失点する」典型テーマ。原因は<strong>計算上のミスではなく認知上の壁</strong>にある。<strong>症状（場所）と誤モデル（脳内バグ）を1表で対応付け</strong>、セクション3以降を読む前に「自分が今どこで・どう詰まっているか」を意識する。
    </p>
    <table className="data-table">
      <thead>
        <tr><th>症状（つまずきポイント）</th><th>誤モデル（脳内バグ）</th><th>正モデル（突破の鍵）</th></tr>
      </thead>
      <tbody>
        <tr>
          <td><strong>① L = コイルの定数 で思考停止</strong></td>
          <td>「L はただの係数」と暗記している</td>
          <td>L = NΦ/i = λ/i（セクション3）。L が大きい = 同じ電流でより多くの磁束 = 変化に強く抵抗</td>
        </tr>
        <tr>
          <td><strong>② コイルを抵抗と同一視する</strong></td>
          <td>「L も何かを消費する」とぼんやり思い込む</td>
          <td>R は熱として消費、L は磁界に<strong>可逆的に蓄積</strong>（セクション1 R/C/L比較）</td>
        </tr>
        <tr>
          <td><strong>③ 磁界・変化・微分が直感しにくい</strong></td>
          <td>抵抗のように「電圧→電流」直線的に考える</td>
          <td>「電流変化 → 磁束変化 → 誘導起電力」の因果ladder（セクション1）で <strong>時系列の物語</strong> として捉える</td>
        </tr>
        <tr>
          <td><strong>④ X_L = ωL の周波数依存を忘れる</strong></td>
          <td>「L の抵抗は L だけで決まる」と暗記</td>
          <td>X_L = 2πfL（セクション4）。<strong>周波数が高いほど電流変化が速くなるので妨げが強くなる</strong></td>
        </tr>
        <tr>
          <td><strong>⑤ 位相「電圧が先・電流が遅れる」を混同</strong></td>
          <td>「電圧が90°進む」「電流90°遅れる」のどちらが基準か曖昧</td>
          <td>v = L di/dt（セクション4位相）から、<strong>i が sin なら v は cos</strong>（cos は sin より90°進む）→ 電圧が先・電流が遅れる</td>
        </tr>
        <tr>
          <td><strong>⑥ 逆起電力 e の符号と意味を取り違える</strong></td>
          <td>「変な電圧が出る」と感覚的に処理</td>
          <td>e = -L di/dt（セクション3）の<strong>「電流を止めるな」原理 = 流れを守る慣性</strong>として理解</td>
        </tr>
      </tbody>
    </table>

    <h2 id="self-induction"><span className="h-num">3</span>自己誘導：e と v の符号規約</h2>
    <p>
      自己インダクタンスで最も混乱しやすいのが、次の2式の符号の違い。一見すると矛盾に見えるが、<strong>見ている対象が違うだけ</strong>で本質は同じ。
    </p>
    <table className="data-table">
      <thead>
        <tr><th>式</th><th>意味</th><th>使う場面</th></tr>
      </thead>
      <tbody>
        <tr>
          <td style={{ whiteSpace: "nowrap" }}><Eq tex="e = -L\,di/dt" inline /></td>
          <td><strong>誘導起電力</strong>（逆起電力）</td>
          <td>レンツの法則を強調するとき・エネルギー授受の向きを問うとき</td>
        </tr>
        <tr>
          <td style={{ whiteSpace: "nowrap" }}><Eq tex="v = L\,di/dt" inline /></td>
          <td><strong>コイル端子電圧</strong>（受動符号規約）</td>
          <td>回路解析（KVL）でコイル端子電圧として使うとき</td>
        </tr>
      </tbody>
    </table>
    <p>
      <Eq tex="e = -L\,di/dt" inline /> の<strong>マイナス</strong>は「変化を妨げる向きに起電力が発生する」というレンツの法則の表現。一方 <Eq tex="v = L\,di/dt" inline /> は「電流が流れ込む端子を正」とする受動符号規約で見たコイルの端子電圧。<strong>同じ現象を符号規約だけ変えて表しているので矛盾しない</strong>。
    </p>
    <Callout variant="tip" title="使い分けの覚え方">
      <p>問題文に「逆起電力」「レンツの法則」と書いてあったら <strong>e</strong>（マイナスあり）。「端子電圧」「閉路方程式」「KVL」と書いてあったら <strong>v</strong>（マイナスなし）。<strong>問題文の言葉で判別</strong>するクセをつけると混乱しない。</p>
    </Callout>

    <h3 id="lambda-ladder" style={{ marginTop: 18 }}>磁束鎖交数 λ から L を理解する</h3>
    <p>
      コイルに電流 i が流れると磁束 Φ が発生する。巻数 N とすると、<strong>磁束鎖交数 λ = NΦ</strong>（コイル全体で鎖交する磁束の総量）。自己インダクタンス L は「電流に対してどれだけ磁束鎖交数を作れるか」を表すので：
    </p>
    <p style={{ textAlign: "center", margin: "10px 0" }}>
      <Eq tex="L = \frac{\lambda}{i} = \frac{N\Phi}{i}" />
    </p>
    <p>
      意味は「同じ電流を流したとき、どれだけ多くの磁束を作れるか」。<strong>L が大きい = 同じ電流でより多くの磁束を作る = 電流変化に対してより大きく抵抗できる</strong>、と直感的につながる。
    </p>

    <h2 id="dc-ac-energy"><span className="h-num">4</span>直流・交流でのコイル挙動 ＋ 磁気エネルギー</h2>

    <h3>直流定常状態：理想コイルは短絡</h3>
    <p>
      直流（f = 0）では di/dt = 0 なので、<Eq tex="v = L\,di/dt = 0" inline />。<strong>理想コイルは短絡（電圧降下ゼロ）として振る舞う</strong>。ただし、電源投入直後（過渡）は電流が急変できないため、初期は開放に近い挙動になる。試験では「定常状態か過渡か」を最初に判断する。
    </p>

    <h3>交流：誘導リアクタンス X_L = ωL</h3>
    <p>
      交流（電流が周期的に変化）では、コイルは電流を妨げる。この妨げる大きさが <strong>誘導リアクタンス</strong>：
    </p>
    <p style={{ textAlign: "center", margin: "10px 0" }}>
      <Eq tex="X_L = \omega L = 2\pi f L \quad [\Omega]" />
    </p>
    <p>
      交流電圧は <Eq tex="V = X_L I = \omega L I" inline />、最大値は <Eq tex="V_m = \omega L I_m" inline />。<strong>周波数 f が高いほど X_L は大きく、電流を流しにくい</strong>。逆に直流（f = 0）では X_L = 0 で短絡近似と整合する。
    </p>

    <h3 id="phase-derivation">位相：v = L di/dt から「電圧が90°進む」を導く</h3>
    <p>
      「コイルでは電流が電圧より90°遅れる」を暗記ではなく <strong>v = L di/dt の微分1回</strong> から導けると、混同が消える。
    </p>
    <p style={{ paddingLeft: 16, margin: "8px 0" }}>
      <strong>Step 1.</strong> コイル電圧の定義式：<Eq tex="v = L\,\frac{di}{dt}" inline /><br />
      <strong>Step 2.</strong> 電流が正弦波で流れていると仮定：<Eq tex="i = I_m \sin(\omega t)" inline /><br />
      <strong>Step 3.</strong> 微分すると：<Eq tex="\frac{di}{dt} = \omega I_m \cos(\omega t)" inline /><br />
      <strong>Step 4.</strong> よって：<Eq tex="v = L \omega I_m \cos(\omega t) = \omega L I_m \sin(\omega t + \pi/2)" inline /><br />
      <strong>Step 5.</strong> 結果：<strong>v は cos 波（i の sin 波より90°進む）</strong> ＝ 電圧が電流より90°進む ＝ 電流が電圧より90°遅れる
    </p>
    <Callout variant="tip" title="位相の腹落ち">
      <p>コイル電圧は「電流そのもの」ではなく「<strong>電流の変化率</strong>」で決まる。<strong>正弦波を微分すると90°位相が進む</strong>のは数学的事実（cos = sin より π/2 進み）。だからコイル端子では電圧が電流より90°進む。「電圧が先・電流が遅れる」は<strong>微分の結果であって暗記事項ではない</strong>。</p>
    </Callout>

    <h3 id="rl-transient">過渡応答：i(t) = (V/R)(1 − e<sup>−t/τ</sup>)</h3>
    <p>
      直流定常（短絡）と交流定常（X<sub>L</sub>=ωL）の中間、<strong>スイッチ投入直後〜定常到達まで</strong>の挙動を表すのが RL 回路の過渡応答。コイル電流は急変できないため、<strong>指数関数的に</strong>定常値へ近づく。
    </p>
    <p style={{ textAlign: "center", margin: "10px 0" }}>
      <Eq tex="i(t) = \frac{V}{R}\left(1 - e^{-t/\tau}\right), \quad \tau = \frac{L}{R}" />
    </p>
    <table className="data-table">
      <thead>
        <tr><th>経過時間</th><th>定常値到達率</th><th>意味</th></tr>
      </thead>
      <tbody>
        <tr><td>τ（1時定数）</td><td>63.2%</td><td>τ = L/R は「63.2% 到達時間」と覚える</td></tr>
        <tr><td>3τ</td><td>95.0%</td><td>実用的には 3τ で「ほぼ定常」とみなす</td></tr>
        <tr><td>5τ</td><td>99.3%</td><td>5τ で完全定常扱い</td></tr>
      </tbody>
    </table>
    <Callout variant="tip" title="OFF 時の減衰">
      <p>スイッチ OFF 時は <Eq tex="i(t) = i_0\,e^{-t/\tau}" inline /> で <strong>指数的減衰</strong>。τ 後に i₀ の 36.8%（= 1 − 63.2%）まで低下。B 問題で頻出（過渡現象 + RL 回路の組合せ）。</p>
    </Callout>
    <p style={{ fontSize: "12px", color: "var(--ink-soft)" }}>
      ▶ 過渡現象の詳細は <a href="#" onClick={(e) => { e.preventDefault(); onNav('transient'); }} style={{ textDecoration: "underline" }}>3.2 過渡現象</a> ページへ
    </p>

    <h3>磁気エネルギー W = (1/2) L i²</h3>
    <p>
      コイルには磁界の形でエネルギーが蓄えられる：
    </p>
    <p style={{ textAlign: "center", margin: "10px 0" }}>
      <Eq tex="W = \frac{1}{2} L i^2 \quad [J]" />
    </p>
    <p>
      この式は<strong>「定常状態専用」ではない</strong>。<strong>線形インダクタで L が一定なら、過渡中でも瞬時電流 i を使って計算できる</strong>（瞬時値式）。ただし、<strong>鉄心が磁気飽和して L が一定でない場合は単純適用不可</strong>（B-H 曲線が非線形になる領域）。
    </p>
    <Callout variant="tip" title="運動エネルギーとの双対">
      <p>W = (1/2) L i² は運動エネルギー W = (1/2) m v² と同型。<strong>L ↔ m（慣性）、i ↔ v（流れの量）</strong>と対応させると暗記不要で導ける（セクション7 拡張問いも参照）。</p>
    </Callout>
    <p style={{ fontSize: "12px", color: "var(--ink-soft)" }}>
      ▶ 複素インピーダンス <Eq tex="Z = R + j\omega L" inline /> の詳細・R と L の合成・位相角は <a href="#" onClick={(e) => { e.preventDefault(); onNav('rlc-resonance'); }} style={{ textDecoration: "underline" }}>2.4 RLC共振</a> ページへ
    </p>

    <h2 id="mutual-induction"><span className="h-num">5</span>相互誘導：M と結合係数 k</h2>
    <p>
      2つのコイルが近くにあると、片方のコイルの電流変化によって生じた磁束が、もう片方のコイルにも鎖交することがある。これを <strong>相互誘導</strong> という。相互誘導の強さを表す量が <strong>相互インダクタンス M</strong>：
    </p>
    <p style={{ textAlign: "center", margin: "10px 0" }}>
      <Eq tex="M = k \sqrt{L_1 L_2}" />
    </p>
    <p>
      ここで <strong>k は結合係数</strong>（無次元、0 ≤ k ≤ 1）で、磁束がどれだけ共有されているかを表す。
    </p>
    <table className="data-table">
      <thead>
        <tr><th>k の値</th><th>意味</th><th>例</th></tr>
      </thead>
      <tbody>
        <tr><td>k = 0</td><td>全く結合していない（磁気的に絶縁）</td><td>離れた2つのコイル・磁気遮蔽あり</td></tr>
        <tr><td>0 &lt; k &lt; 1</td><td>一部だけ結合（漏れ磁束あり）</td><td>空芯トランス・現実のトランス</td></tr>
        <tr><td>k = 1</td><td><strong>完全結合</strong>（漏れ磁束ゼロ）</td><td>理想化された鉄心トランス（モデル）</td></tr>
      </tbody>
    </table>
    <Callout variant="warn" title="k = 1 ≠ 理想変圧器">
      <p>k = 1 は「漏れ磁束ゼロの<strong>完全結合</strong>」を表すだけで、<strong>現実の変圧器が理想変圧器になる意味ではない</strong>。理想変圧器はそれに加えて、<strong>巻線抵抗ゼロ・鉄損ゼロ・励磁電流ゼロ</strong>も理想化した別概念。試験で「k=1 の理想変圧器」と書かれていたら、何を理想化しているかを区別する。</p>
    </Callout>
    <p style={{ fontSize: "12px", color: "var(--ink-soft)" }}>
      ▶ 試験での解法手順（汎用5ステップ）は <a href="#" onClick={(e) => { e.preventDefault(); switchTab('learn'); }} style={{ textDecoration: "underline" }}>学習タブ セクション1</a> へ
    </p>

    <Callout variant="note" title="📐 なぜ合成は ±2M なのか（M が「2回」効く理由）">
      <p style={{ marginTop: 0 }}>「直列なのに、なぜ M ではなく <strong>2M</strong> を足し引きするのか」がインダクタンス最大の引っかかりどころ。鎖交磁束 <Eq tex="\lambda = N\Phi" inline />（公式タブの λ メモ参照）で考えると一発で腑に落ちる。直列で同じ電流 I が流れるとき、各コイルの鎖交磁束は「自分が作る分＋相手から受ける分」の和になる：</p>
      <ul style={{ margin: "6px 0", paddingLeft: 20, lineHeight: 1.85 }}>
        <li>コイル1：<Eq tex="\lambda_1 = L_1 I \pm M I" inline />（相手コイル2から受ける分が <Eq tex="\pm MI" inline />）</li>
        <li>コイル2：<Eq tex="\lambda_2 = L_2 I \pm M I" inline />（相手コイル1から受ける分が <Eq tex="\pm MI" inline />）</li>
      </ul>
      <p>合計すると <Eq tex="\lambda = \lambda_1 + \lambda_2 = (L_1 + L_2 \pm 2M)\,I" inline />。両端電圧は <Eq tex="v = d\lambda/dt = (L_1 + L_2 \pm 2M)\,dI/dt" inline /> なので、合成インダクタンスは <Eq tex="L = L_1 + L_2 \pm 2M" inline />。</p>

            <li>自己単独 → <Eq tex="L = \mu_0 \mu_r N^2 A / l" inline />（必要なら SI 単位に変換）</li>
            <li>相互結合あり → <Eq tex="L = L_1 + L_2 \pm 2M" inline />（M は正の大きさ・符号は ③ で確定）</li>
          </ul>
        </li>
        <li><strong>⑤ 用途別に展開</strong>：
          <ul style={{ margin: "4px 0", paddingLeft: 18 }}>
            <li>交流回路 → <Eq tex="X_L = \omega L" inline />、<Eq tex="V = X_L I = \omega L I" inline />、<Eq tex="V_m = \omega L I_m" inline /></li>
            <li>蓄積エネルギー → <Eq tex="W = (1/2) L I^2" inline />（線形 L 一定なら過渡中でも瞬時値可）</li>
            <li>過渡応答 → コイル電流は急変できない（初期条件 i(0) = 直前値）</li>
            <li>巻数比較 → <Eq tex="L \propto N^2" inline />（巻数2倍で L は4倍）</li>
          </ul>
        </li>
      </ol>
    </div>
    <Callout variant="tip" title="このフローが効く理由">
      <p>過去問の95%以上は「自己 L か相互 M か」「和動か差動か」「交流かエネルギーか」の <strong>3つの分岐</strong> で解ける。<strong>「公式を覚える」のではなく「分岐を覚える」</strong>と、新しい問題でも手が止まらない（R04上問3 / R05上問10 / R07上問3 で実証済み）。</p>
    </Callout>

    <h2 id="examples"><span className="h-num">3</span>例題</h2>
    <SectionCheck pageId="inductance" sectionId="examples" />
    <p><strong>問1:</strong> L=50mH のコイルに 5A の電流が流れているとき、蓄えられているエネルギーを求めよ。</p>
    <details>
      <summary>解答</summary>
      <p>W = LI²/2 = 0.05 × 25/2 = <strong>0.625 J</strong></p>
      <p>運動エネルギー mv²/2 との対応で覚える。</p>
    </details>
    <p style={{ marginTop: 16 }}><strong>問2:</strong> 和動接続で L=120mH、差動接続で L=40mH のとき、相互インダクタンス M と結合係数 k を求めよ（L₁=L₂ とする）。</p>
    <details>
      <summary>解答</summary>
      <p>M = (L和動 - L差動)/4 = (120-40)/4 = <strong>20mH</strong></p>
      <p>L₁+L₂=80mH → L₁=L₂=40mH。k = M/√(L₁L₂) = 20/√(40×40) = 20/40 = <strong>0.5</strong></p>
    </details>
    <p style={{ marginTop: 16 }}><strong>問2-B（単一測定型・R04上期 問3）:</strong> 自己インダクタンス 40mH と 10mH の2つのコイルを直列接続し、合成インダクタンスを測ると <strong>86mH</strong> だった。結合係数 k を求めよ。</p>
    <details>
      <summary>解答</summary>
      <p><strong>① 和動か差動か判定</strong>：単純和は L₁+L₂ = 40+10 = 50mH。実測 86mH は<strong>これより大きい</strong> → 磁束が強め合う<strong>和動接続</strong>（+2M）。<span style={{ fontSize: "12px", color: "var(--ink-soft)" }}>（実測 &lt; 50mH なら差動。実測＝50mH ちょうどなら M=0＝磁気結合なしで、和動/差動の区別自体が消える）</span></p>
      <p><strong>② 和動の式 L = L₁ + L₂ + 2M を M について解く</strong>：</p>
      <p>M = (L − L₁ − L₂)/2 = (86 − 40 − 10)/2 = 36/2 = <strong>18mH</strong></p>
      <p><strong>③ k に代入</strong>：k = M/√(L₁L₂) = 18/√(40×10) = 18/√400 = 18/20 = <strong>0.9</strong></p>
      <p style={{ fontSize: "12px", color: "var(--ink-soft)", marginTop: 8 }}>問2（和動＋差動の<strong>2測定</strong>）と違い、<strong>測定は1つだけ</strong>。L₁・L₂ が既知なら一方の合成 L だけで M・k が確定する。数値が与えられたときの判定のコツは「<strong>実測 vs 単純和 L₁+L₂</strong>」：大きい→和動、小さい→差動。M=18mH ≤ √(L₁L₂)=20mH なので k=0.9≤1 で物理的に妥当。</p>
    </details>
    <p style={{ marginTop: 16 }}><strong>問3 ⚠️単位変換あり:</strong> 環状鉄心コイルで、巻数 N=100、断面積 A=2 cm²、磁路長 l=5 cm、比透磁率 μᵣ=200 のとき、自己インダクタンス L を求めよ（mH 単位）。</p>
    <details>
      <summary>解答</summary>
      <p><strong>Step ①</strong>: cm² と cm を SI 単位に変換</p>
      <ul style={{ margin: "4px 0", paddingLeft: 20 }}>
        <li>A = 2 cm² = 2 × 10⁻⁴ m²</li>
        <li>l = 5 cm = 0.05 m = 5 × 10⁻² m</li>
      </ul>
      <p><strong>Step ②</strong>: 公式 <Eq tex="L = \mu_0 \mu_r N^2 A / l" inline /> に SI 単位で代入</p>
      <ul style={{ margin: "4px 0", paddingLeft: 20 }}>
        <li>μ₀μᵣ = (4π×10⁻⁷)(200) = 8π × 10⁻⁵</li>
        <li>μ₀μᵣ × N² = 8π × 10⁻⁵ × 10⁴ = 8π × 10⁻¹</li>
        <li>× A = 8π × 10⁻¹ × 2 × 10⁻⁴ = 16π × 10⁻⁵</li>
        <li>÷ l = 16π × 10⁻⁵ ÷ (5 × 10⁻²) = 3.2π × 10⁻³ H</li>
      </ul>
      <p><strong>答え</strong>: L = 3.2π × 10⁻³ H ≈ <strong>10.05 mH</strong>（≈ 10 mH）</p>
      <p style={{ fontSize: "12px", color: "var(--ink-soft)", marginTop: 8 }}>ポイント: cm² → m² は ×10⁻⁴、cm → m は ×10⁻²。代入前に必ず SI 単位に揃える。「よくある勘違い⑥」の単位変換忘れを実戦で防ぐ練習。</p>
    </details>
    <p style={{ marginTop: 16 }}><strong>問4（R07下期 問3・最新回）:</strong> 巻数 N=1000 のコイルに直流 I=0.2A を流すと磁束 Φ=6×10⁻⁴ Wb が生じた。このコイルの自己インダクタンス L を求めよ。</p>
    <details>
      <summary>解答</summary>
      <p>磁束鎖交数と電流の関係 <strong>NΦ = LI</strong>（公式タブ λ メモ）を L について解く：</p>
      <p>L = NΦ/I = (1000 × 6×10⁻⁴)/0.2 = 0.6/0.2 = <strong>3 H</strong></p>
      <p style={{ fontSize: "12px", color: "var(--ink-soft)", marginTop: 8 }}>L=μ₀μᵣN²A/l を使う問3と違い、<strong>磁束 Φ が直接与えられたら NΦ=LI 一択</strong>。鉄心の構造（A・l・μ）が無くても L が出る。★易の基本型で、与えられた量（Φ か 構造か）で式を選ぶのがコツ。</p>
    </details>

    <h2 id="r05-q10"><span className="h-num">4</span>R05上問10 解法カード — 相互結合コイル電圧最大値</h2>
    <SectionCheck pageId="inductance" sectionId="r05-q10" />
    <Callout variant="info" title="問題パターン">
      <p>2つのコイル L₁、L₂（相互インダクタンス M）が和動または差動で直列接続された回路に交流電流 <Eq tex="i = I_m \sin\omega t" inline /> が流れるとき、回路の端子電圧の最大値を求める。</p>
    </Callout>
    <p><strong>解法手順</strong>:</p>
    <ol style={{ lineHeight: 1.9 }}>
      <li>合成インダクタンスを計算する
        <ul>
          <li>和動：<Eq tex="L = L_1 + L_2 + 2M" inline /></li>
          <li>差動：<Eq tex="L = L_1 + L_2 - 2M" inline /></li>
        </ul>
      </li>
      <li>誘導リアクタンスを計算する：<Eq tex="X_L = \omega L" inline /></li>
      <li>電流最大値 I_m と X_L を掛けて電圧最大値：<Eq tex="V_m = X_L \cdot I_m = \omega L \cdot I_m" inline /></li>
    </ol>
    <details>
      <summary>なぜ V_m = ωL·I_m になるか</summary>
      <p>交流電流 <Eq tex="i = I_m \sin\omega t" inline /> をコイルに流すと、電圧は：</p>
      <p style={{ textAlign: "center" }}><Eq tex="v = L \frac{di}{dt} = L \cdot I_m \omega \cos\omega t" /></p>
      <p>最大値は <Eq tex="\cos\omega t = 1" inline /> のとき → <Eq tex="V_m = \omega L I_m" inline /></p>
    </details>
    <Callout variant="warn" title="引っかかりやすいポイント">
      <p>問題に M が与えられると「どう使うのか？」で迷いがちだが、<strong>まず合成インダクタンスを作って、あとは単一コイルと同じ手順で計算する</strong>。</p>
    </Callout>

    <h2 id="z-3conditions"><span className="h-num">5</span>3条件Z即答チェック（限界的練習ゾーン）</h2>
    <SectionCheck pageId="inductance" sectionId="z-3conditions" />
    <p style={{ fontSize: "13px", color: "var(--ink-soft)", marginBottom: "10px" }}>
      「解ける／解けない」の境界を強制発火させる練習。<strong>同一 L 値で 3 条件（純 L／RL 直列／RL 並列）</strong>の <Eq tex="|Z|" inline />・位相・電流を即答し、直後に典型誤答3択でセルフ判定する。<strong>3条件すべて正答できれば B 問題（応用問題）対応 OK</strong> の目安。
    </p>
    <Callout variant="info" title="共通設定">
      <p><strong>L = 0.1 H、R = 10 Ω、f = 50 Hz、V = 100 V（実効値）</strong> ⇒ ω = 2πf ≈ 314 rad/s、<Eq tex="X_L = \omega L \approx 31.4\ \Omega" inline /></p>
    </Callout>
    <p style={{ marginTop: 12 }}><strong>即答してから下の解答を開くこと</strong>（暗算 30 秒目安）。</p>
    <table className="data-table">
      <thead>
        <tr><th>条件</th><th>|Z| [Ω]</th><th>位相（電流の遅れ）</th><th>|I| [A]</th></tr>
      </thead>
      <tbody>
        <tr><td><strong>① 純 L</strong>（R を含まない）</td><td>X_L = 31.4</td><td>90°</td><td>3.18</td></tr>
        <tr><td><strong>② RL 直列</strong></td><td>√(R²+X_L²) ≈ 32.96</td><td>arctan(X_L/R) ≈ 72.3°</td><td>3.03</td></tr>
        <tr><td><strong>③ RL 並列</strong></td><td>RX_L/√(R²+X_L²) ≈ 9.53</td><td>arctan(R/X_L) ≈ 17.7°</td><td>10.49</td></tr>
      </tbody>
    </table>
    <details style={{ marginTop: 10, padding: "10px 14px", background: "var(--bg-elev)", border: "1px solid var(--rule)", borderRadius: "6px" }}>
      <summary style={{ cursor: "pointer", fontWeight: 600 }}>解答の導出（3条件まとめて）</summary>
      <p style={{ marginTop: 8 }}><strong>① 純 L</strong>: <Eq tex="Z = j\omega L = j31.4\ \Omega" inline /> ⇒ |Z| = ωL = 31.4 Ω、位相は <Eq tex="\pi/2" inline />（電流90°遅れ）、I = V/|Z| = 100/31.4 ≈ 3.18 A</p>
      <p><strong>② RL 直列</strong>: <Eq tex="Z = R + j\omega L = 10 + j31.4" inline /> ⇒ |Z| = √(10²+31.4²) ≈ 32.96 Ω、位相 φ = arctan(X_L/R) = arctan(3.14) ≈ 72.3°、I = 100/32.96 ≈ 3.03 A</p>
      <p><strong>③ RL 並列</strong>: <Eq tex="1/Z = 1/R + 1/(j\omega L) = 1/R - j/(\omega L)" inline /> ⇒ |1/Z| = √((1/R)²+(1/X_L)²) ≈ 0.1050、|Z| ≈ 9.53 Ω。位相は I = V·(1/R - j/X_L) より φ = arctan(R/X_L) = arctan(10/31.4) ≈ 17.7°、|I| = 100/9.53 ≈ 10.49 A</p>
      <p style={{ fontSize: "12px", color: "var(--ink-soft)", marginTop: 8 }}>※ R と X_L の<strong>どちらが大きいか</strong>で位相が90°側か0°側かが決まる感覚をつかむ：直列は X_L 寄り（72°）、並列は R 寄りに見えるが位相は arctan(R/X_L)＝小さい角（17°）。</p>
    </details>
    <Callout variant="warn" title="典型誤答3択（自己採点用）">
      <ol style={{ margin: "6px 0", paddingLeft: 22, lineHeight: 1.8 }}>
        <li><strong>直列で |Z| = R + X_L と単純加算</strong>（誤）⇒ 正解は <Eq tex="\sqrt{R^2 + X_L^2}" inline />（ピタゴラス・ベクトル合成）</li>
        <li><strong>並列で 1/|Z| = 1/R + 1/X_L と実数加算</strong>（誤）⇒ <Eq tex="1/Z = 1/R + 1/(j\omega L)" inline /> で虚部を分けて合成</li>
        <li><strong>位相を「電圧が電流より遅れる」と逆向き</strong>（誤）⇒ コイルは「電流が遅れる」（電圧が90°進む）。<a href="#" onClick={(e) => { e.preventDefault(); switchTab('explain'); }} style={{ textDecoration: "underline" }}>解説タブ セクション4 位相導出</a>で v = L di/dt から導出済</li>
      </ol>
    </Callout>
    <Callout variant="tip" title="セルフ判定">
      <p><strong>3条件すべて即答できた</strong> ⇒ B 問題（過渡＋RL／RLC合成）でも止まらない。<strong>1問でも誤答</strong> ⇒ 該当条件の導出を<a href="#" onClick={(e) => { e.preventDefault(); switchTab('explain'); }} style={{ textDecoration: "underline" }}>解説タブ セクション4</a>と <a href="#" onClick={(e) => { e.preventDefault(); onNav('rlc-resonance'); }} style={{ textDecoration: "underline" }}>2.4 RLC共振</a> で復習。</p>
    </Callout>

    <Callout variant="note" title="例題1：反転増幅回路のゲインと出力電圧（計算問題）">
      反転増幅回路で Ri = 10 kΩ、Rf = 100 kΩ のとき、電圧利得 Av と入力電圧 Vi = 0.5 V に対する出力電圧 Vo を求めよ。

      <p><strong>答え：Vo = −10 V（位相反転あり）</strong></p>

      <p>正帰還をかけたオペアンプ回路（シュミットトリガ）で、＋入力に R₁・R₂ の分圧を接続。Vi（−入力）が上昇するとき出力が反転するタイミングの判定方法として正しいものを選べ。</p>
      <p>① 仮想接地を使い、＋入力と－入力の電圧差がゼロになる点を求める</p>
      <p>② ＋入力の電圧（分圧）を計算し、Vi がその値を超えた瞬間に出力が反転する</p>

      <p>③ ❌：出力は常に飽和（+Vsat か −Vsat）</p>

const ElectronMotionFormulasTab = ({ onNav, switchTab }) => (
  <>
    <ElectronMotionSymbolLegend />

      </p>
      <p style={{ textAlign: "center", margin: "8px 0" }}>
        <Eq tex="F = qE\;\text{（電界・運動方向に依らず一定）}, \qquad F = qvB\;\text{（磁界・速度と直角）}" />

      </p>
      <p style={{ margin: 0 }}>
        因果でつなぐと <strong>電界の力は運動方向の成分を持てる → 速さが変わる（加速・eV = ½mv² のエネルギー獲得）</strong>。一方 <strong>磁界の力は常に速度と直角 → 仕事をしない → 速さは不変で向きだけ変わる（等速円運動・半径 r = mv/(qB)）</strong>。「<strong>電界は加速装置・磁界はハンドル</strong>」の役割分担がこのページ全体を貫く軸。

      <p style={{ marginBottom: 8 }}>電界 = 一定の力で押す（坂道を転がる）。磁界 = 進む向きに直角の力（紐で振り回す）。だから電界は加速、磁界は曲げるだけ。</p>
      <ul style={{ margin: 0, paddingLeft: 18, lineHeight: 1.75 }}>
        <li><strong>電界中</strong>：F=eE 一定 → 等加速度（速さが変わる）</li>
        <li><strong>加速</strong>：eV=½mv² → v=√(2eV/m)</li>
        <li><strong>磁界中</strong>：F=evB 直角 → 等速円運動（速さ不変）</li>
        <li><strong>半径</strong>：r=mv/(eB)（速いほど大きい円）</li>

        { formula: "eV = \\dfrac{1}{2}mv^2", meaning: "電位差 V で加速された電子のエネルギー保存。到達速さを出す", when: "電位差 V で加速・初速0", notWhen: "磁界のみ（磁界は仕事をしない）" },

    <Callout variant="warn" title="勘違い①：t=0直後にコンデンサを「開放」として扱う">

    <Callout variant="warn" title="勘違い③：RL回路で t=0直後のインダクタを「短絡」として扱う">

    </Callout>

    <h2 id="diffuse"><span className="h-num">7</span>拡張問い（思考を広げる）</h2>
    <Callout variant="info" title="🧐 なぜ指数関数になるのか？（diffuse mode 起動）">
      <p>RC充電では <Eq tex="\dfrac{dv_C}{dt} = \dfrac{E - v_C}{RC}" inline />。つまり<strong>変化の速さが「残りの差（E−v<sub>C</sub>）」に比例</strong>する。満杯に近いほど差が小さく、変化がゆっくりになる。この「自分の残差に比例して減る」構造の解が指数関数 e<sup>−t/τ</sup>。</p>
      <details>
        <summary>もう一段深く（同じ構造の自然現象）</summary>
        <ul style={{ marginTop: 8 }}>
          <li><strong>放射性崩壊</strong>：残っている原子数に比例して崩壊 → 同じ指数則（半減期 ↔ 時定数）</li>
          <li><strong>ニュートンの冷却</strong>：温度差に比例して冷える → 指数で常温へ</li>
          <li>いずれも<strong>1階線形微分方程式</strong>。過渡現象を理解すれば物理・化学の指数現象が一気に繋がる</li>
          <li>逆に L と C が<strong>両方</strong>あると2階になり、指数ではなく<strong>減衰振動</strong>（RLC回路）に変わる</li>
        </ul>
      </details>
    </Callout>
  </>

    <Callout variant="note" title="ダイオードの電圧方向を回路図から判断する手順（R04下・H19 出題）">
      判断の3ステップ：(1) 回路図でダイオードのアノード（A）とカソード（K）を特定する（三角形の底辺側がアノード＝P型、頂点側の棒がカソード＝N型）。(2) アノード・カソードそれぞれの電位を回路から読み取る。(3) アノード電位 {'>'} カソード電位 → 順バイアス（電流が流れる）、アノード電位 {'<'} カソード電位 → 逆バイアス（電流がほぼ流れない）。
    </Callout>

    <h2 id="examples"><span className="h-num">4.</span>例題</h2>

    <Callout variant="note" title="例題1：シリコンダイオードの導通電圧と逆方向電流">
      シリコンPN接合ダイオードに順方向電圧を印加する。導通開始電圧はおよそ何Vか。また逆方向に電圧を印加したとき電流は流れるか。ゲルマニウムダイオードと比較して答えよ。
    </Callout>
    <details>
      <summary>解答・解説</summary>
      <p>ステップ①：シリコンの順方向電圧降下</p>
      <p>シリコン PN 接合の導通閾値 <Eq tex="V_F \approx 0.6 \sim 0.7 \text{ [V]}" />（ゲルマニウムは <Eq tex="\approx 0.2 \sim 0.3 \text{ [V]}" />）</p>
      <p>ステップ②：逆方向電流の有無</p>
      <p>逆バイアス時も少数キャリアによる逆飽和電流 <Eq tex="I_s" /> が流れる。温度が上昇すると <Eq tex="I_s" /> は増加する。完全ゼロにはならない。</p>
      <p><strong>答え：導通開始電圧 ≈ 0.6〜0.7V。逆方向にも微小な逆飽和電流が流れる（完全遮断にはならない）。</strong></p>
    </details>
    <Callout variant="tip" title="この例題のツボ">
      「逆バイアス＝電流ゼロ」は誤り。逆飽和電流は存在する。シリコン 0.6V・ゲルマニウム 0.2V の数値は素材確認の習慣で解決。
    </Callout>
    <Callout variant="note" title="極端条件チェック">
      <p><strong>支配変数：</strong>順方向電圧 V_F（このダイオードの導通状態を最も左右する変数）</p>
      <ul>
        <li>V_F → <strong>0</strong>（電圧なし）のとき：空乏層がビルトインポテンシャルを維持し電流はほぼゼロ。ダイオードは遮断状態</li>
        <li>V_F → <strong>∞</strong>（過大電圧）のとき：順電流が急増し、最大定格を超えると接合部の発熱で素子破壊。実際は配線抵抗・保護抵抗で制限される</li>
      </ul>
    </Callout>

    <Callout variant="note" title="例題2：全波整流回路の出力電圧計算">
      最大値 <Eq tex="V_m = 100\sqrt{2} \text{ [V]}" /> の交流をブリッジ全波整流したとき、純抵抗負荷での出力平均電圧 <Eq tex="V_{avg}" /> を求めよ。ただしダイオードは理想とする。
    </Callout>
    <details>
      <summary>解答・解説</summary>
      <p>ステップ①：全波整流の公式を確認</p>
      <p><Eq tex="V_{avg} = \dfrac{2V_m}{\pi}" /></p>
      <p>ステップ②：数値を代入</p>
      <p><Eq tex="V_{avg} = \dfrac{2 \times 100\sqrt{2}}{\pi} = \dfrac{200\sqrt{2}}{\pi} \approx \dfrac{200 \times 1.414}{3.14} \approx 90.0 \text{ [V]}" /></p>
      <p><strong>答え：V_avg ≈ 90.0 V</strong></p>
    </details>
    <Callout variant="tip" title="この例題のツボ">
      全波整流は半波の2倍（<Eq tex="2V_m/\pi" />）。半波整流（<Eq tex="V_m/\pi" />）と混同しないこと。「全波＝2倍」をセットで記憶する。
    </Callout>
    <Callout variant="note" title="極端条件チェック">
      <p><strong>支配変数：</strong>最大値 V_m（整流出力を最も左右する変数）</p>
      <ul>
        <li>V_m → <strong>0</strong>（入力ゼロ）のとき：V_avg = 0。整流回路は機能しない（入力がなければ出力もない）</li>
        <li>V_m → <strong>∞</strong>（過大入力）のとき：V_avg も無限大 → 実際はダイオードの耐圧（逆方向電圧定格）を超えると素子破壊</li>
      </ul>
    </Callout>

    <Callout variant="note" title="例題3：バラクタダイオードの動作（R02 問11 類題）">
      バラクタダイオードに関する記述として正しいものを選べ。<br/>
      ① 順バイアス電圧を大きくするほど静電容量が大きくなる<br/>
      ② 逆バイアス電圧を大きくするほど空乏層が広がり静電容量が小さくなる<br/>
      ③ 順バイアスで使用する可変容量素子である<br/>
      ④ 静電容量は逆バイアス電圧に比例して増加する
    </Callout>
    <details>
      <summary>解答・解説</summary>
      <p>① ❌：バラクタは<strong>逆バイアス</strong>で使う。順バイアスでは電流が流れてしまい容量素子として機能しない。</p>
      <p>② ✅：正しい。逆バイアス電圧↑ → 空乏層拡大 → 静電容量 C が小さくなる（<Eq tex="C \propto 1/\sqrt{V_R}" />）。</p>
      <p>③ ❌：逆バイアスで使用する（順バイアスは誤り）。</p>
      <p>④ ❌：比例ではなく <Eq tex="C \propto 1/\sqrt{V_R}" />（平方根の逆数に比例）。しかも電圧増加で容量は<strong>減少</strong>。</p>
      <p><strong>答え：②</strong></p>
    </details>
    <Callout variant="tip" title="この例題のツボ">
      バラクタは「逆バイアス・電圧↑で容量↓」の2点セット。選択肢に「順バイアス」「比例して増加」が出たら即排除。
    </Callout>
    <Callout variant="note" title="判断の視点チェック">
      <p><strong>選択肢を切る3ステップ：</strong></p>
      <ul>
        <li>① バイアス方向を確認：順か逆か → バラクタは<strong>逆バイアス</strong>が前提</li>
        <li>② 容量と電圧の増減関係：逆バイアス↑ → 空乏層↑ → 容量↓（逆の関係）</li>
        <li>③ 依存関係の形：比例（線形）ではなく <Eq tex="1/\sqrt{V_R}" />（平方根の逆数）</li>
      </ul>
    </Callout>

    <h3>ホール電圧の式</h3>
    <p>p型半導体に電流 <Eq tex="I" /> を流し、電流に対して垂直方向に磁束密度 <Eq tex="B" /> の磁界を加えると、電流と磁界の両方に直交する方向にホール電圧 <Eq tex="V_H" /> が発生する。</p>
    <div style={{ textAlign: "center", margin: "10px 0" }}><Eq tex="V_H = R_H \cdot \dfrac{BI}{d}" display /></div>
    <table className="data-table">
      <thead>
        <tr>
          <th>記号</th>
          <th>意味</th>
          <th>単位</th>
        </tr>
      </thead>
      <tbody>
        <tr><td><Eq tex="V_H" /></td><td>ホール電圧</td><td>V</td></tr>
        <tr><td><Eq tex="R_H" /></td><td>ホール係数（材料固有）</td><td>m³/C</td></tr>
