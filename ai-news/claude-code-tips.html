<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Claude Code Tips - 自動収集情報</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            background: #f5f5f5;
            color: #333;
        }
        header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            border-radius: 8px;
            margin-bottom: 30px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        header h1 {
            margin: 0;
            font-size: 2em;
        }
        header p {
            margin: 10px 0 0 0;
            opacity: 0.9;
        }
        .update-info {
            font-size: 0.9em;
            margin-top: 15px;
            opacity: 0.8;
        }
        #articles-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }
        .article-card {
            background: white;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s, box-shadow 0.3s;
            display: flex;
            flex-direction: column;
        }
        .article-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.15);
        }
        .article-title {
            font-size: 1.1em;
            font-weight: 600;
            margin: 0 0 10px 0;
            color: #667eea;
        }
        .article-title a {
            color: #667eea;
            text-decoration: none;
        }
        .article-title a:hover {
            text-decoration: underline;
        }
        .article-summary {
            font-size: 0.95em;
            line-height: 1.5;
            margin: 0 0 15px 0;
            color: #555;
            flex-grow: 1;
        }
        .article-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.85em;
            color: #999;
            padding-top: 10px;
            border-top: 1px solid #eee;
        }
        .article-date {
            color: #764ba2;
            font-weight: 500;
        }
        .article-link {
            color: #667eea;
            text-decoration: none;
            font-size: 0.85em;
        }
        .article-link:hover {
            text-decoration: underline;
        }
        .no-data {
            text-align: center;
            color: #999;
            padding: 40px 20px;
            font-size: 1.1em;
        }
        footer {
            text-align: center;
            color: #999;
            font-size: 0.9em;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #ddd;
        }
    </style>
</head>
<body>
    <header>
        <h1>Claude Code Tips 📚</h1>
        <p>Exa APIで自動収集した最新のClaude Code関連情報</p>
        <div class="update-info">最終更新: <span id="update-date">未更新</span></div>
    </header>

    <div id="articles-container">
        <div class="no-data">データを読み込み中...</div>
    </div>

    <footer>
        <p>このページは毎日02:00 JSTに自動更新されます。</p>
    </footer>

    <script>
        // Load and display articles
        async function loadArticles() {
            try {
                const response = await fetch('./claude-code-tips-data.json');
                const data = await response.json();

                const container = document.getElementById('articles-container');
                const updateDate = document.getElementById('update-date');

                if (data.last_updated) {
                    updateDate.textContent = new Date(data.last_updated).toLocaleString('ja-JP');
                }

                if (!data.entries || data.entries.length === 0) {
                    container.innerHTML = '<div class="no-data">データがまだ収集されていません。</div>';
                    return;
                }

                const topArticles = data.entries.slice(0, 30);
                container.innerHTML = topArticles.map(entry => `
                    <div class="article-card">
                        <h3 class="article-title">
                            <a href="${escapeHtml(entry.url)}" target="_blank" rel="noopener noreferrer">
                                ${escapeHtml(entry.title)}
                            </a>
                        </h3>
                        <p class="article-summary">${escapeHtml(entry.summary)}</p>
                        <div class="article-meta">
                            <span class="article-date">${formatDate(entry.publishedDate)}</span>
                            <a href="${escapeHtml(entry.url)}" class="article-link" target="_blank">記事へ →</a>
                        </div>
                    </div>
                `).join('');
            } catch (error) {
                console.error('Failed to load articles:', error);
                document.getElementById('articles-container').innerHTML =
                    '<div class="no-data">データの読み込みに失敗しました。</div>';
            }
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function formatDate(dateStr) {
            if (!dateStr) return '日付不明';
            const date = new Date(dateStr);
            return date.toLocaleDateString('ja-JP', { year: 'numeric', month: '2-digit', day: '2-digit' });
        }

        loadArticles();
    </script>
<div style="text-align:center;padding:1.5rem 0 1rem;"><a href="https://kfurufuru.github.io/secretary-portal/" style="color:#8892a0;text-decoration:none;font-size:0.82rem;">← ポータルに戻る</a></div>
</body>
</html>
