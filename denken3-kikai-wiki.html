<!DOCTYPE html>
<html lang="ja" data-theme="light" data-accent="indigo" data-difficulty="standard">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>電験3種 機械Wiki — 受験対策・要点まとめ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700&family=Noto+Serif+JP:wght@500;600;700&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
  <style>
/* ============================================================
   電験3種 機械Wiki — Stylesheet
   ============================================================ */

:root {
  --bg: oklch(0.985 0.005 85);
  --bg-elev: oklch(0.995 0.003 85);
  --bg-sunken: oklch(0.96 0.006 85);
  --ink: oklch(0.22 0.02 260);
  --ink-soft: oklch(0.42 0.018 260);
  --ink-mute: oklch(0.58 0.014 260);
  --rule: oklch(0.88 0.008 260);
  --rule-soft: oklch(0.93 0.006 260);
  --accent: oklch(0.45 0.12 260);
  --accent-soft: oklch(0.92 0.04 260);
  --accent-ink: oklch(0.32 0.13 260);
  --warn: oklch(0.55 0.14 50);
  --warn-soft: oklch(0.95 0.04 70);
  --ok: oklch(0.55 0.10 155);
  --ok-soft: oklch(0.94 0.04 155);
  --danger: oklch(0.55 0.16 25);
  --danger-soft: oklch(0.95 0.03 25);

  --font-serif: "Noto Serif JP", "Hiragino Mincho ProN", "Yu Mincho", serif;
  --font-sans: "Noto Sans JP", "Hiragino Sans", "Yu Gothic", system-ui, sans-serif;
  --font-mono: "JetBrains Mono", "SF Mono", "Menlo", monospace;

  --fs-base: 15px;
  --lh-base: 1.85;

  --sidebar-w: 280px;
  --toc-w: 220px;
  --content-max: 760px;
}

[data-theme="dark"] {
  --bg: oklch(0.18 0.012 260);
  --bg-elev: oklch(0.22 0.012 260);
  --bg-sunken: oklch(0.14 0.012 260);
  --ink: oklch(0.94 0.008 85);
  --ink-soft: oklch(0.78 0.012 260);
  --ink-mute: oklch(0.60 0.014 260);
  --rule: oklch(0.32 0.014 260);
  --rule-soft: oklch(0.26 0.012 260);
  --accent: oklch(0.72 0.12 260);
  --accent-soft: oklch(0.30 0.06 260);
  --accent-ink: oklch(0.85 0.10 260);
  --warn: oklch(0.78 0.14 70);
  --warn-soft: oklch(0.32 0.05 70);
  --ok: oklch(0.78 0.12 155);
  --ok-soft: oklch(0.28 0.05 155);
  --danger: oklch(0.78 0.14 25);
  --danger-soft: oklch(0.32 0.05 25);
}

[data-accent="indigo"]  { --accent: oklch(0.45 0.12 260); --accent-soft: oklch(0.92 0.04 260); --accent-ink: oklch(0.32 0.13 260); }
[data-accent="forest"]  { --accent: oklch(0.45 0.10 155); --accent-soft: oklch(0.92 0.04 155); --accent-ink: oklch(0.32 0.11 155); }
[data-accent="rust"]    { --accent: oklch(0.50 0.13 35);  --accent-soft: oklch(0.93 0.04 50);  --accent-ink: oklch(0.38 0.14 35);  }
[data-accent="aubergine"] { --accent: oklch(0.40 0.10 320); --accent-soft: oklch(0.92 0.04 320); --accent-ink: oklch(0.30 0.11 320); }

[data-theme="dark"][data-accent="indigo"]  { --accent: oklch(0.74 0.12 260); --accent-soft: oklch(0.30 0.06 260); --accent-ink: oklch(0.85 0.10 260); }
[data-theme="dark"][data-accent="forest"]  { --accent: oklch(0.78 0.12 155); --accent-soft: oklch(0.28 0.05 155); --accent-ink: oklch(0.86 0.10 155); }
[data-theme="dark"][data-accent="rust"]    { --accent: oklch(0.78 0.13 50);  --accent-soft: oklch(0.30 0.06 50);  --accent-ink: oklch(0.85 0.12 50);  }
[data-theme="dark"][data-accent="aubergine"] { --accent: oklch(0.74 0.10 320); --accent-soft: oklch(0.28 0.05 320); --accent-ink: oklch(0.85 0.10 320); }

* { box-sizing: border-box; }

html, body {
  margin: 0;
  padding: 0;
  background: var(--bg);
  color: var(--ink);
  font-family: var(--font-sans);
  font-size: var(--fs-base);
  line-height: var(--lh-base);
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}

a { color: var(--accent-ink); text-decoration: none; }
a:hover { text-decoration: underline; text-underline-offset: 3px; }

/* ============================================================ Layout */

.app {
  display: grid;
  grid-template-columns: var(--sidebar-w) 1fr var(--toc-w);
  min-height: 100vh;
}

@media (max-width: 1100px) {
  .app { grid-template-columns: var(--sidebar-w) 1fr; }
  .toc { display: none; }
}

@media (max-width: 760px) {
  .app { grid-template-columns: 1fr; }
  .sidebar { display: none; }
}

/* ============================================================ Sidebar */

.sidebar {
  position: sticky;
  top: 0;
  height: 100vh;
  border-right: 1px solid var(--rule);
  background: var(--bg-sunken);
  overflow-y: auto;
  padding: 22px 18px 60px;
}

.brand {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 4px 4px 18px;
  border-bottom: 1px solid var(--rule);
  margin-bottom: 16px;
}

.brand-mark {
  width: 36px;
  height: 36px;
  border-radius: 6px;
  background: var(--ink);
  color: var(--bg);
  display: grid;
  place-items: center;
  font-family: var(--font-serif);
  font-weight: 700;
  font-size: 18px;
  letter-spacing: -0.02em;
  flex-shrink: 0;
}

.brand-title {
  font-family: var(--font-serif);
  font-size: 16px;
  font-weight: 600;
  line-height: 1.3;
  letter-spacing: 0.01em;
}
.brand-sub {
  font-size: 11px;
  color: var(--ink-mute);
  letter-spacing: 0.05em;
  text-transform: uppercase;
}

.search {
  position: relative;
  margin-bottom: 18px;
}
.search input {
  width: 100%;
  padding: 8px 10px 8px 32px;
  border: 1px solid var(--rule);
  background: var(--bg-elev);
  border-radius: 5px;
  color: var(--ink);
  font-family: var(--font-sans);
  font-size: 13px;
}
.search input::placeholder { color: var(--ink-mute); }
.search input:focus { outline: 2px solid var(--accent); outline-offset: -1px; border-color: transparent; }
.search-icon {
  position: absolute;
  left: 10px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--ink-mute);
  pointer-events: none;
}

.search-kbd {
  position: absolute;
  right: 8px;
  top: 50%;
  transform: translateY(-50%);
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--ink-mute);
  border: 1px solid var(--rule);
  padding: 1px 5px;
  border-radius: 3px;
  background: var(--bg);
}

.search-results {
  position: absolute;
  top: calc(100% + 4px);
  left: 0;
  right: 0;
  background: var(--bg-elev);
  border: 1px solid var(--rule);
  border-radius: 6px;
  max-height: 360px;
  overflow-y: auto;
  z-index: 30;
  box-shadow: 0 12px 32px -12px oklch(0.2 0.02 260 / 0.25);
}
.search-result {
  padding: 9px 12px;
  border-bottom: 1px solid var(--rule-soft);
  cursor: pointer;
  font-size: 13px;
}
.search-result:last-child { border-bottom: 0; }
.search-result:hover, .search-result.active { background: var(--accent-soft); }
.search-result-title { font-weight: 600; color: var(--ink); }
.search-result-meta { font-size: 11px; color: var(--ink-mute); margin-top: 2px; }
.search-result mark { background: var(--accent-soft); color: var(--accent-ink); padding: 0 2px; border-radius: 2px; }

.nav-group {
  margin-bottom: 4px;
}

.nav-chapter {
  display: flex;
  align-items: center;
  gap: 6px;
  width: 100%;
  background: transparent;
  border: 0;
  padding: 6px 4px;
  text-align: left;
  cursor: pointer;
  font-family: var(--font-sans);
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--ink-mute);
}
.nav-chapter:hover { color: var(--ink); }
.nav-chapter-caret {
  width: 10px;
  height: 10px;
  transition: transform 0.15s;
}
.nav-chapter[data-open="false"] .nav-chapter-caret { transform: rotate(-90deg); }
.nav-chapter-num {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--ink-mute);
  margin-left: auto;
}

.nav-items {
  list-style: none;
  padding: 0;
  margin: 0 0 6px;
  border-left: 1px solid var(--rule);
  margin-left: 8px;
}
.nav-items[data-open="false"] { display: none; }

.nav-item {
  display: flex;
  align-items: baseline;
  gap: 8px;
  padding: 4px 10px 4px 14px;
  margin-left: -1px;
  border-left: 2px solid transparent;
  font-size: 13px;
  color: var(--ink-soft);
  cursor: pointer;
  transition: all 0.12s;
  line-height: 1.4;
}
.nav-item:hover { color: var(--ink); background: var(--rule-soft); }
.nav-item.active {
  color: var(--accent-ink);
  border-left-color: var(--accent);
  background: var(--accent-soft);
  font-weight: 600;
}
.nav-item-num {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--ink-mute);
  flex-shrink: 0;
  font-weight: 400;
}
.nav-item.active .nav-item-num { color: var(--accent); }

.nav-badge {
  margin-left: auto;
  font-family: var(--font-mono);
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 0.05em;
  padding: 1px 5px;
  border-radius: 3px;
  background: var(--warn-soft);
  color: var(--warn);
}

.sidebar-footer {
  margin-top: 20px;
  padding-top: 16px;
  border-top: 1px solid var(--rule);
  font-size: 11px;
  color: var(--ink-mute);
  line-height: 1.6;
}

/* ============================================================ Main Content */

.main {
  padding: 36px 48px 120px;
  min-width: 0;
}

@media (max-width: 760px) { .main { padding: 24px 18px 80px; } }

.crumbs {
  font-size: 12px;
  color: var(--ink-mute);
  margin-bottom: 22px;
  display: flex;
  align-items: center;
  gap: 6px;
  flex-wrap: wrap;
}
.crumbs a { color: var(--ink-mute); }
.crumbs a:hover { color: var(--ink); }
.crumbs .sep { color: var(--rule); }

.page-header {
  border-bottom: 2px solid var(--rule);
  padding-bottom: 18px;
  margin-bottom: 32px;
}
.page-eyebrow {
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--accent-ink);
  margin-bottom: 8px;
}
.page-title {
  font-family: var(--font-serif);
  font-size: 36px;
  font-weight: 700;
  line-height: 1.25;
  letter-spacing: -0.01em;
  margin: 0 0 10px;
  color: var(--ink);
}
.page-deck {
  font-size: 15px;
  color: var(--ink-soft);
  line-height: 1.75;
  max-width: 640px;
}

.page-meta {
  display: flex;
  flex-wrap: wrap;
  gap: 18px;
  margin-top: 16px;
  font-size: 12px;
  color: var(--ink-mute);
}
.page-meta-item { display: flex; align-items: center; gap: 6px; }
.page-meta-item strong { color: var(--ink-soft); font-weight: 600; }

.content { max-width: var(--content-max); }

.content h2 {
  font-family: var(--font-serif);
  font-size: 24px;
  font-weight: 700;
  letter-spacing: -0.005em;
  line-height: 1.35;
  margin: 48px 0 16px;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--rule);
  scroll-margin-top: 24px;
}
.content h2 .h-num {
  font-family: var(--font-mono);
  font-size: 13px;
  color: var(--accent);
  font-weight: 600;
  margin-right: 10px;
  letter-spacing: 0.05em;
}
.content h3 {
  font-family: var(--font-serif);
  font-size: 18px;
  font-weight: 600;
  margin: 32px 0 10px;
  scroll-margin-top: 24px;
}
.content h4 {
  font-size: 14px;
  font-weight: 700;
  letter-spacing: 0.02em;
  margin: 22px 0 8px;
  color: var(--ink);
}
.content p {
  margin: 0 0 14px;
  text-wrap: pretty;
}
.content p strong { color: var(--ink); font-weight: 700; }

/* 論述で問われるポイント — 黄色マーカー */
.marker {
  background: linear-gradient(transparent 55%, oklch(0.92 0.18 95) 55%);
  padding: 0 2px;
  font-weight: 600;
  color: var(--ink);
}
[data-theme="dark"] .marker {
  background: linear-gradient(transparent 55%, oklch(0.55 0.16 95 / 0.55) 55%);
  color: var(--ink);
}
.content ul, .content ol { padding-left: 22px; margin: 6px 0 16px; }
.content li { margin-bottom: 6px; line-height: 1.75; }
.content code {
  font-family: var(--font-mono);
  font-size: 0.88em;
  background: var(--bg-sunken);
  padding: 1px 5px;
  border-radius: 3px;
  border: 1px solid var(--rule-soft);
}

/* ============================================================ Callouts / boxes */

.box {
  border: 1px solid var(--rule);
  border-radius: 6px;
  padding: 16px 18px;
  margin: 18px 0;
  background: var(--bg-elev);
}
.box-label {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  font-weight: 700;
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.box-label::before {
  content: "";
  width: 14px;
  height: 1px;
  background: currentColor;
}

.box-formula  { background: var(--accent-soft); border-color: color-mix(in oklab, var(--accent) 30%, transparent); }
.box-formula .box-label { color: var(--accent-ink); }
.box-warn     { background: var(--warn-soft); border-color: color-mix(in oklab, var(--warn) 30%, transparent); }
.box-warn .box-label { color: var(--warn); }
.box-tip      { background: var(--ok-soft); border-color: color-mix(in oklab, var(--ok) 30%, transparent); }
.box-tip .box-label { color: var(--ok); }
.box-mistake  { background: var(--danger-soft); border-color: color-mix(in oklab, var(--danger) 30%, transparent); }
.box-mistake .box-label { color: var(--danger); }
.box-example  { background: var(--bg-sunken); }
.box-example .box-label { color: var(--ink-soft); }

.box .katex { font-size: 1.05em; }
.box p:last-child { margin-bottom: 0; }

/* ============================================================ Formula card */

.formula-card {
  display: grid;
  grid-template-columns: 80px 1fr;
  gap: 18px;
  align-items: center;
  border: 1px solid var(--rule);
  border-left: 3px solid var(--accent);
  background: var(--bg-elev);
  padding: 16px 20px;
  margin: 16px 0;
  border-radius: 0 5px 5px 0;
}
.formula-card .num {
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.1em;
  color: var(--ink-mute);
}
.formula-card .body { font-size: 14px; color: var(--ink-soft); line-height: 1.6; }
.formula-card .body strong { color: var(--ink); display: block; font-size: 13px; margin-bottom: 4px; font-family: var(--font-sans); }
.formula-card .eq { font-size: 1.15em; margin: 6px 0; }

/* ============================================================ Tables */

.table-wrap { overflow-x: auto; margin: 16px 0; }
table.data {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
}
table.data th, table.data td {
  border: 1px solid var(--rule);
  padding: 8px 12px;
  text-align: left;
  vertical-align: top;
}
table.data th {
  background: var(--bg-sunken);
  font-weight: 700;
  font-size: 12px;
  letter-spacing: 0.02em;
}
table.data td.num, table.data th.num { font-family: var(--font-mono); text-align: right; }
table.data tr:nth-child(even) td { background: color-mix(in oklab, var(--bg-sunken) 50%, transparent); }
table.data caption {
  caption-side: top;
  text-align: left;
  font-size: 12px;
  font-weight: 600;
  margin-bottom: 6px;
  color: var(--ink-soft);
}
/* data-table は data の別名（JSX側で className="data-table" を統一使用） */
table.data-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
}
table.data-table th, table.data-table td {
  border: 1px solid var(--rule);
  padding: 8px 12px;
  text-align: left;
  vertical-align: top;
}
table.data-table th {
  background: var(--bg-sunken);
  font-weight: 700;
  font-size: 12px;
  letter-spacing: 0.02em;
}
table.data-table td.num, table.data-table th.num { font-family: var(--font-mono); text-align: right; }
table.data-table tr:nth-child(even) td { background: color-mix(in oklab, var(--bg-sunken) 50%, transparent); }

/* ============================================================ TOC (right rail) */

.toc {
  position: sticky;
  top: 0;
  height: 100vh;
  padding: 36px 22px 36px 8px;
  border-left: 1px solid var(--rule);
  font-size: 12px;
  overflow-y: auto;
}
.toc-label {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--ink-mute);
  margin-bottom: 10px;
  font-weight: 700;
}
.toc ul { list-style: none; padding: 0; margin: 0; }
.toc li { margin: 0; }
.toc a {
  display: block;
  padding: 4px 10px;
  border-left: 2px solid var(--rule-soft);
  color: var(--ink-mute);
  font-size: 12px;
  line-height: 1.5;
  transition: all 0.12s;
}
.toc a:hover { color: var(--ink); border-color: var(--ink-mute); text-decoration: none; }
.toc a.active { color: var(--accent-ink); border-color: var(--accent); font-weight: 600; }
.toc li.h3 a { padding-left: 22px; font-size: 11px; }

/* ============================================================ Difficulty badges & filter */

.diff-badge {
  display: inline-block;
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.05em;
  padding: 1px 6px;
  border-radius: 3px;
  font-weight: 700;
  vertical-align: middle;
  margin-left: 6px;
}
.diff-basic    { background: var(--ok-soft);     color: var(--ok); }
.diff-standard { background: var(--accent-soft); color: var(--accent-ink); }
.diff-advanced { background: var(--warn-soft);   color: var(--warn); }

[data-difficulty="basic"]    .diff-only-standard,
[data-difficulty="basic"]    .diff-only-advanced,
[data-difficulty="standard"] .diff-only-advanced {
  display: none !important;
}

/* ============================================================ Cards on home */

.card-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 14px;
  margin: 22px 0 32px;
}

.card {
  background: var(--bg-elev);
  border: 1px solid var(--rule);
  border-radius: 6px;
  padding: 16px 18px;
  cursor: pointer;
  transition: all 0.15s;
  display: flex;
  flex-direction: column;
  min-height: 120px;
}
.card:hover {
  border-color: var(--accent);
  transform: translateY(-1px);
  box-shadow: 0 6px 18px -10px color-mix(in oklab, var(--accent) 60%, transparent);
}
.card-num {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.12em;
  color: var(--ink-mute);
  margin-bottom: 4px;
}
.card-title {
  font-family: var(--font-serif);
  font-size: 17px;
  font-weight: 600;
  color: var(--ink);
  margin-bottom: 6px;
  line-height: 1.3;
}
.card-deck { font-size: 12px; color: var(--ink-soft); line-height: 1.55; flex-grow: 1; }
.card-foot {
  margin-top: 10px;
  padding-top: 8px;
  border-top: 1px solid var(--rule-soft);
  display: flex;
  align-items: center;
  justify-content: space-between;
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--ink-mute);
  letter-spacing: 0.05em;
}
.card-freq { color: var(--accent); font-weight: 700; }

/* ============================================================ Stat strip (home) */

.stat-strip {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 0;
  border: 1px solid var(--rule);
  border-radius: 6px;
  background: var(--bg-elev);
  margin: 18px 0 28px;
  overflow: hidden;
}
@media (max-width: 720px) { .stat-strip { grid-template-columns: repeat(2, 1fr); } }
.stat {
  padding: 14px 18px;
  border-right: 1px solid var(--rule);
}
.stat:last-child { border-right: 0; }
.stat-label {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--ink-mute);
  margin-bottom: 4px;
}
.stat-value {
  font-family: var(--font-serif);
  font-size: 22px;
  font-weight: 700;
  line-height: 1;
  color: var(--ink);
}
.stat-sub { font-size: 11px; color: var(--ink-mute); margin-top: 4px; }

/* ============================================================ Frequency chart */

.freq-chart {
  display: grid;
  grid-template-columns: 100px 1fr 60px;
  gap: 10px;
  align-items: center;
  font-size: 12px;
  margin: 4px 0;
}
.freq-chart .label { color: var(--ink-soft); font-weight: 500; }
.freq-chart .bar { background: var(--bg-sunken); height: 18px; border-radius: 2px; overflow: hidden; }
.freq-chart .bar-fill {
  height: 100%;
  background: var(--accent);
  display: flex;
  align-items: center;
  padding: 0 6px;
  color: var(--bg);
  font-family: var(--font-mono);
  font-size: 10px;
  font-weight: 700;
}
.freq-chart .pct { font-family: var(--font-mono); color: var(--ink-mute); font-size: 11px; text-align: right; }

/* ============================================================ Diagrams */

.diagram {
  background: var(--bg-elev);
  border: 1px solid var(--rule);
  border-radius: 6px;
  padding: 18px;
  margin: 18px 0;
  text-align: center;
}
.diagram svg { max-width: 100%; height: auto; }
.diagram-caption {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--ink-mute);
  margin-top: 10px;
  letter-spacing: 0.04em;
}

.diagram-stroke    { stroke: var(--ink); }
.diagram-fill      { fill: var(--ink); }
.diagram-stroke-soft { stroke: var(--ink-mute); }
.diagram-fill-soft { fill: var(--ink-mute); }
.diagram-fill-bg   { fill: var(--bg-elev); }
.diagram-accent    { stroke: var(--accent); fill: var(--accent); }
.diagram-warn      { stroke: var(--warn); fill: var(--warn); }
.diagram-text      { fill: var(--ink); font-family: var(--font-sans); font-size: 11px; }
.diagram-text-mono { fill: var(--ink-soft); font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.04em; }

/* ============================================================ Past-question rows */

.past-q-row {
  display: grid;
  grid-template-columns: 70px 1fr 90px;
  gap: 14px;
  padding: 10px 12px;
  border-bottom: 1px solid var(--rule-soft);
  font-size: 13px;
  align-items: baseline;
}
.past-q-row:last-child { border-bottom: 0; }
.past-q-row:hover { background: var(--bg-sunken); }
.past-q-year {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--ink-mute);
  letter-spacing: 0.04em;
}
.past-q-topic { color: var(--ink); }
.past-q-tag {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--ink-soft);
  text-align: right;
  letter-spacing: 0.04em;
}

/* ============================================================ Pagination footer */

.page-nav {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-top: 64px;
  padding-top: 24px;
  border-top: 1px solid var(--rule);
}
.page-nav-link {
  display: block;
  padding: 14px 18px;
  border: 1px solid var(--rule);
  border-radius: 5px;
  background: var(--bg-elev);
  cursor: pointer;
  transition: all 0.15s;
  text-decoration: none !important;
}
.page-nav-link:hover { border-color: var(--accent); }
.page-nav-link.next { text-align: right; }
.page-nav-dir {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--ink-mute);
  margin-bottom: 4px;
}
.page-nav-title {
  font-family: var(--font-serif);
  font-size: 15px;
  font-weight: 600;
  color: var(--ink);
}

/* ============================================================ Glossary */

.glossary-toolbar {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin: 18px 0;
}
.glossary-toolbar button {
  font-family: var(--font-mono);
  font-size: 11px;
  padding: 4px 10px;
  border: 1px solid var(--rule);
  background: var(--bg-elev);
  color: var(--ink-soft);
  border-radius: 3px;
  cursor: pointer;
  letter-spacing: 0.05em;
}
.glossary-toolbar button:hover { color: var(--ink); border-color: var(--ink-mute); }
.glossary-toolbar button.active { background: var(--accent); color: var(--bg); border-color: var(--accent); }

.glossary-section { margin-bottom: 24px; }
.glossary-section h3 {
  font-family: var(--font-mono);
  font-size: 14px;
  letter-spacing: 0.1em;
  color: var(--accent);
  border-bottom: 1px solid var(--rule);
  padding-bottom: 4px;
  margin: 16px 0 10px;
}
.glossary-entry {
  display: grid;
  grid-template-columns: 200px 1fr;
  gap: 16px;
  padding: 8px 4px;
  border-bottom: 1px solid var(--rule-soft);
  font-size: 13px;
  line-height: 1.6;
}
.glossary-term { font-weight: 600; color: var(--ink); }
.glossary-reading { font-size: 11px; color: var(--ink-mute); font-family: var(--font-mono); margin-top: 2px; }
.glossary-def { color: var(--ink-soft); }
@media (max-width: 720px) {
  .glossary-entry { grid-template-columns: 1fr; gap: 4px; }
}

/* ============================================================ KaTeX overrides */

.katex { font-size: 1em; }
.katex-display { margin: 8px 0; overflow-x: auto; overflow-y: hidden; }

/* ============================================================ Mobile toggle */

.mobile-menu-btn {
  display: none;
  position: fixed;
  bottom: 20px;
  right: 20px;
  width: 48px;
  height: 48px;
  border-radius: 50%;
  background: var(--ink);
  color: var(--bg);
  border: 0;
  z-index: 50;
  cursor: pointer;
  box-shadow: 0 4px 14px -2px oklch(0.2 0.02 260 / 0.4);
}
@media (max-width: 760px) {
  .mobile-menu-btn { display: grid; place-items: center; }
  .sidebar.mobile-open {
    display: block;
    position: fixed;
    inset: 0;
    z-index: 100;
    width: 100%;
    height: 100%;
  }
}

/* Scrollbar */
::-webkit-scrollbar { width: 10px; height: 10px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--rule); border-radius: 5px; border: 2px solid var(--bg); }
::-webkit-scrollbar-thumb:hover { background: var(--ink-mute); }

// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel"
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">{children}</div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

function TweakColor({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <input type="color" className="twk-swatch" value={value}
             onChange={(e) => onChange(e.target.value)} />
    </div>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});

<script type="text/babel">

const { useState, useEffect, useMemo, useRef } = React;

/* ============================================================ KaTeX wrapper */

const Eq = ({ tex, display }) => {
  const ref = useRef(null);
  useEffect(() => {
    if (!ref.current || !window.katex) return;
    try {
      window.katex.render(tex, ref.current, { displayMode: !!display, throwOnError: false });
    } catch (e) {
      ref.current.textContent = tex;
    }
  }, [tex, display]);
  return display
    ? <div className="katex-display-wrap" ref={ref} />
    : <span ref={ref} />;
};

/* ============================================================ Page chrome */

const PageHeader = ({ eyebrow, title, deck, meta }) => (

      deck="機械科目で最頻出の単元。回転磁界・滑り・等価回路・トルク特性が四本柱。計算問題・理論問題ともに毎年必ず出題されるため、最優先で押さえる。"
      meta={[
        { label: "出題頻度", value: "最頻出（10年で約36問）" },
        { label: "難易度", value: "★★★★☆" },
        { label: "関連単元", value: "同期機 / パワエレ / 電動機応用" },
      ]}
    />

    <div className="content">
      <h2 id="overview"><span className="h-num">1.</span>動作原理</h2>
      <p>三相交流を巻線に流すと <span className="marker">固定子内に回転磁界が生じる</span>。この磁界が回転子導体を切り、電磁誘導によって回転子に電流が誘起される。電流と磁束の相互作用（フレミング左手の法則）によりトルクが発生し、回転子は磁界と同方向に回転する。</p>

      <p>回転子の速度は <span className="marker">常に同期速度より小さい</span>。同速になると磁束を切らず誘導電流が消えるため、トルクもゼロとなる。この速度差を <span className="marker">滑り</span> といい、誘導機の動作の根幹を成す。</p>

      <RotatingFieldDiagram />

      <FormulaCard
        num="01 / 06"
        name="同期速度"
        eq="N_s = \dfrac{120 f}{p} \;[\mathrm{min^{-1}}]"
        note={<>f は電源周波数 [Hz]、p は極数。50Hz・4極なら Ns = 1500 min⁻¹。</>}
      />
      <FormulaCard
        num="02 / 06"
        name="滑り（slip）"
        eq="s = \dfrac{N_s - N}{N_s}"
        note={<>N は回転子の実回転速度。0&lt;s&lt;1 が電動機域、s&lt;0 が発電機域、s&gt;1 が制動域。</>}
      />

      <h2 id="circuit"><span className="h-num">2.</span>等価回路と電力の流れ</h2>
      <p>一相分の T 形等価回路は次の通り。一次側に <Eq tex="r_1, jx_1" />、励磁回路に <Eq tex="r_0, jx_0" />、二次側に <Eq tex="jx_2'" /> と <Eq tex="r_2'/s" /> を持つ。<strong>滑り s が分母にある二次抵抗が誘導機の本質</strong> であり、機械的出力は <Eq tex="r_2'(1-s)/s" /> で表される負荷抵抗が消費する電力に相当する。</p>

      <EquivalentCircuit />

      <Box kind="formula" label="重要な比率（覚えよう）">
        <p>二次入力 <Eq tex="P_2" />・二次銅損 <Eq tex="P_{c2}" />・機械的出力 <Eq tex="P_m" /> の比は、滑りだけで決まる:</p>
        <Eq display tex="P_2 : P_{c2} : P_m \;=\; 1 : s : (1-s)" />
        <p>この関係は B 問題で頻出。1 つでも与えられれば残り 2 つが即座に求まる。</p>
      </Box>

      <FormulaCard
        num="03 / 06"
        name="二次銅損 / 二次入力"
        eq="\dfrac{P_{c2}}{P_2} = s \quad,\quad \dfrac{P_m}{P_2} = 1-s"
        note="効率や出力計算で軸となる関係。"
      />

      <h2 id="torque"><span className="h-num">3.</span>トルク特性</h2>
      <p>滑り s に対するトルク T の関係は、典型的な「山形」の曲線となる。停動トルク Tmax を境に、左側（高滑り域）が始動領域、右側（低滑り域）が安定運転領域である。</p>

      <TorqueSlipCurve />

      <FormulaCard
        num="04 / 06"
        name="トルク式（簡易形）"
        eq="T \;\propto\; \dfrac{V_1^{2} \cdot (r_2'/s)}{(r_1 + r_2'/s)^2 + (x_1 + x_2')^2}"
        note={<>電圧の二乗に比例することに注意。電源電圧が 0.9 倍に低下すると、トルクは 0.81 倍となる。</>}
      />

      <h3 id="hireisuii">比例推移（巻線形のみ）</h3>
      <p>巻線形誘導機において <span className="marker">二次抵抗を k 倍にすると、同一トルクを生じる滑りも k 倍</span> になる。これを比例推移という。停動滑り <Eq tex="s_m" /> も k 倍になるため、二次抵抗を増やせば <span className="marker">始動トルクを大きく</span> できる一方、運転時の効率は低下する。</p>

      <Box kind="tip" label="比例推移の使い道">
        <p>「始動時のみ二次抵抗を挿入し、加速後に短絡」という二次抵抗始動法はこの性質を利用したもの。かご形では原理的に二次抵抗を変化できないため、二重かご形・深溝形が用いられる。</p>
      </Box>

      <h2 id="start"><span className="h-num">4.</span>始動方式</h2>
      <div className="table-wrap">
        <table className="data">
          <caption>表1.2.1  代表的な始動方式の比較</caption>
          <thead>
            <tr>
              <th>方式</th>
              <th>適用</th>
              <th className="num">始動電流</th>
              <th className="num">始動トルク</th>
              <th>備考</th>
            </tr>
          </thead>
          <tbody>
            <tr><td>全電圧（直入れ）</td><td>小容量</td><td className="num">100 %</td><td className="num">100 %</td><td>機械的衝撃大</td></tr>
            <tr><td>Y-Δ 始動</td><td>中容量</td><td className="num">1/3</td><td className="num">1/3</td><td>定格運転は Δ 結線</td></tr>
            <tr><td>始動補償器</td><td>大容量</td><td className="num">a²</td><td className="num">a²</td><td>単巻変圧器でタップ電圧 aV</td></tr>
            <tr><td>二次抵抗始動</td><td>巻線形</td><td className="num">小</td><td className="num">大</td><td>比例推移を利用</td></tr>
            <tr><td>インバータ始動</td><td>すべて</td><td className="num">小</td><td className="num">調整可</td><td>VVVF 制御</td></tr>
          </tbody>
        </table>
      </div>

      <Box kind="mistake" label="頻出の誤答">
        <p><strong>Y-Δ 始動の電流とトルク</strong> はともに <Eq tex="1/3" /> になると覚える。「電流は <Eq tex="1/\sqrt{3}" /> 」と書いて間違えるパターンが多い。これは <strong>線電流</strong> と <strong>相電流</strong> の混同が原因。<br/>
        Y 結線では相電流＝線電流、Δ 結線では相電流の <Eq tex="\sqrt{3}" /> 倍が線電流。Y では相電圧が <Eq tex="1/\sqrt{3}" /> となり、トルクは電圧の二乗 ⇒ <Eq tex="1/3" />。電流も <Eq tex="1/3" />。</p>
      </Box>

      <h2 id="speed"><span className="h-num">5.</span>速度制御</h2>
      <ul>
        <li><strong>周波数制御（VVVF）</strong> — 最も広く使われる方式。<Eq tex="V/f = \mathrm{const}" /> で磁束を一定に保つ。低速で電圧降下を補正する <strong>トルクブースト</strong> も併用。</li>
        <li><strong>極数切替</strong> — 巻線結線を切り替えて極数を変え、段階的に速度を変える。</li>
        <li><strong>二次抵抗制御</strong> — 巻線形で外部抵抗を調整。効率は悪いが大容量機で実績あり。</li>
        <li><strong>二次励磁制御（クレーマ・セルビウス）</strong> — 二次に電力を入出力。エネルギー回生が可能。</li>
      </ul>

      <FormulaCard
        num="05 / 06"
        name="V/f 一定制御"
        eq="\dfrac{V}{f} = \mathrm{const} \;\Rightarrow\; \phi \;\approx\; \mathrm{const}"
        note={<>磁束を定格値に保ち、最大トルクを維持しながら可変速運転を行う。基底周波数以上では弱め界磁制御に移行。</>}
      />

      <h2 id="example"><span className="h-num">6.</span>例題</h2>

      <Box kind="example" label="例題 1.2.1（同期速度・滑り）">
        <p><strong>問:</strong> 4 極・50 Hz の三相誘導電動機が 1455 min⁻¹ で運転している。滑り s [%]、回転子周波数 f₂ [Hz] を求めよ。</p>
        <p><strong>解:</strong></p>
        <Eq display tex="N_s = \dfrac{120 \times 50}{4} = 1500 \;[\mathrm{min^{-1}}]" />
        <Eq display tex="s = \dfrac{1500 - 1455}{1500} = 0.030 \;=\; 3.0\;\%" />
        <Eq display tex="f_2 = s \cdot f_1 = 0.030 \times 50 = 1.5 \;[\mathrm{Hz}]" />
      </Box>

      <Box kind="example" label="例題 1.2.2（電力比）">
        <p><strong>問:</strong> ある三相誘導電動機の二次入力が 22.0 kW、滑りが 4.0% であるとき、二次銅損 P_c2 と機械的出力 P_m を求めよ。</p>
        <p><strong>解:</strong> 比 <Eq tex="P_2 : P_{c2} : P_m = 1 : s : (1-s)" /> を用いる。</p>
        <Eq display tex="P_{c2} = s \cdot P_2 = 0.040 \times 22.0 = 0.88 \;[\mathrm{kW}]" />
        <Eq display tex="P_m = (1-s) \cdot P_2 = 0.96 \times 22.0 = 21.12 \;[\mathrm{kW}]" />
      </Box>

      <FormulaCard
        num="06 / 06"
        name="効率（簡易）"
        eq="\eta \;\approx\; (1-s) \times \dfrac{P_2}{P_1} \;\le\; (1-s)"
        note="鉄損・一次銅損・機械損を無視した上限値。実機では (1-s) からさらに数%低下する。"
      />

      <h2 id="trends"><span className="h-num">7.</span>過去問の出題傾向</h2>
      <p>直近10年の出題パターン。計算問題と理論問題が概ね半々で、計算は等価回路から効率を求める問題、理論は始動方式・速度制御の比較が定番。</p>

      <div className="box">
        {data.inductionPastQ.map((q, i) => (
          <div key={i} className="past-q-row">
            <span className="past-q-year">{q.year}</span>
            <span className="past-q-topic">{q.topic}</span>
            <span className="past-q-tag">[{q.tag}]</span>
          </div>
        ))}
      </div>

      <Box kind="tip" label="得点戦略">
        <ul>
          <li><strong>1 : s : (1-s)</strong> の比は反射的に出るまで反復</li>
          <li>同期速度・滑り・回転子周波数は <strong>セットで暗算</strong> できる水準に</li>
          <li>始動方式の表は完全暗記。Y-Δ の <Eq tex="1/3" /> を即答できれば 1 問確保</li>
          <li>等価回路は「<Eq tex="r_2'/s" /> を分割して機械出力を可視化」の発想を持つ</li>
        </ul>
      </Box>

      <h2 id="related"><span className="h-num">8.</span>関連項目</h2>
      <ul>
        <li><a href="#" onClick={(e) => { e.preventDefault(); onNav("synchronous"); }}>1.3 同期機</a> — 回転磁界の概念は共通。滑りの定義のみが異なる。</li>
        <li><a href="#" onClick={(e) => { e.preventDefault(); onNav("power-elec"); }}>2.2 パワーエレクトロニクス</a> — V/f 制御の駆動回路として重要。</li>
        <li><a href="#" onClick={(e) => { e.preventDefault(); onNav("drive-mech"); }}>4.4 電動機応用</a> — 負荷特性とのマッチング。</li>
      </ul>
    </div>

    <PageNav
      prev={{ id: "dc-machine", title: "1.1 直流機" }}
      next={{ id: "synchronous", title: "1.3 同期機" }}
      onNav={onNav}
    />
  </>
);

const DCMachinePage = ({ onNav }) => (

    <Crumbs items={[{ id: "home", label: "ホーム" }, { label: "1. 回転機" }, { label: "1.1 直流機" }]} onNav={onNav} />

        { label: "出題頻度", value: "高（10年で約24問）" },

      <h2 id="emf"><span className="h-num">2.</span>誘導起電力とトルク</h2>

      <FormulaCard num="03 / 04" name="端子電圧（電動機）" eq="V = E + I_a R_a" note="抵抗降下を加える。発電機では V = E − I_a R_a。" />

      <Box kind="mistake" label="陥りやすいポイント">

      <h2 id="speed-control"><span className="h-num">4.</span>速度制御</h2>

      <Box kind="example" label="例題 1.1.1">

const SynchronousPage = ({ onNav }) => (
  <>
    <Crumbs items={[{ id: "home", label: "ホーム" }, { label: "1. 回転機" }, { label: "1.3 同期機" }]} onNav={onNav} />

      <h2 id="reaction"><span className="h-num">2.</span>電機子反作用</h2>
      <p>負荷力率により電機子起磁力の作用が変わる:</p>

        <li><strong>純抵抗負荷</strong> — 交差作用（電機子起磁力が界磁に直交）</li>

      <h2 id="vcurve"><span className="h-num">3.</span>V カーブと位相特性</h2>
      <p>同期電動機の <strong>V カーブ</strong> は界磁電流 If を横軸、電機子電流 Ia を縦軸にとった V 字曲線。底点で力率1（純抵抗負荷）、左側で遅れ・右側で進み力率となる。</p>

const KeikiYoHenseikiPage = ({ onNav }) => (
  <>
    <Crumbs items={[{ id: "home", label: "ホーム" }, { label: "2. 静止器・電力変換" }, { label: "2.3 計器用変成器（CT・VT）" }]} onNav={onNav} />
    <PageHeader eyebrow="2.3  INSTRUMENT TRANSFORMERS (CT / VT)" title="計器用変成器（CT・VT）"
      deck="高圧の電流・電圧を低圧側で安全に測定するための変成器。CT＝電流用・VT＝電圧用。二次禁則が真逆になる理由を「一次側から何を強制するか」の物理から導く。丸暗記すると毎回逆になる典型論点。"
      meta={[{ label: "出題頻度", value: "高（混同型は機械・法規どちらでも出る）" }, { label: "難易度", value: "★★★☆☆" }]} />
    <div className="content">

      <Box kind="example" label="このページの読み方">
        <p>CTとVTの違いは「変圧器を一次側からどう使うか」だけで、内部の物理は全く同じ。<strong>セクション1で共通の物理を組み立て、セクション2でVT、セクション3でCTを別々に動かしてみると、禁則が自動的に逆になる</strong>のが見える。「先に結論を覚える」のではなく、毎回セクション1から再導出できる状態を目指す。</p>
      </Box>

      <h2 id="phys"><span className="h-num">1.</span>すべての変圧器に共通の物理（3点）</h2>

      <h3>1-1. 磁気平衡：N₁I₁ ≈ N₂I₂</h3>
      <p>変圧器は2つの巻線が共通の鉄心を共有する構造。一次に電流 <Eq tex="I_1" /> が流れると鉄心には <span className="marker">起磁力 <Eq tex="N_1 I_1" /></span>（アンペアターン）が発生し、磁束 <Eq tex="\Phi" /> をつくる。二次に電流 <Eq tex="I_2" /> が流れると、レンツの法則により <strong>一次の磁束を打ち消す向き</strong> に二次起磁力 <Eq tex="N_2 I_2" /> が立つ。</p>
      <p>結果として、定常状態では両者がほぼ釣り合う：</p>
      <Eq display tex="N_1 I_1 \;\approx\; N_2 I_2" />
      <p>厳密には <Eq tex="N_1 I_1 - N_2 I_2 = N_1 I_\text{励磁}" /> で、釣り合いの差分が <strong>励磁電流</strong>（鉄心に磁束を作るために必要な分・通常は定格の数%程度）。<strong>磁気平衡の式は「励磁電流が小さいときに成り立つ近似」</strong>であることを覚えておくと、セクション3でCT開放時に何が起きるかが見える。</p>

      <h3>1-2. 鉄心は B_s で飽和する</h3>
      <p>鉄心の磁束密度 <Eq tex="B" /> は、内部の磁界 <Eq tex="H" /> に比例して増える…が、ある値 <Eq tex="B_s" />（<strong>飽和磁束密度</strong>・珪素鋼板で約1.5〜1.8 T）で頭打ちになる。これが <strong>磁気飽和</strong>。</p>
      <BHCurveSVG />
      <p>図のように、B-H曲線は <strong>直線域 → ニー（屈曲点） → 飽和域</strong> の3区間に分かれる。直線域では透磁率 <Eq tex="\mu_r" /> が数千と大きく、わずかな H で B が大きく増える。飽和域では <Eq tex="dB/dH" /> が真空の値（μ₀）近くまで激減し、いくら H を増やしても B はほとんど増えない。</p>
      <p>変圧器は通常、<strong>B-H 直線域の中ほど</strong> で動作するよう設計される（鉄心断面積と巻数で <Eq tex="B" /> を決め打ちする）。ここまでは「通常運用」。<strong>飽和域に突入したら何が起きるか</strong>はセクション3で見る（CT開放時の事故の核心）。</p>

      <h3>1-3. 二次誘起電圧は dΦ/dt に比例</h3>
      <p>ファラデーの法則により、鉄心を貫く磁束 <Eq tex="\Phi" /> が時間変化すると、巻線に誘導起電力が発生する：</p>
      <Eq display tex="V_2 \;=\; -N_2 \dfrac{d\Phi}{dt}" />
      <p>ここで重要なのは、<strong>二次電圧は「磁束そのもの」ではなく「磁束の変化率」に比例する</strong>こと。<Eq tex="\Phi" /> が正弦波なら <Eq tex="d\Phi/dt" /> も正弦波だが、<strong>波形が歪むと dΦ/dt は頂点付近で巨大化する</strong>。これがセクション3のスパイク電圧の物理的源泉。</p>

      <Box kind="formula" label="セクション1 まとめ（CT・VT共通）">
        <p>① 磁気平衡 <Eq tex="N_1 I_1 \approx N_2 I_2" />（励磁電流を無視した近似）<br/>
        ② 鉄心は <Eq tex="B_s" /> で飽和する（B-H 曲線）<br/>
        ③ 二次電圧 <Eq tex="V_2 = -N_2 (d\Phi/dt)" />（磁束変化率に比例）</p>
        <p>この3点は CT も VT も同じ。違いは「一次側から何を強制するか」だけ。</p>
      </Box>

      <h2 id="vt"><span className="h-num">2.</span>VT：一次側から「電圧」を強制する使い方</h2>

      <h3>2-1. 接続と動作</h3>
      <p>VT（Voltage Transformer・計器用変圧器）は被測定回路の電圧を低圧側で測るために <span className="marker">並列接続</span> される。電圧計と同じ繋ぎ方。一次端子電圧 <Eq tex="V_1" /> は被測定回路の電圧そのもので <strong>VT自身は V₁ を変えられない</strong>。</p>
      <p>巻線方程式 <Eq tex="V_1 \approx N_1 (d\Phi/dt)" /> から、<strong>V₁ が決まれば自動的に磁束 Φ が決まる</strong>（巻線抵抗降下を無視した近似）。設計者は通常運用で Φ が B-H 直線域に収まるよう鉄心を選ぶ。よって <strong>磁束は安定</strong>。二次には <Eq tex="V_2 = (N_2/N_1) V_1" /> が現れ、これを計器で読む。</p>

      <h3>2-2. 二次開放：安全（標準運用）</h3>
      <p>二次を開放すると <Eq tex="I_2 = 0" />。しかし一次電圧 <Eq tex="V_1" /> が磁束 <Eq tex="\Phi" /> を決めているので、<strong>磁束は変化しない</strong>。二次端子には <Eq tex="V_2 = (N_2/N_1) V_1" /> がそのまま現れて、無負荷でも計器でそのまま電圧を読める。<span className="marker">VTを無負荷状態で置いておくのは標準運用</span>。</p>

      <h3>2-3. 二次短絡：禁止（焼損）</h3>
      <p>二次を短絡すると <Eq tex="V_2 \approx 0" /> に近づく。一次電圧 <Eq tex="V_1" /> はそのままなので、二次起電力と短絡端子の電位差を <strong>巻線インピーダンス（小さい）</strong> だけで割った大電流が二次に流れる。一次も磁気平衡を保つために I₁ が急増し、<Eq tex="I^2 R" /> 銅損で <strong>巻線が焼損</strong>。VT保護のため二次側にはヒューズを入れるのが標準設計。</p>

      <h3>2-4. 二次側1端子を D種接地する理由</h3>
      <p>VTは高圧側（一次）と低圧側（二次）の間に絶縁が入っているが、絶縁劣化で混触すると <strong>二次に高電圧が侵入</strong> し計器・人体に到達する。二次1端子を <strong>D種接地</strong>（接地抵抗100Ω以下）しておけば、その端子が大地電位に固定され、計器筐体も安全。法規（電技解釈）でも要求される。</p>

      <Box kind="formula" label="セクション2 まとめ（VT）">
        <p>一次に電圧を強制 → 磁束が決まる → 二次は <strong>開放OK・短絡NG</strong>（過電流で焼損）。二次1端子D種接地で感電防止。</p>
      </Box>

      <h2 id="ct"><span className="h-num">3.</span>CT：一次側から「電流」を強制する使い方</h2>

      <h3>3-1. 接続と動作</h3>
      <p>CT（Current Transformer・変流器）は被測定回路の電流を低圧側で測るために <span className="marker">直列挿入</span> される。電流計と同じ繋ぎ方。一次電流 <Eq tex="I_1" /> は被測定回路の電流そのもので <strong>CT自身は I₁ を変えられない</strong>。これが VT との根本的な違い。</p>

      <h3>3-2. 二次短絡：磁気平衡が成立して正常</h3>
      <p>二次を短絡（または低抵抗の電流計を接続）すると、磁気平衡 <Eq tex="N_1 I_1 \approx N_2 I_2" /> が成り立つように二次電流 <Eq tex="I_2 \approx (N_1/N_2) I_1" /> が <strong>自動的に流れる</strong>。一次起磁力 <Eq tex="N_1 I_1" /> と二次起磁力 <Eq tex="N_2 I_2" /> は <strong>ほぼ完全に打ち消し合い</strong>、正味の起磁力（＝励磁起磁力）はごくわずか。したがって磁束 <Eq tex="\Phi" /> は B-H 直線域に収まり <strong>正常動作</strong>。</p>

      <h3>3-3. 二次開放：磁気平衡が壊れ深飽和へ突入</h3>
      <p>二次を開放すると <Eq tex="I_2 = 0" />。一次は被測定回路に直列で <strong>I₁ は依然として流れ続ける</strong>（VTと違って一次電流を CT は止められない）。打ち消す相手のいない一次起磁力 <Eq tex="N_1 I_1" /> は <strong>全部が励磁起磁力</strong> として鉄心に注入される。</p>
      <p>通常運用時の励磁起磁力は定格起磁力の数%だが、開放時は <strong>100%が励磁分</strong> に化ける。励磁起磁力は <span className="marker">桁違いに大きく</span>、鉄心は <Eq tex="B_s" /> に深く突き刺さる <strong>深飽和</strong> に突入する。</p>

      <h3>3-4. 深飽和 → 二次電圧スパイク（数kV）</h3>
      <p>深飽和に入ると磁束 <Eq tex="\Phi" /> の時間波形が歪む。正弦波の一次電流が <Eq tex="\pm" /> ピークに達するとき、鉄心は飽和限界に貼り付いて <Eq tex="\Phi" /> はほとんど増えない（フラット）。一方、一次電流がゼロ付近を横切る瞬間、<strong>飽和から急に抜け出して磁束が一気に向きを変える</strong>。結果として磁束波形は <span className="marker">ほぼ方形波</span> になり、<strong>ゼロクロス付近で dΦ/dt が極端に大きい</strong>。</p>
      <p><Eq tex="V_2 = -N_2 (d\Phi/dt)" /> より、二次に <strong>数kVのスパイク電圧</strong> が瞬時に発生 → 巻線の絶縁設計を超えて <strong>絶縁破壊・感電事故</strong>。これがCT二次開放禁止の物理的核心。</p>

      <h3>3-5. 現場運用：短絡端子で「常に閉路」を保つ</h3>
      <p>点検でCT二次側の電流計を交換するとき、いきなり計器を外すと一瞬で二次が開放状態になり、上記の事故が発生する。これを防ぐため、CT二次端子台には <strong>短絡用ピース（短絡端子）</strong> が標準装備されている。手順は：</p>
      <ol>
        <li>短絡端子を投入（二次を短絡する）</li>
        <li>古い電流計を外す</li>
        <li>新しい電流計を取り付ける</li>
        <li>短絡端子を解放</li>
      </ol>
      <p>常に「閉路を保つ」設計で、物理的に開放させない仕組み。<strong>短絡端子の存在理由がセクション3-3・3-4の物理から導かれる</strong>のがこの設計の美しさ。</p>

      <h3>3-6. 二次側1端子を D種接地する理由</h3>
      <p>VTと同じく一次高圧と二次低圧の混触対策で1端子D種接地。CTは特に開放時に高電圧スパイクが出る危険があるため、接地は二重の意味で重要（混触対策＋万一のスパイク逃がし）。</p>

      <Box kind="formula" label="セクション3 まとめ（CT）">
        <p>一次に電流を強制 → 二次は磁気平衡で <Eq tex="I_2 \approx (N_1/N_2) I_1" /> が <strong>流れる必要</strong> → 二次は <strong>短絡OK・開放NG</strong>（深飽和→スパイク→絶縁破壊）。現場では短絡端子で常時閉路を維持。二次1端子D種接地で感電防止。</p>
      </Box>

      <h2 id="derived"><span className="h-num">4.</span>禁則は自動的に逆になる（セクション1〜3で導出済）</h2>
      <p>セクション2とセクション3を並べると、禁則は <strong>暗記するまでもなく</strong> 逆になることが分かる：</p>
      <div className="table-wrap">
        <table className="data">
          <thead><tr><th></th><th>一次側に強制する量</th><th>二次OK</th><th>二次NG（と物理）</th></tr></thead>
          <tbody>
            <tr><td>VT</td><td>電圧 V₁</td><td>開放（無負荷でΦ維持）</td><td>短絡 → 巻線焼損（I²R 銅損）</td></tr>
            <tr><td>CT</td><td>電流 I₁</td><td>短絡（磁気平衡成立）</td><td>開放 → 深飽和 → V₂スパイク → 絶縁破壊</td></tr>
          </tbody>
        </table>
      </div>
      <p>試験で「CTの二次は開放してはならない」を見たとき、覚えていなくても <strong>「CT＝電流を強制する装置 → 開放すると磁気平衡が崩れる → 深飽和」</strong> と毎回再導出できれば、混同事故はゼロになる。</p>

      <Box kind="example" label="補足: 回路理論からの圧縮表現（参考・電験3種範囲外）">
        <p>電気回路理論には「<strong>電流源は開放してはならない／電圧源は短絡してはならない</strong>」という基本則がある。CTは一次側から見ると <Eq tex="I_1" /> を強制する <strong>電流源等価</strong>、VTは <Eq tex="V_1" /> を強制する <strong>電圧源等価</strong> と見なすと、上記の禁則はこの基本則の系として圧縮できる。</p>
        <p>ただし「等価電源」の概念は本来は回路理論の話で、電験3種範囲外。<strong>本筋はセクション1〜3の物理で導出済み</strong>であって、このメタファーは「思い出すための短縮形」に過ぎないことに注意。物理を理解せずメタファーだけ覚えると、また丸暗記に戻ってしまう。</p>
      </Box>

      <h2 id="ratio"><span className="h-num">5.</span>巻数比の式は磁気平衡の系</h2>
      <p>巻数比の公式は独立に2本あるわけではなく、<strong>セクション1の磁気平衡と磁束変化率から派生</strong>する。</p>

      <h3>5-1. CT の変流比</h3>
      <p>セクション1-1の磁気平衡 <Eq tex="N_1 I_1 \approx N_2 I_2" /> を整理：</p>
      <FormulaCard num="01 / 02" name="CTの変流比" eq="\dfrac{I_1}{I_2} \;\approx\; \dfrac{N_2}{N_1}"
        note={<>例：1000/5 A の CT は一次1000Aを二次5Aに変換（巻数比は逆比 1:200）。読み値 <Eq tex="I_2" /> から一次電流は <Eq tex="I_1 = (1000/5) I_2 = 200 \times I_2" /> で機械的に求まる。</>} />

      <h3>5-2. VT の変圧比</h3>
      <p>セクション1-3の <Eq tex="V = N (d\Phi/dt)" /> を一次・二次で書き、辺々割る：</p>
      <FormulaCard num="02 / 02" name="VTの変圧比" eq="\dfrac{V_1}{V_2} \;=\; \dfrac{N_1}{N_2}"
        note={<>例：6600/110 V の VT は変成比 60:1。三相回路では <Eq tex="6600/\sqrt{3}\ /\ 110/\sqrt{3}" /> 表記（相電圧基準）も使われる。</>} />

      <h3>5-3. 端子記号</h3>
      <ul>
        <li><strong>VT</strong>：一次 P1-P2、二次 1u-1v（または u-v）。減極性が標準</li>
        <li><strong>CT</strong>：一次 K-L（K=入口・L=出口）、二次 k-l（小文字）。減極性が標準</li>
        <li>結線図で <strong>P/K のどちらが一次か</strong> を見れば VT/CT が判別できる</li>
      </ul>

      <Box kind="example" label="例題 2.3.1（変成比の数値計算）">
        <p><strong>問:</strong> 6.6 kV 受電設備で 1000/5 A のCTと 6600/110 V のVTを使用。二次側で計測した電流5A・電圧100Vのとき、一次側の有効電力を求めよ（単相換算・力率1.0として）。</p>
        <p><strong>解:</strong></p>
        <Eq display tex="I_1 = (1000/5) \times 5 = 1000\;[\mathrm{A}]" />
        <Eq display tex="V_1 = (6600/110) \times 100 = 6000\;[\mathrm{V}]" />
        <Eq display tex="P_1 = V_1 I_1 \times 1.0 = 6{,}000{,}000\;[\mathrm{W}] = 6\;[\mathrm{MW}]" />
        <p>変成比は「一次値÷二次読み値」の定格比をそのまま掛ければよい。</p>
      </Box>

      <h2 id="check"><span className="h-num">6.</span>セルフチェック（物理から再導出する練習）</h2>
      <p>穴埋めではなく <strong>「なぜそうなるか」をセクション1〜3から説明する</strong> 練習。文字数は1問あたり3〜4行を目安に。</p>

      <Box kind="formula" label="問1: CT 二次短絡が安全な理由">
        <p>「CTの二次を短絡してしまった。これが事故ではなく <strong>むしろ正常動作</strong> である理由を、セクション1の磁気平衡から説明せよ。」</p>
        <p style={{marginTop:'8px', fontSize:'12px', color:'var(--ink-3,#888)'}}>確認ポイント：N₁I₁ ≈ N₂I₂ の磁気平衡式 → 二次に I₂ が流れて一次起磁力を打ち消す → 正味の起磁力は小さい → 鉄心は直線域 → 正常。</p>
      </Box>

      <Box kind="formula" label="問2: VT 二次短絡が焼損につながる物理過程">
        <p>「VTの二次を短絡すると巻線が焼損する物理過程を <strong>3ステップ</strong> で書け。」</p>
        <p style={{marginTop:'8px', fontSize:'12px', color:'var(--ink-3,#888)'}}>確認ポイント：① V₁ が Φ を決め V₂ = (N₂/N₁)V₁ が誘起 → ② 短絡で V₂≈0 だが巻線インピーダンスのみで電流制限 → ③ 大電流で I²R 銅損 → 巻線温度上昇 → 焼損。</p>
      </Box>

      <Box kind="formula" label="問3: CT 二次開放で起きる「飽和」と「スパイク電圧」の関係">
        <p>「CT二次を開放すると、なぜ <strong>「鉄心の飽和」と「二次の高電圧スパイク」がセットで起きる</strong> のか説明せよ。」</p>
        <p style={{marginTop:'8px', fontSize:'12px', color:'var(--ink-3,#888)'}}>確認ポイント：開放で I₂=0 → N₁I₁ を打ち消す相手がなく全起磁力が励磁分に → 鉄心が B_s 深く突入（深飽和）→ Φ が方形波化 → ゼロクロス付近で dΦ/dt 巨大 → V₂ = -N₂(dΦ/dt) よりスパイク発生。「飽和」と「スパイク」は同じ深飽和現象の二側面。</p>
      </Box>

      <Box kind="formula" label="問4: 短絡端子の存在理由を物理から導く">
        <p>「現場でCT二次側の電流計を交換するとき <strong>「短絡端子で短絡してから外す」手順が必須</strong> な理由を、セクション3から導け。」</p>
        <p style={{marginTop:'8px', fontSize:'12px', color:'var(--ink-3,#888)'}}>確認ポイント：直接外すと一瞬でも二次開放状態 → セクション3-3・3-4の深飽和→スパイクが発生し絶縁破壊と感電の危険 → 短絡端子で常時閉路を維持すれば磁気平衡が崩れず Φ は直線域に留まる。物理から運用器具の設計理由が出てくる。</p>
      </Box>

      <Box kind="formula" label="問5: 二次1端子D種接地の目的">
        <p>「CT・VT どちらも二次1端子を <strong>D種接地</strong> する。<strong>両端接地ではなく1端子のみ</strong> である理由と、<strong>D種が選ばれる理由</strong> をセクション2-4・3-6から説明せよ。」</p>
        <p style={{marginTop:'8px', fontSize:'12px', color:'var(--ink-3,#888)'}}>確認ポイント：1端子のみ＝二次回路に閉路を作らない（両端接地は地絡電流ループの危険）／D種＝低圧機器の標準（接地抵抗100Ω以下）／目的＝混触時の二次高電圧を大地電位に逃がし感電防止。</p>
      </Box>

      <ul>
        <li><strong>kikai 2.1 変圧器</strong> — 電力用変圧器の基本式（巻数比・%Z・効率）。計器用との違いは「容量と目的」</li>

        <li><strong>hoki 2.1 接地工事一覧表</strong> — 計器用変成器二次側のD種接地条件</li>
      </ul>

    </div>

<script type="text/babel">
/* app.jsx */
/* ============================================================
   App shell — sidebar nav, main router, search, TOC, Tweaks

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "theme": "light",

/* ---------- Sidebar ---------- */
const Sidebar = ({ chapters, currentPage, onNav, mobileOpen, onCloseMobile, searchQuery, onSearchChange, searchResults, onSearchSelect }) => {

  const inputRef = useRef(null);
  useEffect(() => {
    const k = (e) => {
      if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
        e.preventDefault();
        inputRef.current?.focus();
      }
    };
    window.addEventListener('keydown', k);
    return () => window.removeEventListener('keydown', k);
  }, []);
  return (
    <aside className={`sidebar${mobileOpen ? ' mobile-open' : ''}`}>
      <div className="brand" onClick={() => { onNav("home"); onCloseMobile?.(); }} style={{ cursor: 'pointer' }}>
        <div className="brand-mark">電</div>
        <div>
          <div className="brand-title">機械Wiki</div>
          <div className="brand-sub">DENKEN-3 / MACHINERY</div>

      </div>

      <div className="search">
        <span className="search-icon" aria-hidden>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="11" cy="11" r="7"/><path d="m20 20-3-3"/></svg>
        </span>
        <input ref={inputRef} type="text" placeholder="検索（ページ・用語）" value={searchQuery} onChange={(e) => onSearchChange(e.target.value)} />
        {!searchQuery && <span className="search-kbd">⌘K</span>}
        {searchQuery && searchResults.length > 0 && (

                <div className="search-result-meta">{r.kind} — {r.context}</div>
              </div>
            ))}
          </div>
        )}

          <div className="search-results"><div className="search-result"><div className="search-result-meta">該当なし</div></div></div>
        )}
      </div>

      {chapters.map(ch => (
        <div key={ch.id} className="nav-group">
          <button className="nav-chapter" data-open={openChapters[ch.id]} onClick={() => toggle(ch.id)}>
            <svg className="nav-chapter-caret" viewBox="0 0 12 12" fill="currentColor"><path d="M3 4l3 4 3-4z"/></svg>

      </div>
    </aside>
  );
};

/* ---------- TOC (right rail) ---------- */
const TOC = ({ page }) => {
  const [items, setItems] = useState([]);
  const [active, setActive] = useState(null);
  useEffect(() => {
    let cancelled = false;
    const update = () => {
      if (cancelled) return;
      const heads = document.querySelectorAll('.content h2[id], .content h3[id]');
      const next = [...heads].map(h => ({
        id: h.id,
        text: h.textContent.replace(/^§\d+\s*/, '').trim(),
        level: h.tagName === 'H2' ? 2 : 3,
      }));
      setItems(prev => {
        if (prev.length === next.length && prev.every((p, i) => p.id === next[i].id)) return prev;
        return next;
      });
    };
    update();
    const t = setTimeout(update, 200);
    return () => { cancelled = true; clearTimeout(t); };
  }, [page]);
  useEffect(() => {
    const onScroll = () => {
      const heads = [...document.querySelectorAll('.content h2[id], .content h3[id]')];
      let cur = null;
      for (const h of heads) {
        if (h.getBoundingClientRect().top < 80) cur = h.id;
      }
      setActive(prev => prev === cur ? prev : cur);
    };
    window.addEventListener('scroll', onScroll, { passive: true });
    onScroll();
    return () => window.removeEventListener('scroll', onScroll);
  }, [page]);
  if (items.length === 0) return <aside className="toc" />;
  return (
    <aside className="toc">
      <div className="toc-label">On this page</div>
      <ul>
        {items.map(it => (
          <li key={it.id} className={it.level === 3 ? 'h3' : ''}>
            <a href={`#${it.id}`} className={active === it.id ? 'active' : ''}>{it.text}</a>
          </li>
        ))}
      </ul>
    </aside>
  );
};

/* ---------- Search index ---------- */
function buildSearchIndex(data) {
  const items = [];
  data.chapters.forEach(ch => {
    ch.pages.forEach(p => {
      items.push({ kind: "ページ", title: p.title, id: p.id, context: `${ch.title} / ${p.num}`, terms: `${p.title} ${p.num}` });
    });
  });
  data.glossary.forEach(g => {
    items.push({ kind: "用語", title: g.term, id: "glossary", context: g.def.slice(0, 40) + "…", terms: `${g.term} ${g.reading} ${g.def}` });
  });
  return items;
}

function searchIndex(idx, q) {
  if (!q || !q.trim()) return [];
  const lower = q.toLowerCase();
  return idx.filter(i => i.terms.toLowerCase().includes(lower)).slice(0, 12).map(i => {
    const re = new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'i');
    return { ...i, titleHtml: i.title.replace(re, '<mark>$1</mark>') };
  });
}

/* ---------- App ---------- */
const App = () => {
  const data = window.WIKI_DATA;
  const [tweaks, setTweak] = window.useTweaks ? window.useTweaks(TWEAK_DEFAULTS) : [TWEAK_DEFAULTS, () => {}];

  const [page, setPage] = useState(() => {
    const h = location.hash.replace(/^#/, '');
    return h && pageIds().includes(h) ? h : 'home';
  });
  const [mobileOpen, setMobileOpen] = useState(false);
  const [searchQuery, setSearchQuery] = useState('');
  const searchIdx = useMemo(() => buildSearchIndex(data), [data]);
  const searchResults = useMemo(() => searchIndex(searchIdx, searchQuery), [searchIdx, searchQuery]);

  // Apply tweaks to root
  useEffect(() => {
    document.documentElement.dataset.theme = tweaks.theme;
    document.documentElement.dataset.accent = tweaks.accent;
    document.documentElement.dataset.difficulty = tweaks.difficulty;
    document.documentElement.style.setProperty('--fs-base', tweaks.fontSize + 'px');
    document.documentElement.style.setProperty('--lh-base', tweaks.lineHeight);
  }, [tweaks]);

  const navigate = (id) => {
    setPage(id);
    location.hash = id;
    window.scrollTo({ top: 0, behavior: 'auto' });
  };
  useEffect(() => {
    const onHash = () => {
      const h = location.hash.replace(/^#/, '');
      if (h && pageIds().includes(h)) setPage(h);
    };
    window.addEventListener('hashchange', onHash);
    return () => window.removeEventListener('hashchange', onHash);
  }, []);

  function pageIds() {
    return ['home', ...data.chapters.flatMap(c => c.pages.map(p => p.id))];
  }

  const renderPage = () => {
    const props = { data, onNav: navigate };
    switch (page) {
      case 'home':              return <HomePage {...props} />;
      case 'dc-machine':        return <DCMachinePage {...props} />;
      case 'induction-machine': return <InductionMachinePage {...props} />;
      case 'synchronous':       return <SynchronousPage {...props} />;
      case 'single-phase-im':   return <SinglePhaseIMPage {...props} />;
      case 'transformer':       return <TransformerPage {...props} />;
      case 'power-elec':        return <PowerElecPage {...props} />;
      case 'keiki-yo-henseiki': return <KeikiYoHenseikiPage {...props} />;
      case 'auto-control':      return <AutoControlPage {...props} />;
      case 'info-elec':         return <InfoElecPage {...props} />;
      case 'lighting':          return <LightingPage {...props} />;
      case 'heat':              return <HeatPage {...props} />;
      case 'chemistry':         return <ChemPage {...props} />;
      case 'drive-mech':        return <DriveMechPage {...props} />;
      case 'trends':            return <TrendsPage {...props} />;
      case 'glossary':          return <GlossaryPage {...props} />;
      case 'guide':             return <GuidePage {...props} />;
      default:                  return <HomePage {...props} />;
    }
  };

  return (
    <>
      <div className="app">
        <Sidebar chapters={data.chapters} currentPage={page} onNav={navigate}
                 mobileOpen={mobileOpen} onCloseMobile={() => setMobileOpen(false)}
                 searchQuery={searchQuery} onSearchChange={setSearchQuery}
                 searchResults={searchResults}
                 onSearchSelect={(r) => { navigate(r.id); setSearchQuery(''); }} />
        <main className="main" key={page}>{renderPage()}</main>
        <TOC key={`toc-${page}`} page={page} />
      </div>
      <button className="mobile-menu-btn" onClick={() => setMobileOpen(o => !o)} aria-label="メニュー">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
          <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
      </button>

      {window.TweaksPanel && (
        <window.TweaksPanel title="Tweaks">
          <window.TweakSection title="表示">
            <window.TweakRadio label="テーマ" value={tweaks.theme} onChange={(v) => setTweak('theme', v)}
              options={[{ value: 'light', label: 'ライト' }, { value: 'dark', label: 'ダーク' }]} />
            <window.TweakRadio label="アクセント" value={tweaks.accent} onChange={(v) => setTweak('accent', v)}
              options={[
                { value: 'indigo', label: 'インディゴ' },
                { value: 'forest', label: 'フォレスト' },
                { value: 'rust', label: 'ラスト' },
                { value: 'aubergine', label: 'オーベルジン' },
              ]} />
          </window.TweakSection>
          <window.TweakSection title="タイポグラフィ">
            <window.TweakSlider label="フォントサイズ" value={tweaks.fontSize} onChange={(v) => setTweak('fontSize', v)}
              min={13} max={19} step={1} suffix="px" />
            <window.TweakSlider label="行間" value={tweaks.lineHeight} onChange={(v) => setTweak('lineHeight', v)}
              min={1.5} max={2.2} step={0.05} />
          </window.TweakSection>
          <window.TweakSection title="コンテンツ">
            <window.TweakRadio label="難易度フィルタ" value={tweaks.difficulty} onChange={(v) => setTweak('difficulty', v)}
              options={[
                { value: 'basic', label: '基礎' },
                { value: 'standard', label: '標準' },
                { value: 'advanced', label: '応用' },
              ]} />
          </window.TweakSection>
        </window.TweaksPanel>
      )}
    </>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);

</script>
</body>
</html>
