<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex, nofollow">
<title>電験3種 法規Wiki（新）</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Noto+Serif+JP:wght@500;700;900&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet" />
<style>
  :root {
    /* ウォーム系トーン */
    --bg:        oklch(0.985 0.008 75);    /* オフホワイト */
    --bg-2:      oklch(0.965 0.012 70);    /* 淡いベージュ */
    --bg-3:      oklch(0.945 0.018 70);    /* もう一段濃いベージュ */
    --bg-elev:   oklch(0.99 0.006 75);     /* 浮き出しブロック背景（3wiki共通ポリシー） */
    --bd:        oklch(0.90 0.012 70);     /* --line のエイリアス（3wiki共通ポリシー） */
    --border:    oklch(0.90 0.012 70);     /* --line のエイリアス（コードベース全体で `var(--border)` 参照あり・未定義だと border 不可視化） */
    --card:      oklch(0.995 0.004 75);
    --line:      oklch(0.90 0.012 70);
    --line-2:    oklch(0.84 0.015 65);
    --ink:       oklch(0.22 0.012 60);     /* 主文字 */
    --ink-1:     oklch(0.22 0.012 60);     /* --ink のエイリアス（コードベース全体で `var(--ink-1)` 参照あり） */
    --ink-2:     oklch(0.42 0.012 60);     /* 副文字 */
    --ink-3:     oklch(0.58 0.012 60);     /* 補助 */
    --accent:    oklch(0.70 0.10 45);      /* テラコッタ（薄め・pastel） */
    --accent-2:  oklch(0.62 0.07 70);      /* ベージュブラウン */
    --accent-soft: oklch(0.93 0.04 55);
    --rank-s-bg: oklch(0.70 0.10 45);
    --rank-s-fg: oklch(0.99 0.005 75);
    --rank-a-bg: oklch(0.86 0.08 60);
    --rank-a-fg: oklch(0.32 0.06 50);
    --rank-b-bg: oklch(0.93 0.03 75);
    --rank-b-fg: oklch(0.42 0.02 60);
    --warn:      oklch(0.65 0.15 35);
    --good:      oklch(0.55 0.09 145);
    --shadow-sm: 0 1px 0 oklch(0.90 0.012 70 / 0.6);
    --shadow:    0 1px 2px oklch(0.30 0.02 60 / 0.04), 0 4px 14px oklch(0.30 0.02 60 / 0.05);
    --radius:    10px;
    --radius-lg: 14px;
    --serif: 'Noto Serif JP', 'Hiragino Mincho ProN', serif;
    --sans:  'Noto Sans JP', 'Hiragino Sans', system-ui, sans-serif;
    --mono:  'JetBrains Mono', ui-monospace, monospace;
  }

  /* === アクセントテーマ切替（data-accent属性で気分別カラー・pastel系）=== */
  /* デフォルト（属性なし）= terracotta（薄め）。以下は他6色のオーバーライド。 */
  :root[data-accent="royal"] {
    --accent:      oklch(0.65 0.13 250);    /* ロイヤルブルー（薄め） */
    --accent-2:    oklch(0.72 0.08 230);
    --accent-soft: oklch(0.94 0.04 250);
    --rank-s-bg:   oklch(0.65 0.13 250);
  }
  :root[data-accent="forest"] {
    --accent:      oklch(0.65 0.12 145);    /* フォレストグリーン（薄め） */
    --accent-2:    oklch(0.72 0.08 145);
    --accent-soft: oklch(0.94 0.04 145);
    --rank-s-bg:   oklch(0.65 0.12 145);
  }
  :root[data-accent="violet"] {
    --accent:      oklch(0.65 0.13 295);    /* ヴァイオレット（薄め） */
    --accent-2:    oklch(0.72 0.08 295);
    --accent-soft: oklch(0.94 0.04 295);
    --rank-s-bg:   oklch(0.65 0.13 295);
  }
  :root[data-accent="rose"] {
    --accent:      oklch(0.68 0.13 20);     /* ローズ（赤・コーラル系） */
    --accent-2:    oklch(0.72 0.09 25);
    --accent-soft: oklch(0.94 0.04 25);
    --rank-s-bg:   oklch(0.68 0.13 20);
  }
  :root[data-accent="cyan"] {
    --accent:      oklch(0.68 0.10 210);    /* シアン（爽やかブルー） */
    --accent-2:    oklch(0.74 0.07 205);
    --accent-soft: oklch(0.94 0.04 210);
    --rank-s-bg:   oklch(0.68 0.10 210);
  }
  :root[data-accent="sakura"] {
    --accent:      oklch(0.72 0.11 350);    /* 桜ピンク */
    --accent-2:    oklch(0.78 0.07 345);
    --accent-soft: oklch(0.95 0.04 350);
    --rank-s-bg:   oklch(0.72 0.11 350);
  }
  :root[data-accent="orange"] {
    --accent:      oklch(0.72 0.13 65);     /* オレンジ（明るい暖色） */
    --accent-2:    oklch(0.78 0.08 65);
    --accent-soft: oklch(0.94 0.05 65);
    --rank-s-bg:   oklch(0.72 0.13 65);
  }
  :root[data-accent="amber"] {
    --accent:      oklch(0.75 0.12 90);     /* アンバー（黄・ゴールド） */
    --accent-2:    oklch(0.80 0.08 90);
    --accent-soft: oklch(0.95 0.05 90);
    --rank-s-bg:   oklch(0.75 0.12 90);
  }
  :root[data-accent="gray"] {
    --accent:      oklch(0.55 0.02 250);    /* グレー（無彩色寄り・青グレー基調） */
    --accent-2:    oklch(0.65 0.02 250);
    --accent-soft: oklch(0.93 0.01 250);
    --rank-s-bg:   oklch(0.55 0.02 250);
  }
  /* dark mode 時の accent-soft 上書き（暗背景で薄色が浮かないように） */
  [data-theme="dark"][data-accent="royal"]  { --accent-soft: oklch(0.30 0.06 250); }
  [data-theme="dark"][data-accent="forest"] { --accent-soft: oklch(0.30 0.05 145); }
  [data-theme="dark"][data-accent="violet"] { --accent-soft: oklch(0.30 0.06 295); }
  [data-theme="dark"][data-accent="rose"]   { --accent-soft: oklch(0.30 0.06 20); }
  [data-theme="dark"][data-accent="cyan"]   { --accent-soft: oklch(0.30 0.05 210); }
  [data-theme="dark"][data-accent="sakura"] { --accent-soft: oklch(0.32 0.06 350); }
  [data-theme="dark"][data-accent="orange"] { --accent-soft: oklch(0.30 0.06 65); }
  [data-theme="dark"][data-accent="amber"]  { --accent-soft: oklch(0.32 0.06 90); }
  [data-theme="dark"][data-accent="gray"]   { --accent-soft: oklch(0.32 0.01 250); }

  [data-theme="dark"] {
    --bg:        oklch(0.20 0.010 60);
    --bg-2:      oklch(0.24 0.012 60);
    --bg-3:      oklch(0.28 0.014 60);
    --bg-elev:   oklch(0.26 0.012 60);
    --bd:        oklch(0.33 0.012 60);
    --border:    oklch(0.33 0.012 60);     /* --line のエイリアス（dark） */
    --card:      oklch(0.23 0.010 60);
    --line:      oklch(0.33 0.012 60);
    --line-2:    oklch(0.40 0.015 60);
    --ink:       oklch(0.92 0.008 70);
    --ink-1:     oklch(0.92 0.008 70);     /* --ink のエイリアス（dark） */
    --ink-2:     oklch(0.74 0.010 65);
    --ink-3:     oklch(0.58 0.010 65);
    --accent-soft: oklch(0.30 0.05 50);
    --rank-a-bg: oklch(0.34 0.06 55);
    --rank-a-fg: oklch(0.88 0.06 60);
    --rank-b-bg: oklch(0.28 0.03 65);
    --rank-b-fg: oklch(0.74 0.02 60);
    --shadow-sm: 0 1px 0 oklch(0.08 0 0 / 0.4);
    --shadow:    0 1px 2px oklch(0.08 0 0 / 0.3), 0 4px 14px oklch(0.08 0 0 / 0.20);
  }
  * { box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: var(--sans);
    font-feature-settings: "palt";
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }
  a { color: inherit; text-decoration: none; }
  button { font-family: inherit; cursor: pointer; }

  /* ── レイアウト ── */
  .app {
    display: grid;
    grid-template-columns: 256px 1fr;
    min-height: 100vh;
  }
  @media (max-width: 900px) {
    .app { grid-template-columns: 1fr; }
    .sidebar { display: none; }
  }

  /* ── サイドバー ── */
  .sidebar {
    border-right: 1px solid var(--line);
    background: var(--bg-2);
    padding: 22px 14px 28px;
    position: sticky;
    top: 0;
    height: 100vh;
    overflow-y: auto;
  }
  .brand {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 4px 8px 18px;
    border-bottom: 1px solid var(--line);
    margin-bottom: 14px;
  }
  .brand-mark {
    width: 30px; height: 30px;
    border-radius: 8px;
    background: var(--accent);
    color: var(--rank-s-fg);
    display: grid; place-items: center;
    font-family: var(--serif);
    font-weight: 900;
    font-size: 16px;
    box-shadow: inset 0 0 0 2px oklch(0.99 0.005 75 / 0.18);
  }
  .brand-name {
    font-family: var(--serif);
    font-weight: 700;
    font-size: 15px;
    letter-spacing: 0.02em;
  }
  .brand-sub {
    font-size: 11px;
    color: var(--ink-3);
    margin-top: -2px;
    letter-spacing: 0.06em;
  }
  .nav-group {
    margin: 14px 0 6px;
  }
  .nav-group-title {
    font-size: 11px;
    color: var(--ink-3);
    text-transform: uppercase;
    letter-spacing: 0.12em;
    padding: 0 8px;
    margin-bottom: 6px;
  }
  .nav-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 7px 10px;
    border-radius: 8px;
    font-size: 13.5px;
    color: var(--ink-2);
    line-height: 1.3;
    cursor: pointer;
    user-select: none;
  }
  .nav-item:hover { background: var(--bg-3); color: var(--ink); }
  .nav-item.active {
    background: var(--accent-soft);
    color: var(--ink);
    font-weight: 500;
  }
  .nav-num {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--ink-3);
    width: 18px;
    flex: none;
  }
  .nav-item.active .nav-num { color: var(--accent); }
  .nav-children {
    margin: 2px 0 6px 18px;
    padding-left: 10px;
    border-left: 1px solid var(--line);
    display: flex;
    flex-direction: column;
    gap: 1px;
  }
  .nav-child {
    padding: 4px 8px;
    font-size: 12.5px;
    color: var(--ink-2);
    border-radius: 6px;
    cursor: pointer;
  }
  .nav-child:hover { background: var(--bg-3); color: var(--ink); }
  .nav-foot {
    margin-top: 18px;
    padding: 12px;
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: var(--radius);
  }
  .streak-row {
    display: flex; align-items: baseline; gap: 6px;
  }
  .streak-num {
    font-family: var(--serif);
    font-weight: 900;
    font-size: 26px;
    color: var(--accent);
    line-height: 1;
  }
  .streak-unit {
    font-size: 12px;
    color: var(--ink-2);
  }
  .streak-label {
    font-size: 11px;
    color: var(--ink-3);
    margin-bottom: 6px;
    letter-spacing: 0.06em;
  }
  .streak-dots {
    display: flex; gap: 3px; margin-top: 8px;
  }
  .streak-dot {
    width: 10px; height: 10px; border-radius: 3px;
    background: var(--bg-3);
  }
  .streak-dot.on { background: var(--accent); }
  .streak-dot.today { background: var(--accent); outline: 2px solid var(--accent-soft); outline-offset: 1px; }

  /* ── メイン ── */
  .main {
    min-width: 0;
  }
  .topbar {
    position: sticky; top: 0; z-index: 10;
    background: oklch(0.985 0.008 75 / 0.85);
    backdrop-filter: saturate(1.2) blur(10px);
    border-bottom: 1px solid var(--line);
    padding: 10px 28px;
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .crumbs {
    font-size: 12.5px;
    color: var(--ink-3);
    display: flex; gap: 6px; align-items: center;
  }
  .crumbs .sep { color: var(--line-2); }
  .search {
    flex: 1;
    max-width: 520px;
    margin-left: auto;
    position: relative;
  }
  .search input {
    width: 100%;
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 8px 12px 8px 34px;
    font-size: 13px;
    color: var(--ink);
    font-family: inherit;
    outline: none;
  }
  .search input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
  .search .icn { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--ink-3); font-size: 13px; }
  .search .kbd {
    position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
    font-family: var(--mono); font-size: 10.5px; color: var(--ink-3);
    border: 1px solid var(--line); border-radius: 4px; padding: 1px 5px;
    background: var(--bg);
  }
  .search-results {
    position: absolute; top: calc(100% + 6px); left: 0; right: 0;
    background: var(--card); border: 1px solid var(--line);
    border-radius: 10px; box-shadow: var(--shadow);
    z-index: 200; overflow: hidden; display: none;
  }
  .search-results.open { display: block; }
  .sr-item {
    display: flex; flex-direction: column; gap: 2px;
    padding: 9px 14px; cursor: pointer;
    border-bottom: 1px solid var(--line); transition: background 0.1s;
  }
  .sr-item:last-child { border-bottom: none; }
  .sr-item:hover, .sr-item.focused { background: var(--accent-soft); }
  .sr-label { font-size: 13px; color: var(--ink); font-weight: 500; }
  .sr-sub   { font-size: 11px; color: var(--ink-3); }
  .sr-empty { padding: 12px 14px; font-size: 13px; color: var(--ink-3); text-align: center; }
  .top-actions { display: flex; gap: 8px; align-items: center; }
  .icon-btn {
    width: 32px; height: 32px;
    border-radius: 8px;
    border: 1px solid var(--line);
    background: var(--card);
    display: grid; place-items: center;
    color: var(--ink-2);
    font-size: 14px;
  }
  .icon-btn:hover { border-color: var(--line-2); color: var(--ink); }

  .content {
    padding: 28px 28px 80px;
    max-width: 1180px;
    margin: 0 auto;
  }

  /* ── ヒーロー ── */
  .hero {
    background:
      radial-gradient(80% 120% at 90% -10%, oklch(0.93 0.06 55) 0%, transparent 60%),
      radial-gradient(60% 100% at 0% 110%, oklch(0.95 0.03 80) 0%, transparent 55%),
      var(--card);
    border: 1px solid var(--line);
    border-radius: var(--radius-lg);
    padding: 28px 32px;
    box-shadow: var(--shadow);
    display: grid;
    grid-template-columns: 1fr 320px;
    gap: 28px;
  }
  @media (max-width: 880px) {
    .hero { grid-template-columns: 1fr; padding: 22px; }
  }
  .hero-eyebrow {
    font-family: var(--mono);
    font-size: 11.5px;
    letter-spacing: 0.18em;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 10px;
  }
  .hero h1 {
    font-family: var(--serif);
    font-weight: 900;
    font-size: 38px;
    line-height: 1.25;
    letter-spacing: 0.01em;
    margin: 0 0 10px;
    color: var(--ink);
    text-wrap: pretty;
  }
  .hero h1 em {
    font-style: normal;
    background: linear-gradient(180deg, transparent 65%, var(--accent-soft) 65%);
    padding: 0 2px;
  }
  .hero-sub {
    font-size: 15px;
    color: var(--ink-2);
    margin: 0 0 22px;
    max-width: 560px;
    text-wrap: pretty;
  }
  .cta-row {
    display: flex; flex-wrap: wrap; gap: 10px;
  }
  .btn {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 10px 16px;
    border-radius: 9px;
    font-size: 13.5px;
    font-weight: 500;
    border: 1px solid transparent;
    transition: transform 0.05s ease, background 0.15s;
  }
  .btn:active { transform: translateY(1px); }
  .btn.primary {
    background: var(--accent);
    color: var(--rank-s-fg);
  }
  .btn.primary:hover { background: oklch(0.58 0.14 45); }
  .btn.secondary {
    background: var(--card);
    color: var(--ink);
    border-color: var(--line-2);
  }
  .btn.secondary:hover { background: var(--bg-2); }
  .btn .arrow { transition: transform 0.15s; }
  .btn:hover .arrow { transform: translateX(2px); }

  .hero-side {
    background: oklch(0.99 0.005 75 / 0.5);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 16px 18px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  .resume-label {
    font-size: 11px;
    letter-spacing: 0.12em;
    color: var(--ink-3);
    text-transform: uppercase;
  }
  .resume-title {
    font-family: var(--serif);
    font-weight: 700;
    font-size: 16px;
    color: var(--ink);
    margin-top: 4px;
  }
  .resume-meta {
    font-size: 12px;
    color: var(--ink-3);
    display: flex; gap: 8px; align-items: center;
    margin-top: 4px;
  }
  .progress {
    height: 6px;
    background: var(--bg-3);
    border-radius: 999px;
    overflow: hidden;
    margin-top: 10px;
  }
  .progress > span {
    display: block; height: 100%;
    background: var(--accent);
    border-radius: 999px;
  }
  .progress-text {
    display: flex; justify-content: space-between;
    font-size: 11.5px;
    color: var(--ink-3);
    margin-top: 6px;
    font-family: var(--mono);
  }
  .resume-btn {
    margin-top: 4px;
    width: 100%;
    justify-content: center;
  }

  /* ── セクション ── */
  .section {
    margin-top: 44px;
  }
  .section-head {
    display: flex; align-items: flex-end; justify-content: space-between;
    margin-bottom: 16px;
    gap: 16px;
  }
  .section-title {
    font-family: var(--serif);
    font-weight: 700;
    font-size: 22px;
    margin: 0;
    color: var(--ink);
    letter-spacing: 0.01em;
  }
  .section-num {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--accent);
    letter-spacing: 0.18em;
    margin-bottom: 4px;
  }
  .section-sub {
    font-size: 13px;
    color: var(--ink-2);
    margin: 4px 0 0;
  }
  .section-link {
    font-size: 12.5px;
    color: var(--ink-2);
    border-bottom: 1px solid var(--line-2);
    padding-bottom: 1px;
  }
  .section-link:hover { color: var(--accent); border-color: var(--accent); }

  /* ── ロードマップ ── */
  .roadmap {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 12px;
    position: relative;
  }
  @media (max-width: 1000px) {
    .roadmap { grid-template-columns: repeat(2, 1fr); }
  }
  @media (max-width: 560px) {
    .roadmap { grid-template-columns: 1fr; }
  }
  .step {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 16px 16px 18px;
    position: relative;
    box-shadow: var(--shadow-sm);
  }
  .step.done { background: oklch(0.97 0.02 70); }
  .step.current { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft), var(--shadow-sm); }
  .step-head {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 8px;
  }
  .step-no {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--ink-3);
    letter-spacing: 0.12em;
  }
  .step.current .step-no { color: var(--accent); }
  .step-status {
    font-size: 10.5px;
    padding: 2px 7px;
    border-radius: 999px;
    font-weight: 500;
    letter-spacing: 0.06em;
  }
  .status-done { background: oklch(0.92 0.05 145); color: oklch(0.32 0.07 145); }
  .status-now  { background: var(--accent); color: var(--rank-s-fg); }
  .status-next { background: var(--bg-3); color: var(--ink-3); }
  .step-title {
    font-family: var(--serif);
    font-weight: 700;
    font-size: 15px;
    margin: 4px 0 6px;
    color: var(--ink);

<script>
  // アクセントテーマ早期適用（React mount 前・フラッシュ防止）
  // localStorage 'hoki_accent' = 'royal' | 'forest' | 'violet'。'terracotta' or null = デフォルト（属性なし）
  try {
    var __ha = localStorage.getItem('hoki_accent');
    if (__ha && /^(royal|forest|violet|rose|cyan|sakura|orange|amber|gray)$/.test(__ha)) {
      document.documentElement.setAttribute('data-accent', __ha);
    }
  } catch (e) {}
</script>
