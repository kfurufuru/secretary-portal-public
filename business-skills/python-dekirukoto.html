.cat-chip.cat-knowledge { background: rgba(167,139,250,0.1); color: var(--cat-knowledge); border: 1px solid rgba(167,139,250,0.3); }

// ── Utility ──
function escapeHtml(str) {
  return String(str)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#039;");
}

// ── Render cards ──
const triedSet = loadTried();
let pinnedId = loadPin();

function renderCards() {
  const grid = document.getElementById("item-grid");
  grid.innerHTML = "";

  ITEMS.forEach((item, idx) => {
    const cat = CATEGORIES[item.category] || CATEGORIES.tool;
    const libsHtml = (item.libs || [])
      .map(l => `<span class="c-tag">${escapeHtml(l)}</span>`)
      .join("");

    const card = document.createElement("div");
    card.className = "item-card";
    if (triedSet.has(item.id)) card.classList.add("is-tried");
    if (pinnedId === item.id) card.classList.add("is-pinned");
    card.dataset.category = item.category;
    card.dataset.id = item.id;

    card.innerHTML = `
      <div class="card-header" role="button" aria-expanded="false">
        <div class="card-meta">
          <div class="card-icon-wrap cat-${escapeHtml(item.category)}">
            <i data-lucide="${escapeHtml(item.icon)}" width="18" height="18"></i>
          </div>
          <span class="cat-chip cat-${escapeHtml(item.category)}">${escapeHtml(cat.label)}</span>
          <div class="card-actions">
            <button class="card-tried-btn" data-action="tried" title="試した" aria-label="試した">
              <i data-lucide="check" width="14" height="14"></i>
            </button>
            <button class="card-pin-btn" data-action="pin" title="今週の1個にピン留め" aria-label="ピン留め">
              <i data-lucide="pin" width="14" height="14"></i>
            </button>
          </div>
        </div>
        <h3 class="card-title">${escapeHtml(item.title)}</h3>
        <p class="card-can">${escapeHtml(item.can)}</p>
        <button class="expand-btn" aria-expanded="false" aria-controls="body-${escapeHtml(item.id)}">
          <span>▼</span>
          <span class="expand-arrow">詳細</span>
        </button>
      </div>
      <div class="card-body" id="body-${escapeHtml(item.id)}">
        <div class="card-body-inner">
          <div>
            <div class="detail-label">刺さる場面</div>
            <p class="detail-text">${escapeHtml(item.scene)}</p>
          </div>
          ${libsHtml ? `<div>
            <div class="detail-label">ライブラリ</div>
            <div class="libs-row">${libsHtml}</div>
          </div>` : ""}
          <div class="snippet-wrap">
            <div class="detail-label">最小コード</div>
            <pre class="snippet-pre"><button class="copy-btn" data-action="copy">COPY</button><code>${escapeHtml(item.snippet)}</code></pre>
          </div>
        </div>
      </div>
    `;

    // accordion toggle
    const header = card.querySelector(".card-header");
    const btn = card.querySelector(".expand-btn");
    function toggleCard() {
      const isExpanded = card.classList.toggle("expanded");
      btn.setAttribute("aria-expanded", isExpanded);
      header.setAttribute("aria-expanded", isExpanded);
    }
    header.addEventListener("click", e => {
      if (e.target.closest("[data-action]")) return;
      toggleCard();
    });

    // action buttons (pin / tried)
    card.querySelector('[data-action="pin"]').addEventListener("click", e => {
      e.stopPropagation();
      togglePin(item.id);
    });
    card.querySelector('[data-action="tried"]').addEventListener("click", e => {
      e.stopPropagation();
      toggleTried(item.id);
    });

    // copy button
    card.querySelector('[data-action="copy"]').addEventListener("click", async e => {
      e.stopPropagation();
      const btnEl = e.currentTarget;
      try {
        await navigator.clipboard.writeText(item.snippet);
        btnEl.textContent = "COPIED";
        btnEl.classList.add("copied");
        setTimeout(() => { btnEl.textContent = "COPY"; btnEl.classList.remove("copied"); }, 1500);
      } catch {
        btnEl.textContent = "失敗";
      }
    });

    // keyboard
    header.addEventListener("keydown", e => {
      if (e.target.closest("[data-action]")) return;
      if (e.key === "Enter" || e.key === " ") { e.preventDefault(); toggleCard(); }
      if (e.key === "Escape" && card.classList.contains("expanded")) { toggleCard(); }
    });
    header.tabIndex = 0;

    grid.appendChild(card);

    // entrance animation (stagger via CSS delay — robust to rAF throttling)
    card.style.transitionDelay = `${idx * 60}ms`;
    card.classList.add("visible");
  });

  // stats
  document.getElementById("stat-total").textContent = ITEMS.length;
  renderPinBox();
}

// ── Pin / Tried state management ────────────────────────────────────────────
function togglePin(id) {
  pinnedId = (pinnedId === id) ? "" : id;
  savePin(pinnedId);
  document.querySelectorAll(".item-card").forEach(c => {
    c.classList.toggle("is-pinned", c.dataset.id === pinnedId);
  });
  renderPinBox();
}
function toggleTried(id) {
  if (triedSet.has(id)) triedSet.delete(id); else triedSet.add(id);
  saveTried(triedSet);
  const card = document.querySelector(`.item-card[data-id="${id}"]`);
  if (card) card.classList.toggle("is-tried", triedSet.has(id));
}
function renderPinBox() {
  const content = document.getElementById("pin-content");
  const jumpBtn = document.getElementById("pin-jump");
  const clearBtn = document.getElementById("pin-clear");
  if (!pinnedId) {
    content.textContent = "カード右上の📌でピン留め。まず1個、試す対象を決める。";
    content.classList.add("empty");
    jumpBtn.style.display = "none";
    clearBtn.style.display = "none";
    return;
  }
  const item = ITEMS.find(i => i.id === pinnedId);
  if (!item) { pinnedId = ""; savePin(""); renderPinBox(); return; }
  content.innerHTML = `<strong>${escapeHtml(item.title)}</strong> — ${escapeHtml(item.can)}`;
  content.classList.remove("empty");
  jumpBtn.style.display = "inline-block";
  clearBtn.style.display = "inline-block";
  jumpBtn.onclick = () => {
    const card = document.querySelector(`.item-card[data-id="${pinnedId}"]`);
    if (card) {
      card.scrollIntoView({ behavior: "smooth", block: "center" });
      if (!card.classList.contains("expanded")) card.querySelector(".card-header").click();
    }
  };
  clearBtn.onclick = () => togglePin(pinnedId);
}

// ── Filter ──
function initFilter() {
  const bar = document.getElementById("filter-bar");
  bar.addEventListener("click", e => {
    const btn = e.target.closest(".filter-btn");
    if (!btn) return;
    bar.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    const filter = btn.dataset.filter;
    document.querySelectorAll(".item-card").forEach(card => {
      if (filter === "all" || card.dataset.category === filter) {
        card.classList.remove("hidden");
      } else {
        card.classList.add("hidden");
      }
    });
  });
}

// ── Init ──
document.addEventListener("DOMContentLoaded", () => {
  renderCards();
  initFilter();
  document.getElementById("stat-updated").textContent = new Date().toISOString().slice(0, 10);
  // Lucide icons
  if (typeof lucide !== "undefined") {
    lucide.createIcons();
  } else {
    // fallback: wait for script load
    document.querySelector('script[src*="lucide"]').addEventListener("load", () => lucide.createIcons());
  }
});

// Lucide loaded via defer — run after DOMContentLoaded
window.addEventListener("load", () => {
  if (typeof lucide !== "undefined") lucide.createIcons();
});

</script>
