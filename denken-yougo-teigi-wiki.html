<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>電験3種 法規 用語定義 暗記＆ミニテスト</title>
<style>
  :root{
    --bg:#f6f7f9; --card:#ffffff; --ink:#1c2430; --sub:#5b6675; --line:#e3e7ee;
    --accent:#1f6feb; --accent-weak:#e8f0fe;
    --ok:#1a7f4b; --ok-bg:#e6f4ec; --ng:#c0392b; --ng-bg:#fbeae8;
    --p1:#b4531a; --p1-bg:#fdf0e6; --p2:#1f6feb; --p2-bg:#e8f0fe; --p3:#5b6675; --p3-bg:#eef1f5;
    --shadow:0 1px 3px rgba(20,30,50,.08),0 1px 2px rgba(20,30,50,.04);
  }
  @media (prefers-color-scheme: dark){
    :root{
      --bg:#0f141b; --card:#1a212b; --ink:#e6ebf2; --sub:#9aa6b5; --line:#2a333f;
      --accent:#4d9bff; --accent-weak:#17263c;
      --ok:#4ecb86; --ok-bg:#12291d; --ng:#ff7b6b; --ng-bg:#2c1614;
      --p1:#f0a15e; --p1-bg:#2a1c11; --p2:#4d9bff; --p2-bg:#132234; --p3:#9aa6b5; --p3-bg:#20272f;
      --shadow:0 1px 3px rgba(0,0,0,.4);
    }
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    background:var(--bg); color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Hiragino Kaku Gothic ProN","Noto Sans JP",Meiryo,sans-serif;
    line-height:1.7; -webkit-text-size-adjust:100%;
  }
  .wrap{max-width:760px; margin:0 auto; padding:16px 14px 80px}
  header h1{font-size:1.25rem; margin:.2em 0 .1em; letter-spacing:.01em}
  .src{font-size:.72rem; color:var(--sub); background:var(--card); border:1px solid var(--line);
       border-radius:8px; padding:8px 10px; margin:8px 0 4px; box-shadow:var(--shadow)}
  .src b{color:var(--ink)}
  /* tab nav */
  nav.tabs{display:flex; gap:6px; position:sticky; top:0; z-index:10; background:var(--bg);
           padding:10px 0; margin:6px 0 10px; border-bottom:1px solid var(--line)}
  nav.tabs button{flex:1; font:inherit; font-size:.9rem; font-weight:600; cursor:pointer;
    padding:9px 6px; border-radius:10px; border:1px solid var(--line); background:var(--card); color:var(--sub)}
  nav.tabs button.active{background:var(--accent); color:#fff; border-color:var(--accent)}
  .panel{display:none} .panel.active{display:block}
  /* filter chips */
  .chips{display:flex; flex-wrap:wrap; gap:6px; margin:4px 0 12px}
  .chips button{font:inherit; font-size:.78rem; cursor:pointer; padding:5px 10px; border-radius:999px;
    border:1px solid var(--line); background:var(--card); color:var(--sub)}
  .chips button.active{background:var(--accent-weak); color:var(--accent); border-color:var(--accent)}
  /* term cards */
  .cat-title{font-size:.82rem; font-weight:700; color:var(--sub); margin:18px 0 6px; letter-spacing:.04em}
  .term{background:var(--card); border:1px solid var(--line); border-radius:12px; padding:12px 14px;
        margin:8px 0; box-shadow:var(--shadow)}
  .term .top{display:flex; align-items:baseline; gap:8px; flex-wrap:wrap}
  .term .name{font-size:1.05rem; font-weight:700}
  .badge{font-size:.65rem; font-weight:700; padding:2px 7px; border-radius:999px; white-space:nowrap}
  .b-p1{color:var(--p1); background:var(--p1-bg)} .b-p2{color:var(--p2); background:var(--p2-bg)}
  .b-p3{color:var(--p3); background:var(--p3-bg)}
  .term .def{margin:6px 0 4px; font-size:.95rem}
  .term .src-tag{font-size:.7rem; color:var(--sub)}
  .term .num{color:var(--accent); font-weight:700}
  .checks{display:flex; gap:5px; margin-top:9px}
  .checks button{flex:1; font:inherit; font-size:.82rem; cursor:pointer; padding:6px 0; border-radius:8px;
    border:1px solid var(--line); background:transparent; color:var(--sub)}
  .checks button.sel{color:#fff; border-color:transparent}
  .checks button[data-v="◎"].sel,.checks button[data-v="○"].sel{background:var(--ok)}
  .checks button[data-v="△"].sel{background:#c9962b}
  .checks button[data-v="×"].sel{background:var(--ng)}
  table.vt{width:100%; border-collapse:collapse; margin:6px 0; font-size:.9rem}
  table.vt th,table.vt td{border:1px solid var(--line); padding:6px 8px; text-align:center}
  table.vt th{background:var(--accent-weak); color:var(--accent)}
  /* quiz */
  .quiz-setup{background:var(--card); border:1px solid var(--line); border-radius:12px; padding:14px;
    box-shadow:var(--shadow); margin-bottom:14px}
  .quiz-setup label{display:block; font-size:.8rem; color:var(--sub); margin:10px 0 4px; font-weight:600}
  select{width:100%; font:inherit; font-size:.95rem; padding:9px 10px; border-radius:9px;
    border:1px solid var(--line); background:var(--card); color:var(--ink)}
  .btn{display:block; width:100%; font:inherit; font-size:1rem; font-weight:700; cursor:pointer;
    padding:12px; border-radius:11px; border:none; background:var(--accent); color:#fff; margin-top:16px}
  .btn.ghost{background:var(--card); color:var(--accent); border:1px solid var(--accent)}
  .q-head{display:flex; justify-content:space-between; font-size:.8rem; color:var(--sub); margin-bottom:6px}
  .q-prog{height:6px; background:var(--line); border-radius:99px; overflow:hidden; margin-bottom:14px}
  .q-prog > i{display:block; height:100%; background:var(--accent); transition:width .3s}
  .q-stem{background:var(--card); border:1px solid var(--line); border-radius:12px; padding:14px;
    box-shadow:var(--shadow); font-size:1.02rem; margin-bottom:12px}
  .q-stem .qlabel{font-size:.72rem; color:var(--accent); font-weight:700; display:block; margin-bottom:5px}
  .opts button{display:block; width:100%; text-align:left; font:inherit; font-size:.95rem; cursor:pointer;
    padding:11px 13px; border-radius:10px; border:1px solid var(--line); background:var(--card); color:var(--ink);
    margin:8px 0; box-shadow:var(--shadow)}
  .opts button.correct{background:var(--ok-bg); border-color:var(--ok); color:var(--ink)}
  .opts button.wrong{background:var(--ng-bg); border-color:var(--ng); color:var(--ink)}
  .opts button:disabled{cursor:default}
  .expl{background:var(--accent-weak); border-radius:10px; padding:10px 12px; font-size:.86rem; margin-top:6px}
  .expl .src-tag{color:var(--sub); font-size:.74rem; display:block; margin-top:4px}
  .result{text-align:center; background:var(--card); border:1px solid var(--line); border-radius:12px;
    padding:20px; box-shadow:var(--shadow)}
  .result .score{font-size:2.4rem; font-weight:800; color:var(--accent)}
  .wrong-list{text-align:left; margin-top:14px}
  .wrong-list .wi{border-top:1px solid var(--line); padding:9px 0; font-size:.88rem}
  .wrong-list .wi b{color:var(--ng)}
  .progress-box{background:var(--card); border:1px solid var(--line); border-radius:12px; padding:14px;
    box-shadow:var(--shadow); text-align:center}
  .pgrid{display:flex; gap:8px; margin-top:10px}
  .pgrid > div{flex:1; padding:10px 4px; border-radius:10px}
  .pgrid .n{font-size:1.5rem; font-weight:800}
  .muted{color:var(--sub); font-size:.82rem}
  .reset{margin-top:10px; font-size:.78rem; color:var(--sub); background:none; border:none; text-decoration:underline; cursor:pointer}
</style>
</head>
<body>
<div class="wrap">
<header>
  <h1>電験3種 法規 用語定義 ⚡ 暗記＆ミニテスト</h1>
  <div class="src">
    出典：<b>電気設備に関する技術基準を定める省令（令和5年）</b>／<b>電気設備の技術基準の解釈（令和7年11月）</b>。
    全用語を原典で逐語照合済。数値境界（電圧区分・防護措置の高さ）は一次確認済。
    <span class="src-tag" style="display:block;margin-top:4px">🔎 原典 最終確認: 2026-07-12（照合日メタ）</span>
  </div>
</header>

<nav class="tabs">
  <button data-tab="reg" class="active">📖 用語登録</button>
  <button data-tab="quiz">✍️ ミニテスト</button>
  <button data-tab="prog">📊 進捗</button>
</nav>

<!-- 用語登録 -->
<section id="reg" class="panel active">
  <div class="chips" id="regChips"></div>
  <div id="regList"></div>
</section>

<!-- ミニテスト -->
<section id="quiz" class="panel">
  <div id="quizSetup"></div>
  <div id="quizRun" style="display:none"></div>
  <div id="quizResult" style="display:none"></div>
</section>

<!-- 進捗 -->
<section id="prog" class="panel">
  <div id="progBody"></div>
</section>
</div>

<script>
/* ============================================================
   データ（すべて原典逐語照合済 / 令和5年省令・令和7年11月解釈）
   priority: 1=最優先(★数値/頻出) 2=重要 3=補足
   ============================================================ */
const CATS = {
  volt:  "① 電圧の区分（★数値必須）",
  bougo: "② 接触防護措置（★数値必須）",
  shorei:"③ 省令の基本用語",
  basho: "④ 施設場所・区分（解釈）",
  seishitsu:"⑤ 性質の区分（解釈・混同注意）",
  hikikomi:"⑥ 引込線・配線系（解釈/省令）",
};
const TERMS = [
  // ① 電圧区分（表として別扱いだが、テスト用に個別化）
  {id:"v_tei_ac", cat:"volt", pri:1, name:"低圧（交流）", def:"交流にあっては600V以下のもの", src:"省令 第2条第1号", num:"600V以下"},
  {id:"v_tei_dc", cat:"volt", pri:1, name:"低圧（直流）", def:"直流にあっては750V以下のもの", src:"省令 第2条第1号", num:"750V以下"},
  {id:"v_kou", cat:"volt", pri:1, name:"高圧", def:"直流750V・交流600Vを超え、7000V以下のもの", src:"省令 第2条第2号", num:"〜7000V以下"},
  {id:"v_toku", cat:"volt", pri:1, name:"特別高圧", def:"7000Vを超えるもの", src:"省令 第2条第3号", num:"7000V超"},
  // ② 接触防護措置
  {id:"b_sesshoku", cat:"bougo", pri:1, name:"接触防護措置", def:"次のいずれかに適合するよう施設。イ:屋内は床上2.3m以上・屋外は地表上2.5m以上の高さで、かつ人が通る場所から手を伸ばしても触れない範囲に施設／ロ:さく・へい等を設けるか金属管に収める等", src:"解釈 第1条第36号", num:"屋内2.3m / 屋外2.5m"},
  {id:"b_kani", cat:"bougo", pri:1, name:"簡易接触防護措置", def:"次のいずれかに適合するよう施設。イ:屋内は床上1.8m以上・屋外は地表上2m以上の高さで、かつ人が通る場所から容易に触れない範囲に施設／ロ:さく・へい等を設けるか金属管に収める等", src:"解釈 第1条第37号", num:"屋内1.8m / 屋外2m"},
  // ③ 省令の基本用語
  {id:"s_denro", cat:"shorei", pri:2, name:"電路", def:"通常の使用状態で電気が通じているところ", src:"省令 第1条第1号"},
  {id:"s_kikai", cat:"shorei", pri:2, name:"電気機械器具", def:"電路を構成する機械器具", src:"省令 第1条第2号"},
  {id:"s_densen", cat:"shorei", pri:2, name:"電線", def:"強電流電気の伝送に使用する電気導体、絶縁物で被覆した電気導体、又は絶縁物で被覆した上を保護被覆で保護した電気導体", src:"省令 第1条第7号"},
  {id:"s_densenro", cat:"shorei", pri:2, name:"電線路", def:"発電所・蓄電所・変電所・開閉所及びこれらに類する場所並びに電気使用場所相互間の電線（電車線を除く）並びにこれを支持し又は保蔵する工作物", src:"省令 第1条第9号"},
  {id:"s_hatsu", cat:"shorei", pri:3, name:"発電所", def:"発電機・原動機・燃料電池・太陽電池その他の機械器具を施設して電気を発生させる所（小規模発電設備等を除く）", src:"省令 第1条第3号"},
  {id:"s_hen", cat:"shorei", pri:3, name:"変電所", def:"構外から伝送される電気を、構内に施設した変圧器・回転変流機・整流器その他の電気機械器具により変成する所であって、変成した電気をさらに構外に伝送するもの（蓄電所を除く）", src:"省令 第1条第5号"},
  {id:"s_kaihei", cat:"shorei", pri:3, name:"開閉所", def:"構内に施設した開閉器その他の装置により電路を開閉する所であって、発電所・蓄電所・変電所及び需要場所以外のもの", src:"省令 第1条第6号"},
  {id:"s_shiji", cat:"shorei", pri:3, name:"支持物", def:"木柱・鉄柱・鉄筋コンクリート柱及び鉄塔並びにこれらに類する工作物であって、電線又は弱電流電線・光ファイバケーブルを支持することを主たる目的とするもの", src:"省令 第1条第16号"},
  // ④ 施設場所・区分（解釈）
  {id:"k_shiyou", cat:"basho", pri:1, name:"使用電圧（公称電圧）", def:"電路を代表する線間電圧", src:"解釈 第1条第1号"},
  {id:"k_saidai", cat:"basho", pri:1, name:"最大使用電圧", def:"通常の使用状態において電路に加わる最大の線間電圧（使用電圧に係数を乗じて求める。1000V以下は係数1.15）。絶縁耐力試験の基準になる", src:"解釈 第1条第2号"},
  {id:"k_denkishiyou", cat:"basho", pri:2, name:"電気使用場所", def:"電気を使用するための電気設備を施設した、1の建物又は1の単位をなす場所", src:"解釈 第1条第4号"},
  {id:"k_juyou", cat:"basho", pri:2, name:"需要場所", def:"電気使用場所を含む1の構内又はこれに準ずる区域であって、発電所・蓄電所・変電所及び開閉所以外のもの", src:"解釈 第1条第5号"},
  {id:"k_zouei", cat:"basho", pri:2, name:"造営物", def:"工作物のうち、土地に定着するものであって、屋根及び柱又は壁を有するもの", src:"解釈 第1条第23号"},
  {id:"k_kenzou", cat:"basho", pri:2, name:"建造物", def:"造営物のうち、人が居住若しくは勤務し、又は頻繁に出入り若しくは来集するもの", src:"解釈 第1条第24号"},
  {id:"k_kakusan", cat:"basho", pri:3, name:"点検できない隠ぺい場所", def:"天井ふところ・壁内又はコンクリート床内等、工作物を破壊しなければ電気設備に接近・点検できない場所", src:"解釈 第1条第29号"},
  {id:"k_tenkan", cat:"basho", pri:3, name:"点検できる隠ぺい場所", def:"点検口がある天井裏・戸棚又は押入れ等、容易に電気設備に接近・点検できる隠ぺい場所", src:"解釈 第1条第30号"},
  {id:"k_tenkai", cat:"basho", pri:3, name:"展開した場所", def:"点検できない隠ぺい場所及び点検できる隠ぺい場所以外の場所", src:"解釈 第1条第31号"},
  // ⑤ 性質の区分（混同注意）
  {id:"z_nannen", cat:"seishitsu", pri:2, name:"難燃性", def:"炎を当てても燃え広がらない性質", src:"解釈 第1条第32号"},
  {id:"z_jishou", cat:"seishitsu", pri:3, name:"自消性のある難燃性", def:"難燃性であって、炎を除くと自然に消える性質", src:"解釈 第1条第33号"},
  {id:"z_funen", cat:"seishitsu", pri:2, name:"不燃性", def:"難燃性のうち、炎を当てても燃えない性質", src:"解釈 第1条第34号"},
  {id:"z_taika", cat:"seishitsu", pri:2, name:"耐火性", def:"不燃性のうち、炎により加熱された状態においても著しく変形又は破壊しない性質", src:"解釈 第1条第35号"},
  // ⑥ 引込線・配線系
  {id:"h_kakuu", cat:"hikikomi", pri:2, name:"架空引込線", def:"架空電線路の支持物から、他の支持物を経ずに需要場所の取付け点に至る架空電線", src:"解釈 第1条第9号"},
  {id:"h_hiki", cat:"hikikomi", pri:2, name:"引込線", def:"架空引込線、及び需要場所の造営物の側面等に施設する電線であって、当該需要場所の引込口に至るもの", src:"解釈 第1条第10号"},
  {id:"h_rensetsu", cat:"hikikomi", pri:2, name:"連接引込線", def:"一需要場所の引込線から分岐して、支持物を経ないで他の需要場所の引込口に至る部分の電線", src:"省令 第1条第17号"},
  {id:"h_haisen", cat:"hikikomi", pri:3, name:"配線", def:"電気使用場所において施設する電線（電気機械器具内の電線及び電線路の電線を除く）", src:"省令 第1条第18号"},
];

/* ============================================================
   状態（localStorage）
   ============================================================ */
const LS_CHECK = "denken_yougo::check";
const LS_QUIZ  = "denken_yougo::quizlog";
function loadChecks(){ try{return JSON.parse(localStorage.getItem(LS_CHECK))||{}}catch(e){return {}} }
function saveChecks(o){ localStorage.setItem(LS_CHECK, JSON.stringify(o)); }
function loadQuizLog(){ try{return JSON.parse(localStorage.getItem(LS_QUIZ))||[]}catch(e){return []} }
function saveQuizLog(a){ localStorage.setItem(LS_QUIZ, JSON.stringify(a.slice(-30))); }

/* ============================================================
   タブ切替
   ============================================================ */
document.querySelectorAll('nav.tabs button').forEach(b=>{
  b.onclick=()=>{
    document.querySelectorAll('nav.tabs button').forEach(x=>x.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');
    document.getElementById(b.dataset.tab).classList.add('active');
    if(b.dataset.tab==='prog') renderProgress();
  };
});

/* ============================================================
   用語登録ビュー
   ============================================================ */
const PRI_BADGE = {1:['最優先','b-p1'],2:['重要','b-p2'],3:['補足','b-p3']};
let regFilter = 'all';
function renderChips(){
  const box=document.getElementById('regChips');
  const opts=[['all','すべて']].concat(Object.entries(CATS).map(([k,v])=>[k,v.replace(/（.*/,'')]));
  box.innerHTML=opts.map(([k,v])=>`<button data-f="${k}" class="${k===regFilter?'active':''}">${v}</button>`).join('');
  box.querySelectorAll('button').forEach(b=>b.onclick=()=>{regFilter=b.dataset.f; renderChips(); renderReg();});
}
function renderReg(){
  const checks=loadChecks();
  const list=document.getElementById('regList');
  let html='';
  for(const [ck,cname] of Object.entries(CATS)){
    if(regFilter!=='all' && regFilter!==ck) continue;
    const items=TERMS.filter(t=>t.cat===ck);
    if(!items.length) continue;
    html+=`<div class="cat-title">${cname}</div>`;
    if(ck==='volt'){
      html+=`<table class="vt"><tr><th>区分</th><th>交流</th><th>直流</th></tr>
        <tr><td>低圧</td><td>600V 以下</td><td>750V 以下</td></tr>
        <tr><td>高圧</td><td>600V 超〜7000V 以下</td><td>750V 超〜7000V 以下</td></tr>
        <tr><td>特別高圧</td><td colspan="2">7000V を超えるもの</td></tr></table>
        <div class="muted" style="margin:-2px 0 6px">罠：低圧の上限は交流600V／直流750Vで<b>非対称</b>。境界は「以下・超」に注意。</div>`;
    }
    items.forEach(t=>{
      const [bl,bc]=PRI_BADGE[t.pri];
      const cur=checks[t.id]||'';
      html+=`<div class="term">
        <div class="top"><span class="name">${t.name}</span>
          <span class="badge ${bc}">${bl}</span>
          ${t.num?`<span class="badge b-p2">${t.num}</span>`:''}</div>
        <div class="def">${t.def}</div>
        <div class="src-tag"><span class="num">📄 ${t.src}</span></div>
        <div class="checks" data-id="${t.id}">
          ${['◎','○','△','×'].map(v=>`<button data-v="${v}" class="${cur===v?'sel':''}">${v}</button>`).join('')}
        </div></div>`;
    });
  }
  list.innerHTML=html;
  list.querySelectorAll('.checks').forEach(row=>{
    row.querySelectorAll('button').forEach(b=>b.onclick=()=>{
      const c=loadChecks(); const id=row.dataset.id;
      c[id] = (c[id]===b.dataset.v)? undefined : b.dataset.v;
      if(!c[id]) delete c[id];
      saveChecks(c); renderReg();
    });
  });
}

/* ============================================================
   ミニテスト
   ============================================================ */
function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
let quiz=null;

function renderQuizSetup(){
  const s=document.getElementById('quizSetup');
  document.getElementById('quizRun').style.display='none';
  document.getElementById('quizResult').style.display='none';
  s.style.display='block';
  const catOpts=['<option value="all">すべての用語</option>']
    .concat(Object.entries(CATS).map(([k,v])=>`<option value="${k}">${v}</option>`)).join('');
  s.innerHTML=`<div class="quiz-setup">
    <label>出題形式</label>
    <select id="qMode">
      <option value="name2def">用語 → 定義（4択）</option>
      <option value="def2name">定義 → 用語（4択）</option>
      <option value="num">数値の穴埋め（4択）</option>
      <option value="mix">ミックス</option>
    </select>
    <label>範囲</label>
    <select id="qCat">${catOpts}</select>
    <label>問題数</label>
    <select id="qCount"><option>5</option><option selected>10</option><option>全部</option></select>
    <button class="btn" id="qStart">テスト開始</button>
    <div class="muted" style="margin-top:10px">◎○=覚えた／△×=要復習は「用語登録」タブで記録できます。</div>
  </div>`;
  document.getElementById('qStart').onclick=startQuiz;
}

function buildQuestion(t, mode, pool){
  // pool: 同種の選択肢母集団
  const numPool = TERMS.filter(x=>x.num);
  if(mode==='num' || (mode==='mix' && t.num && Math.random()<0.5 && numPool.length>=4)){
    if(!t.num){ mode='name2def'; } else {
      const distract=shuffle(numPool.filter(x=>x.id!==t.id)).slice(0,3).map(x=>x.num);
      return {q:`「${t.name}」の数値基準は？`, label:'数値', opts:shuffle([t.num,...distract]),
              ans:t.num, expl:t.def, src:t.src};
    }
  }
  if(mode==='def2name'){
    const distract=shuffle(pool.filter(x=>x.id!==t.id)).slice(0,3).map(x=>x.name);
    return {q:t.def, label:'この定義の用語は？', opts:shuffle([t.name,...distract]),
            ans:t.name, expl:`${t.name}（${t.src}）`, src:t.src};
  }
  // name2def
  const distract=shuffle(pool.filter(x=>x.id!==t.id)).slice(0,3).map(x=>x.def);
  return {q:`「${t.name}」の定義は？`, label:'定義', opts:shuffle([t.def,...distract]),
          ans:t.def, expl:`${t.name}（${t.src}）`, src:t.src};
}

function startQuiz(){
  const mode=document.getElementById('qMode').value;
  const cat=document.getElementById('qCat').value;
  const cntSel=document.getElementById('qCount').value;
  let pool = cat==='all'? TERMS.slice() : TERMS.filter(t=>t.cat===cat);
  let src = mode==='num'? pool.filter(t=>t.num) : pool;
  if(mode==='num' && src.length<4){ alert('数値問題はこの範囲では作れません（4問未満）。範囲を「すべて」にしてください。'); return; }
  let items=shuffle(src);
  const n = cntSel==='全部'? items.length : Math.min(parseInt(cntSel), items.length);
  items=items.slice(0,n);
  const distractPool = cat==='all'? TERMS : TERMS.filter(t=>t.cat===cat);
  quiz={qs:items.map(t=>buildQuestion(t,mode, distractPool.length>=4?distractPool:TERMS)), i:0, correct:0, wrong:[], mode};
  document.getElementById('quizSetup').style.display='none';
  document.getElementById('quizResult').style.display='none';
  document.getElementById('quizRun').style.display='block';
  renderQuestion();
}

function renderQuestion(){
  const run=document.getElementById('quizRun');
  const q=quiz.qs[quiz.i];
  const pct=Math.round(quiz.i/quiz.qs.length*100);
  run.innerHTML=`
    <div class="q-head"><span>第 ${quiz.i+1} / ${quiz.qs.length} 問</span><span>正解 ${quiz.correct}</span></div>
    <div class="q-prog"><i style="width:${pct}%"></i></div>
    <div class="q-stem"><span class="qlabel">${q.label}</span>${q.q}</div>
    <div class="opts" id="opts">${q.opts.map((o,i)=>`<button data-i="${i}">${o}</button>`).join('')}</div>
    <div id="qfeed"></div>`;
  run.querySelectorAll('#opts button').forEach(b=>b.onclick=()=>answer(b.textContent));
}

function answer(choice){
  const q=quiz.qs[quiz.i];
  const ok = choice===q.ans;
  if(ok) quiz.correct++; else quiz.wrong.push({q:q.q, ans:q.ans, chosen:choice, src:q.src});
  document.querySelectorAll('#opts button').forEach(b=>{
    b.disabled=true;
    if(b.textContent===q.ans) b.classList.add('correct');
    else if(b.textContent===choice) b.classList.add('wrong');
  });
  document.getElementById('qfeed').innerHTML=`
    <div class="expl">${ok?'✅ 正解':'❌ 不正解'}　${q.expl}
      <span class="src-tag">📄 ${q.src}</span></div>
    <button class="btn" id="qNext">${quiz.i+1<quiz.qs.length?'次の問題 →':'結果を見る'}</button>`;
  document.getElementById('qNext').onclick=()=>{
    quiz.i++;
    if(quiz.i<quiz.qs.length) renderQuestion(); else finishQuiz();
  };
}

function finishQuiz(){
  const log=loadQuizLog();
  log.push({t:Date.now(), score:quiz.correct, total:quiz.qs.length, mode:quiz.mode});
  saveQuizLog(log);
  document.getElementById('quizRun').style.display='none';
  const r=document.getElementById('quizResult');
  r.style.display='block';
  const pct=Math.round(quiz.correct/quiz.qs.length*100);
  let wl='';
  if(quiz.wrong.length){
    wl=`<div class="wrong-list"><div class="muted" style="font-weight:700;margin-bottom:4px">復習ポイント</div>`
      + quiz.wrong.map(w=>`<div class="wi">${w.q}<br>正解：<b>${w.ans}</b>　<span class="muted">📄 ${w.src}</span></div>`).join('')
      + `</div>`;
  } else { wl=`<div class="muted" style="margin-top:12px">全問正解！ 🎉</div>`; }
  r.innerHTML=`<div class="result">
    <div class="score">${quiz.correct} / ${quiz.qs.length}</div>
    <div class="muted">正答率 ${pct}%</div>
    ${wl}
    <button class="btn" id="qAgain">もう一度</button>
    <button class="btn ghost" id="qBack" style="margin-top:8px">設定に戻る</button>
  </div>`;
  document.getElementById('qAgain').onclick=startQuiz;
  document.getElementById('qBack').onclick=renderQuizSetup;
}

/* ============================================================
   進捗
   ============================================================ */
function renderProgress(){
  const c=loadChecks(); const total=TERMS.length;
  const cnt={'◎':0,'○':0,'△':0,'×':0};
  Object.values(c).forEach(v=>{if(cnt[v]!==undefined)cnt[v]++});
  const done=cnt['◎']+cnt['○']; const rest=total-Object.keys(c).length;
  const log=loadQuizLog().slice().reverse();
  const body=document.getElementById('progBody');
  body.innerHTML=`
    <div class="progress-box">
      <div class="muted">用語 自己チェック（${total}語中）</div>
      <div class="pgrid">
        <div style="background:var(--ok-bg)"><div class="n" style="color:var(--ok)">${done}</div><div class="muted">覚えた ◎○</div></div>
        <div style="background:var(--p1-bg)"><div class="n" style="color:var(--p1)">${cnt['△']}</div><div class="muted">うろ覚え △</div></div>
        <div style="background:var(--ng-bg)"><div class="n" style="color:var(--ng)">${cnt['×']}</div><div class="muted">間違えた ×</div></div>
        <div style="background:var(--p3-bg)"><div class="n" style="color:var(--p3)">${rest}</div><div class="muted">未評価</div></div>
      </div>
      <button class="reset" id="resetChecks">自己チェックをリセット</button>
    </div>
    <div class="progress-box" style="margin-top:12px">
      <div class="muted" style="margin-bottom:6px">直近のテスト結果</div>
      ${log.length? log.slice(0,8).map(l=>{
        const d=new Date(l.t); const md=({name2def:'用語→定義',def2name:'定義→用語',num:'数値',mix:'ミックス'})[l.mode]||l.mode;
        return `<div class="wi" style="border-top:1px solid var(--line);padding:7px 0;font-size:.85rem;text-align:left">
          ${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}
          　<b>${l.score}/${l.total}</b>　<span class="muted">${md}</span></div>`;
      }).join('') : '<div class="muted">まだ記録がありません</div>'}
    </div>`;
  document.getElementById('resetChecks').onclick=()=>{
    if(confirm('自己チェックを全消去しますか？')){ localStorage.removeItem(LS_CHECK); renderProgress(); renderReg(); }
  };
}

/* init */
renderChips(); renderReg(); renderQuizSetup();
</script>
