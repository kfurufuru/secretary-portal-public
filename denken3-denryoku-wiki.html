<!DOCTYPE html>
<html lang="ja" data-theme="light" data-accent="deeporange" data-difficulty="standard">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>電験3種 電力Wiki — 受験対策・要点まとめ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700&family=Noto+Serif+JP:wght@500;600;700&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css" integrity="sha384-n8MVd4RsNIU0tAv4ct0nTaAbDJwPJzDEaqSD1odI+WdtXRGWt2kTvGFasHpSy3SV" crossorigin="anonymous">
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js" integrity="sha384-XjKyOOlGwcjNTAIQHIpgOno0Hl1YQqzUOEleOLALmuqehneUG+vnGctmUb0ZY0l8" crossorigin="anonymous"></script>
  <style>
/* ============================================================
   電験3種 電力Wiki — Stylesheet
   ============================================================ */

:root {
  --bg: oklch(0.985 0.005 85);
  --bg-elev: oklch(0.995 0.003 85);
  --bg-sunken: oklch(0.96 0.006 85);
  --ink: oklch(0.22 0.02 260);
  --ink-soft: oklch(0.42 0.018 260);
  --ink-mute: oklch(0.58 0.014 260);
  --rule: oklch(0.88 0.008 260);
  --rule-soft: oklch(0.93 0.006 260);
  --accent: oklch(0.45 0.12 260);
  --accent-soft: oklch(0.92 0.04 260);
  --accent-ink: oklch(0.32 0.13 260);
  --warn: oklch(0.55 0.14 50);
  --warn-soft: oklch(0.95 0.04 70);
  --ok: oklch(0.55 0.10 155);
  --ok-soft: oklch(0.94 0.04 155);
  --danger: oklch(0.55 0.16 25);
  --danger-soft: oklch(0.95 0.03 25);

  --font-serif: "Noto Serif JP", "Hiragino Mincho ProN", "Yu Mincho", serif;
  --font-sans: "Noto Sans JP", "Hiragino Sans", "Yu Gothic", system-ui, sans-serif;
  --font-mono: "JetBrains Mono", "SF Mono", "Menlo", monospace;

  --fs-base: 15px;
  --lh-base: 1.85;

  --sidebar-w: 280px;
  --toc-w: 220px;
  --content-max: 760px;
}

[data-theme="dark"] {
  --bg: oklch(0.18 0.012 260);
  --bg-elev: oklch(0.22 0.012 260);
  --bg-sunken: oklch(0.14 0.012 260);
  --ink: oklch(0.94 0.008 85);
  --ink-soft: oklch(0.78 0.012 260);
  --ink-mute: oklch(0.60 0.014 260);
  --rule: oklch(0.32 0.014 260);
  --rule-soft: oklch(0.26 0.012 260);
  --accent: oklch(0.72 0.12 260);
  --accent-soft: oklch(0.30 0.06 260);
  --accent-ink: oklch(0.85 0.10 260);
  --warn: oklch(0.78 0.14 70);
  --warn-soft: oklch(0.32 0.05 70);
  --ok: oklch(0.78 0.12 155);
  --ok-soft: oklch(0.28 0.05 155);
  --danger: oklch(0.78 0.14 25);
  --danger-soft: oklch(0.32 0.05 25);
}

[data-accent="indigo"]  { --accent: oklch(0.45 0.12 260); --accent-soft: oklch(0.92 0.04 260); --accent-ink: oklch(0.32 0.13 260); }
[data-accent="forest"]  { --accent: oklch(0.45 0.10 155); --accent-soft: oklch(0.92 0.04 155); --accent-ink: oklch(0.32 0.11 155); }
[data-accent="rust"]    { --accent: oklch(0.50 0.13 35);  --accent-soft: oklch(0.93 0.04 50);  --accent-ink: oklch(0.38 0.14 35);  }
[data-accent="aubergine"] { --accent: oklch(0.40 0.10 320); --accent-soft: oklch(0.92 0.04 320); --accent-ink: oklch(0.30 0.11 320); }
[data-accent="deeporange"] { --accent: oklch(0.55 0.17 42); --accent-soft: oklch(0.93 0.05 50); --accent-ink: oklch(0.44 0.16 40); }

[data-theme="dark"][data-accent="indigo"]  { --accent: oklch(0.74 0.12 260); --accent-soft: oklch(0.30 0.06 260); --accent-ink: oklch(0.85 0.10 260); }
[data-theme="dark"][data-accent="forest"]  { --accent: oklch(0.78 0.12 155); --accent-soft: oklch(0.28 0.05 155); --accent-ink: oklch(0.86 0.10 155); }
[data-theme="dark"][data-accent="rust"]    { --accent: oklch(0.78 0.13 50);  --accent-soft: oklch(0.30 0.06 50);  --accent-ink: oklch(0.85 0.12 50);  }
[data-theme="dark"][data-accent="aubergine"] { --accent: oklch(0.74 0.10 320); --accent-soft: oklch(0.28 0.05 320); --accent-ink: oklch(0.85 0.10 320); }
[data-theme="dark"][data-accent="deeporange"] { --accent: oklch(0.80 0.15 52); --accent-soft: oklch(0.32 0.07 45); --accent-ink: oklch(0.87 0.12 52); }

* { box-sizing: border-box; }

html, body {
  margin: 0;
  padding: 0;
  background: var(--bg);
  color: var(--ink);
  font-family: var(--font-sans);
  font-size: var(--fs-base);
  line-height: var(--lh-base);
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}

a { color: var(--accent-ink); text-decoration: none; }
a:hover { text-decoration: underline; text-underline-offset: 3px; }

/* ============================================================ Layout */

.app {
  display: grid;
  grid-template-columns: var(--sidebar-w) 1fr var(--toc-w);
  min-height: 100vh;
}

@media (max-width: 1100px) {
  .app { grid-template-columns: var(--sidebar-w) 1fr; }
  .toc { display: none; }
}

@media (max-width: 760px) {
  .app { grid-template-columns: 1fr; }
  .sidebar { display: none; }
}

/* ============================================================ Sidebar */

.sidebar {
  position: sticky;
  top: 0;
  height: 100vh;
  border-right: 1px solid var(--rule);
  background: var(--bg-sunken);
  overflow-y: auto;
  padding: 22px 18px 60px;
}

.brand {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 4px 4px 18px;
  border-bottom: 1px solid var(--rule);
  margin-bottom: 16px;
}

.brand-mark {
  width: 36px;
  height: 36px;
  border-radius: 6px;
  background: var(--ink);
  color: var(--bg);
  display: grid;
  place-items: center;
  font-family: var(--font-serif);
  font-weight: 700;
  font-size: 18px;
  letter-spacing: -0.02em;
  flex-shrink: 0;
}

.brand-title {
  font-family: var(--font-serif);
  font-size: 16px;
  font-weight: 600;
  line-height: 1.3;
  letter-spacing: 0.01em;
}
.brand-sub {
  font-size: 11px;
  color: var(--ink-mute);
  letter-spacing: 0.05em;
  text-transform: uppercase;
}

.search {
  position: relative;
  margin-bottom: 18px;
}
.search input {
  width: 100%;
  padding: 8px 10px 8px 32px;
  border: 1px solid var(--rule);
  background: var(--bg-elev);
  border-radius: 5px;
  color: var(--ink);
  font-family: var(--font-sans);
  font-size: 13px;
}
.search input::placeholder { color: var(--ink-mute); }
.search input:focus { outline: 2px solid var(--accent); outline-offset: -1px; border-color: transparent; }
.search-icon {
  position: absolute;
  left: 10px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--ink-mute);
  pointer-events: none;
}

.search-kbd {
  position: absolute;
  right: 8px;
  top: 50%;
  transform: translateY(-50%);
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--ink-mute);
  border: 1px solid var(--rule);
  padding: 1px 5px;
  border-radius: 3px;
  background: var(--bg);
}

.search-results {
  position: absolute;
  top: calc(100% + 4px);
  left: 0;
  right: 0;
  background: var(--bg-elev);
  border: 1px solid var(--rule);
  border-radius: 6px;
  max-height: 360px;
  overflow-y: auto;
  z-index: 30;
  box-shadow: 0 12px 32px -12px oklch(0.2 0.02 260 / 0.25);
}
.search-result {
  padding: 9px 12px;
  border-bottom: 1px solid var(--rule-soft);
  cursor: pointer;
  font-size: 13px;
}
.search-result:last-child { border-bottom: 0; }
.search-result:hover, .search-result.active { background: var(--accent-soft); }
.search-result-title { font-weight: 600; color: var(--ink); }
.search-result-meta { font-size: 11px; color: var(--ink-mute); margin-top: 2px; }
.search-result mark { background: var(--accent-soft); color: var(--accent-ink); padding: 0 2px; border-radius: 2px; }

.nav-group {
  margin-bottom: 4px;
}

.nav-chapter {
  display: flex;
  align-items: center;
  gap: 6px;
  width: 100%;
  background: transparent;
  border: 0;
  padding: 6px 4px;
  text-align: left;
  cursor: pointer;
  font-family: var(--font-sans);
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--ink-mute);
}
.nav-chapter:hover { color: var(--ink); }
.nav-chapter-caret {
  width: 10px;
  height: 10px;
  transition: transform 0.15s;
}
.nav-chapter[data-open="false"] .nav-chapter-caret { transform: rotate(-90deg); }
.nav-chapter-num {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--ink-mute);
  margin-left: auto;
}

.nav-items {
  list-style: none;
  padding: 0;
  margin: 0 0 6px;
  border-left: 1px solid var(--rule);
  margin-left: 8px;
}
.nav-items[data-open="false"] { display: none; }

.nav-item {
  display: flex;
  align-items: baseline;
  gap: 8px;
  padding: 4px 10px 4px 14px;
  margin-left: -1px;
  border-left: 2px solid transparent;
  font-size: 13px;
  color: var(--ink-soft);
  cursor: pointer;
  transition: all 0.12s;
  line-height: 1.4;
}
.nav-item:hover { color: var(--ink); background: var(--rule-soft); }
.nav-item.active {
  color: var(--accent-ink);
  border-left-color: var(--accent);
  background: var(--accent-soft);
  font-weight: 600;
}
.nav-item-num {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--ink-mute);
  flex-shrink: 0;
  font-weight: 400;
}
.nav-item.active .nav-item-num { color: var(--accent); }

.nav-badge {
  margin-left: auto;
  font-family: var(--font-mono);
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 0.05em;
  padding: 1px 5px;
  border-radius: 3px;
  background: var(--warn-soft);
  color: var(--warn);
}

.sidebar-footer {
  margin-top: 20px;
  padding-top: 16px;
  border-top: 1px solid var(--rule);
  font-size: 11px;
  color: var(--ink-mute);
  line-height: 1.6;
}

/* ============================================================ Main Content */

.main {
  padding: 36px 48px 120px;
  min-width: 0;
}

@media (max-width: 760px) { .main { padding: 24px 18px 80px; } }

.crumbs {
  font-size: 12px;
  color: var(--ink-mute);
  margin-bottom: 22px;
  display: flex;
  align-items: center;
  gap: 6px;
  flex-wrap: wrap;
}
.crumbs a { color: var(--ink-mute); }
.crumbs a:hover { color: var(--ink); }
.crumbs .sep { color: var(--rule); }

.page-header {
  border-bottom: 2px solid var(--rule);
  padding-bottom: 18px;
  margin-bottom: 32px;
}
.page-eyebrow {
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--accent-ink);
  margin-bottom: 8px;
}
.migrated-badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.04em;
  color: var(--ok);
  border: 1px solid color-mix(in oklch, var(--ok) 45%, transparent);
  background: color-mix(in oklch, var(--ok) 12%, transparent);
  padding: 2px 9px;
  border-radius: 999px;
  margin-bottom: 10px;
}
.page-title {
  font-family: var(--font-serif);
  font-size: 36px;
  font-weight: 700;
  line-height: 1.25;
  letter-spacing: -0.01em;
  margin: 0 0 10px;
  color: var(--ink);
}
.page-deck {
  font-size: 15px;
  color: var(--ink-soft);
  line-height: 1.75;
  max-width: 640px;
}

.page-meta {
  display: flex;
  flex-wrap: wrap;
  gap: 18px;
  margin-top: 16px;
  font-size: 12px;
  color: var(--ink-mute);
}
.page-meta-item { display: flex; align-items: center; gap: 6px; }
.page-meta-item strong { color: var(--ink-soft); font-weight: 600; }

.content { max-width: var(--content-max); }

.content h2 {
  font-family: var(--font-serif);
  font-size: 24px;
  font-weight: 700;
  letter-spacing: -0.005em;
  line-height: 1.35;
  margin: 48px 0 16px;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--rule);
  scroll-margin-top: 24px;
}
.content h2 .h-num {
  font-family: var(--font-mono);
  font-size: 13px;
  color: var(--accent);
  font-weight: 600;
  margin-right: 10px;
  letter-spacing: 0.05em;
}
.content h3 {
  font-family: var(--font-serif);
  font-size: 18px;
  font-weight: 600;
  margin: 32px 0 10px;
  scroll-margin-top: 24px;
}
.content h4 {
  font-size: 14px;
  font-weight: 700;
  letter-spacing: 0.02em;
  margin: 22px 0 8px;
  color: var(--ink);
}
.content p {
  margin: 0 0 14px;
  text-wrap: pretty;
}
.content p strong { color: var(--ink); font-weight: 700; }

/* 論述で問われるポイント — 黄色マーカー */
.marker {
  background: linear-gradient(transparent 55%, oklch(0.92 0.18 95) 55%);
  padding: 0 2px;
  font-weight: 600;
  color: var(--ink);
}
[data-theme="dark"] .marker {
  background: linear-gradient(transparent 55%, oklch(0.55 0.16 95 / 0.55) 55%);
  color: var(--ink);
}
.content ul, .content ol { padding-left: 22px; margin: 6px 0 16px; }
.content li { margin-bottom: 6px; line-height: 1.75; }
.content code {
  font-family: var(--font-mono);
  font-size: 0.88em;
  background: var(--bg-sunken);
  padding: 1px 5px;
  border-radius: 3px;
  border: 1px solid var(--rule-soft);
}

/* ============================================================ Callouts / boxes */

.box {
  border: 1px solid var(--rule);
  border-radius: 6px;
  padding: 16px 18px;
  margin: 18px 0;
  background: var(--bg-elev);
}
.box-label {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  font-weight: 700;
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.box-label::before {
  content: "";
  width: 14px;
  height: 1px;
  background: currentColor;
}

.box-formula  { background: var(--accent-soft); border-color: color-mix(in oklab, var(--accent) 30%, transparent); }
.box-formula .box-label { color: var(--accent-ink); }
.box-warn     { background: var(--warn-soft); border-color: color-mix(in oklab, var(--warn) 30%, transparent); }
.box-warn .box-label { color: var(--warn); }
.box-tip      { background: var(--ok-soft); border-color: color-mix(in oklab, var(--ok) 30%, transparent); }
.box-tip .box-label { color: var(--ok); }
.box-mistake  { background: var(--danger-soft); border-color: color-mix(in oklab, var(--danger) 30%, transparent); }
.box-mistake .box-label { color: var(--danger); }
.box-example  { background: var(--bg-sunken); }
.box-example .box-label { color: var(--ink-soft); }

.box .katex { font-size: 1.05em; }
.box p:last-child { margin-bottom: 0; }

/* ============================================================ Formula card */

.formula-card {
  display: grid;
  grid-template-columns: 80px 1fr;
  gap: 18px;
  align-items: center;
  border: 1px solid var(--rule);
  border-left: 3px solid var(--accent);
  background: var(--bg-elev);
  padding: 16px 20px;
  margin: 16px 0;
  border-radius: 0 5px 5px 0;
}
.formula-card .num {
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.1em;
  color: var(--ink-mute);
}
.formula-card .body { font-size: 14px; color: var(--ink-soft); line-height: 1.6; min-width: 0; }
.formula-card .body strong { color: var(--ink); display: block; font-size: 13px; margin-bottom: 4px; font-family: var(--font-sans); }
.formula-card .eq { font-size: 1.15em; margin: 6px 0; }

/* ============================================================ Tables */

.table-wrap { overflow-x: auto; margin: 16px 0; }
table.data {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
}
table.data th, table.data td {
  border: 1px solid var(--rule);
  padding: 8px 12px;
  text-align: left;
  vertical-align: top;
}
table.data th {
  background: var(--bg-sunken);
  font-weight: 700;
  font-size: 12px;
  letter-spacing: 0.02em;
}
table.data td.num, table.data th.num { font-family: var(--font-mono); text-align: right; }
table.data tr:nth-child(even) td { background: color-mix(in oklab, var(--bg-sunken) 50%, transparent); }
table.data caption {
  caption-side: top;
  text-align: left;
  font-size: 12px;
  font-weight: 600;
  margin-bottom: 6px;
  color: var(--ink-soft);
}
/* data-table は data の別名（JSX側で className="data-table" を統一使用） */
table.data-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
}
table.data-table th, table.data-table td {
  border: 1px solid var(--rule);
  padding: 8px 12px;
  text-align: left;
  vertical-align: top;
}
table.data-table th {
  background: var(--bg-sunken);
  font-weight: 700;
  font-size: 12px;
  letter-spacing: 0.02em;
}
table.data-table td.num, table.data-table th.num { font-family: var(--font-mono); text-align: right; }
table.data-table tr:nth-child(even) td { background: color-mix(in oklab, var(--bg-sunken) 50%, transparent); }

/* ============================================================ TOC (right rail) */

.toc {
  position: sticky;
  top: 0;
  height: 100vh;
  padding: 36px 22px 36px 8px;
  border-left: 1px solid var(--rule);
  font-size: 12px;
  overflow-y: auto;
}
.toc-label {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--ink-mute);
  margin-bottom: 10px;
  font-weight: 700;
}
.toc ul { list-style: none; padding: 0; margin: 0; }
.toc li { margin: 0; }
.toc a {
  display: block;
  padding: 4px 10px;
  border-left: 2px solid var(--rule-soft);
  color: var(--ink-mute);
  font-size: 12px;
  line-height: 1.5;
  transition: all 0.12s;
}
.toc a:hover { color: var(--ink); border-color: var(--ink-mute); text-decoration: none; }
.toc a.active { color: var(--accent-ink); border-color: var(--accent); font-weight: 600; }
.toc li.h3 a { padding-left: 22px; font-size: 11px; }

/* ============================================================ Difficulty badges & filter */

.diff-badge {
  display: inline-block;
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.05em;
  padding: 1px 6px;
  border-radius: 3px;
  font-weight: 700;
  vertical-align: middle;
  margin-left: 6px;
}
.diff-basic    { background: var(--ok-soft);     color: var(--ok); }
.diff-standard { background: var(--accent-soft); color: var(--accent-ink); }
.diff-advanced { background: var(--warn-soft);   color: var(--warn); }

[data-difficulty="basic"]    .diff-only-standard,
[data-difficulty="basic"]    .diff-only-advanced,
[data-difficulty="standard"] .diff-only-advanced {
  display: none !important;
}

/* ============================================================ Cards on home */

.card-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 14px;
  margin: 22px 0 32px;
}

.card {
  background: var(--bg-elev);
  border: 1px solid var(--rule);
  border-radius: 6px;
  padding: 16px 18px;
  cursor: pointer;
  transition: all 0.15s;
  display: flex;
  flex-direction: column;
  min-height: 120px;
}
.card:hover {
  border-color: var(--accent);
  transform: translateY(-1px);
  box-shadow: 0 6px 18px -10px color-mix(in oklab, var(--accent) 60%, transparent);
}
.card-num {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.12em;
  color: var(--ink-mute);
  margin-bottom: 4px;
}
.card-title {
  font-family: var(--font-serif);
  font-size: 17px;
  font-weight: 600;
  color: var(--ink);
  margin-bottom: 6px;
  line-height: 1.3;
}
.card-deck { font-size: 12px; color: var(--ink-soft); line-height: 1.55; flex-grow: 1; }
.card-foot {
  margin-top: 10px;
  padding-top: 8px;
  border-top: 1px solid var(--rule-soft);
  display: flex;
  align-items: center;
  justify-content: space-between;
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--ink-mute);
  letter-spacing: 0.05em;
}
.card-freq { color: var(--accent); font-weight: 700; }

/* ============================================================ Cable field guide (図鑑) */
.cbl-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(232px, 1fr)); gap: 14px; margin: 18px 0 26px; }
.cbl-card { background: var(--bg-elev); border: 1px solid var(--rule); border-radius: 8px; overflow: hidden; display: flex; flex-direction: column; }
.cbl-photo { background: var(--bg-sunken); border-bottom: 1px solid var(--rule-soft); line-height: 0; }
.cbl-photo img { width: 100%; height: auto; display: block; }
.cbl-body { padding: 11px 13px 13px; display: flex; flex-direction: column; gap: 7px; }
.cbl-head { display: flex; align-items: baseline; gap: 7px; flex-wrap: wrap; }
.cbl-no { font-family: var(--font-mono); font-size: 11px; font-weight: 700; color: var(--accent-ink); background: var(--accent-soft); border-radius: 4px; padding: 1px 7px; line-height: 1.6; }
.cbl-name { font-family: var(--font-serif); font-size: 15.5px; font-weight: 700; color: var(--ink); }
.cbl-sub { font-size: 11px; color: var(--ink-mute); line-height: 1.4; }
.cbl-facts { list-style: none; margin: 0; padding: 0; display: flex; flex-direction: column; gap: 4px; }
.cbl-facts li { font-size: 12.5px; color: var(--ink-soft); line-height: 1.5; display: flex; gap: 8px; }
.cbl-facts li > span { flex: 0 0 34px; font-size: 10px; font-weight: 700; color: var(--ink-mute); padding-top: 2px; letter-spacing: 0.02em; }
.cbl-facts li b { color: var(--accent-ink); font-weight: 700; }
.cbl-key { margin-top: 1px; font-size: 11.5px; color: var(--ink-soft); background: var(--bg-sunken); border-left: 3px solid var(--accent); border-radius: 0 4px 4px 0; padding: 6px 9px; line-height: 1.5; }

/* ============================================================ Stat strip (home) */

.stat-strip {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 0;
  border: 1px solid var(--rule);
  border-radius: 6px;
  background: var(--bg-elev);
  margin: 18px 0 28px;
  overflow: hidden;
}
@media (max-width: 720px) { .stat-strip { grid-template-columns: repeat(2, 1fr); } }
.stat {
  padding: 14px 18px;
  border-right: 1px solid var(--rule);
}
.stat:last-child { border-right: 0; }
.stat-label {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--ink-mute);
  margin-bottom: 4px;
}
.stat-value {
  font-family: var(--font-serif);
  font-size: 22px;
  font-weight: 700;
  line-height: 1;
  color: var(--ink);
}
.stat-sub { font-size: 11px; color: var(--ink-mute); margin-top: 4px; }

/* ============================================================ Frequency chart */

.freq-chart {
  display: grid;
  grid-template-columns: 100px 1fr 60px;
  gap: 10px;
  align-items: center;
  font-size: 12px;
  margin: 4px 0;
}
.freq-chart .label { color: var(--ink-soft); font-weight: 500; }
.freq-chart .bar { background: var(--bg-sunken); height: 18px; border-radius: 2px; overflow: hidden; }
.freq-chart .bar-fill {
  height: 100%;
  background: var(--accent);
  display: flex;
  align-items: center;
  padding: 0 6px;
  color: var(--bg);
  font-family: var(--font-mono);
  font-size: 10px;
  font-weight: 700;
}
.freq-chart .pct { font-family: var(--font-mono); color: var(--ink-mute); font-size: 11px; text-align: right; }

/* ============================================================ Diagrams */

.diagram {
  background: var(--bg-elev);
  border: 1px solid var(--rule);
  border-radius: 6px;
  padding: 18px;
  margin: 18px 0;
  text-align: center;
}
.diagram svg { max-width: 100%; height: auto; }
.diagram-caption {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--ink-mute);
  margin-top: 10px;
  letter-spacing: 0.04em;
}

.diagram-stroke    { stroke: var(--ink); }
.diagram-fill      { fill: var(--ink); }
.diagram-stroke-soft { stroke: var(--ink-mute); }
.diagram-fill-soft { fill: var(--ink-mute); }
.diagram-fill-bg   { fill: var(--bg-elev); }
.diagram-accent    { stroke: var(--accent); fill: var(--accent); }
.diagram-warn      { stroke: var(--warn); fill: var(--warn); }
.diagram-text      { fill: var(--ink); font-family: var(--font-sans); font-size: 11px; }
.diagram-text-mono { fill: var(--ink-soft); font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.04em; }

/* ============================================================ Past-question rows */

.past-q-row {
  display: grid;
  grid-template-columns: 70px 1fr 90px;
  gap: 14px;
  padding: 10px 12px;
  border-bottom: 1px solid var(--rule-soft);
  font-size: 13px;
  align-items: baseline;
}
.past-q-row:last-child { border-bottom: 0; }
.past-q-row:hover { background: var(--bg-sunken); }
.past-q-year {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--ink-mute);
  letter-spacing: 0.04em;
}
.past-q-topic { color: var(--ink); }
.past-q-tag {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--ink-soft);
  text-align: right;
  letter-spacing: 0.04em;
}

/* ============================================================ Pagination footer */

.page-nav {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-top: 64px;
  padding-top: 24px;
  border-top: 1px solid var(--rule);
}
.page-nav-link {
  display: block;
  padding: 14px 18px;
  border: 1px solid var(--rule);
  border-radius: 5px;
  background: var(--bg-elev);
  cursor: pointer;
  transition: all 0.15s;
  text-decoration: none !important;
}
.page-nav-link:hover { border-color: var(--accent); }
.page-nav-link.next { text-align: right; }
.page-nav-dir {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--ink-mute);
  margin-bottom: 4px;
}
.page-nav-title {
  font-family: var(--font-serif);
  font-size: 15px;
  font-weight: 600;
  color: var(--ink);
}

/* ============================================================ Glossary */

.glossary-toolbar {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin: 18px 0;
}
.glossary-toolbar button {
  font-family: var(--font-mono);
  font-size: 11px;
  padding: 4px 10px;
  border: 1px solid var(--rule);
  background: var(--bg-elev);
  color: var(--ink-soft);
  border-radius: 3px;
  cursor: pointer;
  letter-spacing: 0.05em;
}
.glossary-toolbar button:hover { color: var(--ink); border-color: var(--ink-mute); }
.glossary-toolbar button.active { background: var(--accent); color: var(--bg); border-color: var(--accent); }

.glossary-section { margin-bottom: 24px; }
.glossary-section h3 {
  font-family: var(--font-mono);
  font-size: 14px;
  letter-spacing: 0.1em;
  color: var(--accent);
  border-bottom: 1px solid var(--rule);
  padding-bottom: 4px;
  margin: 16px 0 10px;
}
.glossary-entry {
  display: grid;
  grid-template-columns: 200px 1fr;
  gap: 16px;
  padding: 8px 4px;
  border-bottom: 1px solid var(--rule-soft);
  font-size: 13px;
  line-height: 1.6;
}
.glossary-term { font-weight: 600; color: var(--ink); }
.glossary-reading { font-size: 11px; color: var(--ink-mute); font-family: var(--font-mono); margin-top: 2px; }
.glossary-def { color: var(--ink-soft); }
@media (max-width: 720px) {
  .glossary-entry { grid-template-columns: 1fr; gap: 4px; }
}

/* ============================================================ KaTeX overrides */

.katex { font-size: 1em; }
.katex-display-wrap { display: block; }
.katex-display { margin: 8px 0; overflow-x: auto; overflow-y: hidden; }

/* ============================================================ Mobile toggle */

.mobile-menu-btn {
  display: none;
  position: fixed;
  bottom: 20px;
  right: 20px;
  width: 48px;
  height: 48px;
  border-radius: 50%;
  background: var(--ink);
  color: var(--bg);
  border: 0;
  z-index: 50;
  cursor: pointer;
  box-shadow: 0 4px 14px -2px oklch(0.2 0.02 260 / 0.4);
}
@media (max-width: 760px) {
  .mobile-menu-btn { display: grid; place-items: center; }
  .sidebar.mobile-open {
    display: block;
    position: fixed;
    inset: 0;
    z-index: 100;
    width: 100%;
    height: 100%;
  }
}

/* Scrollbar */
::-webkit-scrollbar { width: 10px; height: 10px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--rule); border-radius: 5px; border: 2px solid var(--bg); }
::-webkit-scrollbar-thumb:hover { background: var(--ink-mute); }

<script type="text/babel">
/* tweaks-panel.jsx */

// tweaks-panel.jsx
// Reusable Tweaks shell + form-control helpers.
//
// Owns the host protocol (listens for __activate_edit_mode / __deactivate_edit_mode,
// posts __edit_mode_available / __edit_mode_set_keys / __edit_mode_dismissed) so
// individual prototypes don't re-roll it. Ships a consistent set of controls so you
// don't hand-draw <input type="range">, segmented radios, steppers, etc.
//
// Usage (in an HTML file that loads React + Babel):
//
//   const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
//     "primaryColor": "#D97757",
//     "fontSize": 16,
//     "density": "regular",
//     "dark": false
//   }/*EDITMODE-END*/;
//
//   function App() {
//     const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
//     return (
//       <div style={{ fontSize: t.fontSize, color: t.primaryColor }}>
//         Hello
//         <TweaksPanel>
//           <TweakSection label="Typography" />
//           <TweakSlider label="Font size" value={t.fontSize} min={10} max={32} unit="px"
//                        onChange={(v) => setTweak('fontSize', v)} />
//           <TweakRadio  label="Density" value={t.density}
//                        options={['compact', 'regular', 'comfy']}
//                        onChange={(v) => setTweak('density', v)} />
//           <TweakSection label="Theme" />
//           <TweakColor  label="Primary" value={t.primaryColor}
//                        onChange={(v) => setTweak('primaryColor', v)} />
//           <TweakToggle label="Dark mode" value={t.dark}
//                        onChange={(v) => setTweak('dark', v)} />
//         </TweaksPanel>
//       </div>
//     );
//   }
//
// ─────────────────────────────────────────────────────────────────────────────

const __TWEAKS_STYLE = `
  .twk-panel{position:fixed;right:16px;bottom:16px;z-index:2147483646;width:280px;
    max-height:calc(100vh - 32px);display:flex;flex-direction:column;
    background:rgba(250,249,247,.78);color:#29261b;
    -webkit-backdrop-filter:blur(24px) saturate(160%);backdrop-filter:blur(24px) saturate(160%);
    border:.5px solid rgba(255,255,255,.6);border-radius:14px;
    box-shadow:0 1px 0 rgba(255,255,255,.5) inset,0 12px 40px rgba(0,0,0,.18);
    font:11.5px/1.4 ui-sans-serif,system-ui,-apple-system,sans-serif;overflow:hidden}
  .twk-hd{display:flex;align-items:center;justify-content:space-between;
    padding:10px 8px 10px 14px;cursor:move;user-select:none}
  .twk-hd b{font-size:12px;font-weight:600;letter-spacing:.01em}
  .twk-x{appearance:none;border:0;background:transparent;color:rgba(41,38,27,.55);
    width:22px;height:22px;border-radius:6px;cursor:default;font-size:13px;line-height:1}
  .twk-x:hover{background:rgba(0,0,0,.06);color:#29261b}
  .twk-body{padding:2px 14px 14px;display:flex;flex-direction:column;gap:10px;
    overflow-y:auto;overflow-x:hidden;min-height:0;
    scrollbar-width:thin;scrollbar-color:rgba(0,0,0,.15) transparent}
  .twk-body::-webkit-scrollbar{width:8px}
  .twk-body::-webkit-scrollbar-track{background:transparent;margin:2px}
  .twk-body::-webkit-scrollbar-thumb{background:rgba(0,0,0,.15);border-radius:4px;
    border:2px solid transparent;background-clip:content-box}
  .twk-body::-webkit-scrollbar-thumb:hover{background:rgba(0,0,0,.25);
    border:2px solid transparent;background-clip:content-box}
  .twk-row{display:flex;flex-direction:column;gap:5px}
  .twk-row-h{flex-direction:row;align-items:center;justify-content:space-between;gap:10px}
  .twk-lbl{display:flex;justify-content:space-between;align-items:baseline;
    color:rgba(41,38,27,.72)}
  .twk-lbl>span:first-child{font-weight:500}
  .twk-val{color:rgba(41,38,27,.5);font-variant-numeric:tabular-nums}

  .twk-sect{font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;
    color:rgba(41,38,27,.45);padding:10px 0 0}
  .twk-sect:first-child{padding-top:0}

  .twk-field{appearance:none;width:100%;height:26px;padding:0 8px;
    border:.5px solid rgba(0,0,0,.1);border-radius:7px;
    background:rgba(255,255,255,.6);color:inherit;font:inherit;outline:none}
  .twk-field:focus{border-color:rgba(0,0,0,.25);background:rgba(255,255,255,.85)}
  select.twk-field{padding-right:22px;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6' viewBox='0 0 10 6'><path fill='rgba(0,0,0,.5)' d='M0 0h10L5 6z'/></svg>");
    background-repeat:no-repeat;background-position:right 8px center}

  .twk-slider{appearance:none;-webkit-appearance:none;width:100%;height:4px;margin:6px 0;
    border-radius:999px;background:rgba(0,0,0,.12);outline:none}
  .twk-slider::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;
    width:14px;height:14px;border-radius:50%;background:#fff;
    border:.5px solid rgba(0,0,0,.12);box-shadow:0 1px 3px rgba(0,0,0,.2);cursor:default}
  .twk-slider::-moz-range-thumb{width:14px;height:14px;border-radius:50%;
    background:#fff;border:.5px solid rgba(0,0,0,.12);box-shadow:0 1px 3px rgba(0,0,0,.2);cursor:default}

  .twk-seg{position:relative;display:flex;padding:2px;border-radius:8px;
    background:rgba(0,0,0,.06);user-select:none}
  .twk-seg-thumb{position:absolute;top:2px;bottom:2px;border-radius:6px;
    background:rgba(255,255,255,.9);box-shadow:0 1px 2px rgba(0,0,0,.12);

// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel"
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">{children}</div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

function TweakColor({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <input type="color" className="twk-swatch" value={value}
             onChange={(e) => onChange(e.target.value)} />
    </div>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});

          <li><strong>100Vと200Vの両方が取れる</strong>：外線–中性線間＝100V（電灯）、外線–外線間＝200V（エアコン・IH等）。</li>
          <li><strong>平衡時は中性線電流ゼロ</strong>：両外線の負荷が等しければ中性線に電流が流れず、電圧降下・損失とも小さい（係数1）。同一電力・同一損失なら電線量は単相2線式の約3/8で済む。</li>
          <li><strong>不平衡はバランサで解消</strong>：巻数比1:1の単巻変圧器（バランサ）を末端の両外線間に接続すると、負荷不平衡でも両外線電流が均等化され、中性線電流・電圧不平衡が減る。</li>
          <li><strong>中性線の欠相（断線）が最大の弱点</strong>：欠相すると2つの100V負荷が200Vに直列接続された形になり、<strong>軽負荷側の電圧が異常上昇して機器を焼損</strong>する。だから中性線には過電流遮断器を（単独で）施設してはならない（法規と横断の急所）。</li>
        </ul>
      </Box>

      <h2 id="shihyo"><span className="h-num">3.</span>負荷の指標（需要率・負荷率・不等率）</h2>
      <div className="table-wrap"><table className="data">
        <thead><tr><th>指標</th><th>定義</th><th>値の範囲</th><th>意味</th></tr></thead>
        <tbody>
          <tr><td><strong>需要率</strong></td><td>最大需要電力 / 設備容量 × 100</td><td>0〜100%</td><td>設備がどれだけフル稼働に近いか</td></tr>
          <tr><td><strong>負荷率</strong></td><td>平均需要電力 / 最大需要電力 × 100</td><td>0〜100%</td><td>高いほど設備利用効率が良い</td></tr>
          <tr><td><strong>不等率</strong></td><td>Σ(各需要家の最大需要) / 合成最大需要</td><td><strong>1以上</strong></td><td>同時性が低いほど大きい＝設備節減効果</td></tr>
        </tbody>
      </table></div>
      <Box kind="warn" label="不等率は「1以上」— 1以下と思い込む引っかけ">
        <p>各需要家の最大需要は同時刻に発生しない（A工場は朝、C家庭は夕方など時間帯がずれる）。よって合成最大は「各最大の単純な和」より必ず小さくなり、<Eq tex="\text{不等率} = \dfrac{\sum (\text{各最大})}{\text{合成最大}} \geq 1" /> となる。「率」から100%以下と誤解しやすいが、不等率だけは1以上。分子と分母を逆にする誤りも頻出。</p>
      </Box>

      <h2 id="formula"><span className="h-num">4.</span>公式マップ（最重要）</h2>
      <p>方式で電圧降下の係数が変わる。<strong>単相2線=2 / 単相3線=1 / 三相3線=√3</strong> を取り違えないこと。</p>
      <FormulaCard num="01" name="電圧降下（単相2線式）" eq="\Delta V = 2I(R\cos\theta + X\sin\theta)\,[\text{V}]"
        note="電流が往路・復路の2本を流れ、各線で R cosθ + X sinθ の降下が生じるため2倍。" />
      <FormulaCard num="02" name="電圧降下（三相3線式）" eq="\Delta V = \sqrt{3}\,I(R\cos\theta + X\sin\theta)\,[\text{V}]"
        note="相電圧基準の降下 I(Rcosθ+Xsinθ) を、線間電圧基準に換算すると √3 倍。" />
      <FormulaCard num="03" name="電力損失（三相3線式）" eq="P_{\text{loss}} = 3I^2R\,[\text{W}]"
        note="3本の線それぞれに I が流れ、1本あたり I²R。力率が低いと同じ電力でも I が増え、損失は2乗で増える。" />
      <FormulaCard num="04" name="力率改善のコンデンサ容量" eq="Q_c = P(\tan\phi_1 - \tan\phi_2)\,[\text{kvar}]"
        note="有効電力 P は不変。無効電力の差 Q1−Q2 = P(tanφ1−tanφ2) をコンデンサで補償する。" />
      <FormulaCard num="05" name="力率改善後の損失軽減率" eq="1 - \left(\dfrac{\cos\phi_1}{\cos\phi_2}\right)^2"
        note="電流が cosφ1/cosφ2 倍に減り、損失は電流の2乗。力率0.8→1.0で損失は0.64倍（36%減）。" />
      <Box kind="example" label="力率改善が「電流削減」である理由">
        <p>同じ有効電力 P を送るとき線電流は <Eq tex="I = \dfrac{P}{\sqrt{3}\,V\cos\phi}" />。力率が上がると電流が減り、<strong>(1)</strong> 電圧降下 <Eq tex="\sqrt{3}\,I(R\cos\theta+X\sin\theta)" /> が減少、<strong>(2)</strong> 電力損失 <Eq tex="3I^2R" /> が電流の2乗で減少、<strong>(3)</strong> 線路容量に余裕が生まれる。「コンデンサ→電圧上昇」は結果であって、主効果は電流削減。</p>
      </Box>

      <h2 id="kaiho"><span className="h-num">5.</span>解法パターン</h2>
      <Box kind="tip" label="① 電圧降下の計算">
        <ol>
          <li>方式（単相2線／単相3線／三相3線）を確認して係数を選ぶ（2／1／√3）</li>
          <li><Eq tex="\sin\theta = \sqrt{1-\cos^2\theta}" /> を求める</li>
          <li>該当公式に代入</li>
        </ol>
      </Box>
      <Box kind="tip" label="② 力率改善のコンデンサ容量">
        <ol>
          <li><Eq tex="\tan\phi = \dfrac{\sin\phi}{\cos\phi}" /> を改善前・改善後それぞれ計算</li>
          <li><Eq tex="Q_c = P(\tan\phi_1 - \tan\phi_2)" /> [kvar]</li>
          <li><Eq tex="Q_c > 0" /> になることを確認（改善後の力率角は小さい）</li>
        </ol>
      </Box>

      <h2 id="trap"><span className="h-num">6.</span>引っかけ・誤答ポイント</h2>
      <Box kind="warn" label="頻出の3トラップ">
        <ul>
          <li><strong>「配電線」=三相3線と即断</strong> — 低圧配電（100/200V）には単相2線・単相3線が多い。問題文の方式を必ず確認してから係数を選ぶ。</li>
          <li><strong>単相2線の電圧降下を三相より小さいと誤認</strong> — 往復2本分で係数2倍。同条件なら単相2線の方が大きい。</li>
          <li><strong>力率改善の主効果を「電圧上昇」と誤解</strong> — 本質は電流削減。電圧改善・損失低減はその結果。</li>
        </ul>
      </Box>

      <h2 id="seigo"><span className="h-num">7.</span>正誤判定の急所</h2>
      <div className="table-wrap"><table className="data">
        <thead><tr><th>命題</th><th>判定</th><th>理由</th></tr></thead>
        <tbody>
          <tr><td>不等率は常に1以下である</td><td><strong>誤</strong></td><td>Σ各最大 / 合成最大 ≥ 1</td></tr>
          <tr><td>進相コンデンサ設置で線路電流が減少する</td><td><strong>正</strong></td><td>無効電流を補償し有効電流のみに</td></tr>
          <tr><td>スポットネットワーク方式は供給信頼性が高い</td><td><strong>正</strong></td><td>複数回線並列で1回線停電でも無停電</td></tr>
          <tr><td>単相2線式の電圧降下は三相3線式より小さい</td><td><strong>誤</strong></td><td>往復2本分で係数2倍・大きい</td></tr>
          <tr><td>需要率が100%に近いほど設備に余裕がない</td><td><strong>正</strong></td><td>設備容量いっぱいの最大需要が発生</td></tr>
          <tr><td>力率改善で電力損失は力率の2乗に反比例して減る</td><td><strong>正</strong></td><td>Ploss ∝ I² ∝ (1/cosφ)²</td></tr>
        </tbody>
      </table></div>

      <h2 id="kakomon"><span className="h-num">8.</span>出題実績（約85問・科目最多）</h2>
      <p>計算・論説・穴埋めのすべてで出題。特に電圧降下・力率改善の計算は毎年のように問われる。</p>
      <div className="table-wrap"><table className="data">
        <thead><tr><th>年度</th><th>問</th><th>テーマ</th><th>形式</th></tr></thead>
        <tbody>
          <tr><td>R07下</td><td>問16</td><td>配電線の電圧降下と負荷電力の関係</td><td>計算</td></tr>
          <tr><td>R07下</td><td>問17</td><td>力率の異なる負荷接続時の線路電流と電圧降下</td><td>計算</td></tr>
          <tr><td>R07上</td><td>問13</td><td>力率変化に伴う配電線の負荷電力の変化</td><td>計算</td></tr>
          <tr><td>R06上</td><td>問17</td><td>三相3線式ループ配電線路の電圧降下</td><td>計算</td></tr>

        <p>R07でも計算問題が複数（問16・問17）。力率改善・電圧降下の計算は継続が濃厚。論説はスポットネットワーク／バンキング方式の比較、分散型電源の配電系統連系が有力。</p>

      <h2 id="intro"><span className="h-num">1.</span>直感的理解</h2>
      <p>自家用受電設備の地絡保護の本質は、<strong>構内の地絡を検出して受電用遮断器を切る</strong>だけでなく、<strong>自分の事故を電力会社の配電系統に波及させない（もらい事故を起こさない・受けない）</strong>ことにある。高圧受電（6.6 kV）する需要家では、この2つを両立させる保護方式が求められる。</p>
      <Box kind="tip" label="地絡保護の骨格（この流れで押さえる）">
        <p>配電線 6.6 kV →&nbsp;<strong>PAS（区分開閉器）</strong>&nbsp;→ 構内引込（高圧 CVT ケーブル）→&nbsp;<strong>受電用 VCB</strong>&nbsp;→ 変圧器 → 低圧負荷。地絡検出は&nbsp;<strong>ZCT（零相電流 I₀）</strong>&nbsp;と&nbsp;<strong>EVT（零相電圧 V₀）</strong>&nbsp;で行い、<strong>DGR</strong>&nbsp;が方向を判定して PAS・VCB を切る。</p>
      </Box>
      <Box kind="warn" label="なぜ単純な GR では足りないのか（因果理解）">
        <p>高圧受電では構内に高圧ケーブル（CVT 等）が引き回される。ケーブルは&nbsp;<strong>対地静電容量が大きい</strong>&nbsp;ため、<strong>構外（系統側）の地絡</strong>&nbsp;が起きると、その零相電圧を受けて構内ケーブルの対地静電容量を通る&nbsp;<strong>充電電流</strong>&nbsp;が ZCT に流れる。大きさだけを見る GR（地絡過電流継電器）はこれを「構内地絡」と誤認し、<strong>健全な自家用設備が不必要に遮断される（もらい事故）</strong>。これを防ぐため、電流の大きさに加え&nbsp;<strong>位相（方向）</strong>&nbsp;を判定する DGR で「電流が構内へ向かうか／系統へ向かうか」を仕分ける。</p>
      </Box>
      <Box kind="example" label="5秒で思い出す">
        <p>GR は大きさだけ → ケーブルの充電電流で&nbsp;<strong>もらい事故</strong>。DGR は大きさ＋方向 → 構外地絡では不動作で&nbsp;<strong>波及・もらいを防ぐ</strong>。</p>
      </Box>

      <h2 id="setsubi"><span className="h-num">2.</span>設備を歩く（地絡保護の骨格）</h2>
      <Box kind="tip" label="高圧受電設備の主要機器">
        <ul>
          <li><strong>PAS（区分開閉器）</strong> — 電柱上の引込口に設置。GR 付 PAS／DGR 付 PAS とし、構内地絡時に自動で開放して系統への波及を防ぐ。PAS は遮断器ではないが、通常の6.6kV非接地系の地絡電流は短絡電流より十分小さく PAS の地絡遮断定格内のため<strong>地絡時は検出後ただちに開放できる（G動作）</strong>。開放できないのは<strong>短絡電流</strong>で、過電流を検出したら開放せずロック（蓄勢）し、<strong>配電用変電所の遮断器が動作して高圧側が停電（制御電源喪失）してから開放する（SO動作）</strong>。地絡と過電流が同時に発生した場合も SO動作が優先する。この2つを合わせて SOG 動作という。</li>
          <li><strong>ZCT（零相変流器）</strong> — 三相一括で鉄心を通し、零相電流 I₀（地絡電流相当）を検出。</li>
          <li><strong>EVT／ZPD（接地形計器用変圧器・零相電圧検出器）</strong> — 零相電圧 V₀ を検出。DGR の方向判定の基準位相を与える。</li>
          <li><strong>VCB（真空遮断器）</strong> — 受電用遮断器。継電器の指令で実際に電流を遮断する実行側。</li>
        </ul>
      </Box>
      <Box kind="warn" label="GR と DGR の入力の違い（見分けの第一歩）">
        <p><strong>GR（地絡過電流継電器）＝ ZCT のみ</strong>（I₀ の大きさだけ）。<strong>DGR（地絡方向継電器）＝ ZCT ＋ EVT</strong>（I₀ の大きさ ＋ V₀ との位相関係）。<strong>EVT が付くか付かないか</strong>が GR と DGR の見分けの第一歩。DGR は「① I₀ が整定値以上」かつ「② V₀ に対する I₀ の位相が構内方向」の両方を満たすときトリップする。</p>
      </Box>

      <h2 id="gr-dgr"><span className="h-num">3.</span>GR と DGR の比較表（最重要）</h2>
      <div className="table-wrap"><table className="data">
        <thead><tr><th>項目</th><th>GR（地絡継電器）</th><th>DGR（地絡方向継電器・67G）</th></tr></thead>
        <tbody>
          <tr><td><strong>入力センサー</strong></td><td>ZCT のみ</td><td>ZCT ＋ EVT／ZPD</td></tr>
          <tr><td><strong>判定要素</strong></td><td>零相電流 I₀ の大きさだけ</td><td>I₀ の大きさ ＋ 位相（方向）</td></tr>
          <tr><td><strong>構外地絡（系統側）</strong></td><td>ケーブル充電電流で誤動作しうる</td><td>不動作（電流が構外方向と判定）</td></tr>
          <tr><td><strong>構内地絡</strong></td><td>動作</td><td>動作</td></tr>
          <tr><td><strong>もらい事故防止</strong></td><td>×（できない）</td><td>○（方向判定で防ぐ）</td></tr>
          <tr><td><strong>適用</strong></td><td>構内ケーブルが短い小規模設備</td><td>ケーブルこう長が長い／対地静電容量が大きい設備</td></tr>
          <tr><td><strong>コスト</strong></td><td>安い（EVT 不要）</td><td>高い（EVT／ZPD が必要）</td></tr>
        </tbody>
      </table></div>
      <Box kind="warn" label="出題の核心：なぜ DGR が必要か">
        <p>「構内の高圧ケーブルが長い（対地静電容量が大きい）ほど、構外地絡時に GR が誤動作しやすい」→ だから&nbsp;<strong>方向判定する DGR</strong>&nbsp;を用いる、という因果が穴埋・論説の頻出論点。</p>
      </Box>

      <h2 id="morai"><span className="h-num">4.</span>もらい事故（波及事故）のメカニズム</h2>
      <Box kind="example" label="構外地絡時に GR が誤動作する流れ">
        <ol>
          <li>構外（他需要家・系統側）で1線地絡が発生 → 系統全体に零相電圧 V₀ が生じる</li>
          <li>V₀ により、自分の構内ケーブルの対地静電容量へ充電電流が流れる</li>
          <li>この充電電流（零相分）が ZCT を通過し、GR が I₀ を検出</li>
          <li>GR は大きさだけを見て「構内地絡」と誤認 → 不要動作（もらい事故）</li>
        </ol>
      </Box>
      <Box kind="warn" label="もらい事故の正体">
        <p>自分の構内では地絡が起きていないのに、<strong>他者・系統側の地絡が作る零相電圧</strong>&nbsp;によって、<strong>自分のケーブルの対地静電容量を流れる充電電流</strong>&nbsp;を GR が拾ってしまう現象。構内ケーブルが長い（C 大）ほど充電電流が大きく、誤動作しやすい。</p>
      </Box>
      <p>DGR がもらい事故を防ぐのは、電流の&nbsp;<strong>向き（位相）</strong>&nbsp;で構内地絡と構外地絡を仕分けられるから。</p>
      <div className="table-wrap"><table className="data">
        <thead><tr><th>地絡の場所</th><th>I₀ の向き（V₀ 基準）</th><th>DGR の判定</th></tr></thead>
        <tbody>
          <tr><td><strong>構内地絡</strong></td><td>系統 → 構内（地絡点）へ電流が向かう</td><td><strong>動作</strong>（トリップ）</td></tr>
          <tr><td><strong>構外地絡</strong></td><td>構内（ケーブル C）→ 系統へ充電電流が向かう</td><td><strong>不動作</strong></td></tr>
        </tbody>
      </table></div>
      <p>構外地絡では電流の向きが「構外向き（充電電流）」になるため、位相で除外できる。これが DGR がもらい事故を防ぐ原理。</p>

      <h2 id="formula"><span className="h-num">5.</span>公式マップ</h2>
      <FormulaCard num="01" name="対地静電容量に流れる地絡電流（容量分）" eq="I_{gc} = 2\pi f\, C_3\, E \,[\text{A}]"
        note="C₃＝3線一括の対地静電容量[F]、E＝事故前の対地電圧（相電圧 V/√3）。1線地絡で健全相の対地電圧が上昇し、各相の対地静電容量を通じて充電電流が大地へ流れる。充電電流 ωCV と同型で、ケーブルの C が大きいほど大きい。" />
      <FormulaCard num="02" name="1線地絡電流（抵抗分と容量分のベクトル合成）" eq="I_g = \sqrt{I_{gr}^2 + I_{gc}^2} \,[\text{A}]"
        note="非接地系（高圧配電）では、抵抗分 I_gr（EVT の制限抵抗・地絡抵抗を流れる成分）と容量分 I_gc（対地静電容量を流れる成分）のベクトル和。" />
      <FormulaCard num="03" name="地絡電流の位相（零相電圧 V₀ に対する進み角）" eq="\theta = \tan^{-1}\!\left(\dfrac{I_{gc}}{I_{gr}}\right)"
        note="抵抗分 I_gr が容量分 I_gc より十分大きいと位相 θ は小さく、DGR の方向判定が安定する。EVT 二次に制限抵抗を入れて抵抗分を確保するのは、位相を安定させ DGR を確実に動作させるため。" />
      <FormulaCard num="04" name="ケーブル1条あたりの対地静電容量（同軸近似）" eq="C = \dfrac{2\pi\varepsilon}{\ln(D/d)} \,[\text{F/m}]"
        note="D＝遮へい層（外側電極）径、d＝導体径。高圧ケーブルは D/d が小さく C が大きい → 地絡電流（容量分）が大きい。地中送電のケーブル静電容量と同じ帰結。" />
      <Box kind="tip" label="なぜ高圧ケーブルで地絡電流が大きいか（地中送電からの帰結）">
        <p>高圧ケーブル（CVT 等）は導体と遮へい層の距離が数 mm と非常に近く、対地静電容量が架空電線に比べ桁違いに大きい。したがって構内ケーブルが長いほど、対地静電容量に流れる地絡電流（充電電流分）が大きくなり、もらい事故のリスクが上がる。</p>
      </Box>

      <h2 id="cvt-earth"><span className="h-num">6.</span>CVT 遮へい銅テープの接地と ZCT の関係（実務頻出）</h2>
      <Box kind="warn" label="最頻出ミス：接地線を ZCT に通すか通さないか">
        <p>CVT（高圧ケーブル）の&nbsp;<strong>遮へい銅テープの接地線</strong>&nbsp;を ZCT の&nbsp;<strong>どちら側で処理するか</strong>&nbsp;によって、地絡検出が正しく動いたり・動かなかったりする。実務でも試験でも狙われる。</p>
      </Box>
      <Box kind="example" label="なぜ接地線を ZCT に通し返すのか（因果理解）">
        <p>遮へい層には、健全時でもケーブルの対地静電容量を通る充電電流（遮へい電流）が流れている。この電流は ZCT を「行き（導体側）」に通過するので、接地線を ZCT に&nbsp;<strong>通さず</strong>&nbsp;に接地すると、ZCT は充電電流分を「残留＝地絡」と誤検出してしまう。</p>
        <p>接地線を&nbsp;<strong>ZCT の窓に通し返して</strong>&nbsp;接地すると、行きの充電電流と帰りの接地電流が ZCT 内で打ち消し合い（ベクトル和 ≒ 0）、ZCT は真の地絡電流だけを検出できる。</p>
      </Box>
      <div className="table-wrap"><table className="data">
        <thead><tr><th>接地方法</th><th>ZCT が見る電流</th><th>結果</th></tr></thead>
        <tbody>
          <tr><td>接地線を&nbsp;<strong>ZCT に通し返す</strong>（正）</td><td>充電電流が相殺 → 真の地絡分のみ</td><td><strong>正常検出</strong></td></tr>
          <tr><td>接地線を&nbsp;<strong>ZCT を通さず</strong>接地（誤）</td><td>充電電流分が残留</td><td><strong>誤動作・不検出</strong></td></tr>
        </tbody>
      </table></div>
      <p>結論：<strong>遮へいの接地線は ZCT を貫通させて（通し返して）から接地する</strong>。ケーブルヘッドの接地処理の定番論点。</p>

      <h2 id="kaiho"><span className="h-num">7.</span>解法パターン</h2>
      <Box kind="tip" label="① GR と DGR を見分ける（EVT の有無）">
        <p>「EVT があるか」「方向判定するか」「もらい事故を防げるか」の3点セットで判断する。EVT/ZPD なし・大きさのみ・もらい事故を防げない＝GR。EVT/ZPD あり・大きさ＋方向・もらい事故を防げる＝DGR。</p>
      </Box>
      <Box kind="tip" label="② もらい事故の因果を説明する（論説の模範筋道）">
        <ol>
          <li>高圧ケーブルは対地静電容量が大きい</li>
          <li>構外地絡時、零相電圧で充電電流が ZCT を流れる</li>
          <li>GR は大きさだけ見て誤動作（もらい事故）</li>
          <li>DGR は位相（方向）で構外地絡を除外できる</li>
          <li>ゆえにケーブルこう長が長いほど DGR が必要</li>
        </ol>
      </Box>
      <Box kind="example" label="③ 地絡電流（容量分）の計算">
        <p>対地静電容量 C₃ ＝ 0.3 μF、6.6 kV 非接地系、f ＝ 50 Hz のときの容量分地絡電流：</p>
        <ol>
          <li>対地電圧 <Eq tex="E = 6600/\sqrt{3} \approx 3810\,\text{V}" /></li>
          <li><Eq tex="\omega = 2\pi f = 2\pi\times 50 = 314\,\text{rad/s}" /></li>
          <li><Eq tex="I_{gc} = \omega C_3 E = 314\times 0.3\times10^{-6}\times 3810 \approx 0.36\,\text{A}" /></li>
        </ol>
      </Box>
      <Box kind="example" label="④ 地絡電流の合成と位相">
        <p>抵抗分 I_gr ＝ 0.5 A、容量分 I_gc ＝ 0.36 A のとき：</p>
        <ol>
          <li>大きさ <Eq tex="I_g = \sqrt{0.5^2 + 0.36^2} = \sqrt{0.25+0.130} \approx 0.62\,\text{A}" /></li>
          <li>位相 <Eq tex="\theta = \tan^{-1}(0.36/0.5) \approx 36^\circ" />（V₀ に対する進み）</li>
        </ol>
      </Box>

      <h2 id="trap"><span className="h-num">8.</span>引っかけパターン</h2>
      <div className="table-wrap"><table className="data">
        <thead><tr><th>誤った記述</th><th>正しい記述</th></tr></thead>
        <tbody>
          <tr><td>GR は構外地絡で誤動作せず、もらい事故を防げる</td><td><strong>誤</strong>：GR は大きさだけ。方向判定する DGR でないと防げない</td></tr>
          <tr><td>DGR は ZCT の零相電流だけで方向を判定する</td><td><strong>誤</strong>：方向判定には EVT／ZPD の零相電圧 V₀ が基準として必要</td></tr>
          <tr><td>構内の高圧ケーブルは架空電線より対地静電容量が小さいので地絡電流は小さい</td><td><strong>誤</strong>：ケーブルは導体–遮へい間が近く C が大きい → 地絡電流（容量分）は大きい</td></tr>
          <tr><td>ケーブル遮へいの接地線は ZCT を通さずに最短で接地するのがよい</td><td><strong>誤</strong>：充電電流分を相殺するため ZCT に通し返してから接地する。通さないと誤動作・不検出</td></tr>
          <tr><td>GR 付 PAS は短絡電流も遮断できる遮断器である</td><td><strong>誤</strong>：PAS は負荷開閉器で短絡電流の遮断能力はない。短絡時は蓄勢ロックし無電圧確認後に開放（SO動作）。地絡電流（数A）は即時開放できる（G動作）</td></tr>
        </tbody>
      </table></div>

      <h2 id="seigo"><span className="h-num">9.</span>正誤判定の急所</h2>
      <div className="table-wrap"><table className="data">
        <thead><tr><th>命題</th><th>判定</th><th>解説</th></tr></thead>
        <tbody>
          <tr><td>DGR は零相電流の大きさと、零相電圧に対する位相で地絡方向を判定する</td><td><strong>正</strong></td><td>ZCT(I₀)＋EVT(V₀) の位相で構内／構外を仕分け</td></tr>
          <tr><td>GR は ZCT のみ、DGR は ZCT と EVT を入力とする</td><td><strong>正</strong></td><td>EVT の有無が GR／DGR の分かれ目</td></tr>

          <tr><td>高圧ケーブルの対地静電容量は架空電線より小さい</td><td><strong>誤</strong></td><td>導体–遮へい間が近く大きい</td></tr>

          <tr><td>GR 付 PAS が無電圧開放（SO動作）するのは地絡検出時である</td><td><strong>誤</strong></td><td>無電圧開放は<strong>短絡（過電流蓄勢）時</strong>。地絡時は即時開放（G動作）</td></tr>

      <p>電線は完全な導体ではなく、抵抗 R とリアクタンス X で電圧降下が生じ、送電端と受電端の電圧が異なる。三相電力は <Eq tex="P = \sqrt{3}\,V_L I_L \cos\theta" /> なので、<strong>同じ電力なら電圧を上げるほど電流が小さくなる</strong>。</p>
      <Box kind="tip" label="超高圧送電のメリット（損失は電流の2乗）">
        <p>電力損失は <Eq tex="P_{\text{loss}} = 3I^2R" />。電圧を10倍にすれば電流は <Eq tex="1/10" />、損失は <Eq tex="1/100" /> になる。だから 275 kV・500 kV の超高圧で送り、変電所で降圧して配電する。送電端電圧は <Eq tex="V_s = V_r + \Delta V" /> で、<Eq tex="\Delta V" /> は「抵抗成分（有効分）＋リアクタンス成分（無効分）」からなる。</p>
      </Box>

      <h2 id="setsubi"><span className="h-num">2.</span>構成要素</h2>
      <div className="table-wrap"><table className="data">
        <thead><tr><th>機器</th><th>正式名・略称</th><th>役割</th><th>ポイント</th></tr></thead>
        <tbody>
          <tr><td>導体</td><td>ACSR（鋼心アルミより線）</td><td>電流を流す</td><td>鋼心で強度・外周アルミで導電。表皮効果でアルミ部を有効活用</td></tr>
          <tr><td>がいし</td><td>懸垂／耐張がいし</td><td>導体を絶縁し機械的に支持</td><td>電圧階級に応じ連結数が変わる（<strong>1個あたり約10kV</strong> が暗記目安。66kV では4〜6個を1連に連結する例が多いが、個数は雷・汚損・塩害・機械荷重でも変わる）</td></tr>
          <tr><td>鉄塔</td><td>自立型・引留型</td><td>送電線を空中に支持</td><td>耐風・耐雪設計</td></tr>
          <tr><td>架空地線</td><td>OPGW（光ファイバ複合）</td><td>直撃雷から導体を保護・通信兼用</td><td>鉄塔頂部に設置。遮蔽角を小さくするほど保護効果大</td></tr>
        </tbody>
      </table></div>

      <h2 id="tokusei"><span className="h-num">3.</span>線路定数と短距離/長距離モデル</h2>
      <div className="table-wrap"><table className="data">
        <thead><tr><th>定数</th><th>記号</th><th>意味</th><th>短距離(100km以下)</th></tr></thead>
        <tbody>
          <tr><td>抵抗</td><td>R</td><td>電力損失の原因</td><td>考慮</td></tr>
          <tr><td>リアクタンス</td><td>X</td><td>位相遅れによる電圧降下</td><td>考慮</td></tr>
          <tr><td>サセプタンス</td><td>B</td><td>対地静電容量の充電電流</td><td>無視可</td></tr>
          <tr><td>コンダクタンス</td><td>G</td><td>コロナ損・漏れ電流</td><td>通常無視</td></tr>
        </tbody>
      </table></div>
      <Box kind="tip" label="モデルの使い分け">
        <p><strong>短距離（集中定数・R と X のみ）</strong>が電験3種の主戦場。数十km程度までの短距離線路では充電電流が小さく B を無視できる（100km程度の中距離になると C を考慮したπ形・T形回路で扱う）。<strong>長距離（分布定数）</strong>では B が効き、フェランチ効果など特有の現象が現れる。</p>
      </Box>

      <h2 id="shougai"><span className="h-num">4.</span>障害と対策</h2>
      <div className="table-wrap"><table className="data">
        <thead><tr><th>障害</th><th>原因</th><th>主な対策</th></tr></thead>
        <tbody>
          <tr><td>直撃雷</td><td>落雷が導体に直撃</td><td>架空地線（遮蔽角を小さく）</td></tr>
          <tr><td>誘導雷（感応雷）</td><td>落雷の電磁界変化が誘起電圧を発生</td><td>避雷器（アレスタ）の設置</td></tr>
          <tr><td>逆フラッシオーバー</td><td>鉄塔の接地抵抗が高く塔電位が上昇</td><td>接地抵抗の低減（埋設地線）</td></tr>
          <tr><td>フラッシオーバー（雷サージ）</td><td>雷サージ電圧ががいし連の絶縁強度を超える</td><td>避雷器・不平衡絶縁</td></tr>
          <tr><td>コロナ放電</td><td>導体表面電界が臨界電界(約30kV/cm)超</td><td>太い導体・多導体方式・コロナリング</td></tr>
          <tr><td>微風振動</td><td>弱風のカルマン渦で上下振動</td><td>ストックブリッジダンパ</td></tr>
          <tr><td>ギャロッピング</td><td>着雪導体が強風で大振幅振動</td><td>オフセット架線・スペーサ</td></tr>
          <tr><td>スリートジャンプ</td><td>着氷雪が一斉脱落して導体が跳ね上がる</td><td>オフセット配置（上下相を互い違い）</td></tr>
          <tr><td>塩害</td><td>塩分付着でがいし表面が導電化</td><td>耐塩がいし・シリコーン塗布・洗浄</td></tr>
          <tr><td>誘導障害（静電・電磁）</td><td>電線の電圧が静電誘導／電流（地絡時 3I₀）が電磁誘導で通信線に電圧を誘起</td><td>ねん架・遮蔽線・地絡電流抑制（詳細は <a href="#" onClick={(e) => { e.preventDefault(); onNav("yudo-shougai"); }}>3.3 誘導障害</a>）</td></tr>
        </tbody>
      </table></div>
      <Box kind="example" label="逆フラッシオーバーの物理（接地抵抗を下げる理由）">
        <p>通常は「導体（高電位）→がいし→鉄塔（接地）」へ絶縁破壊が進む。だが鉄塔の<strong>接地抵抗が高い</strong>と、落雷時に塔基部の電位が <Eq tex="V = I_{\text{雷}} \times R_{\text{接地}}" /> だけ上昇し、塔電位が導体電位を上回って「鉄塔→がいし→導体」へ逆向きに破壊が進む。だから対策は<strong>接地抵抗の低減</strong>。コロナは逆に、導体が細いほど表面電界（1/r で減衰）が高くなり発生しやすいので、多導体で等価半径を大きくして電界を下げる。</p>
      </Box>

      <h2 id="tarumi"><span className="h-num">5.</span>たるみ（弛度）と実長（計算頻出）</h2>
      <p>電線は支持点間で必ずたるむ。張力を上げればたるみは減るが、電線・支持物への負担は増える。この関係を式で扱うのが弛度計算。</p>
      <FormulaCard num="D1" name="弛度（たるみ）" eq="D = \dfrac{WS^2}{8T}\,[\text{m}]"
        note="W: 電線1mあたりの合成荷重 [N/m]、S: 径間 [m]、T: 電線最低点の水平張力 [N]。張力Tを大きくすると弛度Dは小さくなる（反比例）。支持点がほぼ同じ高さで弛度が径間に比べ小さいときの放物線近似。" />
      <FormulaCard num="D2" name="電線の実長" eq="L = S + \dfrac{8D^2}{3S}\,[\text{m}]"
        note="実長Lは径間SよりD²に比例する分だけわずかに長い。「たるみが2倍なら伸び（L−S）は4倍」の関係が問われる。" />
      <Box kind="tip" label="因果で覚える — 温度・荷重とたるみの連動">
        <ul>
          <li><strong>気温上昇 → 電線が伸びる → 実長L増 → 弛度D増・張力T減</strong>。夏・大電流時は地上高が下がるため、最大たるみ時でも法定離隔を確保できる高さに設計する。</li>
          <li><strong>氷雪・風の付加荷重 → 合成荷重W増 → 弛度・張力とも増</strong>。Wは鉛直方向（自重＋氷雪）と水平方向（風圧）のベクトル和で求める。</li>
          <li>「温度が上がると張力も上がる」は<strong>誤り</strong>（張力と弛度は逆の関係。S3 引っかけパターン16参照）。</li>
        </ul>
      </Box>

      <h2 id="corona"><span className="h-num">6.</span>円筒導体の電界とコロナ放電</h2>
      <p>送電線は断面が円い<strong>円筒（円柱）導体</strong>。電荷を帯びた円筒導体のまわりには、中心から外向きに放射状の<strong>電界</strong>が広がる。線電荷密度を <Eq tex="\lambda\,[\text{C/m}]" />、真空（空気）の誘電率を <Eq tex="\varepsilon_0" /> とすると、中心軸から距離 <Eq tex="r" /> の点の電界の大きさは次式で表される。</p>
      <FormulaCard num="C1" name="円筒導体まわりの電界（放射状・ガウスの法則）" eq="E = \dfrac{\lambda}{2\pi\varepsilon_0\, r}\;[\text{V/m}]"
        note="E は距離 r に反比例（1/r で減衰）。導体表面（r = 導体半径 a）でいちばん強くなる。" />
      <p>この<strong>導体表面の電界</strong>を<strong>電位傾度</strong>（1 cm あたり何 kV かかっているか）と呼ぶ。<Eq tex="E \propto 1/r" /> なので電界は導体表面で最大で、外へ離れるほど急速に弱まる。下図の左は円筒導体の断面と放射状の電界（内側ほど密＝電位傾度大）、右は距離 r に対する電界 E の 1/r 減衰を示す。</p>

      <Box kind="warn" label="コロナ放電の発生条件 — 表面の電位傾度が臨界電界を超える">
        <p>電線表面の電位傾度が、空気の<strong>臨界電界（絶縁破壊の限界。標準状態 δ=1 で約 30 kV/cm＝波高値。実効値では約 21 kV/cm）</strong>を超えると、導体ごく近傍の空気が局部的に絶縁破壊して青白く放電・発音する。これが<strong>コロナ放電</strong>。がいし連の全路破壊（フラッシオーバ）と違い、<strong>導体表面近傍だけの部分放電</strong>である点が急所。</p>
      </Box>

      <p><strong>コロナが発生しやすくなる要因</strong>（いずれも「表面電界が上がる」または「臨界電界が下がる」方向）。</p>
      <div className="table-wrap"><table className="data">
        <thead><tr><th>要因</th><th>効果（表面電界／臨界電界への影響）</th></tr></thead>
        <tbody>
          <tr><td>電線が細い（半径 a が小さい）</td><td>表面電界は <Eq tex="E \propto 1/a" /> なので上昇。細いほどコロナしやすい</td></tr>
          <tr><td>送電電圧が高い（線電荷 λ 大）</td><td>電荷密度が増えて電界が上昇</td></tr>
          <tr><td>雨・雪・霧・塩分や傷などの突起</td><td>水滴や突起の先端に電界が集中し、表面係数が下がって臨界電界が低下</td></tr>
          <tr><td>高地・低気圧・高温（空気密度 δ が小）</td><td>空気が薄く絶縁破壊しやすくなり臨界電界が低下</td></tr>
        </tbody>
      </table></div>

      <Box kind="tip" label="なぜ太い導体・多導体（バンドル）でコロナを抑えるのか">
        <p>表面電界は導体の<strong>等価半径</strong>で決まる。<strong>多導体（バンドル）方式</strong>は数本の素導体を数十 cm 間隔で並べ、全体を「1 本の太い導体」とみなした等価半径を大きくする。等価半径が大きいほど表面の電位傾度が下がり、臨界電界に達しにくい。単導体でも太径・中空にする、金具の端部に<strong>コロナリング</strong>を付けて電界集中を緩和する、なども同じ狙い。第4節の表「太い導体・多導体方式・コロナリング」はすべてこの原理。</p>
      </Box>

      <p><strong>コロナの影響（ほとんどがデメリット）。</strong></p>
      <div className="table-wrap"><table className="data">
        <thead><tr><th>影響</th><th>内容</th></tr></thead>
        <tbody>
          <tr><td>コロナ損</td><td>放電でエネルギーを消費する電力損失。線路定数の<strong>コンダクタンス G</strong> に相当し、雨天時に増大</td></tr>
          <tr><td>雑音障害</td><td>電波障害・通信線への誘導雑音（ラジオノイズ）</td></tr>
          <tr><td>可聴騒音</td><td>ジー音・パチパチ音（とくに雨天時）</td></tr>
          <tr><td>腐食・劣化</td><td>オゾン・窒素酸化物（NOx）が発生し、電線・金具を腐食</td></tr>
          <tr><td>（利点）異常電圧の減衰</td><td>雷サージなど進行波の波高値を減衰させる効果もある（数少ない利点）</td></tr>
        </tbody>
      </table></div>
      <Box kind="example" label="論説の急所 — コロナ臨界電圧の大小関係">
        <p>コロナが始まる電圧を<strong>コロナ臨界電圧</strong>という。表面の電位傾度がちょうど臨界電界に一致するときの電圧で、導体半径・線間距離・相対空気密度 δ・表面係数 m で決まる（ピークの式）。3 種では数値計算より、<strong>「太い導体・多導体・δ が大（低地・低温・高気圧）・晴天ほど臨界電圧が高くコロナしにくい」</strong>という大小関係の論説が問われる。</p>
      </Box>
      <Box kind="tip" label="地中ケーブルでも同じ円筒の電界（→地中送電・電力ケーブル）">
        <p>この 1/r の円筒電界は、地中ケーブルの<strong>同軸円筒構造</strong>にも現れる。ただしケーブルは遮へいで閉じているため電界が絶縁体内で完結し、導体表面の電位傾度が絶縁設計を左右する。詳細は「地中送電・電力ケーブル」ページの<strong>同軸円筒ケーブルの電界分布と電位傾度</strong>を参照。</p>
      </Box>

      <h2 id="formula"><span className="h-num">7.</span>公式マップ（最重要）</h2>
      <FormulaCard num="01" name="電圧降下（三相3線式）" eq="\Delta V = \sqrt{3}\,I(R\cos\theta + X\sin\theta)\,[\text{V}]"
        note="√3 は (Rcosθ+Xsinθ) の外側全体にかかる。Vs = Vr + ΔV。" />
      <FormulaCard num="02" name="電圧降下（単相2線式）" eq="\Delta V = 2I(R\cos\theta + X\sin\theta)\,[\text{V}]"
        note="往復2線分で係数は2。三相の √3 と取り違えない。" />
      <FormulaCard num="03" name="電力損失（三相3線式）" eq="P_{\text{loss}} = 3I^2R\,[\text{W}]"
        note="cosθ は式に現れないが、力率が低いと I が増えて損失は増える（力率は I に織込み済み）。" />
      <FormulaCard num="04" name="送電効率" eq="\eta = \dfrac{P_r}{P_r + P_{\text{loss}}} \times 100\,[\%]"
        note="Pr=受電端電力、Ploss=線路損失。" />
      <FormulaCard num="05" name="百分率電圧降下率" eq="\delta = \dfrac{\Delta V}{V_r} \times 100\,[\%]"
        note="Vr は線間/相のどちらかに統一して使う。" />
      <Box kind="warn" label="フェランチ効果 — 軽負荷時に受電端電圧が上がる">
        <p>長い送電線や地中ケーブルは対地静電容量 C が大きく、軽負荷・無負荷でも<strong>進み電流（充電電流）</strong>が流れる。これがリアクタンス X を通ると電圧上昇（+jX）方向に作用し、受電端電圧が送電端より<strong>高くなる</strong>。対策は<strong>分路リアクトル</strong>で進み電流を吸収。「重負荷時」「電圧が下がる」と書いた選択肢は誤り。</p>
      </Box>

      <h2 id="kaiho"><span className="h-num">8.</span>解法パターン（三相電圧降下）</h2>
      <Box kind="example" label="例題: Vr=66kV・20MW・力率0.8(遅れ)・R=10Ω・X=15Ω → 送電端電圧は？">
        <p>① 線電流を求める：</p>
        <p><Eq tex="I = \dfrac{20\times10^{6}}{\sqrt{3}\cdot 66\times10^{3}\cdot 0.8} \approx 218.7\,\text{A}" display /></p>
        <p>② <Eq tex="\sin\theta = \sqrt{1-0.8^2} = 0.6" /> を使って電圧降下：</p>
        <p><Eq tex="\Delta V = \sqrt{3}\cdot 218.7\cdot(10\cdot0.8 + 15\cdot0.6) = \sqrt{3}\cdot 218.7\cdot 17 \approx 6.44\,\text{kV}" display /></p>
        <p>③ 送電端電圧：<Eq tex="V_s = V_r + \Delta V = 66 + 6.44 \approx 72.4\,\text{kV}" /></p>
      </Box>
      <Box kind="warn" label="R の定義を誤解する引っかけ">
        <p>R は「1線あたりの抵抗」。「1kmあたり0.1Ω・線路長50km」なら R = 5Ω。三相3線式で往復分を足してはいけない（<Eq tex="3I^2R" /> の「3」が既に3線分）。Δ結線では線電流 <Eq tex="I_L = \sqrt{3}\,I_P" /> に変換してから使う。</p>

/* ============================================================

   ============================================================ */
const HenatsukiPage = ({ data, onNav }) => (
  <>
    <Crumbs items={[{ id: "home", label: "ホーム" }, { label: "変圧器（基礎ハブ）" }]} onNav={onNav} />
    <PageHeader
      eyebrow="2.1  TRANSFORMER (HUB)"
      title="変圧器（基礎ハブ）"
      deck="巻数比で電圧・電流が逆比例し、磁束を介してエネルギーを転送する。変電分野（約54問）の基礎ハブ。巻数比・換算・損失・効率・電圧変動率・並行運転・結線を俯瞰する。"
      meta={[
        { label: "出題頻度", value: "高（変電分野 約54問の中核）" },
        { label: "難易度", value: "★★★" },
        { label: "出題形式", value: "計算（効率/並行運転/短絡）・論説（結線/種類）" },
      ]}
    />
    <div className="content">

      <h2 id="ratio"><span className="h-num">1.</span>巻数比（5秒で思い出す）</h2>
      <FormulaCard num="01" name="巻数比 a（電圧比＝電流比の逆数）" eq="\dfrac{V_1}{V_2} = \dfrac{N_1}{N_2} = \dfrac{I_2}{I_1} = a"
        note="電圧は巻数に比例、電流は巻数に反比例。V1·I1=V2·I2（エネルギー保存）から導ける。" />
      <Box kind="tip" label="等価回路の換算は「方向で逆数」">
        <p>巻数比 <Eq tex="a = N_1/N_2 = V_1/V_2" />。インピーダンス換算は方向で <Eq tex="a^2" /> 倍と <Eq tex="1/a^2" /> 倍が逆転する：</p>
        <ul>
          <li><strong>二次→一次</strong>に換算した抵抗・リアクタンス： <Eq tex="R_2' = a^2 R_2,\ X_2' = a^2 X_2" />（<Eq tex="\times a^2" />）</li>
          <li><strong>一次→二次</strong>に換算した抵抗・リアクタンス： <Eq tex="R_1'' = R_1/a^2" />（<Eq tex="\times 1/a^2" />）</li>
        </ul>
        <p>理由：換算後 <Eq tex="V_1=aV_2,\ I_1=I_2/a" /> なので <Eq tex="Z_1 = V_1/I_1 = a^2 Z_2" />。「一次に換算した二次抵抗は <Eq tex="a^2" /> 倍＝正／二次に換算した一次抵抗は <Eq tex="1/a^2" /> 倍」— 主語と換算方向を必ず読む。</p>
      </Box>

      <h2 id="loss"><span className="h-num">2.</span>損失の分類（鉄損は一定・銅損は α²）</h2>
      <div className="table-wrap"><table className="data">
        <thead><tr><th>損失</th><th>別名</th><th>発生場所</th><th>負荷依存性</th></tr></thead>
        <tbody>
          <tr><td>鉄損 Pi</td><td>無負荷損</td><td>鉄心</td><td><strong>一定</strong>（電圧・周波数で決まる）</td></tr>
          <tr><td>銅損 Pc</td><td>負荷損</td><td>巻線抵抗</td><td><strong>電流²＝負荷率α²に比例</strong></td></tr>
        </tbody>
      </table></div>
      <Box kind="example" label="鉄損の内訳（論説頻出）— ヒステリシス損と渦電流損は別物">
        <ul>
          <li><strong>ヒステリシス損</strong> <Eq tex="P_h \propto f \cdot B_m^{1.6}" />（周波数1乗）→ 対策＝<strong>方向性珪素鋼板・アモルファス</strong></li>
          <li><strong>渦電流損</strong> <Eq tex="P_e \propto f^2 B_m^2 t^2 / \rho" />（周波数2乗・板厚² ・比抵抗に反比例）→ 対策＝<strong>薄板積層・珪素添加</strong></li>
        </ul>
        <p>「薄板化はヒステリシス損対策」は<strong>誤</strong>（薄板化は渦電流損対策）。板厚半分で渦電流損は約1/4。</p>
      </Box>
      <Box kind="tip" label="損失の分離測定">
        <p><strong>無負荷試験</strong>（定格電圧・二次開放）→ 励磁電流のみで銅損≈0、測定値≈<strong>鉄損 Pi</strong>。<strong>短絡試験</strong>（二次短絡・インピーダンス電圧で定格電流）→ 磁束密度数%で鉄損≈0、測定値≈<strong>定格銅損 Pc,full</strong> ＋ <Eq tex="\%Z = \dfrac{V_s}{V_n}\times100,\ \%R = \dfrac{P_s}{S_n}\times100,\ \%X = \sqrt{\%Z^2-\%R^2}" /> も得る。</p>
      </Box>

      <h2 id="eff"><span className="h-num">3.</span>効率と最大効率（鉄損＝銅損）</h2>
      <FormulaCard num="02" name="効率（皮相容量 Sn・負荷率 α 基準）" eq="\eta = \dfrac{\alpha S_n \cos\theta}{\alpha S_n \cos\theta + P_i + \alpha^2 P_{c,full}} \times 100\,[\%]"
        note="出力 Pout=α·Sn·cosθ。銅損は Pc(α)=α²·Pc,full。" />
      <FormulaCard num="03" name="最大効率条件・最大効率の負荷率" eq="P_i = \alpha^2 P_{c,full} \quad\Rightarrow\quad \alpha_m = \sqrt{\dfrac{P_i}{P_{c,full}}}"
        note="鉄損=銅損のとき効率最大。このとき損失合計＝2Pi。" />
      <Box kind="example" label="例題: 10kV·A・α=1・力率1.0・鉄損200W・定格銅損300W → 効率は？">
        <p><Eq tex="\eta = \dfrac{10{,}000}{10{,}000 + 200 + 300}\times100 = \dfrac{10{,}000}{10{,}500}\times100 \approx 95.2\%" display /></p>
        <p>最大効率の負荷率（Pi=100W・Pc,full=400W の場合）：<Eq tex="\alpha_m = \sqrt{100/400} = 0.5" /></p>
      </Box>

      <h2 id="henka"><span className="h-num">4.</span>電圧変動率</h2>
      <FormulaCard num="04" name="電圧変動率" eq="\varepsilon \approx \varepsilon_r \cos\theta + \varepsilon_x \sin\theta\,[\%]"
        note="εr=Pc,full/Sn×100（%抵抗）、εx=%リアクタンス。εr の分母は皮相 Sn（有効出力ではない）。" />
      <Box kind="example" label="例題: %r=2%・%x=4%・力率0.8(遅れ)">
        <p><Eq tex="\varepsilon = 2\times0.8 + 4\times0.6 = 1.6 + 2.4 = 4.0\%" /></p>
      </Box>

      <h2 id="heikou"><span className="h-num">5.</span>並行運転（分担は 1/%Z に比例）</h2>
      <p>並行運転の条件：<strong>変圧比・%Z・極性・相回転・位相変位・結線群</strong>の一致。違うと循環電流や偏った分担が起きる。</p>
      <Box kind="warn" label="%Z が違うと容量比どおりに分担されない">
        <p>分担電流はインピーダンスに反比例＝<strong>分担 ∝ 1/%Z</strong>。同容量で A(%Z=4%)・B(%Z=6%) を並列すると <Eq tex="I_A:I_B = \tfrac{1}{4}:\tfrac{1}{6} = 6:4" />。負荷100Aなら A=60A・B=40A で、容量比1:1なのに<strong>%Z の小さい A が過負荷</strong>。異容量機は基準容量を揃えて比較する。</p>
      </Box>

      <h2 id="ketsusen"><span className="h-num">6.</span>三相結線とV結線</h2>
      <div className="table-wrap"><table className="data">
        <thead><tr><th>結線</th><th>位相変位</th><th>第3高調波</th><th>特徴</th></tr></thead>
        <tbody>
          <tr><td>Y-Y</td><td>0°</td><td>吸収先なし→歪む</td><td>配電にほぼ不使用・第三巻線(Δ)で対策</td></tr>
          <tr><td>Δ-Δ</td><td>0°</td><td>Δループで循環吸収</td><td>中性点なし・1台故障でV結線運転可</td></tr>
          <tr><td>Y-Δ</td><td>−30°(遅れ)</td><td>二次Δで吸収</td><td>降圧用（送電端）</td></tr>
          <tr><td>Δ-Y</td><td>+30°(進み)</td><td>一次Δで吸収</td><td>昇圧用（発電所）</td></tr>
        </tbody>
      </table></div>
      <Box kind="example" label="V結線の3公式（H30問12型）">
        <p>単相1台容量を <Eq tex="S_n" /> とすると：三相出力 <Eq tex="S_V = \sqrt{3}\,S_n" />、利用率 <Eq tex="\dfrac{S_V}{2S_n} = \dfrac{\sqrt{3}}{2} \approx 0.866" />、容量効率 <Eq tex="\dfrac{S_V}{3S_n} = \dfrac{1}{\sqrt{3}} \approx 0.577" />。<strong>0.866(2台基準)と0.577(Δ3台基準)を取り違えない</strong>。Y-Δ と Δ-Y は位相が60°差で並行運転不可。</p>
      </Box>

      <h2 id="tanraku"><span className="h-num">7.</span>短絡電流（%Z 使用）</h2>
      <FormulaCard num="05" name="短絡電流" eq="I_s = I_n \times \dfrac{100}{\%Z}\,[\text{A}]"
        note="In=定格電流。%Z に反比例＝%Z が小さいほど短絡電流大→遮断器の遮断容量を大きく。" />
      <Box kind="example" label="例題: 500kV·A・6600/210V・%Z=5% の二次側三相短絡電流">
        <p><Eq tex="I_n = \dfrac{500\times10^3}{\sqrt{3}\times210} \approx 1375\,\text{A}" /></p>
        <p><Eq tex="I_s = 1375 \times \dfrac{100}{5} = 27{,}500\,\text{A} = 27.5\,\text{kA}" display /></p>
        <p>定格電流の20倍。電源側%Zが与えられたら 合成%Z=変圧器%Z+電源%Z で計算。</p>
      </Box>

      <h2 id="seigo"><span className="h-num">8.</span>正誤判定の急所</h2>
      <div className="table-wrap"><table className="data">
        <thead><tr><th>命題</th><th>判定</th><th>理由</th></tr></thead>
        <tbody>
          <tr><td>変圧器の鉄損は負荷電流の2乗に比例する</td><td><strong>誤</strong></td><td>鉄損は一定。2乗比例は銅損</td></tr>
          <tr><td>二次側に換算した一次抵抗は a² 倍</td><td><strong>誤</strong></td><td>1/a² 倍（一次に換算した二次抵抗が a²倍）</td></tr>
          <tr><td>無負荷試験では銅損も測定できる</td><td><strong>誤</strong></td><td>励磁電流のみ→測定値は実質 鉄損</td></tr>
          <tr><td>短絡試験は定格電圧をかけて行う</td><td><strong>誤</strong></td><td>インピーダンス電圧（数%）で定格電流</td></tr>
          <tr><td>ヒステリシス損は周波数の2乗に比例する</td><td><strong>誤</strong></td><td>Ph∝f（1乗）。2乗は渦電流損</td></tr>
          <tr><td>短絡電流は %Z に比例して大きくなる</td><td><strong>誤</strong></td><td>Is=In×100/%Z で %Z に反比例</td></tr>
          <tr><td>Y-Y結線は第3高調波電流を吸収できる</td><td><strong>誤</strong></td><td>吸収はΔ結線。Y-Yは歪む</td></tr>
          <tr><td>無電圧切換は変圧器を停止させずに行える</td><td><strong>誤</strong></td><td>停止が必要。停止不要は負荷時タップ切換</td></tr>
        </tbody>
      </table></div>
      <Box kind="warn" label="「無電圧切換＝電圧を切らない」という誤読に注意">
        <p>タップ切換装置の<strong>無電圧切換（オフロードタップチェンジャー）</strong>は、変圧器を<strong>停止してから</strong>切り換える。停止が不要なのは<strong>負荷時タップ切換装置（オンロードタップチェンジャー）</strong>。名称の「無電圧」は「電圧が印加されていない状態で切り換える」という意味であり、「電圧を中断せずに（切らずに）切り換える」という意味ではない。この誤読を突く正誤問題が頻出。</p>
      </Box>

      <h2 id="kakomon"><span className="h-num">9.</span>出題実績（基礎ハブ・約27問＋変電周辺）</h2>
      <p>効率・最大効率・並行運転・短絡（遮断器選定）の計算が頻出。論説は結線方式・タップ切換・種類。深い全日効率は損失深掘りページへ。</p>

          <tr><td>R04下</td><td>問7</td><td>結線方式の違いと特性</td><td>論説</td></tr>
          <tr><td>H30</td><td>問12</td><td>V結線方式</td><td>計算</td></tr>
          <tr><td>H28</td><td>問16</td><td>事故時に流れる電流（短絡）</td><td>計算</td></tr>

        <p>効率・最大効率の単独計算、V結線（H30以来の周期）、並行運転負荷分担（R05上・R06上で連続）が有力。</p>
