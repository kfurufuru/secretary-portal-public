/* ============================================================
   1.1 水力発電 — 本文移植済み（約37問）
   出典: denken-wiki-denryoku/docs/themes/suiryoku.md（v1.0）
   ============================================================ */
const SuiryokuPage = ({ data, onNav }) => (
  <>
    <Crumbs items={[{ id: "home", label: "ホーム" }, { label: "水力発電" }]} onNav={onNav} />
    <PageHeader
      eyebrow="1.1  HYDROELECTRIC POWER GENERATION"
      title="水力発電"
      deck="水の位置エネルギーを電気に変換する。発電分野の頻出テーマ（約37問）。P = 9.8 Q H η が全計算の出発点。"
      meta={[
        { label: "出題頻度", value: "高（約37問）" },
        { label: "難易度", value: "★★☆" },
        { label: "出題形式", value: "計算（出力/落差/揚水）・論説（水車）" },
      ]}
    />
    <div className="content">

      <h2 id="intro"><span className="h-num">1.</span>直感的理解 — P=9.8QHη</h2>
      <p>「高い水を低い所へ落とす」だけ。位置E→運動E(水車)→電気E(発電機)。アナロジーで <strong>水≒電流、落差≒電圧</strong>（P=VI と同じ構造）。流量が多く落差が大きいほど大出力。</p>
      <Box kind="tip" label="「9.8」の正体">
        <p>水の比重量 <Eq tex="\rho g = 1000 \times 9.8 = 9800\,\text{N/m}^3 = 9.8\,\text{kN/m}^3" />。これに流量 Q[m³/s]・有効落差 H[m] を掛け、kW にまとめた係数が 9.8。単位確認：[kN/m³]×[m³/s]×[m]＝[kW]。</p>
      </Box>

      <h2 id="suisha"><span className="h-num">2.</span>水車の種類（衝動 vs 反動）</h2>
      <div className="table-wrap"><table className="data">
        <thead><tr><th>項目</th><th>衝動水車（ペルトン）</th><th>反動水車（フランシス/カプラン）</th></tr></thead>
        <tbody>
          <tr><td>原理</td><td>ノズル噴流の運動E（水圧は大気圧）</td><td>ランナーを水中に浸し圧力差で回す</td></tr>
          <tr><td>適用落差</td><td><strong>高落差・小流量</strong>（300m級〜）</td><td>フランシスは<strong>中〜高落差</strong>（40〜600m級・揚水にも使用）／カプラン・プロペラは<strong>低落差・大流量</strong>（〜60m級）</td></tr>
          <tr><td>比速度 Ns</td><td>低い</td><td>高い（フランシス→カプランで増）</td></tr>
          <tr><td>キーワード</td><td>ノズル・バケット</td><td>フランシス＝混流／カプラン＝可動翼</td></tr>
        </tbody>
      </table></div>
      <div className="table-wrap"><table className="data">
        <thead><tr><th>発電所分類</th><th>特徴</th><th>調整単位</th></tr></thead>
        <tbody>
          <tr><td>流れ込み式</td><td>自然流量をそのまま利用（調整なし）</td><td>—（ベース）</td></tr>
          <tr><td>調整池式</td><td>数日〜数週間分を貯留</td><td>日〜週</td></tr>
          <tr><td>貯水池式</td><td>大型ダムで季節間調整</td><td>季節</td></tr>
          <tr><td>揚水式</td><td>上下調整池＋ポンプで揚水</td><td>ピーク・需給調整</td></tr>
        </tbody>
      </table></div>

      <h2 id="formula"><span className="h-num">3.</span>公式マップ（最重要）</h2>
      <FormulaCard num="01" name="発電出力（必須）" eq="P = 9.8\,Q\,H\,\eta\,[\text{kW}]"
        note="Q=流量[m³/s]、H=有効落差=総落差−損失水頭[m]、η=水車効率×発電機効率。" />
      <FormulaCard num="02" name="揚水入力（効率は割る）" eq="P_{\text{pump}} = \dfrac{9.8\,Q\,H_p}{\eta_{\text{pump}}}\,[\text{kW}]"
        note="揚水は損失分だけ余分に投入するので η で割る。発電はη掛ける／揚水はη割る、が最頻出の引っかけ。" />
      <FormulaCard num="03" name="比速度" eq="N_s = \dfrac{N\sqrt{P}}{H^{5/4}}"
        note="Ns が大きいほど低落差・大流量型。ペルトン(低)→フランシス(中)→カプラン(高)。" />
      <FormulaCard num="04" name="年間発電電力量・設備利用率" eq="E = P \times T\,[\text{kWh}]"
        note="T=年間運転時間[h]。設備利用率 = E /(P_rated × 8760) × 100 [%]。発電電力量・重油使用量比較(R05下問15型)の起点。" />
      <FormulaCard num="05" name="流量と流速（連続の式）" eq="Q = A \times v\,[\text{m}^3/\text{s}]"
        note="A=水路断面積[m²]、v=平均流速[m/s]。使用水量=Q×t で有効貯水容量(R07上問15型)を組み立てる。" />

      <h2 id="kaiho"><span className="h-num">4.</span>解法パターン（例題つき）</h2>
      <Box kind="example" label="① 出力: Q=50・H=100・η=0.85">
        <p><Eq tex="P = 9.8 \times 50 \times 100 \times 0.85 = 41{,}650\,\text{kW} = 41.65\,\text{MW}" display /></p>
      </Box>
      <Box kind="example" label="② 有効落差: 総落差200m・損失10m・Q=30・η=0.90">
        <p><Eq tex="H = 200 - 10 = 190\,\text{m}" />、<Eq tex="P = 9.8 \times 30 \times 190 \times 0.90 \approx 50{,}274\,\text{kW}" /></p>
      </Box>
      <Box kind="example" label="③ 揚水総合効率: 発電 Q=40・H=150・ηgen=0.88 / 揚水 ηpump=0.82">
        <p><Eq tex="P_{\text{gen}} = 9.8\times40\times150\times0.88 = 51{,}744\,\text{kW}" /></p>
        <p><Eq tex="P_{\text{pump}} = \dfrac{9.8\times40\times150}{0.82} \approx 71{,}707\,\text{kW}" /></p>
        <p><Eq tex="\eta_{\text{total}} = \dfrac{51{,}744}{71{,}707} \approx 72.2\%" /></p>
      </Box>

      <Box kind="tip" label="水撃作用・キャビテーション（R02 問1 型の論説急所）">
        <ul>
          <li><strong>水撃作用（ウォーターハンマー）</strong>：負荷急減で水車の入口弁を急閉すると、水圧管内の水の慣性で圧力が急上昇する現象。対策は<strong>サージタンク</strong>（圧力変動を水位変動として吸収）、ペルトンの<strong>デフレクタ</strong>（ジェットをそらして緩閉を可能に）。</li>
          <li><strong>キャビテーション</strong>：流速が大きく圧力が飽和蒸気圧まで下がると気泡が発生し、崩壊時の衝撃でランナー・吸出し管を壊食する現象。対策は<strong>吸出し管の高さ（吸出し高さ）を高くしすぎない</strong>・比速度を大きくしすぎない・翼形状の工夫。</li>
          <li><strong>吸出し管</strong>：反動水車の出口と放水面の間の管。ランナー出口の速度エネルギーを圧力として回収し、<strong>落差を有効利用</strong>する（衝動水車のペルトンには無い）。</li>
        </ul>
      </Box>

      <h2 id="trap"><span className="h-num">5.</span>引っかけ・誤答ポイント</h2>
      <Box kind="warn" label="頻出トラップ">
        <ul>
          <li><strong>総落差をそのまま代入</strong> — H=総落差−損失水頭。P=9.8·Q·H₀·η は誤り。</li>
          <li><strong>揚水の効率の向き</strong> — 揚水は P=9.8QH/η（割る）。発電は掛ける。向きが逆。</li>
          <li><strong>ペルトンを低落差・大流量と誤認</strong> — ペルトンは高落差・小流量。低落差大流量はカプラン。</li>
          <li><strong>調整池式を季節調整と誤認</strong> — 季節間は貯水池式。調整池式は日〜週。</li>
        </ul>
      </Box>

        <thead><tr><th>命題</th><th>判定</th><th>理由</th></tr></thead>

          <tr><td>有効落差は総落差から損失水頭を引いたもの</td><td><strong>正</strong></td><td>H=Hgross−hloss</td></tr>
          <tr><td>揚水所要電力は P=9.8QHη で求められる</td><td><strong>誤</strong></td><td>正しくは P=9.8QH/η</td></tr>
          <tr><td>カプラン水車は可動式ランナー翼を持つ</td><td><strong>正</strong></td><td>低落差・大流量・プロペラ型</td></tr>
          <tr><td>サージタンクはウォーターハンマーを吸収する</td><td><strong>正</strong></td><td>圧力変動の緩衝装置</td></tr>
        </tbody>
      </table></div>

        { label: "難易度", value: "★★☆" },
        { label: "出題形式", value: "論説・穴埋め（計算は燃料比較）" },
      ]}
    />
    <div className="content">

      <h2 id="intro"><span className="h-num">1.</span>直感的理解 — 火力との違いは熱源だけ</h2>
      <p>蒸気→タービン→発電機は火力と同じ。違うのは熱源が <strong>核分裂</strong> という1点。試験の核心は次の3つ。</p>
      <div className="table-wrap"><table className="data">
        <thead><tr><th>項目</th><th>火力との違い</th></tr></thead>
        <tbody>
          <tr><td>燃料</td><td>化石燃料でなく <strong>核燃料</strong>（濃縮ウラン UO₂）</td></tr>
          <tr><td>出力制御</td><td>燃料調整でなく <strong>制御棒</strong>（挿入で減・引抜で増）</td></tr>
          <tr><td>冷却</td><td>崩壊熱があるため <strong>停止後も冷却が必要</strong></td></tr>
        </tbody>
      </table></div>

      <h2 id="yoso"><span className="h-num">2.</span>原子炉の4要素</h2>
      <div className="table-wrap"><table className="data">
        <thead><tr><th>要素</th><th>役割</th><th>代表材料</th></tr></thead>
        <tbody>
          <tr><td>核燃料</td><td>核分裂で熱を発生</td><td>UO₂（二酸化ウラン）ペレット</td></tr>
          <tr><td>減速材</td><td>高速中性子→熱中性子に減速</td><td>軽水・重水・黒鉛</td></tr>
          <tr><td>制御棒</td><td>中性子を吸収して出力制御</td><td><strong>ハフニウム・ホウ素・カドミウム</strong></td></tr>
          <tr><td>冷却材</td><td>核分裂熱を外部へ輸送</td><td>軽水・重水・液体ナトリウム</td></tr>
        </tbody>
      </table></div>
      <Box kind="tip" label="なぜ減速材が要るか">
        <p>核分裂で出る中性子は高速すぎて U-235 に吸収されにくい。減速材で熱中性子（低速）に落として連鎖反応を持続させる。軽水炉（PWR/BWR）は<strong>軽水が減速材と冷却材を兼ねる</strong>。</p>
      </Box>

      <h2 id="rogata"><span className="h-num">3.</span>原子炉の種類（PWR / BWR が中心）</h2>
      <div className="table-wrap"><table className="data">
        <thead><tr><th>項目</th><th>PWR(加圧水型)</th><th>BWR(沸騰水型)</th><th>CANDU(重水型)</th></tr></thead>
        <tbody>
          <tr><td>減速・冷却材</td><td>軽水</td><td>軽水</td><td>重水</td></tr>
          <tr><td>冷却材圧力</td><td>約155 atm(高圧・沸騰させない)</td><td>約70 atm(炉内で直接沸騰)</td><td>約100 atm</td></tr>
          <tr><td>冷却水系統</td><td><strong>2系統</strong>(一次/二次・蒸気発生器)</td><td><strong>1系統</strong>(直接サイクル)</td><td>2系統</td></tr>
          <tr><td>タービン側蒸気</td><td>非放射性(二次側)</td><td><strong>放射性</strong>(直接)</td><td>非放射性</td></tr>
          <tr><td>燃料濃縮度</td><td>低濃縮(2〜5%)</td><td>低濃縮(2〜5%)</td><td><strong>天然ウラン</strong>(0.7%)</td></tr>
        </tbody>
      </table></div>
      <Box kind="example" label="CANDUが天然ウランを使える理由">
        <p>重水(D₂O)は軽水より中性子吸収断面積が桁違いに小さい（軽水の数百分の1）。余剰中性子が多く残るため、濃縮しない<strong>天然ウラン(U-235 0.7%)でも臨界を維持</strong>できる。軽水炉は軽水が中性子を吸うため2〜5%濃縮が必要。</p>
      </Box>
      <Box kind="tip" label="核燃料サイクル（R07上 問4で穴埋出題・要点）">
        <p><strong>サイクルの流れ</strong>：ウラン採掘 → 製錬 → 転換（UF₆化）→ ウラン濃縮（U-235濃度を高める）→ <strong>再転換</strong>（UF₆→UO₂粉末）→ 燃料加工（ペレット→燃料棒→集合体）→ 原子炉で使用 → 再処理（使用済み燃料からU・Puを回収）→ MOX燃料として再利用／高レベル廃棄物はガラス固化して処分</p>
        <div className="table-wrap"><table className="data">
          <thead><tr><th>核反応</th><th>内容</th></tr></thead>
          <tbody>
            <tr><td>U-235 の核分裂</td><td>熱中性子を吸収して分裂→大量の熱と 2〜3 個の中性子を放出</td></tr>
            <tr><td>U-238 の変換</td><td>中性子を吸収→Pu-239 に変換（<strong>高速増殖炉の原理</strong>）</td></tr>
            <tr><td>連鎖反応</td><td>分裂で生じた中性子が次の核分裂を引き起こす</td></tr>
          </tbody>
        </table></div>
        <p><strong>燃料構造</strong>：ペレット（UO₂ 焼結体）→ 燃料棒（ジルカロイ被覆管）→ 燃料集合体（数百本を束ねたもの）。使用済み燃料の再処理で回収した Pu を混ぜたのが <strong>MOX 燃料</strong>。</p>
      </Box>

      <h2 id="rinkai"><span className="h-num">4.</span>臨界と反応度</h2>
      <div className="table-wrap"><table className="data">
        <thead><tr><th>状態</th><th>中性子増倍率 k</th><th>意味</th></tr></thead>
        <tbody>
          <tr><td>臨界</td><td>k = 1</td><td>連鎖反応が一定割合で持続（通常運転）</td></tr>
          <tr><td>未臨界</td><td>k &lt; 1</td><td>反応が減衰（停止・制御棒挿入）</td></tr>
          <tr><td>超臨界</td><td>k &gt; 1</td><td>反応が増加（出力上昇中・制御された状態で危険ではない）</td></tr>
        </tbody>
      </table></div>
      <Box kind="tip" label="超臨界は爆発状態ではない">
        <p>起動時は必ず超臨界（出力増加）を経て定格に達する。危険なのは制御棒が追いつかない<strong>「即発超臨界」</strong>で、超臨界とは別概念。</p>
      </Box>

      <h2 id="keisan"><span className="h-num">5.</span>核分裂エネルギーの計算（R06上 問4・R05上 問4 型）</h2>
      <p>問4の計算型はほぼこの1パターン：<strong>ウランの核分裂エネルギーを求め、化石燃料の発熱量と比較する</strong>。</p>
      <FormulaCard num="N1" name="質量とエネルギーの等価（アインシュタインの式）" eq="E = mc^2\;[\text{J}]"
        note="m: 質量欠損 [kg]、c = 3×10⁸ m/s。核分裂で失われた質量（質量欠損・元の約0.09%）がエネルギーに変わる。" />
      <Box kind="example" label="定番の数値：U-235 1g の核分裂エネルギー">
        <p>核分裂1回で約 <strong>200 MeV</strong> 放出。U-235 1g に含まれる原子数は 6.02×10²³ ÷ 235 ≒ 2.56×10²¹ 個なので、</p>
        <p>E ≒ 2.56×10²¹ × 200×10⁶ × 1.602×10⁻¹⁹ J ≒ <strong>8.2×10¹⁰ J</strong></p>
        <p>重油（発熱量 約44,000 kJ/kg）に換算すると 8.2×10¹⁰ ÷ 4.4×10⁷ ≒ <strong>約1.9 t 分</strong>。「ウラン1g ≒ 重油約2t」のオーダー感覚を持っておくと検算に使える。出題では質量欠損 m が与えられて E=mc² を使う形と、1核分裂あたり200MeVから積み上げる形の両方がある。</p>
      </Box>
      <Box kind="warn" label="計算の引っかけ">
        <ul>
          <li><strong>MeV→J の換算</strong>：1 eV = 1.602×10⁻¹⁹ J（1 MeV = 1.602×10⁻¹³ J）。指数を1つ間違えると桁が6ずれる。</li>
          <li><strong>「1gが全部核分裂する」とは限らない</strong>：問題文の「核分裂した質量」「燃焼度」の条件を読む。</li>
          <li>発電電力量に直すときは<strong>熱効率（軽水炉 約30〜35%）を掛ける</strong>のを忘れない。</li>
        </ul>
      </Box>

      <h2 id="trap"><span className="h-num">6.</span>引っかけ・誤答ポイント</h2>
      <Box kind="warn" label="頻出4トラップ">
        <ul>
          <li><strong>制御棒の操作方向</strong> — 挿入で出力<strong>低下</strong>・引抜で上昇。緊急停止(スクラム)は全制御棒一斉挿入。「引き抜くと下がる」は誤り。</li>
          <li><strong>PWRとBWRの逆転</strong> — 直接タービンへ蒸気を送るのは<strong>BWR</strong>。PWRは蒸気発生器を介す（一次は沸騰させない）。</li>
          <li><strong>原子力の熱効率を火力より高いと誤認</strong> — 軽水炉は高温蒸気が使えず（280〜300℃）熱効率30〜35%で火力(35〜42%)より<strong>低い</strong>。</li>
          <li><strong>減速材と制御棒材料の混同</strong> — 軽水は減速材・冷却材。制御棒はハフニウム・ホウ素・カドミウム。</li>
        </ul>
      </Box>

      <h2 id="seigo"><span className="h-num">7.</span>正誤判定の急所</h2>
      <div className="table-wrap"><table className="data">
        <thead><tr><th>命題</th><th>判定</th><th>理由</th></tr></thead>
        <tbody>
          <tr><td>PWRでは一次冷却水が直接タービンを回す</td><td><strong>誤</strong></td><td>蒸気発生器で二次側を沸騰させて回す</td></tr>
          <tr><td>BWRでは炉内蒸気が直接タービンを回す</td><td><strong>正</strong></td><td>直接サイクル（放射性蒸気）</td></tr>
          <tr><td>制御棒の材料にはウランが使われる</td><td><strong>誤</strong></td><td>中性子吸収材（ハフニウム等）</td></tr>
          <tr><td>CANDUは天然ウランを燃料に使用できる</td><td><strong>正</strong></td><td>重水は中性子吸収が少ない</td></tr>
          <tr><td>制御棒を挿入すると出力が上昇する</td><td><strong>誤</strong></td><td>挿入で中性子吸収増→出力低下</td></tr>
          <tr><td>PWRの冷却水系統はBWRより多い</td><td><strong>正</strong></td><td>PWR=2系統・BWR=1系統</td></tr>
        </tbody>
      </table></div>

      <h2 id="kakomon"><span className="h-num">8.</span>出題実績（約26問・毎年 問4）</h2>
      <p>核燃料サイクル・原子炉型(PWR/BWR)・4要素・臨界の論説/穴埋めが中心。計算はウランと石炭/重油の発熱量比較。</p>

          <tr><td>R04下</td><td>問4</td><td>日本の原子炉の型と特性</td><td>穴埋</td></tr>

      <h2 id="taiyou"><span className="h-num">3.</span>太陽光発電</h2>

      </Box>

      <h2 id="furyoku"><span className="h-num">4.</span>風力発電（P は風速の3乗）</h2>
      <FormulaCard num="02" name="風力エネルギー（必須）" eq="P = \dfrac{1}{2}\,\rho A v^3\,[\text{W}]"

      <Box kind="warn" label="風速の3乗に比例（2乗ではない）">

      <h2 id="nenryo"><span className="h-num">5.</span>燃料電池（カルノー非依存）</h2>

      <h2 id="trap"><span className="h-num">6.</span>引っかけ・誤答ポイント</h2>
      <Box kind="warn" label="頻出5トラップ">

      <h2 id="intro"><span className="h-num">1.</span>直感的理解 — なぜ「全日効率」を別概念にするか</h2>
      <p>瞬時効率 <Eq tex="\eta = P_{out}/(P_{out}+P_i+P_c)" /> は<strong>負荷率 α が固定</strong>の前提で、ある瞬間の効率を表す。実プラントの変圧器は昼夜・休日・季節で負荷率が大きく変動するため、<strong>24時間ぶん積分した「全日効率」</strong>で評価しないと設備設計や更新判断を誤る。</p>
      <Box kind="tip" label="3行で本質">
        <ul>
          <li>鉄損 <Eq tex="P_i" /> は<strong>電圧があれば24hずっと一定</strong>（無負荷損）→ 1日で <Eq tex="24 P_i" /> [Wh]</li>
          <li>銅損 <Eq tex="P_c" /> は<strong>負荷率の二乗</strong>に比例 → 時間別の負荷率パターンを掛けて積分</li>
          <li>全日効率 ＝ 1日の出力電力量 ÷（1日の出力電力量 ＋ 1日の鉄損 ＋ 1日の銅損）</li>
        </ul>
      </Box>
      <Box kind="warn" label="瞬時効率最大の負荷率 ≠ 全日効率最大の負荷率">
        <p>瞬時効率は <Eq tex="P_i = \alpha^2 P_{c,full}" /> で最大化（鉄損＝銅損／基礎ハブの最大効率条件）。全日効率は24hの負荷パターンに依存するため、軽負荷時間が長い変圧器では<strong>鉄損を小さくした機種</strong>（アモルファスなど）が有利になる。この差異が出題の核心。</p>
      </Box>

      <h2 id="zenjitsu"><span className="h-num">2.</span>全日効率の本格計算</h2>
      <FormulaCard num="01" name="全日効率（24h積分）" eq="\eta_{day} = \dfrac{\sum_k P_{out,k}\,t_k}{\sum_k P_{out,k}\,t_k + 24 P_i + \sum_k \alpha_k^2 P_{c,full}\,t_k} \times 100\,[\%]"
        note="Pout,k=Sn·αk·cosθ（時間帯kの出力）、tk=時間帯kの時間[h]（Σtk=24h）、Pi=鉄損[W]（一定）、Pc,full=定格時の銅損[W]。" />
      <Box kind="warn" label="負荷率は皮相 [kV·A] 基準">
        <p>変圧器の定格は皮相電力 <Eq tex="S_n" /> [V·A] で与えられる。負荷率も皮相基準で、有効電力 <Eq tex="P_{out}" /> [W] から負荷率を出すときは<strong>力率で割って皮相に戻す</strong>：<Eq tex="\alpha = P_{out}/(S_n \cos\theta)" />。これを忘れて <Eq tex="P_{out}/S_n" /> で計算すると力率分だけズレる（このページの正誤判定 罠①参照）。</p>
      </Box>
      <Box kind="tip" label="解法フロー（5ステップ）">
        <ul>
          <li>① 時間別の負荷率と時間を表に整理</li>
          <li>② 出力電力量 <Eq tex="\sum P_{out,k} t_k" /> を集計 [Wh]</li>
          <li>③ 鉄損総量 <Eq tex="24 P_i" /> [Wh]（負荷率に依らず一定）</li>
          <li>④ 銅損総量 <Eq tex="\sum \alpha_k^2 P_{c,full} t_k" /> [Wh]</li>
          <li>⑤ 定義式に代入</li>
        </ul>
      </Box>
      <Box kind="example" label="計算例: Sn=100kV·A・力率1.0・鉄損Pi=500W・定格銅損Pc,full=1500W">
        <div className="table-wrap"><table className="data">
          <thead><tr><th>時間帯</th><th>時間 tk [h]</th><th>負荷率 αk</th><th>出力 Pout,k [kW]</th></tr></thead>
          <tbody>
            <tr><td>深夜（軽負荷）</td><td>8</td><td>0.2</td><td>20</td></tr>
            <tr><td>朝夕（中負荷）</td><td>10</td><td>0.6</td><td>60</td></tr>
            <tr><td>昼間（重負荷）</td><td>6</td><td>1.0</td><td>100</td></tr>
          </tbody>
        </table></div>
        <p>力率1.0のため <Eq tex="P_{out}=S_n \alpha" /> でWとV·Aが一致するケース。</p>
        <p><strong>① 出力電力量</strong>：<Eq tex="20\times8 + 60\times10 + 100\times6 = 160+600+600 = 1360\,\text{kWh}" /></p>
        <p><strong>② 鉄損総量</strong>：<Eq tex="24 P_i = 24\times500 = 12{,}000\,\text{Wh} = 12\,\text{kWh}" /></p>
        <p><strong>③ 銅損総量</strong>：<Eq tex="(0.2^2\times8 + 0.6^2\times10 + 1.0^2\times6)\times1500 = (0.32+3.6+6.0)\times1500 = 9.92\times1500 = 14{,}880\,\text{Wh} \approx 14.88\,\text{kWh}" display /></p>
        <p><strong>④ 全日効率</strong>：<Eq tex="\eta_{day} = \dfrac{1360}{1360+12+14.88}\times100 = \dfrac{1360}{1386.88}\times100 \approx 98.06\%" display /></p>
      </Box>
      <Box kind="tip" label="計算チェック">
        <p>鉄損12kWhは時間が長い深夜帯にも一定で支配的になりがち。銅損14.88kWhは昼間6hで9kWhを稼ぐ（負荷率1.0×6h×1.5kW）。軽負荷の深夜が長い設備では鉄損比率が上がる → アモルファス変圧器の利得が大きい。</p>
      </Box>

      <h2 id="nenkan"><span className="h-num">3.</span>年間損失電力量と電気代換算</h2>
      <FormulaCard num="02" name="年間損失電力量（季節変動なしの仮定）" eq="W_{loss,year} = (24 P_i + \sum \alpha_k^2 P_{c,full}\,t_k) \times 365\,[\mathrm{Wh/yr}]"
        note="負荷パターンが季節で変わらないと仮定し、1日の損失を365倍する。" />
      <FormulaCard num="03" name="年間損失額（電力量単価C [円/kWh]）" eq="\text{Cost} = W_{loss,year} \times C\,[\mathrm{JPY/yr}]"
        note="Cは電力量単価。年間損失電力量に単価を掛けて円換算→更新経済性の判断材料。" />
      <Box kind="example" label="例: 上記計算例（1日損失 12＋14.88＝26.88kWh）・単価20円/kWh">
        <p>年間損失電力量：<Eq tex="W_{loss,year} = (12+14.88)\times365 = 9{,}811\,\mathrm{kWh/yr}" /></p>
        <p>年間損失額：<Eq tex="9{,}811 \times 20 \approx 196{,}000\,\mathrm{JPY/yr}" /></p>
      </Box>

      <h2 id="koushin"><span className="h-num">4.</span>更新経済性評価（旧機→新機）</h2>
      <FormulaCard num="04" name="更新による年間損失削減" eq="\Delta W_{year} = \{(24 P_{i,old} + \sum \alpha_k^2 P_{c,old}\,t_k) - (24 P_{i,new} + \sum \alpha_k^2 P_{c,new}\,t_k)\}\times365"
        note="旧機（old）から新機（new）への更新で、年間損失電力量の差を取る。" />
      <FormulaCard num="05" name="単純回収年（ペイバック）" eq="T_{\text{pb}} = \dfrac{I}{\Delta W_{year}\times C}\,[\mathrm{yr}]"
        note="I=更新投資額[円]、ΔWyear×C=年間損失削減額[円/年]。" />
      <Box kind="warn" label="鉄損改善は「24h × 365日」で効く">
        <p>新機で鉄損が半分になれば、その効果は <Eq tex="\Delta P_i \times 8760" /> h（24h×365日）で年間に効く（負荷率に無関係）。軽負荷時間が長い変圧器ほど鉄損改善のインパクトが大きい。</p>
      </Box>

      <h2 id="amorphous"><span className="h-num">5.</span>アモルファス変圧器とトップランナー規制</h2>

      <h2 id="r04"><span className="h-num">6.</span>R04下 問12 個別解説（施設管理B問題）</h2>

      </Box>
      <Box kind="example" label="設問(a)：更新後の負荷損（定格通電時）→ 正答 (5) 4,640W">
        <p><strong>① 省エネ基準達成率の定義式</strong>（負荷率40%時の損失で評価）：<Eq tex="\text{rate}[\%] = \dfrac{W_{\text{base}}}{W_i + W_{c40}}\times100" />、ここで <Eq tex="W_{c40}=0.16\,W_{c,full}" /></p>

      <Box kind="example" label="設問(b)：更新前後の損失比率 W2/W1（300kW・遅れ力率0.8）→ 正答 (3) 65%">

        <p><strong>② 負荷率</strong>：<Eq tex="\alpha = \dfrac{375}{500} = 0.75" /></p>
        <p><strong>③ 旧機の損失</strong>：<Eq tex="W_1 = 500 + 0.75^2\times6{,}700 = 500 + 0.5625\times6{,}700 = 4{,}268.75\,\text{W}" /></p>
        <p><strong>④ 新機の損失</strong>（(a)の4,640Wを使用）：<Eq tex="W_2 = 150 + 0.75^2\times4{,}640 = 150 + 2{,}610 = 2{,}760\,\text{W}" /></p>

      </Box>

      <Box kind="warn" label="頻出トラップ">

          <li><strong>銅損を負荷率の一次（×α）で計算する</strong> → 誤。銅損は <Eq tex="\alpha^2 P_{c,full}" />。負荷率0.5のとき銅損は<strong>1/4</strong>（半分ではない）。0.75のとき0.5625倍。</li>

          <li><strong>年間値を365倍するのを忘れる</strong> → 誤。1日の損失と年間損失で桁が2桁以上違う。</li>
          <li><strong>瞬時効率最大の負荷率と全日効率最大の負荷パターンを混同</strong> → 誤。瞬時効率最大は <Eq tex="P_i=\alpha^2 P_c" />、全日効率最大は24hの負荷パターン全体で評価する別概念。</li>
        </ul>
      </Box>

      <FormulaCard num="01" name="変流比（CT）" eq="K_n = \dfrac{I_1}{I_2} = \dfrac{N_2}{N_1}"

      <FormulaCard num="02" name="変圧比（VT）" eq="K_v = \dfrac{V_1}{V_2} = \dfrac{N_1}{N_2}"

      <Box kind="tip" label="計器側からの一次値換算（試験頻出）">

      </Box>
      <p><strong>接続方式（最頻出）</strong>：CT は主回路に<strong>直列</strong>・二次計器（電流計・電流コイル）にも<strong>直列</strong>で負荷は<strong>低インピーダンス</strong>。VT は主回路に<strong>並列</strong>・二次計器（電圧計・電圧コイル）にも<strong>並列</strong>で負荷は<strong>高インピーダンス</strong>。</p>
      <Box kind="tip" label="極性記号 K-L / k-l">

      </Box>
      <FormulaCard num="03" name="比誤差" eq="\varepsilon = \dfrac{K_n I_2 - I_1}{I_1} \times 100\,[\%]"
        note="変成比のずれ。主な原因は励磁電流分の損失。位相誤差δは二次と一次の位相のずれ（鉄損・励磁電流が原因）。" />
      <Box kind="warn" label="負担（burden）が大きいほど誤差が増える">
        <p>二次側に接続する計器・継電器のインピーダンスを<strong>負担（burden）</strong>と呼ぶ［VA］。負担が大きい（多数の計器を接続）ほど二次電流による磁束減少が大きく<strong>誤差増大</strong>。負担が定格を超えると階級（精度等級）を保証できない。CT では OCR・電流計・電力計の多数接続で負担超過に注意し、さらに二次回路に絶対に<strong>開放部を作らない</strong>。</p>
      </Box>
      <FormulaCard num="04" name="残留回路（零相電流検出）" eq="I_{res} = I_a + I_b + I_c = 3 I_0"
        note="3相の相CT二次をY結線して中性線を取り出すと、その線に3相の和電流=3I0（零相電流の3倍）が流れる。" />
      <Box kind="example" label="残留回路の挙動と ZCT との違い">
        <p><strong>平衡時</strong>：<Eq tex="I_a + I_b + I_c = 0" /> → 残留回路に電流流れず。<strong>地絡時</strong>：1相に地絡電流加算 → <Eq tex="I_a + I_b + I_c \neq 0" /> → 残留回路に <strong>3 I0</strong> が流れる。残留回路は<strong>3つの相 CT</strong>の二次を組み合わせて検出（既設の相 CT を利用でき経済的）。ZCT は<strong>三相一括で1個の鉄心</strong>を通して直接検出（精度が高く小電流地絡も検出可）。</p>
      </Box>

      <h2 id="kaiho"><span className="h-num">5.</span>解法パターン（例題つき）</h2>
      <Box kind="example" label="① 変流比から一次電流を求める">
        <p>変流比 400/5 の CT で二次電流計が 3.5 A を示した。一次電流は？</p>
        <p><Eq tex="K_n = 400/5 = 80" /></p>
        <p><Eq tex="I_1 = I_2 \times K_n = 3.5 \times 80 = 280\,\text{A}" display /></p>
        <p>「比は一次/二次」を必ず確認。小数の掛け算で計算ミスが多い。</p>
      </Box>
      <Box kind="example" label="④ 残留回路から一線地絡電流を読む">
        <p>3つの相 CT 二次を Y 結線した残留回路に 0.6 A が流れた。変流比 200/5 のとき地絡電流は？</p>
        <p><Eq tex="I_0(\text{2nd}) = 0.6 / 3 = 0.2\,\text{A}" /></p>
        <p><Eq tex="K_n = 200/5 = 40" /></p>
        <p><Eq tex="I_0 = 0.2 \times 40 = 8\,\text{A}" /></p>
        <p><Eq tex="I_g = 3 I_0 = 3 \times 8 = 24\,\text{A}" display /></p>
        <p>「3で割って40倍して3倍する」と覚える（数学的には Kn 倍する＝二次の 3I0 を一次へ写し取る）。</p>
      </Box>
      <Box kind="example" label="② CT 二次回路を絶対に開放してはいけない（計器交換手順）">
        <ul>
          <li><strong>必ず二次端子を短絡してから</strong>計器を取り外す（CT には専用の短絡端子板がある）。</li>
          <li>計器を交換した後、<strong>短絡を解除</strong>して通電状態に戻す。</li>
          <li>短絡したまま放置しても<strong>過電流にはならない</strong>（むしろ安全側）。</li>
        </ul>
      </Box>
      <Box kind="example" label="③ VT 二次回路を絶対に短絡してはいけない">
        <ul>
          <li><strong>一次側を停止</strong>してから二次を触る、または<strong>二次ヒューズを抜く</strong>。</li>
          <li>通電中の VT 二次を短絡すると<strong>過大短絡電流</strong>で巻線焼損。</li>
          <li>実機の VT 二次にはヒューズが入っており、万一短絡してもヒューズが先に切れて巻線を守る。CT の禁則（開放 NG）と左右対称で混同しやすい。</li>
        </ul>
      </Box>
      <Box kind="tip" label="⑤ 取扱注意の総合判別／⑥ 極性ミスは逆動作">
        <p>取扱注意問題は4基準で判別：VT 二次は<strong>並列・短絡 NG</strong>／CT 二次は<strong>直列・開放 NG</strong>／接地は<strong>二次側1点</strong>（多点接地は循環電流発生）／計器負担は定格 VA を超えない。1つでも違反する選択肢が「誤り」。極性は CT の K 端子と電力計の電流端子、VT の K 端子と電力計の電圧端子の極性側（±）を一致させる。逆だと電力指示が負・誤値になり、差動継電器（87）では誤動作につながる。</p>
      </Box>

      <h2 id="trap"><span className="h-num">6.</span>引っかけパターン</h2>
      <Box kind="warn" label="頻出トラップ（左右対称・因果の取り違え）">
        <ul>
          <li><strong>接続方式の取り違え</strong> — 「CT は並列／VT は直列」は誤。正しくは <strong>CT 直列・VT 並列</strong>。</li>
          <li><strong>二次禁則の左右対称取り違え</strong> — 「CT 二次は短絡してはならない」は誤（短絡してよい・むしろ安全）。「VT 二次は開放してはならない」も誤（開放してよい・短絡が NG）。</li>
          <li><strong>CT 二次開放の害を「電流」と誤認</strong> — 開放すると過大<strong>電圧</strong>が発生して焼損（一次電流が全量励磁電流化→鉄心磁気飽和→二次に異常高電圧）。過大電流ではない。</li>
          <li><strong>計器用変成器＝VT のみと誤認</strong> — VT と CT の<strong>総称</strong>。JIS では両方を含む上位概念。</li>
          <li><strong>ZCT と CT の混同</strong> — ZCT は短絡電流ではなく<strong>零相電流（地絡電流）</strong>を検出する。</li>
        </ul>
      </Box>
      <Box kind="warn" label="CT 二次開放がなぜ危険か（最頻出の因果）">
        <p>通電中の CT 二次を不用意に開放すると、一次電流が全量励磁電流化して鉄心が磁気飽和し、<strong>数千 V の異常高電圧</strong>が二次に発生する。絶縁破壊・感電・焼損につながる。試験論点としても実務安全としても最頻出。</p>
      </Box>

      <h2 id="seigo"><span className="h-num">7.</span>正誤判定の急所</h2>
      <div className="table-wrap"><table className="data">
        <thead><tr><th>命題</th><th>判定</th><th>理由</th></tr></thead>
        <tbody>
          <tr><td>計器用変成器は VT と CT の総称である</td><td><strong>正</strong></td><td>JIS 用語。単独で出ても両者の話</td></tr>
          <tr><td>VT は二次側を並列接続し、CT は二次側を直列接続する</td><td><strong>正</strong></td><td>二次側の計器接続も VT 並列／CT 直列</td></tr>
          <tr><td>CT の二次側を開放しても問題ない</td><td><strong>誤</strong></td><td>鉄心磁気飽和で異常高電圧→焼損・感電</td></tr>
          <tr><td>VT の二次側を短絡しても問題ない</td><td><strong>誤</strong></td><td>過大短絡電流で巻線焼損。CT と左右対称</td></tr>
          <tr><td>CT は二次側に低インピーダンス負荷を接続する</td><td><strong>正</strong></td><td>電流計・電流コイル（内部抵抗小）</td></tr>
          <tr><td>VT は二次側に高インピーダンス負荷を接続する</td><td><strong>正</strong></td><td>電圧計・電圧コイル（内部抵抗大）</td></tr>
          <tr><td>3つの相 CT 二次を Y 結線した残留回路には常に零電流が流れる</td><td><strong>誤</strong></td><td>平衡時のみ零。地絡時は 3 I0 が流れる</td></tr>
          <tr><td>ZCT は三相それぞれの相電流を個別に検出する</td><td><strong>誤</strong></td><td>三相一括で和電流（零相電流）を検出</td></tr>
          <tr><td>CT の K 端子と二次の k 端子は同極性である</td><td><strong>正</strong></td><td>同方向の磁束を発生する同極性端子</td></tr>
          <tr><td>計器用変成器の二次側は接地しない方が安全である</td><td><strong>誤</strong></td><td>二次側1点接地が原則（絶縁破壊時の人身保護）</td></tr>
          <tr><td>CT 二次の計器交換時はそのまま端子を外してよい</td><td><strong>誤</strong></td><td>必ず二次端子を短絡してから取り外す</td></tr>
          <tr><td>コンデンサ形 VT（CVT）は特別高圧以上の系統で使用される</td><td><strong>正</strong></td><td>66 kV〜で鉄心 VT より絶縁設計が容易</td></tr>
        </tbody>
      </table></div>

            <tr><td><strong>開放時</strong></td><td>CB → DS</td><td>CBで電流ゼロにしてからDSを開く（DSはアーク消弧能力なし）</td></tr>
          </tbody>
        </table></div>
        <p>「入はD→C・切はC→D」を書き出してから選択肢と照合。逆順序の選択肢は<strong>DS焼損</strong>につながるNGパターン。</p>
      </Box>
      <Box kind="example" label="② 遮断器の種類と消弧媒体を結びつける（R03問8・R06下問8型）">
        <p>典型問題：「次の遮断器と消弧媒体の組合せのうち、誤っているものを選べ」。</p>
        <div className="table-wrap"><table className="data">
          <thead><tr><th>略称</th><th>消弧媒体</th><th>主流度</th><th>引っかけ筆頭</th></tr></thead>
          <tbody>
            <tr><td>OCB</td><td><strong>絶縁油</strong></td><td>× 旧式</td><td>「OCBは油で絶縁」→ 正（消弧も絶縁も油）</td></tr>
            <tr><td>ABB</td><td><strong>圧縮空気</strong></td><td>× 旧式</td><td>「ABBはSF6」→ 誤（GCBと取り違え最多）</td></tr>
            <tr><td>GCB（GISにも用いられる代表的遮断器）</td><td><strong>SF6ガス</strong></td><td>○ 主流</td><td>「GISは圧縮空気で絶縁」→ 誤（ABBと取り違え）</td></tr>
            <tr><td>VCB</td><td><strong>真空</strong></td><td>◎ 主流</td><td>「VCBはSF6で消弧」→ 誤（真空中で電流ゼロ点消弧）</td></tr>
          </tbody>
        </table></div>
        <p>絶縁媒体と消弧媒体は同じか、という別軸の引っかけも頻出。GISはSF6ガスが絶縁・消弧の両方を担う。</p>
      </Box>
      <Box kind="example" label="③ 開閉機器の遮断能力を仕分ける（R02問8型）">
        <p>典型問題：「次の開閉機器のうち、事故電流を遮断できるものを選べ」。</p>

          <tbody>
            <tr><td>DS</td><td>×</td><td>×</td><td>保守時の電路分離（無電流で操作）</td></tr>

      </Box>

      <h3 className="h-sub">差動継電器（87）の原理</h3>
      <FormulaCard num="01" name="差動継電器の動作判定（入出力電流の差）" eq="|I_{in} - I_{out}| > I_{set} \;\Rightarrow\; \text{trip}"
        note="入力電流 Iin（CT1）と出力電流 Iout（CT2）の差が整定値 Iset を超えるとトリップ。正常時は Iin≒Iout で差≒0＝不動作。内部故障時は Iin≠Iout で差が大きくなり動作する。" />
      <Box kind="example" label="差動継電器が変圧器内部故障を検出できる理由">
        <p>変圧器が正常動作している場合、一次側電流と二次側電流は変圧比に従って一定の比率を保つ。差動継電器は両者の差を監視しており、正常時は差≒0。内部故障（巻線間短絡・地絡等）が発生すると、故障電流の一部が変圧器内部を短絡経路で流れ、一次・二次の電流比が崩れる。この「差」を検出してトリップする。<strong>外部短絡では一次・二次の差が出ないため誤動作しない</strong>（保護範囲が変圧器内部に限定）。</p>
      </Box>

      <h3 className="h-sub">距離継電器（21）の原理</h3>
      <FormulaCard num="02" name="距離継電器の動作判定（インピーダンス）" eq="Z = \dfrac{V}{I} \le Z_{set} \;\Rightarrow\; \text{trip}"
        note="CT・VT の入力から Z=V/I を計算し、整定値 Zset 以下なら事故とみなしてトリップ。整定値は保護したい線路のインピーダンスに対応する値。物理的距離ではなくインピーダンスで判定する点が頻出ひっかけ。" />
      <ul>

        <li><strong>段階保護</strong>：1 段（瞬時）・2 段（短時限）・3 段（長時限）の 3 段で広い範囲をカバー</li>
      </ul>

      <h3 className="h-sub">DGR（地絡方向継電器）の特殊性</h3>
      <p>DGR は <strong>電流の大きさ＋方向（位相）</strong> の両方を判定する。これにより自構内/構外の地絡を仕分け、波及事故を防止する。</p>
      <div className="table-wrap"><table className="data">
        <thead><tr><th>地絡の場所</th><th>地絡電流の方向</th><th>DGRの動作</th></tr></thead>
        <tbody>
          <tr><td>自構内の地絡</td><td>「構内向き」</td><td><strong>動作</strong></td></tr>
          <tr><td>隣接回路の地絡</td><td>「構外向き」</td><td><strong>不動作</strong>（波及防止）</td></tr>
        </tbody>
      </table></div>
      <p>DGR の入力は <strong>ZCT（零相電流）＋ EVT（零相電圧）</strong> のセット（詳細は計器用変成器ページ）。</p>

      <h2 id="seitei"><span className="h-num">5.</span>整定の考え方 — 時限協調・方向・比率差動</h2>
      <h3 className="h-sub">OCR の整定（時限協調）</h3>
      <p>直列に複数の OCR が並ぶ系統では、<strong>下流が先に動作・上流が後で動作</strong> する時限差をつける（<strong>時限協調</strong>）。下流の OCR が先にトリップして事故区間だけを切り離し、上流の健全区間は通電を継続。下流が動作失敗した場合のバックアップとして上流が動作する（例：上流 OCR 0.6s／下流 OCR 0.3s）。</p>
      <Box kind="tip" label="DGR・差動の整定">
        <ul>
          <li><strong>DGR</strong>：電流整定＝地絡電流の最小予想値より小さく／方向整定＝自構内方向のみ動作するよう位相基準を設定／時限整定＝上位（系統側）の DGR と協調</li>
          <li><strong>差動（87）</strong>：不平衡電流許容値＝CT 誤差・タップ位置による差を吸収する余裕／<strong>比率差動特性</strong>＝負荷電流に比例して動作感度を変え、外部事故時の誤動作を防止</li>
        </ul>
      </Box>

      <h2 id="kaiho"><span className="h-num">6.</span>解法パターン</h2>
      <Box kind="example" label="① 略称・器具番号・用途を結びつける（R06上問8型）">
        <p>「名称と 器具番号の組合せのうち誤っているものを選べ」型。判別の核：<strong>OCR=51（過電流）／OCGR=51G（地絡の大きさのみ）／DGR=67G（地絡の大きさ＋方向）／UVR=27（不足電圧）／OVR=59（過電圧）／87（差動）／21（距離）</strong>。51・87・21 は暗記必須。</p>
      </Box>
      <Box kind="example" label="② 差動（87）と距離（21）の原理を判別（R04上問8型）">
        <p>2 軸対比：差動は <strong>2 つの CT の電流の「差」</strong> で内部のみ保護（外部短絡で不動作）。距離は <strong>CT+VT の V/I＝インピーダンス</strong> で整定値以下区間を保護。決め手は「<strong>差で見る vs インピーダンスで見る</strong>」。</p>
      </Box>
      <Box kind="example" label="③ 定限時・反限時の判別（OCR論点）">
        <p>「電流が大きいほど動作時間が短い特性は？」→ <strong>反限時</strong>。「電流に関わらず一定時間」→ <strong>定限時</strong>。「整定値超で即時」→ <strong>瞬時特性</strong>（大電流事故の高速遮断・87 と併用）。両者の取り違えが引っかけ筆頭。</p>
      </Box>
      <Box kind="example" label="④ 保護継電器方式の総合判別（R01問8型）">
        <p>「誤っているものを選べ」型のチェックリスト：(1) OCR の時限協調＝下流先動作・上流バックアップ（下流時限＜上流時限）／(2) 87＝内部故障のみ動作／(3) 21＝インピーダンス（V/I）で判定・物理距離ではない／(4) DGR＝ZCT＋EVT で自構内/構外を仕分け／(5) 段階保護＝距離継電器は 1 段（瞬時）・2 段（短時限）・3 段（長時限）。<strong>保護範囲の誤認</strong>と <strong>方向判定の有無</strong>が出題の約7割。</p>
      </Box>

      <h2 id="trap"><span className="h-num">7.</span>引っかけパターン</h2>
      <Box kind="warn" label="頻出トラップ TOP5">
        <ul>
          <li><strong>OCR と OCGR の混同</strong> — 「OCR は地絡電流を検出する」は誤。OCR は <strong>過電流</strong>（短絡等）。地絡は OCGR（51G）または DGR（67G）。</li>
          <li><strong>DGR の動作条件</strong> — 「DGR は電流の大きさだけで地絡を判定する」は誤。大きさに加え <strong>方向（位相）</strong> も判定する。</li>
          <li><strong>差動継電器の保護範囲</strong> — 「87 は変圧器の外部短絡でも動作する」は誤。<strong>内部故障のみ</strong>動作。外部短絡では一次・二次の差が出ない。</li>
          <li><strong>距離継電器の動作</strong> — 「事故点までの物理的距離で動作する」は誤。<strong>インピーダンス（V/I）</strong>で動作する。</li>
          <li><strong>反限時と定限時の取り違え</strong> — 「定限時は電流が大きいほど早く動作する」は誤。定限時は <strong>一定時間</strong>。電流が大きいほど早いのは <strong>反限時</strong>。</li>
        </ul>
      </Box>

          <tr><td>UVR は電圧が整定値以下になったとき動作する</td><td><strong>正</strong></td><td>不足電圧継電器（27）</td></tr>

          <tr><td>器具番号 87 は差動継電器である</td><td><strong>正</strong></td><td>ANSI/IEEE C37.2 と共通の番号体系</td></tr>
          <tr><td>DGR の入力には ZCT と EVT を用いる</td><td><strong>正</strong></td><td>零相電流と零相電圧の両方で方向判定</td></tr>
          <tr><td>OCR は時限協調により上流より下流を早く動作させる</td><td><strong>正</strong></td><td>下流先動作・上流バックアップが時限協調の原則</td></tr>
        </tbody>

      <FormulaCard num="02" name="残留回路（零相電流の取り出し）" eq="I_{res} = 3 I_0\ (\text{2nd}),\quad I_g = 3 I_0\ (\text{1st})"

        <p>② 変流比 <Eq tex="K_n = 200 / 5 = 40" /></p>
        <p>③ 一次零相電流 <Eq tex="I_0 = 0.2 \times 40 = 8\,\text{A}" /></p>
        <p>④ 一線地絡電流 <Eq tex="I_g = 3 I_0 = 3 \times 8 = 24\,\text{A}" display /></p>

            <tr><td>DS→CB の操作順序（入はD→C・切はC→D）</td><td>★★★</td><td>遮断器・断路器</td></tr>
            <tr><td>GIS の絶縁媒体 = SF6</td><td>★★★</td><td>遮断器・断路器</td></tr>
            <tr><td>DGR は大きさ＋方向（位相）も判定</td><td>★★☆</td><td>保護継電器</td></tr>
            <tr><td>差動継電器(87)の保護範囲は内部のみ</td><td>★★☆</td><td>保護継電器</td></tr>
          </tbody>

      <h2 id="trap"><span className="h-num">6.</span>引っかけ・誤答ポイント</h2>
      <Box kind="warn" label="3役割を横断する頻出トラップ">
        <ul>
          <li><strong>CT 二次開放を「過大電流で焼損」と誤認</strong> — 正しくは過大「電圧」。一次電流が全量励磁電流化し鉄心が磁気飽和して二次に異常高電圧が発生する。CT の禁則は開放 NG、VT は短絡 NG（左右対称で混同最多）。</li>
          <li><strong>断路器(DS)で事故電流を切れると誤認</strong> — DS はアーク消弧能力がなく、無電流時の電路分離専用。投入は DS→CB、開放は CB→DS の順を逆にすると DS が焼損する。</li>
          <li><strong>GIS は圧縮空気で絶縁と誤認</strong> — GIS は SF6 ガス。圧縮空気を使うのは空気遮断器(ABB)。VCB は真空で消弧（SF6 ではない）。</li>
          <li><strong>DGR を「大きさだけで判定」と誤認</strong> — DGR は大きさに加え方向（位相）も判定し、自構内向きのみ動作して波及事故を防ぐ。入力は ZCT（零相電流）＋EVT（零相電圧）のセット。</li>
          <li><strong>差動継電器(87)が外部短絡でも動作と誤認</strong> — 87 は内部故障のみ動作。外部短絡では一次・二次の差が出ず誤動作しない（保護範囲が内部に限定）。</li>
        </ul>
      </Box>

      <h2 id="seigo"><span className="h-num">7.</span>正誤判定の急所</h2>
      <div className="table-wrap"><table className="data">
        <thead><tr><th>命題</th><th>判定</th><th>理由</th></tr></thead>
        <tbody>
          <tr><td>計器用変成器は VT と CT の総称である</td><td><strong>正</strong></td><td>JIS 用語。VT・CT 両方を含む上位概念</td></tr>
          <tr><td>CT の二次側を開放しても問題ない</td><td><strong>誤</strong></td><td>鉄心磁気飽和で異常高電圧が発生し焼損・感電</td></tr>
          <tr><td>VT の二次側を短絡しても問題ない</td><td><strong>誤</strong></td><td>過大短絡電流で巻線焼損。CT と左右対称の禁則</td></tr>
          <tr><td>断路器は事故電流を遮断できる</td><td><strong>誤</strong></td><td>DS は電流遮断能力なし。遮断は CB の役割</td></tr>
          <tr><td>遮断器投入時は CB→DS の順で操作する</td><td><strong>誤</strong></td><td>投入は DS→CB。開放が CB→DS</td></tr>
          <tr><td>GIS は圧縮空気を絶縁媒体に使用する</td><td><strong>誤</strong></td><td>SF6（六フッ化硫黄）ガス。圧縮空気は ABB</td></tr>
          <tr><td>真空遮断器の消弧媒体は真空である</td><td><strong>正</strong></td><td>真空中はアークを維持できず電流ゼロ点で消弧</td></tr>
          <tr><td>地絡方向継電器(DGR)は電流の大きさだけで判定する</td><td><strong>誤</strong></td><td>大きさに加え方向（位相）も判定</td></tr>
          <tr><td>差動継電器(87)は変圧器の外部短絡でも動作する</td><td><strong>誤</strong></td><td>内部故障のみ動作。外部短絡では差が出ない</td></tr>
          <tr><td>OCR の反限時特性は電流が大きいほど短時間で動作する</td><td><strong>正</strong></td><td>重大事故ほど早期遮断の論理</td></tr>
        </tbody>

      </Box>

      <h2 id="denkai"><span className="h-num">3.</span>同軸円筒ケーブルの電界分布と電位傾度</h2>
      <p>電力ケーブルは、中心の<strong>円筒導体</strong>を絶縁体が包み、その外を<strong>遮へい層（外側の円筒）</strong>が同心状に覆う<strong>同軸円筒構造</strong>。導体と遮へいの間（絶縁体の中）には架空送電線と同じく放射状の電界ができるが、外側が遮へいで閉じている点が違う。導体半径を <Eq tex="d/2" />、遮へい内半径を <Eq tex="D/2" /> とすると、絶縁体内の距離 <Eq tex="r" /> の点の電界は次式で表される。</p>
      <FormulaCard num="C1" name="同軸円筒内の電界（絶縁体中・d/2 ≤ r ≤ D/2）" eq="E(r) = \dfrac{V}{r\,\ln(D/d)}\;[\text{V/m}]"
        note="V=導体・遮へい間の電圧。分母 ln(D/d) は後述の静電容量 C=2πε/ln(D/d) と同じ項。E は 1/r で減衰し、内側の導体表面（r=d/2）で最大になる。" />
      <p><strong>電界は内側の導体表面で最大</strong>（電位傾度が最大）、遮へい側で最小になる。導体表面の最大電位傾度は次式で、絶縁体はこの最大値に耐えなければならない。</p>
      <FormulaCard num="C2" name="導体表面の最大電位傾度" eq="E_{\max} = \dfrac{V}{(d/2)\,\ln(D/d)} = \dfrac{2V}{d\,\ln(D/d)}\;[\text{V/m}]"
        note="r=d/2（導体表面）での値。細い導体・薄い絶縁ほど E_max が大きくなり、絶縁ストレスが増す。" />

        <svg viewBox="0 0 640 250" width="100%" style={{ maxWidth: "640px", height: "auto", display: "block", margin: "0 auto" }} role="img" aria-label="同軸円筒ケーブルの断面と絶縁体内の電界、距離に対する電界分布のグラフ">

      <Box kind="tip" label="架空送電線のコロナ（円筒導体の電界）と同じ物理">
        <p>これは架空送電線ページの「円筒導体まわりの電界 <Eq tex="E = \lambda/(2\pi\varepsilon_0 r)" />」と同じ 1/r の放射状電界。違いは、架空線が<strong>開放空間</strong>で電界が遠方まで広がるのに対し、ケーブルは<strong>遮へいで閉じた同軸空間</strong>で電界が絶縁体内で完結し外へ漏れない点。どちらも<strong>導体表面で電界が最大</strong>になり、そこが絶縁の弱点になる。</p>
      </Box>
      <Box kind="example" label="なぜ半導電層で導体表面をならすのか（設備構造との接続）">
        <p>最大電位傾度 <Eq tex="E_{\max}" /> は導体表面に集中するため、導体表面に微小な凹凸や突起があると、その先端で電界がさらに局所的に跳ね上がって絶縁体を傷める。<strong>内部半導電層</strong>は導体表面をなめらかな等電位面にならし、<Eq tex="E_{\max}" /> を設計値どおりに抑える。設備構造の「半導電層で電界を均一化」は、この最大電位傾度の局所集中を防ぐ操作である。</p>
      </Box>
      <Box kind="warn" label="絶縁は薄いほどよい…わけではない（電界と静電容量のトレードオフ）">
        <p>絶縁層を薄く（D/d を 1 に近づける）すると静電容量 <Eq tex="C = 2\pi\varepsilon/\ln(D/d)" /> は大きくなるが、同時に <Eq tex="E_{\max} = 2V/(d\ln(D/d))" /> も大きくなり絶縁破壊しやすくなる。実務では導体径・絶縁厚を、<Eq tex="E_{\max}" /> が絶縁材料の耐電界以下に収まるよう設計する。3種では「導体表面で電界最大・薄い絶縁ほど電位傾度が大きい」という定性関係を押さえれば十分。</p>
      </Box>

      <h2 id="hikaku"><span className="h-num">4.</span>架空送電 vs 地中送電 比較表（最重要）</h2>
      <p>架空線と地中ケーブルで <strong>L・C・フェランチ効果のしやすさが逆転</strong>する点が試験の急所。</p>
      <div className="table-wrap"><table className="data">
        <thead><tr><th>項目</th><th>架空送電線</th><th>地中ケーブル</th></tr></thead>
        <tbody>
          <tr><td>建設費</td><td>低い</td><td>高い（5〜10倍以上）</td></tr>
          <tr><td>保守・復旧</td><td>巡視は容易・事故復旧は早い</td><td>故障は少ないが、<strong>事故点の探査・復旧に長時間</strong>かかる</td></tr>
          <tr><td>信頼性・事故頻度</td><td>低（雷・風雪・塩害の影響大）</td><td>高（外部環境の影響小）</td></tr>
          <tr><td>事故復旧時間</td><td>短い（目視で発見しやすい）</td><td>長い（掘削が必要）</td></tr>
          <tr><td>充電電流</td><td>小さい</td><td><strong>大きい</strong>（静電容量 C が大）</td></tr>
          <tr><td>インダクタンス L</td><td>大きい</td><td><strong>小さい</strong>（導体間距離が小さい）</td></tr>
          <tr><td>静電容量 C</td><td>小さい</td><td><strong>大きい</strong>（導体間距離が小さい）</td></tr>
          <tr><td>フェランチ効果の発生しやすさ</td><td>比較的少ない</td><td><strong>発生しやすい</strong>（C が大のため）</td></tr>
          <tr><td>熱放散</td><td>容易（空気冷却）</td><td>困難（土壌依存）</td></tr>
          <tr><td>環境影響・景観</td><td>鉄塔が目立つ・土地が使えない</td><td>地中化で景観保護・土地は使える</td></tr>
        </tbody>
      </table></div>

      <h2 id="cable"><span className="h-num">5.</span>ケーブルの種類比較（CV と OF）</h2>
      <div className="table-wrap"><table className="data">
        <thead><tr><th>種類</th><th>絶縁材料</th><th>誘電正接 tanδ</th><th>最高使用温度</th><th>特徴</th></tr></thead>
        <tbody>
          <tr><td>OFケーブル（油浸紙絶縁油入）</td><td>浸油紙</td><td>大きい（目安 0.002〜0.004）</td><td>75〜85℃</td><td><strong>絶縁油を加圧・給油し、絶縁層内にボイド（空隙）が生じるのを防ぐ</strong>方式。給油設備が要り油圧管理が必要・漏油リスク</td></tr>
          <tr><td>CVケーブル（XLPE絶縁ビニルシース）</td><td>XLPE</td><td><strong>小さい</strong>（目安 0.0003〜0.001）</td><td><strong>90℃</strong></td><td>軽量・油不要・現在の主流</td></tr>
          <tr><td>CVTケーブル</td><td>XLPE（単心3条）</td><td>小さい</td><td>90℃</td><td>単心ケーブルを3本撚り合わせ</td></tr>
        </tbody>
      </table></div>
      <Box kind="example" label="CV が OF より誘電損が少ない理由（因果理解）">
        <p>誘電損 <Eq tex="P_d = \omega C V^2 \tan\delta" /> から、絶縁材料の誘電正接 <Eq tex="\tan\delta" /> が誘電損を左右する。OFケーブルの絶縁体（浸油紙）は油を含む有機紙で、双極子（分子の正負の電荷の中心がずれた構造）が交番電界で向きを変えるたびにエネルギーを消費する。この分子レベルの摩擦が誘電損の正体。XLPE は分子構造が均一で双極子が少なく <Eq tex="\tan\delta" /> が桁違いに小さいため、同じ電圧・静電容量でも誘電損が OF の数分の一になる。最高使用温度も CV（90℃）が OF（75〜85℃）より高く、CV の方が許容電流を大きく取れる。</p>
      </Box>

            <h2 id="zukan"><span className="h-num">6.</span>見た目で見分けるケーブル・電線図鑑（全種横断）</h2>
      <p>電験では名称・用途だけでなく、<strong>断面や外観のイメージ</strong>から種類を問われることがある。<strong>低圧・一般用／高圧・特別高圧／その他の線材・導体</strong>の3群に分け、外観と見分けポイントを整理する。第5節の CV / OF 比較と合わせ、<strong>外観 → 名称 → 用途</strong>を一続きで覚えるとよい。</p>
      <Box kind="warn" label="この節の使い方（重要）">
        <p><strong>本節は地中送電に限らず、ケーブル・電線を横断的に集めた資料である。</strong>このうち<strong>地中送電で主に使うのは CV・CVT・OF</strong> の3種（OF は既設中心で、新設は CV 系が主流）。IV・HIV・VVF・VVR は<strong>屋内低圧配線</strong>、CVV は<strong>制御・信号回路用</strong>、ACSR・TACSR・硬銅線・耐熱銅合金線・高圧架空配電線は<strong>架空線</strong>、亜鉛めっき鋼線・鋼より線は<strong>支持・保護用</strong>であり、地中送電の選択肢ではない。<strong>「このページで見た＝地中用」と早合点しないこと</strong>。</p>
        <p>掲載画像は<strong>外観の全体像をつかむためのイメージ</strong>である。<strong>層構成・素線数・寸法などの細部は製品や規格により異なる</strong>ので、CV ケーブルの正確な断面（導体→内部半導電層→架橋ポリエチレン絶縁→外部半導電層→金属遮へい層→防食層）は第2節の構造図・本文で確認すること。外観識別が有効なのは <strong>VVF↔VVR・CV↔CVT・銅系↔アルミ系・単線↔より線</strong> など。<strong>ACSR↔TACSR や 硬銅線↔耐熱銅合金線は外観だけでは判別できず、問題文の記述で判断する</strong>。</p>
      </Box>

      <h3 id="zukan-tei">低圧・一般用ケーブル（8種）</h3>
      <div className="cbl-grid">
        {CBL_LOW.map(c => <CableCard key={c.no} c={c} />)}
      </div>
      <Box kind="tip" label="低圧・一般用の見分け4軸">
        <p>① <strong>単心か多心か</strong>（芯線が1本か複数か）／② <strong>平形か丸形か</strong>（外形）／③ <strong>電力用か制御用か</strong>（太い電力線か細い信号線か）／④ <strong>耐熱・耐火などの特殊性</strong>（HIV＝耐熱・MI＝耐火）。この4軸を順に当てはめると名称に落とし込める。</p>
      </Box>

      <h3 id="zukan-kou">高圧・特別高圧の電線・ケーブル（6種）</h3>
      <p>※ 架空線では「ケーブル」より「電線・導体」と呼ぶことも多い。</p>
      <div className="cbl-grid">
        {CBL_HIGH.map(c => <CableCard key={c.no} c={c} />)}
      </div>
      <Box kind="tip" label="高圧・特別高圧の見分け4軸">
        <p>① <strong>架空線か地中線か</strong>（電柱・鉄塔なら架空／受電設備・地中ならケーブル系）／② <strong>被覆付きか裸電線か</strong>（高圧配電は被覆付き／特高送電は裸線が多い）／③ <strong>配電用か送電用か</strong>（6.6kV級は配電／特別高圧以上は送電）／④ <strong>単心・3本組・大容量用か</strong>（CV／CVT／ACSR・TACSR・OF を見分ける）。</p>
      </Box>

      <h3 id="zukan-other">その他の線材・導体（6種）</h3>
      <p>ケーブルの前段として、導体そのもの（銅系・鋼系・アルミ系の裸線）も外観で問われる。「電気を流す導体」か「支える線」かを区別する。</p>
      <div className="cbl-grid">
        {CBL_OTHER.map(c => <CableCard key={c.no} c={c} />)}
      </div>
      <Box kind="tip" label="その他の線材の見分け4軸">
        <p>① <strong>銅系か鋼系かアルミ系か</strong>（色と材質でまず判別：赤銅色＝銅／銀色＝鋼・アルミ）／② <strong>単線かより線か</strong>（1本か複数をより合わせたか）／③ <strong>導体用か支持用か</strong>（電流を流すか支えるか＝亜鉛めっき鋼線は支持用）／④ <strong>強度・耐熱・柔らかさ</strong>のどれを重視した線か。</p>
      </Box>

      <Box kind="warn" label="混同ペア（ここが狙われる）">
        <ul>
          <li><strong>VVF ↔ VVR</strong>：平形が VVF、丸形が VVR。外形で即断する。</li>
          <li><strong>硬銅線 ↔ 亜鉛めっき鋼線</strong>：赤銅色で導体用が硬銅線、銀色で支持・補強用が亜鉛めっき鋼線（電流より強度）。</li>
          <li><strong>硬銅線 ↔ アルミ線</strong>：導電性の銅（配電・引込）と、軽量で長スパン向きのアルミ（架空送電導体）。</li>
          <li><strong>CV ↔ CVT</strong>：1本の丸形が CV、単心3本をより合わせたのが CVT（三相3線）。</li>
          <li><strong>IV ↔ HIV</strong>：見た目はほぼ同じ。<strong>耐熱グレードが HIV</strong>。</li>
          <li><strong>ACSR ↔ TACSR</strong>：どちらも鋼心アルミより線で<strong>外観だけでは判別できない</strong>。問題文の「<strong>耐熱・大容量・電流増加</strong>」の記述があれば TACSR（耐熱アルミ合金）と判断する。</li>
          <li><strong>高圧絶縁電線 ↔ ACSR</strong>：被覆ありで電柱の配電が高圧絶縁電線、被覆なしの裸より線で鉄塔の送電が ACSR。</li>
        </ul>
      </Box>

      <h2 id="fusetsu"><span className="h-num">7.</span>布設方式の3分類（管路式・暗きょ式・直接埋設式）</h2>
      <p>地中電線路の布設方式は<strong>管路式・暗きょ式・直接埋設式</strong>の3つ。当Wikiの分野別集計では近年の下期に布設方式を含む地中電線路の論説が続けて挙がっている（<strong>年度・問番号は試験センター公表の過去問で要確認</strong>）。<strong>「放熱（許容電流）」と「外傷・保守性」が裏返しのトレードオフになる</strong>点が狙われる。（施設基準の条文そのものは法規科目の範囲）</p>
      <div className="table-wrap"><table className="data">
        <thead><tr><th>比較軸</th><th>直接埋設式</th><th>管路式</th><th>暗きょ式（洞道）</th></tr></thead>
        <tbody>
          <tr><td>布設方法</td><td>ケーブルを直接土中に埋設</td><td>埋設した管に引き入れる</td><td>地下の暗きょ内に布設</td></tr>
          <tr><td>建設費・工期</td><td><strong>安い・短い</strong></td><td>中</td><td><strong>高い・長い</strong></td></tr>
          <tr><td>放熱・許容電流</td><td><strong>良い</strong>（土壌に直接接触）</td><td><strong>悪い</strong>（管内の空気層で熱がこもる）</td><td>換気により確保（多条時は相互加熱に注意）</td></tr>
          <tr><td>外傷・第三者被害</td><td><strong>受けやすい</strong></td><td>受けにくい</td><td>受けにくい</td></tr>
          <tr><td>多条数の布設</td><td>不向き</td><td>中</td><td><strong>最も多条に対応</strong></td></tr>
          <tr><td>増設・引替・保守</td><td><strong>困難</strong>（掘削が必要）</td><td>容易（マンホールから引替。増設は予備管がある場合）</td><td><strong>容易</strong>（人が立ち入れる）</td></tr>
        </tbody>
      </table></div>
      <Box kind="warn" label="【頻出】「安い方式ほど放熱が良い」— 直感と逆になる">
        <p><strong>直接埋設式は最も安く工期も短いのに、管路式より放熱が良く許容電流を大きく取れる</strong>。ケーブルが土に直接触れて熱が逃げるため。逆に管路式は<strong>管内の空気層が断熱材のように働き、放熱が悪く許容電流が小さくなる</strong>。「管路で保護されている＝性能も上」と考えると逆を選ばされる。（同一条件・少条数での比較。直接埋設でも多条を近接させれば相互加熱で許容電流は下がる）</p>
        <p>ただし直接埋設式は<strong>外傷を受けやすく、増設・事故復旧に掘削が必要</strong>という弱点があり、これが管路式・暗きょ式の長所とちょうど裏返しになる。<strong>「安い・放熱良い」と「守られている・保守しやすい」はセットで手に入らない</strong>と押さえる。</p>
      </Box>

      <h2 id="formula"><span className="h-num">8.</span>公式マップ（最重要）</h2>
      <FormulaCard num="01" name="充電電流（ケーブルはコンデンサ）" eq="I_c = \omega C V = 2\pi f C V\,[\text{A}]"
        note="ω=2πf（角周波数）、C=ケーブルの静電容量[F]、V=相電圧[V]（三相なら線間電圧÷√3）。ケーブルに交流を印加すると Q=CV が充電され、電流は電荷の時間微分で振幅 ωCV。" />
      <FormulaCard num="02" name="誘電損（絶縁体の損失）" eq="P_d = \omega C V^2 \tan\delta\,[\text{W}]"
        note="V は相電圧（対地電圧）で1相分。三相合計はその3倍。tanδ=誘電正接（絶縁材料の損失特性）。理想コンデンサは有効電力0だが、実際は損失角δだけ90°からずれ P=VI sinδ。δが小さく sinδ≈tanδ として整理。OFより CVの方が tanδ が小さく誘電損が少ない。" />
      <FormulaCard num="03" name="ケーブルの静電容量（同軸構造）" eq="C = \dfrac{2\pi\varepsilon}{\ln(D/d)}\,[\text{F/m}]"
        note="D=外側導体（遮へい）径、d=内側導体径。D/d が小さい（導体と遮へいが近い）ほど C が大きい。地中ケーブルは絶縁層が薄く C が大、架空線は導体間距離が大きく C が小。" />
      <Box kind="tip" label="C が大きいか小さいかは「導体間距離」で決まる">
        <p><strong>架空送電線</strong>は導体間（または導体と大地間）の距離が数m〜数十mと大きいので C は小さい。<strong>地中ケーブル</strong>は絶縁層が薄く導体と遮へい層の距離が数mm〜数十mmと小さいので C は大きい。この「距離が近い＝C大」が、充電電流大・フェランチ効果が起きやすいことの根本原因。</p>
      </Box>
      <Box kind="formula" label="ケーブルの損失は3つ — 抵抗損・誘電体損・シース損">
        <p>ケーブルで発生する損失は次の3つ。どれか1つを問われることが多いので<strong>3点セットで覚える</strong>。</p>
        <ol>
          <li><strong>抵抗損（導体損）</strong> — 導体の抵抗に電流が流れて生じる <Eq tex="I^2 R" />。負荷電流の2乗で増え、<strong>通常の負荷運転時には3損失中で最大</strong>。ただし<strong>無負荷・軽負荷では電流が小さく、電圧で決まる誘電体損の方が相対的に大きくなる</strong>。</li>
          <li><strong>誘電体損（誘電損）</strong> — 絶縁体の分子摩擦。1相分は <Eq tex="P_d = \omega C E^2 \tan\delta" />（<Eq tex="E" />＝対地電圧）で、<strong>三相合計はその3倍</strong>（線間電圧 <Eq tex="V" /> で書けば <Eq tex="\omega C V^2 \tan\delta" />）。<strong>電圧が掛かっていれば無負荷でも発生</strong>するのが特徴。</li>
          <li><strong>シース損</strong> — 金属シース（遮へい層）に生じる損失。<strong>単心ケーブル</strong>では導体電流がつくる磁束でシースに電圧が誘起され、<strong>シースの両端を接地すると循環電流が流れて発熱する</strong>（シース回路損）。ほかに渦電流損もある（3心ケーブルは3相の磁束がほぼ打ち消し合うため問題になりにくい）。</li>
        </ol>
        <p><strong>シース回路損（循環電流）の低減策＝クロスボンド接地</strong>。ケーブルの<strong>大区間（メジャーセクション）を3等分した小区間ごとに3相のシースを順番に入れ替えて接続</strong>すると、大区間トータルでシースの誘起電圧の和がほぼゼロになり、循環電流が流れなくなる（短距離線路では<strong>片端接地</strong>も用いられる）。なお<strong>渦電流損はクロスボンドでは消えない</strong>点に注意</p>
      </Box>

      <h2 id="kaiho"><span className="h-num">9.</span>解法パターン（充電電流の計算）</h2>
      <Box kind="tip" label="充電電流 Ic=ωCV の見分け方と手順">
        <p><strong>見分け方</strong>：「地中ケーブル」「静電容量 ○ μF/km」「充電電流」のキーワードが揃っている。</p>
        <ol>
          <li><Eq tex="\omega = 2\pi f" /> を計算（f=50Hz なら ω=2π×50≈314 rad/s）</li>
          <li>静電容量を F に換算（μF/km なら線路長[km]を掛けて全体の C[F] に）</li>
          <li>三相なら相電圧 <Eq tex="V = V_L/\sqrt{3}" /> を使って <Eq tex="I_c = \omega C V" /> に代入</li>
        </ol>
      </Box>
      <Box kind="example" label="例題: 線路長10km・静電容量0.2μF/km・66kV系統・f=50Hz の充電電流は？">
        <p>① 全体の静電容量：</p>
        <p><Eq tex="C = 0.2\times10^{-6}\times 10 = 2\times10^{-6}\,\text{F}" display /></p>
        <p>② 角周波数：<Eq tex="\omega = 2\pi\times50 \approx 314\,\text{rad/s}" /></p>
        <p>③ 三相なので相電圧を使う：<Eq tex="V = \dfrac{66{,}000}{\sqrt{3}} \approx 38{,}105\,\text{V}" /></p>
        <p>④ 充電電流：</p>
        <p><Eq tex="I_c = 314 \times 2\times10^{-6} \times 38{,}105 \approx 23.9\,\text{A}" display /></p>
      </Box>

      <h2 id="trap"><span className="h-num">10.</span>引っかけ・誤答ポイント</h2>
      <Box kind="warn" label="【頻出1】L と C の大小が架空と逆">
        <p>「地中ケーブルは架空送電線よりインダクタンス L が大きく、静電容量 C が小さい」→ <strong>誤り</strong>。導体間距離が小さいため <strong>L は小さく・C は大きい</strong>。架空線とまったく逆になる点が狙われる。</p>
      </Box>
      <Box kind="warn" label="【頻出2】フェランチ効果は地中ケーブルで起きやすい">
        <p>「フェランチ効果は架空送電線の方が起きやすい」→ <strong>誤り</strong>。フェランチ効果（受電端電圧が送電端電圧より高くなる現象）は<strong>静電容量 C が大きいほど発生しやすい</strong>。地中ケーブルは C が桁違いに大きく、軽負荷・無負荷時に充電電流による進み無効電力が大きくなるため、フェランチ効果が顕著になる。</p>
      </Box>
      <Box kind="warn" label="【頻出3】CV と OF の最高使用温度">
        <p>「CVケーブルの最高使用温度は OF ケーブルより低い」→ <strong>誤り</strong>。CV（XLPE絶縁）は <strong>90℃</strong>、OF（浸油紙絶縁）は75〜85℃。CV の方が高く、許容電流を大きく取れる。</p>
      </Box>
      <Box kind="warn" label="【頻出4】事故復旧時間は信頼性とは別の指標">
        <p>「地中ケーブルの事故復旧は架空送電線より短時間で済む」→ <strong>誤り</strong>。事故<strong>頻度</strong>（信頼性）は地中の方が低い（高信頼）が、一度事故が起きると掘削が必要なため<strong>復旧時間は長い</strong>。信頼性と復旧時間を混同させる引っかけ。</p>
      </Box>

      <h2 id="seigo"><span className="h-num">11.</span>正誤判定の急所</h2>
      <div className="table-wrap"><table className="data">
        <thead><tr><th>命題</th><th>判定</th><th>理由</th></tr></thead>
        <tbody>
          <tr><td>地中ケーブルは架空送電線より静電容量が小さい</td><td><strong>誤</strong></td><td>導体間距離が小さく C は大きい</td></tr>
          <tr><td>CVケーブルはOFケーブルより誘電正接が小さく誘電損が少ない</td><td><strong>正</strong></td><td>XLPEは浸油紙より tanδ が小さい</td></tr>
          <tr><td>地中ケーブルの事故復旧は架空送電線より短時間で済む</td><td><strong>誤</strong></td><td>掘削が必要で時間がかかる</td></tr>
          <tr><td>フェランチ効果は地中ケーブルで発生しやすい</td><td><strong>正</strong></td><td>C が大きく充電電流が多いため</td></tr>
          <tr><td>CVケーブルの最高使用温度はOFケーブルより高い</td><td><strong>正</strong></td><td>CV=90℃、OF=75〜85℃</td></tr>
          <tr><td>地中ケーブルはインダクタンスが架空送電線より大きい</td><td><strong>誤</strong></td><td>導体間距離が小さく L は小さい</td></tr>
          <tr><td>地中送電は雷害や風雪の影響を受けにくく信頼性が高い</td><td><strong>正</strong></td><td>地中埋設で外部環境の影響が小</td></tr>
          <tr><td>充電電流は静電容量と周波数に比例する</td><td><strong>正</strong></td><td>Ic=ωCV=2πfCV（f と C に比例）</td></tr>
        </tbody>

          <text x="510" y="250" textAnchor="middle" fontSize="11.5" fontWeight="600" fill="var(--ink-soft)">電流 → 磁界 → 相互インダクタンス M</text>
        </svg>
        <p style={{ margin: "8px 4px 0", fontSize: "12px", color: "var(--ink-mute)", textAlign: "center" }}>左: 静電誘導（電圧→電界→静電容量 C）／右: 電磁誘導（電流→磁界→相互インダクタンス M）。原因と結合経路がちょうど裏返しの関係になっている。</p>
      </div>

      {/* 2. 静電誘導 */}
      <h2 id="seiden"><span className="h-num">2.</span>静電誘導 — 電圧由来（容量結合）</h2>
      <p><strong>静電誘導</strong>＝送電線の<strong>対地電圧</strong>が、送電線と通信線の間の<strong>静電容量（相互容量）</strong>を介して通信線に電圧を誘起する現象。電線と通信線の間に「目に見えないコンデンサ」があり、通信線と大地の間にもコンデンサがあるため、通信線が分圧されて電位をもつ。<strong>電流が流れていなくても、電圧がかかっていれば常時発生</strong>する（無負荷・充電状態でも生じる）点が急所。</p>

      <div style={{ margin: "18px 0", padding: "14px 12px", background: "var(--bg-sunken)", border: "1px solid var(--rule)", borderRadius: "10px" }}>
        <svg viewBox="0 0 680 320" width="100%" style={{ maxWidth: "680px", height: "auto", display: "block", margin: "0 auto" }} role="img" aria-label="三相送電線と通信線の間の相互容量Ca・Cb・Ccと、通信線の対地容量Csによる分圧回路の図">

          <circle cx="340" cy="52" r="9" fill="var(--danger)" />
          <circle cx="480" cy="52" r="9" fill="var(--danger)" />

          <text x="480" y="34" textAnchor="middle" fontSize="12" fontWeight="600" fill="var(--danger)">c相</text>
          <text x="600" y="56" textAnchor="middle" fontSize="11" fill="var(--danger)">送電線</text>

          {/* Ca */}

          <line x1="186" y1="130" x2="214" y2="130" stroke="var(--accent-ink)" strokeWidth="2" />
          <line x1="186" y1="138" x2="214" y2="138" stroke="var(--accent-ink)" strokeWidth="2" />
          <line x1="200" y1="140" x2="200" y2="228" stroke="var(--accent)" strokeWidth="1.6" strokeDasharray="4 3" />
          <text x="224" y="138" fontSize="11" fontWeight="700" fill="var(--accent-ink)">Ca</text>

          {/* Cb */}
          <line x1="340" y1="61" x2="340" y2="128" stroke="var(--accent)" strokeWidth="1.6" strokeDasharray="4 3" />
          <line x1="326" y1="130" x2="354" y2="130" stroke="var(--accent-ink)" strokeWidth="2" />
          <line x1="326" y1="138" x2="354" y2="138" stroke="var(--accent-ink)" strokeWidth="2" />
          <line x1="340" y1="140" x2="340" y2="228" stroke="var(--accent)" strokeWidth="1.6" strokeDasharray="4 3" />
          <text x="364" y="138" fontSize="11" fontWeight="700" fill="var(--accent-ink)">Cb</text>

          <line x1="480" y1="61" x2="480" y2="128" stroke="var(--accent)" strokeWidth="1.6" strokeDasharray="4 3" />
          <line x1="466" y1="130" x2="494" y2="130" stroke="var(--accent-ink)" strokeWidth="2" />
          <line x1="466" y1="138" x2="494" y2="138" stroke="var(--accent-ink)" strokeWidth="2" />
          <line x1="480" y1="140" x2="480" y2="228" stroke="var(--accent)" strokeWidth="1.6" strokeDasharray="4 3" />
          <text x="504" y="138" fontSize="11" fontWeight="700" fill="var(--accent-ink)">Cc</text>

          {/* 通信線 */}
          <line x1="90" y1="230" x2="590" y2="230" stroke="var(--warn)" strokeWidth="2.6" />

          {/* Cs（対地容量） */}
          <line x1="340" y1="232" x2="340" y2="270" stroke="var(--ink-mute)" strokeWidth="1.6" strokeDasharray="4 3" />

          <line x1="326" y1="280" x2="354" y2="280" stroke="var(--ink-soft)" strokeWidth="2" />

      </div>

      <FormulaCard num="Y1" name="静電誘導電圧（不平衡分・代表式）"
        eq="E_s = \dfrac{\sqrt{C_a{}^2 + C_b{}^2 + C_c{}^2 - C_aC_b - C_bC_c - C_cC_a}}{C_a + C_b + C_c + C_s}\, E"
        note="E＝送電線の対地電圧。Ca＝Cb＝Cc（完全ねん架・対称配置）なら分子がゼロになり Es＝0。だから静電誘導対策の要はねん架と対称配置。" />
      <Box kind="tip" label="静電誘導の3つの急所">
        <ul style={{ margin: "4px 0 0", paddingLeft: "20px", lineHeight: 1.9 }}>
          <li>原因は<strong>電圧</strong>（電流ではない）。負荷電流ゼロでも発生する。</li>
          <li>大きさは送電線の<strong>電圧に比例</strong>し、相互容量の<strong>不平衡</strong>で決まる。</li>
          <li><strong>ねん架・対称配置</strong>で Ca＝Cb＝Cc に近づけると打ち消せる。</li>
        </ul>
      </Box>

      {/* 3. 電磁誘導 */}
      <h2 id="denji"><span className="h-num">3.</span>電磁誘導 — 電流由来（磁気結合）・地絡時に急増</h2>
      <p><strong>電磁誘導</strong>＝送電線の<strong>電流</strong>が作る<strong>磁束</strong>が、並行する通信線と鎖交し、<strong>相互インダクタンス M</strong>を介して誘導起電力を生じさせる現象（変圧器と同じ原理）。平常時は<strong>三相電流のベクトル和がほぼゼロ</strong>（Ia＋Ib＋Ic≈0）で磁束が打ち消し合うため誘導は小さい。ところが<strong>地絡事故</strong>が起きると三相の対称性が崩れ、大きな<strong>零相電流</strong>（残留電流 3I₀＝地絡電流）が流れて磁束が打ち消されず、通信線に大きな誘導電圧が現れる。<strong>電磁誘導障害が問題になるのは、この地絡事故時</strong>。</p>

      <div style={{ margin: "18px 0", padding: "14px 12px", background: "var(--bg-sunken)", border: "1px solid var(--rule)", borderRadius: "10px" }}>
        <svg viewBox="0 0 680 300" width="100%" style={{ maxWidth: "680px", height: "auto", display: "block", margin: "0 auto" }} role="img" aria-label="送電線の地絡電流3I0が作る磁束が並行する通信線と鎖交し、相互インダクタンスMを介して誘導電圧Emを生じる図">
          <defs>
            <marker id="ys-arrow-i2" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
              <path d="M0,0 L10,5 L0,10 z" fill="var(--danger)" />
            </marker>
          </defs>
          {/* 送電線（電流）・ラベルは磁束と衝突しない右側へ退避 */}
          <line x1="60" y1="80" x2="620" y2="80" stroke="var(--danger)" strokeWidth="3.4" markerEnd="url(#ys-arrow-i2)" />
          <text x="400" y="60" textAnchor="middle" fontSize="12" fontWeight="600" fill="var(--danger)">送電線（電流）</text>
          <text x="390" y="106" textAnchor="middle" fontSize="11" fill="var(--danger)">平常時 Ia+Ib+Ic ≈ 0 → 地絡時 3I₀ が残る</text>

          {/* 磁束（同心円・左寄せでラベル回避） */}
          <circle cx="170" cy="80" r="16" fill="none" stroke="var(--ok)" strokeWidth="1.6" strokeDasharray="4 3" />
          <circle cx="170" cy="80" r="30" fill="none" stroke="var(--ok)" strokeWidth="1.6" strokeDasharray="4 3" />
          <circle cx="170" cy="80" r="44" fill="none" stroke="var(--ok)" strokeWidth="1.6" strokeDasharray="4 3" />
          <text x="170" y="150" textAnchor="middle" fontSize="12" fontWeight="600" fill="var(--ok)">磁束 Φ（電流が作る）</text>

          {/* 相互インダクタンスM（離隔） */}
          <line x1="540" y1="88" x2="540" y2="212" stroke="var(--ink-mute)" strokeWidth="1.2" strokeDasharray="3 3" />
          <line x1="534" y1="88" x2="546" y2="88" stroke="var(--ink-mute)" strokeWidth="1.2" />
          <line x1="534" y1="212" x2="546" y2="212" stroke="var(--ink-mute)" strokeWidth="1.2" />
          <text x="556" y="150" fontSize="11" fontWeight="700" fill="var(--ok)">M・離隔 d</text>

          {/* 通信線 */}
          <line x1="60" y1="220" x2="620" y2="220" stroke="var(--warn)" strokeWidth="2.8" strokeDasharray="2 2" />
          <text x="230" y="242" textAnchor="middle" fontSize="12" fontWeight="600" fill="var(--warn)">通信線（誘導電圧 Em・並行長 ℓ）</text>

          {/* 大地 */}
          <line x1="60" y1="278" x2="620" y2="278" stroke="var(--ink-mute)" strokeWidth="2" />
          <text x="90" y="293" fontSize="11" fill="var(--ink-mute)">大地</text>
        </svg>
        <p style={{ margin: "8px 4px 0", fontSize: "12px", color: "var(--ink-mute)", textAlign: "center" }}>送電線電流が作る磁束 Φ が通信線と鎖交し、相互インダクタンス M を介して Em を誘起。平常時は三相の磁束が打ち消し合うが、地絡時は 3I₀ が残って Em が急増する。</p>
      </div>

      <FormulaCard num="Y2" name="電磁誘導電圧（地絡事故時）"
        eq="E_m = \omega M \ell \,(3I_0) = 2\pi f\, M \ell \,(3I_0)\;[\text{V}]"
        note="M＝送電線と通信線の相互インダクタンス[H/km]、ℓ＝並行長[km]、3I₀＝地絡電流（零相電流の3倍）[A]。周波数 f・並行長 ℓ・地絡電流が大きいほど、離隔が小さいほど大きくなる。" />
      <Box kind="warn" label="電磁誘導の急所 — 地絡電流を小さくすれば障害も小さい">
        <p>Em は<strong>地絡電流 3I₀ に比例</strong>する。だから中性点接地方式が効いてくる：<strong>直接接地は地絡電流が大きく電磁誘導障害も大きい</strong>／<strong>抵抗接地・消弧リアクトル接地は地絡電流を抑えて障害を小さくできる</strong>。加えて<strong>故障を高速遮断</strong>して誘導電圧の継続時間を短くするのも有効。</p>
      </Box>

      {/* 4. 比較表 */}
      <h2 id="hikaku"><span className="h-num">4.</span>静電誘導 vs 電磁誘導（対比表・裏返り防止）</h2>
      <div className="table-wrap"><table className="data">
        <thead><tr><th>項目</th><th>静電誘導</th><th>電磁誘導</th></tr></thead>
        <tbody>
          <tr><td>原因</td><td><strong>電線路の電圧 V</strong></td><td><strong>電線路の電流 I</strong></td></tr>
          <tr><td>結合</td><td>静電容量 C（コンデンサ・電界）</td><td>相互インダクタンス M（磁束・磁界）</td></tr>
          <tr><td>比例するもの</td><td>電圧に比例</td><td>電流に比例</td></tr>
          <tr><td>平常時</td><td>電圧があれば常時発生（不平衡分）</td><td>三相電流のベクトル和≈0 で小さい</td></tr>
          <tr><td>最大になる時</td><td>常時（無負荷・充電状態でも）</td><td><strong>地絡事故時（3I₀ が流れる）</strong></td></tr>
          <tr><td>代表式</td><td>Es＝√(…)/(ΣC)·E</td><td>Em＝ωMℓ·3I₀</td></tr>
          <tr><td>主な対策</td><td>ねん架・対称配置・遮蔽線</td><td>地絡電流抑制・高速遮断・ねん架・遮蔽線</td></tr>
        </tbody>
      </table></div>

      {/* 5. 裏返り防止 */}
      <h2 id="anti-reverse"><span className="h-num">5.</span>なぜ反対に間違えるのか — 名前を分解して固定する</h2>
      <Box kind="example" label="名前がそのまま原因を指している">
        <ul style={{ margin: "4px 0 0", paddingLeft: "20px", lineHeight: 2.0 }}>
          <li><strong>「静電」誘導</strong> → 静電気 → 電荷 → 電界 → <strong>電圧</strong>が原因 → 相手は<strong>コンデンサ C</strong></li>
          <li><strong>「電磁」誘導</strong> → 電流がつくる磁界 → 磁束 → <strong>電流</strong>が原因 → 相手は<strong>相互インダクタンス M</strong></li>
        </ul>
        <p style={{ margin: "10px 0 0" }}>試験で迷ったら問題文のキーワードで機械的に振り分ける：「<strong>電圧・充電・無負荷でも</strong>」とあれば<strong>静電</strong>／「<strong>電流・地絡事故・零相電流</strong>」とあれば<strong>電磁</strong>。特に<strong>地絡事故時に問題になるのは電磁誘導</strong>を固定すると、R07上問9・H28問8 のような論説で裏返らない。</p>
      </Box>

      {/* 6. 対策 */}
      <h2 id="taisaku"><span className="h-num">6.</span>誘導障害の対策</h2>
      <div className="table-wrap"><table className="data">
        <thead><tr><th>区分</th><th>対策</th><th>効く理由</th></tr></thead>
        <tbody>
          <tr><td>共通</td><td>送電線と通信線の<strong>離隔距離</strong>を大きくする</td><td>C も M も距離が離れるほど小さくなる</td></tr>
          <tr><td>共通</td><td><strong>ねん架</strong>（電線の位置を区間ごとに入れ替える）</td><td>相互容量・相互インダクタンスを三相で均等化し打ち消す</td></tr>
          <tr><td>共通</td><td><strong>遮蔽線</strong>（架空地線）の設置・接地</td><td>誘導を遮蔽線側に肩代わりさせ通信線への誘導を低減</td></tr>
          <tr><td>共通</td><td>通信線を<strong>ケーブル化し金属遮蔽層を接地</strong></td><td>電界・磁界を遮蔽して誘起電圧を抑える</td></tr>
          <tr><td>静電のみ</td><td><strong>対称配置</strong>（相導体の幾何配置を対称に）</td><td>Ca＝Cb＝Cc に近づけて静電誘導電圧を打ち消す</td></tr>
          <tr><td>電磁のみ</td><td><strong>中性点を抵抗接地／消弧リアクトル接地</strong></td><td>地絡電流 3I₀ を小さくして Em を下げる（直接接地は逆に大きい）</td></tr>
          <tr><td>電磁のみ</td><td>保護継電器で<strong>故障を高速遮断</strong></td><td>大きな誘導電圧の継続時間を短くする</td></tr>
        </tbody>
      </table></div>
      <Box kind="warn" label="中性点接地方式は「静電」ではなく「電磁」に効く">
        <p>中性点接地方式（直接／抵抗／消弧リアクトル）が変えるのは<strong>地絡電流の大きさ</strong>なので、効くのは<strong>電磁誘導</strong>側。静電誘導は電圧由来なので中性点接地方式では変わらない。「静電誘導対策に中性点接地」と書いた選択肢は誤り。</p>
      </Box>

      {/* 7. 正誤判定 */}
      <h2 id="seigo"><span className="h-num">7.</span>正誤判定の急所</h2>
      <div className="table-wrap"><table className="data">
        <thead><tr><th>命題</th><th>判定</th><th>理由</th></tr></thead>
        <tbody>
          <tr><td>静電誘導は送電線の電流によって生じる</td><td><strong>誤</strong></td><td>静電誘導の原因は電圧。電流由来は電磁誘導</td></tr>
          <tr><td>電磁誘導障害は地絡事故時に大きくなる</td><td><strong>正</strong></td><td>3I₀（零相電流）が流れ磁束が打ち消されない</td></tr>
          <tr><td>完全なねん架で静電誘導電圧は打ち消される</td><td><strong>正</strong></td><td>Ca＝Cb＝Cc となり Es の分子が 0</td></tr>
          <tr><td>電磁誘導軽減には中性点を直接接地するのがよい</td><td><strong>誤</strong></td><td>直接接地は地絡電流大→障害大。抵抗／消弧リアクトルが有効</td></tr>
          <tr><td>通信線をケーブル化し遮蔽層を接地すると障害が減る</td><td><strong>正</strong></td><td>電界・磁界を遮蔽して誘起電圧を抑える</td></tr>
          <tr><td>静電誘導は負荷電流が流れていなくても発生する</td><td><strong>正</strong></td><td>電圧が原因なので無負荷（充電状態）でも生じる</td></tr>
        </tbody>
      </table></div>

      {/* 8. 出題実績 */}
      <h2 id="kakomon"><span className="h-num">8.</span>出題実績（論説中心・取り違えを問う）</h2>
      <div className="table-wrap"><table className="data">
        <thead><tr><th>年度</th><th>問</th><th>テーマ</th><th>形式</th></tr></thead>
        <tbody>
          <tr><td>R07上</td><td>問9</td><td>架空送電線路に発生する誘導障害</td><td>論説</td></tr>
          <tr><td>H28</td><td>問8</td><td>誘導障害（静電・電磁の区別と対策）</td><td>論説</td></tr>
        </tbody>
      </table></div>
      <Box kind="tip" label="出題のねらい">
        <p>論説で問われるのは「原因（電圧か電流か）」「地絡時に効くのは電磁」「対策の対応づけ（ねん架・遮蔽線・中性点接地）」の3点。数値計算はまれで、<strong>静電／電磁の取り違えと対策の対応づけ</strong>で得点が決まる。</p>
      </Box>

      {/* 9. 関連ページ */}
      <h2 id="related"><span className="h-num">9.</span>関連ページ</h2>
      <Box kind="tip" label="つながる知識（点と点を結ぶ）">

      <h2 id="renkei"><span className="h-num">7.</span>系統連系と単独運転防止</h2>
      <p>太陽光・風力・小水力等の分散型電源を系統につなぐには、系統連系規程（JEAG 9701）に沿った要件を満たす必要がある。</p>
      <div className="table-wrap"><table className="data">
        <thead><tr><th>要件</th><th>内容</th></tr></thead>
        <tbody>
          <tr><td>単独運転防止</td><td>系統停電時に分散型電源が単独で運転（アイランディング）しないこと</td></tr>
          <tr><td>逆潮流</td><td>余剰電力を系統に逆流させること。大部分の分散型電源で認められている</td></tr>
          <tr><td>保護協調</td><td>系統の保護システムと連系点の保護装置を協調させること</td></tr>
          <tr><td>電圧変動</td><td>連系により配電線の電圧が許容範囲を超えないこと</td></tr>
          <tr><td>高調波</td><td>インバータから発生する高調波が規制値以下であること</td></tr>
        </tbody>
      </table></div>
      <Box kind="warn" label="逆潮流は「有効電力」の流れだけ（頻出引っかけ）">
        <p>系統連系規程での逆潮流の定義は「分散型電源設置者の構内から、一般送配電事業者の電力系統側へ向かう<strong>有効電力</strong>の流れ」。</p>
        <ul>
          <li><strong>無効電力は逆潮流に含めない</strong>。連系点で系統側へ無効電力が流れていても「逆潮流」とは呼ばない。逆潮流の有無は<strong>有効電力の向き</strong>だけで判定する。</li>
          <li>「逆潮流あり」＝余剰電力を売電している状態。「逆潮流なし連系」＝発電を構内消費だけに使い有効電力を系統へ流さない運用で、<strong>RPR（逆電力継電器）</strong>で逆潮流を監視・防止する。</li>
          <li><strong>なぜ有効電力だけか</strong>：売電量や系統側の電圧上昇に直接効くのは有効電力の往来で、無効電力は力率・電圧調整として別枠で管理するため。</li>
        </ul>
      </Box>
      <Box kind="example" label="単独運転防止（アイランディング防止）が必要な理由">
        <p>系統停電時に分散型電源が単独で電圧を供給し続けると、（1）需要家側に電圧が印加されたまま残り作業員の感電リスクが生じ、（2）系統復旧時の位相不一致で機器が損傷する。<strong>検出方法</strong>は、周波数・電圧に意図的な変動を与えて検出する<strong>能動的方式</strong>と、周波数・電圧の急変を検出する<strong>受動的方式</strong>。<strong>対策</strong>は、系統停電を検出したら自動的に解列（連系点遮断）すること。</p>
      </Box>
      <Box kind="tip" label="単独運転検出方式（受動的3・能動的3）">
        <div className="table-wrap"><table className="data">
          <thead><tr><th>方式</th><th>代表例</th><th>検出原理（イメージ）</th></tr></thead>
          <tbody>
            <tr><td><strong>受動的</strong></td><td>電圧位相跳躍検出</td><td>系統が切れると負荷の力率分だけ電圧位相が急に飛ぶ→その跳躍を検出</td></tr>
            <tr><td><strong>受動的</strong></td><td>周波数変化率検出（ROCOF, df/dt）</td><td>系統が切れると需給アンバランス分だけ周波数が急変→変化の速さを検出</td></tr>
            <tr><td><strong>受動的</strong></td><td>3次高調波電圧急増検出</td><td>系統が切れると変圧器由来の3次高調波電圧が逃げ場を失い急増→それを検出</td></tr>
            <tr><td><strong>能動的</strong></td><td>周波数シフト方式</td><td>出力周波数を少し押し続ける。系統ありなら抑え込まれ変化なし／切れると周波数がずれ続ける</td></tr>
            <tr><td><strong>能動的</strong></td><td>無効電力変動方式</td><td>無効電力を周期的に変動させる。系統ありなら影響なし／切れると周波数が揺れる</td></tr>
            <tr><td><strong>能動的</strong></td><td>負荷変動方式</td><td>瞬間的に負荷を挿入し電圧の変化を見る。系統ありなら変化小／切れると電圧が大きく動く</td></tr>
          </tbody>
        </table></div>
        <p><strong>受動的</strong>＝系統が切れた瞬間のショック（急変）を見る。<strong>能動的</strong>＝わざと小さく揺さぶり続け、揺れが返ってこなければ（＝揺れが増幅されれば）系統が消えたと判断する。能動的は感度が高いが、複数台連系時に互いの揺さぶりが干渉する課題がある。</p>
      </Box>
      <Box kind="warn" label="再エネ大量導入と系統の慣性力（頻出引っかけ）">
        <p>「太陽光発電を大量に系統連系すると系統の慣性力が増す」→ <strong>誤り</strong>。太陽光発電はインバータ（直流→交流変換器）経由で接続されるため、同期発電機の回転体がもつ慣性力（イナーシャ）に相当するものがない。太陽光比率が上がると系統全体の慣性力が<strong>低下</strong>し、周波数が変動しやすくなる。対策は蓄電池（BESS）・揚水との組み合わせ、需要側制御（DR）。</p>
      </Box>

      <h2 id="formula"><span className="h-num">8.</span>公式マップと負荷持続曲線</h2>
      <FormulaCard num="01" name="設備利用率" eq="U = \dfrac{W}{P \times 8760} \times 100\,[\%]"
        note="U=設備利用率、W=年間発電電力量[kWh]、P=設備容量[kW]、8760=1年の時間[h]。高いほど設備を有効活用。太陽光は約12〜18%、火力は約50〜80%。" />
      <FormulaCard num="02" name="供給予備率" eq="R = \dfrac{P_s - P_d}{P_d} \times 100\,[\%]"
        note="R=供給予備率、Ps=供給力、Pd=最大需要電力。高いほど安定供給しやすいが設備コストは増える。一般に8〜10%以上を目標とすることが多い。" />
      <Box kind="example" label="例題①: 容量100kWの太陽光が年間140,000kWh発電 → 設備利用率は？">
        <p>設備利用率 U は次式で求まる。</p>
        <p><Eq tex="U = \dfrac{140{,}000}{100 \times 8760} \times 100 = \dfrac{140{,}000}{876{,}000} \times 100 \approx 16.0\,\%" display /></p>
        <p>太陽光の目安（12〜18%）の範囲に収まる。</p>
      </Box>
      <Box kind="example" label="例題②: 供給力1,100万kW・最大需要1,000万kW → 供給予備率は？">
        <p>供給予備率 R は次式で求まる。</p>
        <p><Eq tex="R = \dfrac{1100 - 1000}{1000} \times 100 = 10.0\,\%" display /></p>
        <p>目標の8〜10%以上を満たす水準。</p>
      </Box>
      <Box kind="tip" label="負荷持続曲線とベース・ミドル・ピーク">
        <p><strong>負荷持続曲線</strong>は、年間8760時間を通じて各負荷レベルが何時間持続するかを表したグラフ。これを使って電源を割り当てる。</p>
        <ul>
          <li><strong>ベース負荷</strong> — 年間ほぼ常時必要な最低限の電力。原子力・石炭火力・大型水力で賄う</li>
          <li><strong>ミドル負荷</strong> — 昼間・平日に追加的に必要。LNG・石油火力で対応</li>
          <li><strong>ピーク負荷</strong> — 夏の猛暑日・冬の厳寒日など年間数十〜数百時間のみ。揚水・ガスタービンで対応</li>
        </ul>
      </Box>

      <h2 id="trap"><span className="h-num">9.</span>引っかけ・誤答ポイント</h2>
      <Box kind="warn" label="頻出の4トラップ">
        <ul>
          <li><strong>周波数低下の原因を逆に理解</strong> — 周波数低下＝<strong>需要が供給を上回る（需要過多）</strong>。供給過多のサインではない。</li>
          <li><strong>揚水の昼夜を逆に覚える</strong> — 揚水（汲み上げ・電力消費）は<strong>夜間</strong>、放水・発電（ピーク対応）は<strong>昼間</strong>。向きが逆の出題が頻出。</li>
          <li><strong>供給予備率は小さい方がよいと誤解</strong> — 予備率が<strong>高い</strong>ほど安定供給に有利（安全マージン大）。ただし設備コストは増える。</li>
          <li><strong>低圧100V系を100V±10Vと誤認</strong> — 正しくは<strong>101V±6V</strong>（95〜107V）。</li>
        </ul>
      </Box>

      <h2 id="seigo"><span className="h-num">10.</span>正誤判定の急所</h2>
      <div className="table-wrap"><table className="data">
        <thead><tr><th>命題</th><th>判定</th><th>理由</th></tr></thead>
        <tbody>
          <tr><td>系統周波数が低下するのは需要が供給を上回っている状態である</td><td><strong>正</strong></td><td>発電機の回転数（周波数）が需要増で低下</td></tr>
          <tr><td>揚水発電所は電力需要の多い昼間に揚水を行う</td><td><strong>誤</strong></td><td>揚水は夜間（余剰電力）。昼間は放水・発電</td></tr>
          <tr><td>設備利用率が高いほど発電設備を有効活用している</td><td><strong>正</strong></td><td>実際の発電量 / 最大可能発電量</td></tr>
          <tr><td>低圧100V系の電圧の適正範囲は100V±10Vである</td><td><strong>誤</strong></td><td>適正範囲は101V±6V（95〜107V）</td></tr>
          <tr><td>太陽光発電を大量に系統連系すると系統の慣性力が増す</td><td><strong>誤</strong></td><td>インバータ連系では慣性力は低下する</td></tr>
          <tr><td>単独運転防止は系統停電時に分散型電源を自動解列させる技術である</td><td><strong>正</strong></td><td>感電リスク・位相不一致を防ぐ</td></tr>
          <tr><td>経済負荷配分（EDC）は限界コストの高い発電所から優先的に起動する</td><td><strong>誤</strong></td><td>限界コストの低い（安い）発電所から優先</td></tr>
          <tr><td>供給予備率が高いほど電力供給の安定性が高い</td><td><strong>正</strong></td><td>需要変動・設備故障に対応しやすい</td></tr>
        </tbody>
      </table></div>

      <h3>なぜ出題周期があるのか（因果説明）</h3>

        <li><strong>問番号とテーマの固定配置</strong>: 問1=水力、問4=原子力、問14=電気材料という配置は長年の出題慣行としてほぼ固定されている（公式に明文化された制度ではなく、変わる可能性はある）。周期ではなく「テーマは固定・角度のみ変わる」という構造。</li>
        <li><strong>計算テーマの難度調整</strong>: 計算が集中するB問題（問15〜17）は各10点で配点が大きく差がつきやすい。試験委員は配電・水力・火力という頻出計算テーマの難度を回ごとに均すため、同一テーマを毎回ではなく交互に配置する傾向がある。これが特定計算の「隔年的な出題」の一因とみられる。</li>
        <li><strong>出題委員の交代サイクル</strong>: 出題委員の任期・交代周期は公表されていないが、テーマの「休眠→復活」パターンから作問体制の交代周期が推定される。委員が交代すると「前任者が出したテーマ」は一定期間避けられ、その後復活する。架空送電や地中送電でみられる「2〜3年の空白→再出題」はこのサイクルを反映している可能性が高い。</li>
      </ol>

      <h2 id="day3"><span className="h-num">1.</span>Day 3（試験3日前）— 数値と公式の因果確認</h2>

      <h3>水力発電の出力公式</h3>
      <Box kind="tip" label="P = 9.8QHη の根拠">
        <p>水の密度 ρ = 1,000 kg/m³、重力加速度 g = 9.8 m/s²。水の質量流量 = ρQ [kg/s]、位置エネルギー = mgh なので、理論水力 <Eq tex="P_0 = \rho g Q H = 1000 \times 9.8 \times Q \times H\,[\text{W}] = 9.8QH\,[\text{kW}]" />。ηは水車・発電機の総合効率。9.8 は ρg を単位変換した係数であり、丸暗記ではなく物理量の積。</p>
      </Box>
      <p><strong>確認事項</strong>:</p>
      <ul>
        <li>Q[m³/s]、H[m]、η（小数）の単位を正しく代入できるか</li>
        <li>「9.8 は ρg から導出される」と説明できるか</li>
        <li>揚水時の所要電力 <Eq tex="P = 9.8QH / \eta" />（ηで割る）と発電時（ηを掛ける）を混同しないか</li>
      </ul>

      <h3>電圧降下式</h3>
      <Box kind="tip" label="単相と三相で係数が異なる理由">
        <p><strong>単相2線式</strong>: 往路・復路の2本分の抵抗・リアクタンスが直列に入るため、係数は2。<Eq tex="v = 2I(R\cos\phi + X\sin\phi)\,[\text{V}]" /></p>
        <p><strong>三相3線式</strong>: 線電流は1本分だが、線間電圧は相電圧の√3倍。<Eq tex="v = \sqrt{3}\,I(R\cos\phi + X\sin\phi)\,[\text{V}]" /></p>
        <p>「なぜ√3か」— 三相の1線あたりの電圧降下は <Eq tex="I(R\cos\phi + X\sin\phi)" /> だが、これは相電圧の降下。線間電圧は √3 倍なので全体も √3 倍になる。</p>
      </Box>
      <p><strong>確認事項</strong>:</p>
      <ul>
        <li>単相2線式の係数「2」の理由を説明できるか</li>
        <li>三相3線式の係数「√3」の理由を説明できるか</li>
        <li>R・X・Φの定義（R=抵抗、X=リアクタンス、Φ=力率角）を言えるか</li>
      </ul>

      <h3>電力損失式</h3>
      <Box kind="tip" label="P_loss = 3I²R のI²とその意味">
        <p>3本の電線それぞれでジュール熱が発生する。1本あたりの損失は <Eq tex="I^2R" />。3本分の合計が <Eq tex="3I^2R" />。</p>
        <p><strong>I²になる理由</strong>: ジュール熱は電圧×電流 = (IR)×I = I²R。電圧に比例するのではなく、電流の2乗に比例する。これは銅損の本質。</p>
      </Box>
      <p><strong>確認事項</strong>:</p>
      <ul>
        <li>「なぜ I² か」をオームの法則から導けるか</li>
        <li>3線分あるのに係数「3」と、三相の√3の混同をしていないか</li>
      </ul>

      <h3>力率改善（コンデンサ進相）</h3>
      <Box kind="tip" label="コンデンサで線電流が減る理由">
        <p>有効電力 <Eq tex="P = \sqrt{3}\,V I \cos\phi" /> が一定のとき、cosΦが上がると <Eq tex="I = P/(\sqrt{3}\,V\cos\phi)" /> は下がる。コンデンサは遅れ電流（誘導性負荷）に対して進み電流を供給し、電源から見た無効電流を相殺→合成電流（線電流）が減少する。</p>
      </Box>
      <p><strong>確認事項</strong>:</p>
      <ul>
        <li>コンデンサが「進み無効電力を供給する」ことを説明できるか</li>
        <li>線電流が減ることで電圧降下・電力損失が同時に減る連鎖を説明できるか</li>
      </ul>

      <h2 id="day2"><span className="h-num">2.</span>Day 2（試験2日前）— 引っかけパターン復習</h2>

      <h3>DS→CB操作順序</h3>
      <Box kind="warn" label="操作順序の誤りは最頻出引っかけ">
        <p><strong>投入時</strong>: DS（断路器）先投入 → CB（遮断器）後投入。<strong>開放時</strong>: CB先開放 → DS後開放。</p>
        <p><strong>理由</strong>: DSはアーク消弧能力がない。負荷電流が流れている状態でDSを操作するとアークが発生し事故につながる。CBはアーク消弧機能を持つため、電流を切る操作は必ずCBで行う。</p>
      </Box>
      <p><strong>確認事項</strong>:</p>
      <ul>
        <li>「DSはアーク消弧できない→電流ゼロの状態でのみ操作」を言えるか</li>
        <li>投入・開放それぞれの手順を、理由とセットで説明できるか</li>
      </ul>

      <h3>揚水発電の効率方向</h3>
      <Box kind="warn" label="発電時と揚水時でηの使い方が逆">
        <p><strong>発電時</strong>: <Eq tex="P_{\text{出力}} = 9.8QH\eta" />（η掛け → エネルギーが減る方向）。<strong>揚水時</strong>: <Eq tex="P_{\text{入力}} = 9.8QH / \eta" />（η割り → 入力エネルギーが増える方向）。</p>
        <p><strong>理由</strong>: 発電時は水のエネルギーから損失を引いて電気出力を得る（出力 &lt; 理論値）。揚水時は必要な位置エネルギー以上のエネルギーを電力で投入しなければならない（入力 &gt; 理論値）。</p>
      </Box>
      <p><strong>確認事項</strong>:</p>
      <ul>
        <li>「入力=必要量/η、出力=投入量×η」という方向性を即答できるか</li>
      </ul>

      <h3>風力出力の風速指数</h3>
      <Box kind="warn" label="v²ではなくv³">
        <p>風力発電の出力 <Eq tex="P \propto v^3" />。</p>
        <p><strong>理由</strong>: 風の運動エネルギー <Eq tex="E = \frac{1}{2}mv^2" />。風量（単位時間あたりの空気質量）は <Eq tex="m \propto Av" />（断面積×風速）。よって <Eq tex="P = E \times \text{流量} \propto v^2 \times v = v^3" />。</p>
      </Box>
      <p><strong>確認事項</strong>:</p>
      <ul>
        <li>「質量流量がvに比例するため、指数が2から3になる」を説明できるか</li>
        <li>風速が2倍になると出力は8倍（2³）になることを即答できるか</li>
      </ul>

      <h3>変圧器並行運転条件</h3>
      <Box kind="tip" label="並行運転の3条件">
        <ol>
          <li><strong>巻数比（変圧比）が等しい</strong>: 異なると循環電流が流れ、無駄な損失が発生する</li>
          <li><strong>極性が等しい</strong>: 異なると電圧が打ち消しあい短絡状態になる</li>
          <li><strong>百分率インピーダンスが等しい</strong>: 異なると負荷分担が変圧器容量に比例しない</li>
        </ol>
      </Box>
      <p><strong>確認事項</strong>:</p>
      <ul>
        <li>3条件それぞれの理由（満たさないと何が起きるか）を説明できるか</li>
        <li>「容量に反比例して電流分担→インピーダンスが小さい方に過電流」を言えるか</li>
      </ul>

      <h2 id="day1"><span className="h-num">3.</span>Day 1（試験前日）— B問題計算の最終確認</h2>

      <h3>送電線路の計算手順</h3>
      <Box kind="tip" label="電圧降下・電力損失の計算ステップ">
        <ol>
          <li>負荷電流 I を求める: <Eq tex="I = P / (\sqrt{3}\,V\cos\phi)" /></li>
          <li>電圧降下 <Eq tex="v = \sqrt{3}\,I(R\cos\phi + X\sin\phi)" /> を計算</li>
          <li>電力損失 <Eq tex="P_{\text{loss}} = 3I^2R" /> を計算</li>
          <li>送電端電圧 <Eq tex="V_s = V_r + v" />（受電端基準の場合）</li>
        </ol>
        <p><strong>ミスしやすい点</strong>:</p>
        <ul>

          <li><Eq tex="\sin\phi = \sqrt{1 - \cos^2\phi}" /> を計算し忘れる</li>
          <li>受電端電圧Vrか送電端電圧Vsか問題文をよく読む</li>
        </ul>
      </Box>
      <p><strong>確認事項</strong>:</p>
      <ul>
        <li>上記4ステップを見ずに再現できるか</li>
        <li>sinΦの計算を素早く行えるか（cos=0.8→sin=0.6、cos=0.6→sin=0.8）</li>
      </ul>

      <h3>変圧器効率の最大条件</h3>
      <Box kind="tip" label="鉄損 = 銅損のとき効率最大になる数学的根拠">
        <p>効率 <Eq tex="\eta = P_{\text{out}} / (P_{\text{out}} + P_i + P_c)" /></p>
        <ul>
          <li><Eq tex="P_i" /> = 鉄損（負荷に無関係・一定）</li>
          <li><Eq tex="P_c" /> = 銅損（負荷電流Iの2乗に比例: <Eq tex="P_c = P_{c0} \times (I/I_n)^2" />）</li>
        </ul>
        <p>合計損失 <Eq tex="P_i + P_c" /> を最小化する問題。微分法より <Eq tex="P_i = P_c" /> のとき。これは「和が一定」ではなく「積が最小になる条件」— AM-GM不等式の応用。</p>
      </Box>
      <p><strong>確認事項</strong>:</p>
      <ul>
        <li>「鉄損=銅損」が最小損失の必要条件であることを導けるか</li>
        <li>最大効率時の負荷率 <Eq tex="m = \sqrt{P_i / P_{cn}}" /> を式から導けるか</li>
      </ul>

      <h2 id="theme"><span className="h-num">2.</span>最頻出テーマ別：出題傾向と配点</h2>

        <p><Eq tex="v = \sqrt{3}\,I(R\cos\phi + X\sin\phi)" display /> （三相3線式）</p>

          <li>三相と単相の係数（√3 vs 2）を取り違える</li>

      <h3>2位：変圧器（効率・負荷分担）</h3>

      <Box kind="example" label="計算テンプレート（効率）">

        <p>全日入力エネルギー = Σ(P_出力 × 時間) + 鉄損 × 24h + Σ(銅損 × 負荷率² × 時間)</p>

        <p>※ <Eq tex="P_{cn}" /> = 定格銅損（全負荷時の銅損）</p>

        <p>担当容量:</p>

      <Box kind="warn" label="負荷分担の方向を間違えやすい">

      <Box kind="warn" label="パターン1：DS操作時に電流が流れていると誤答">
        <p><strong>誤答</strong>：「断路器（DS）で負荷電流を開放できる」</p>

        <p><strong>正解</strong>：電流の開閉は必ず遮断器（CB）で行う。DSは電流ゼロの状態でのみ操作可能。</p>
      </Box>

        <p><strong>理由</strong>：「CBで電流を制御し、DSは電流ゼロ時のみ」が原則。</p>
        <ul>
          <li>投入: DS先投入（電流未流通）→ CB投入（電流を流す）</li>
          <li>開放: CB開放（電流を切る）→ DS開放（電流ゼロ状態で分離）</li>
        </ul>
        <p><strong>正解</strong>：投入は DS → CB、開放は CB → DS。</p>
      </Box>
      <Box kind="warn" label="パターン3：変圧器並行運転の負荷分担方向">
        <p><strong>誤答</strong>：「%インピーダンスが大きい変圧器の方が多くの負荷を分担する」</p>
        <p><strong>理由</strong>：並列回路の原理より、インピーダンスが小さい経路に電流が多く流れる。変圧器も同じく %Z が小さい方に電流が集中する。容量の大きな変圧器に合わせて %Z を設計するため「大容量 = 小%Z」になることが多い。</p>
        <p><strong>正解</strong>：負荷分担比 = %Z_B : %Z_A（逆比）</p>
      </Box>

      <h2 id="kouritsu"><span className="h-num">2.</span>効率・エネルギー計算系</h2>
      <Box kind="warn" label="パターン4：揚水時と発電時のηの使い方逆転">
        <p><strong>誤答</strong>：「揚水時の電力 P = 9.8QHη」（発電時と同じ式を使う）</p>
        <p><strong>理由</strong>：エネルギーの流れる方向で η の扱いが変わる。</p>
        <ul>
          <li>発電時: 水のエネルギー → 電気（損失で減る） → <Eq tex="P = 9.8QH\eta" />（掛ける）</li>
          <li>揚水時: 電気 → 水のエネルギー（損失分だけ余計に必要） → <Eq tex="P = 9.8QH/\eta" />（割る）</li>
        </ul>
        <p><strong>正解</strong>：「欲しいエネルギーを得る側」はη掛け、「必要なエネルギーを供給する側」はη割り。</p>
      </Box>
      <Box kind="warn" label="パターン5：変圧器銅損が負荷電流に比例すると誤答">
        <p><strong>誤答</strong>：「銅損は負荷電流に比例する」</p>
        <p><strong>理由</strong>：銅損 = <Eq tex="3I^2r" />（ジュール熱）。<Eq tex="I^2" />に比例するのが正しい。負荷が半分（<Eq tex="I = 0.5 I_n" />）になると、銅損は <Eq tex="0.5^2 = 0.25" /> 倍（1/4）になる。</p>
        <p><strong>正解</strong>：銅損 ∝ <Eq tex="I^2" />（電流の2乗に比例）。鉄損は負荷に無関係・一定。</p>
      </Box>
      <Box kind="warn" label="パターン6：最大効率条件を「鉄損 + 銅損が最小」と混同">
        <p><strong>誤答</strong>：「変圧器効率が最大になるのは合計損失がゼロのとき」</p>
        <p><strong>理由</strong>：損失ゼロは不可能。効率 <Eq tex="\eta = P_{out}/(P_{out} + P_i + P_c)" /> を最大化するには <Eq tex="P_c = P_i" /> のとき損失の和が最小になる（AM-GM不等式）。</p>
        <p><strong>正解</strong>：鉄損（一定）= 銅損（負荷の2乗に比例）のとき効率最大。</p>
      </Box>

      <h2 id="shizen"><span className="h-num">3.</span>自然エネルギー系</h2>
      <Box kind="warn" label="パターン7：風力出力が風速の2乗に比例すると誤答">
        <p><strong>誤答</strong>：「風力発電の出力は風速の2乗に比例する（<Eq tex="P \propto v^2" />）」</p>
        <p><strong>理由</strong>：出力 = 運動エネルギー × 流量 = <Eq tex="(\frac{1}{2}mv^2) \times (\rho Av) \propto v^3" />。質量流量 <Eq tex="m \propto v" /> なので、最終的に <Eq tex="v^2 \times v = v^3" /> になる。</p>
        <p><strong>正解</strong>：<Eq tex="P \propto v^3" />。風速が2倍→出力は8倍（<Eq tex="2^3" />）。</p>
      </Box>
      <Box kind="warn" label="パターン8：太陽電池の温度上昇で出力が上がると誤答">
        <p><strong>誤答</strong>：「温度が上がると太陽電池の発電量が増える」</p>
        <p><strong>理由</strong>：太陽電池の開放電圧Voc は温度上昇で低下する（約 -0.4%/℃）。電流は温度上昇でわずかに増加するが、電圧低下の影響が支配的で出力（P=VI）は低下。夏に晴れていても、パネル自体の温度が高いと発電効率が下がる。</p>
        <p><strong>正解</strong>：温度上昇 → 開放電圧低下 → 最大出力低下。</p>
      </Box>

      <h2 id="soudensei"><span className="h-num">4.</span>送配電・電圧系</h2>
      <Box kind="warn" label="パターン9：フェランチ効果で送電端電圧が高いと誤答">
        <p><strong>誤答</strong>：「フェランチ効果とは、送電端電圧が受電端電圧より高い現象」</p>
        <p><strong>理由</strong>：フェランチ効果は「軽負荷時に受電端電圧が送電端電圧より<strong>高く</strong>なる」現象。充電電流（進み電流）が送電線のインダクタンスを通ることで電圧上昇が起きる。</p>
        <p><strong>正解</strong>：フェランチ効果 → 受電端電圧 &gt; 送電端電圧（逆転）。長距離・ケーブル系統で顕著。</p>
      </Box>
      <Box kind="warn" label="パターン10：電圧降下式の係数（単相と三相の取り違え）">
        <p><strong>誤答</strong>：「三相3線式の電圧降下 <Eq tex="v = 2I(R\cos\Phi + X\sin\Phi)" />」</p>
        <p><strong>理由</strong>：係数「2」は単相2線式（往復2本分）のもの。三相は線電流1本分の電圧降下が相電圧降下であり、線間電圧に直すと √3 倍になる。</p>
        <p><strong>正解</strong>：三相3線式 → <Eq tex="v = \sqrt{3}\,I(R\cos\Phi + X\sin\Phi)" />、単相2線式 → <Eq tex="v = 2I(R\cos\Phi + X\sin\Phi)" /></p>
      </Box>
      <Box kind="warn" label="パターン11：電力損失の係数（3と√3の混同）">
        <p><strong>誤答</strong>：「三相の電力損失 <Eq tex="P_{loss} = \sqrt{3}\,I^2R" />」</p>
        <p><strong>理由</strong>：電力損失はジュール熱の物理量。3本の電線それぞれで <Eq tex="I^2R" /> が発生する。合計は <Eq tex="3I^2R" />。√3 は電圧計算（線電圧と相電圧の関係）に使うもので、損失には使わない。</p>
        <p><strong>正解</strong>：<Eq tex="P_{loss} = 3I^2R" /></p>
      </Box>
      <Box kind="warn" label="パターン12：受電端電力率と送電端力率の混同">
        <p><strong>誤答</strong>：「送電線路の電力損失計算に受電端力率cosΦrを使う」と「送電端力率cosΦsを使う」の混乱</p>
        <p><strong>理由</strong>：一般に負荷（受電端）の力率が与えられることが多く、線電流Iも <Eq tex="P/(\sqrt{3}\,V_r\cos\Phi_r)" /> で求める。問題文の「力率」がどこの点のものかを必ず確認する。</p>
        <p><strong>正解</strong>：問題文を読み、力率の基準点（送電端か受電端か）を最初に確認する。</p>
      </Box>

      <h2 id="kiki"><span className="h-num">5.</span>機器特性系</h2>
      <Box kind="warn" label="パターン13：変圧器の巻数比と電圧・電流の方向">
        <p><strong>誤答</strong>：「巻数が多い側の電圧が低い」</p>
        <p><strong>理由</strong>：変圧器は電圧が巻数に比例する（<Eq tex="V_1/V_2 = N_1/N_2" />）。巻数が多い＝電圧が高い（昇圧側）。電流は逆比（<Eq tex="N_1/N_2 = I_2/I_1" />）。</p>
        <p><strong>正解</strong>：電圧は巻数に比例、電流は巻数に反比例。</p>
      </Box>
      <Box kind="warn" label="パターン14：コンデンサ（進み）と方向の混同">
        <p><strong>誤答</strong>：「コンデンサは遅れ無効電力を供給する」</p>
        <p><strong>理由</strong>：コンデンサは充放電により<strong>進み電流</strong>を流す → 進み無効電力（Q &lt; 0 の補償）を供給。誘導性負荷（モーター等）が消費する遅れ無効電力を打ち消す効果がある。</p>
        <p><strong>正解</strong>：コンデンサ → 進み無効電力を供給 → 力率改善（遅れ力率を1に近づける）。</p>
      </Box>
      <Box kind="warn" label="パターン15：架空地線の役割を雷電流の導体と誤解">
        <p><strong>誤答</strong>：「架空地線は雷電流を大地に流すためのもの」</p>
        <p><strong>理由</strong>：架空地線の主な役割は「遮蔽（直撃雷から電力線を守る）」と「誘導雷サージの低減」。雷撃を受けた際の電流は鉄塔を通して大地に流れるが、架空地線そのものが雷電流を「流す管」として機能するわけではない。架空地線がなければ電力線に直撃雷が当たる。</p>
        <p><strong>正解</strong>：架空地線の役割は「雷の直撃から電力線を保護する遮蔽」。逆フラッシオーバーには注意。</p>
      </Box>
      <Box kind="warn" label="パターン16：電線の弛度（たるみ）と張力の関係">
        <p><strong>誤答</strong>：「温度上昇→電線が伸びる→弛度が大きくなる→張力が大きくなる」</p>
        <p><strong>理由</strong>：電線が伸びると弛度（<Eq tex="D = wS^2/8T" />）は大きくなるが、張力Tは<strong>下がる</strong>。Dが増えるとTが減る（逆比関係）。また地絡故障の観点では弛度増大→地上高低下が問題。</p>
        <p><strong>正解</strong>：温度上昇 → 電線伸長 → 弛度増大 → 張力<strong>低下</strong>（張力と弛度は逆の関係）。</p>
      </Box>
      <Box kind="warn" label="パターン17：中性点接地方式と地絡電流の大小">
        <p><strong>誤答</strong>：「非接地方式では地絡電流が最大になる」</p>
        <p><strong>理由</strong>：非接地方式では1線地絡時の地絡電流は対地静電容量を通じた充電電流のみで小さい。直接接地方式の方が地絡電流が大きく（大地を経由する低抵抗ループが形成される）、これに対応した保護継電器の高速動作が必要。</p>
        <p><strong>正解</strong>：地絡電流の大小 → <strong>直接接地 &gt; 抵抗接地 &gt; 非接地 &gt; 消弧リアクトル接地（最小）</strong>。消弧リアクトルは対地静電容量と並列共振させて地絡電流を打ち消す方式なので、非接地（充電電流のみ）よりさらに小さい（この順序は代表的傾向。抵抗値・ケーブルこう長・離調状態で入れ替わりうる）。</p>
      </Box>

      <h2 id="check"><span className="h-num">6.</span>総合チェック</h2>
      <p>試験前にこのページを1周して、各パターンの「理由」部分を自分の言葉で言えるか確認する。再現できないパターンはテーマ別ページで因果を再確認すること。</p>

          <tr><td><strong>合計</strong></td><td><strong>17パターン</strong></td></tr>

      <Box kind="tip" label="関連ページ">
        <ul>
          <li><strong>試験直前3日チェックリスト</strong> — 引っかけを事前チェック</li>

        note="出力は負荷率 m に比例、銅損は m² に比例することに注意。" />
      <div className="table-wrap"><table className="data">
        <thead><tr><th>記号</th><th>意味</th></tr></thead>
        <tbody>

          <tr><td>m</td><td>負荷率（実負荷/定格）</td></tr>

      <Box kind="tip" label="手順">
        <ol>
          <li>負荷率 m を確認</li>
