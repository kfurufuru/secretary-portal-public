        </ol>
      </Box>
      <Box kind="warn" label="落とし穴">
        <ul>
          <li><strong>鉄損は一定</strong>、銅損は電流の2乗（≒負荷率の2乗）に比例</li>
          <li>最大効率条件: <strong>鉄損 = 銅損</strong>（最大効率負荷率 <Eq tex="= \sqrt{P_i / P_{cn}}" />）</li>
          <li>全日効率は「1日の出力電力量 / 1日の入力電力量」で計算</li>
        </ul>
      </Box>
      <Box kind="example" label="例題イメージ">
        <p>100 kVA、鉄損 500 W、定格銅損 1000 W、力率 0.8、負荷率 0.5 のとき効率は?</p>
        <p>出力 = 0.5 × 100 × 0.8 = 40 kW</p>
        <p>銅損 = 0.5² × 1000 = 250 W</p>
        <p>η = 40000 / (40000 + 500 + 250) = <strong>98.2%</strong></p>
      </Box>

      <h2 id="souden-koka"><span className="h-num">4.</span>送電線の電圧降下計算</h2>
      <FormulaCard num="06" name="電圧降下（三相3線式）" eq="e \approx \sqrt{3}\,I(R\cos\theta + X\sin\theta)\,[\text{V}]"
        note="三相は √3 倍。R・X は1線分の値。" />
      <FormulaCard num="07" name="電圧降下（単相2線式）" eq="e \approx 2\,I(R\cos\theta + X\sin\theta)\,[\text{V}]"
        note="単相2線は2倍（単相3線は配線の状況次第）。" />
      <div className="table-wrap"><table className="data">
        <thead><tr><th>記号</th><th>意味</th><th>単位</th></tr></thead>
        <tbody>
          <tr><td>e</td><td>電圧降下（送電端−受電端）</td><td>V</td></tr>
          <tr><td>I</td><td>線電流</td><td>A</td></tr>
          <tr><td>R</td><td>1線の抵抗</td><td>Ω</td></tr>
          <tr><td>X</td><td>1線のリアクタンス</td><td>Ω</td></tr>
          <tr><td>cosθ</td><td>力率</td><td>—</td></tr>
          <tr><td>sinθ</td><td>無効率 = √(1−cos²θ)</td><td>—</td></tr>
        </tbody>
      </table></div>
      <Box kind="tip" label="手順">
        <ol>
          <li>力率 cosθ から <Eq tex="\sin\theta = \sqrt{1-\cos^2\theta}" /> を計算</li>
          <li>線電流 I を電力から算出（三相: <Eq tex="I = \dfrac{P}{\sqrt{3}\,V\cos\theta}" />）</li>
          <li>公式に代入</li>
        </ol>
      </Box>
      <Box kind="warn" label="落とし穴">
        <ul>
          <li>三相は <strong>√3 倍</strong>、単相2線は <strong>2倍</strong>（単相3線は配線の状況次第）</li>
          <li>R, X は <strong>1線分</strong>の値（三相全体ではない）</li>
          <li>電圧降下率 = e / V_s × 100 [%] で表す場合もある</li>
        </ul>
      </Box>
      <Box kind="example" label="例題イメージ">
        <p>三相3線式、R=2Ω、X=3Ω、I=100A、cosθ=0.8（sinθ=0.6）のとき電圧降下は?</p>
        <p>e = √3 × 100 × (2×0.8 + 3×0.6) = 1.732 × 100 × 3.4 = <strong>589 V</strong></p>
      </Box>

      <h2 id="haiden-loss"><span className="h-num">5.</span>配電線の電力損失計算</h2>
      <FormulaCard num="08" name="電力損失（三相3線式）" eq="P_{\text{loss}} = 3 I^2 R\,[\text{W}]"
        note="三相は3本の線があるので係数は3。電流の2乗に比例。" />
      <FormulaCard num="09" name="電力損失（単相2線式）" eq="P_{\text{loss}} = 2 I^2 R\,[\text{W}]"
        note="往復2本分で係数2。電流が2倍になると損失は4倍。" />
      <div className="table-wrap"><table className="data">
        <thead><tr><th>記号</th><th>意味</th><th>単位</th></tr></thead>
        <tbody>
          <tr><td>P_loss</td><td>電力損失</td><td>W</td></tr>
          <tr><td>I</td><td>線電流</td><td>A</td></tr>
          <tr><td>R</td><td>1線の抵抗</td><td>Ω</td></tr>
        </tbody>
      </table></div>
      <Box kind="tip" label="手順">
        <ol>
          <li>線電流 I を確認（電力・電圧・力率から計算）</li>
          <li>公式に代入</li>
        </ol>
      </Box>
      <Box kind="warn" label="落とし穴">
        <ul>
          <li>三相は <strong>3本</strong>の線があるので係数は3</li>
          <li>電流が2倍になると損失は <strong>4倍</strong>になる（電流の2乗に比例）</li>
          <li><strong>力率改善の効果</strong>: cosθ が上がると電流 I が減り損失が大幅減</li>
          <li>電圧を2倍にすると電流は半分になり損失は <strong>1/4</strong> になる</li>
        </ul>
      </Box>
      <FormulaCard num="10" name="力率改善前後の損失比" eq="\dfrac{P_{\text{loss}2}}{P_{\text{loss}1}} = \left(\dfrac{\cos\theta_1}{\cos\theta_2}\right)^2"
        note="力率 0.6 → 0.9 に改善すると損失は (0.6/0.9)² = 0.44倍（56%削減）。" />
      <Box kind="example" label="例題イメージ">
        <p>三相3線式、R=1Ω/線、負荷 100 kW、線間電圧 6600 V、cosθ=0.8 のとき電力損失は?</p>
        <p>I = 100000 / (√3 × 6600 × 0.8) = 10.95 A</p>
        <p>P_loss = 3 × 10.95² × 1 = <strong>360 W</strong></p>
      </Box>

      <h2 id="henatsuki-pz"><span className="h-num">6.</span>変圧器計算（%インピーダンス・短絡電流・並列運転）</h2>
      <Box kind="warn" label="R08出題予測：★★（2年空白・番外P2）">
        <p>変圧器計算は R06・R07 で<strong>2年連続出題されていない</strong>。波形分析上、R08 で復活する番外ポジション。効率計算（パターン3）とは別に、%インピーダンス系を押さえておくこと。</p>
      </Box>
      <FormulaCard num="11" name="%インピーダンス（単相ベース）" eq="\%Z = \dfrac{I_n Z}{V_n} \times 100\,[\%]"
        note="基準容量・基準電圧を統一して計算する。" />
      <FormulaCard num="12" name="短絡電流" eq="I_s = I_n \times \dfrac{100}{\%Z}\,[\text{A}]"
        note="%Z が小さいほど短絡電流は大きい。" />
      <FormulaCard num="13" name="短絡容量" eq="P_s = P_n \times \dfrac{100}{\%Z}\,[\text{VA}]"
        note="遮断器の遮断容量は P_s 以上を選定する。" />
      <FormulaCard num="14" name="基準容量換算（%Z合成）" eq="\%Z_{\text{新}} = \%Z_{\text{旧}} \times \dfrac{P_{\text{基準}}}{P_{\text{旧基準}}}"
        note="異なる容量の機器の %Z を合成するときは同じ基準容量に換算してから加算する。" />
      <FormulaCard num="15" name="並列運転の負荷分担" eq="\dfrac{P_a}{P_b} = \dfrac{P_{na}/\%Z_a}{P_{nb}/\%Z_b}"
        note="負荷分担比は 定格容量 ÷ %Z の比で決まる。" />
      <div className="table-wrap"><table className="data">
        <thead><tr><th>記号</th><th>意味</th></tr></thead>
        <tbody>
          <tr><td>%Z</td><td>パーセントインピーダンス</td></tr>
          <tr><td>I_n</td><td>定格電流</td></tr>
          <tr><td>I_s</td><td>短絡電流</td></tr>
          <tr><td>P_n</td><td>定格容量</td></tr>
          <tr><td>P_s</td><td>短絡容量</td></tr>
          <tr><td>V_n</td><td>定格電圧</td></tr>
        </tbody>
      </table></div>
      <Box kind="tip" label="手順（短絡電流・短絡容量問題）">
        <ol>
          <li>基準容量 P_n と %Z を確認（複数機器なら基準統一）</li>
          <li>各要素の %Z を基準容量換算</li>
          <li>合成 %Z を算出（直列: 加算／並列: 逆数和）</li>
          <li>I_s = I_n × 100 / %Z または P_s = P_n × 100 / %Z で算出</li>
        </ol>
      </Box>
      <Box kind="warn" label="落とし穴">
        <ul>
          <li><strong>基準容量の統一忘れ</strong>が最頻ミス。%Z は基準容量に比例する</li>
          <li><strong>一次側と二次側</strong>どちらで計算してもよいが、%Z は変わらない（電流・インピーダンスは変わる）</li>
          <li><strong>並列運転</strong>は %Z が等しい方が負荷分担が容量比通りになる。%Z が違うと小さい方が過負荷</li>
          <li><strong>三相の場合</strong>: 線間電圧・三相容量で計算すれば単相式がそのまま使える（√3不要）</li>
          <li>短絡容量の<strong>遮断容量選定</strong>: 実機の遮断器定格は P_s 以上を選ぶ</li>
        </ul>
      </Box>
      <Box kind="example" label="例題イメージ（基準容量換算）">
        <p>10 MVA 基準で変圧器 %Z=8%、系統側 %Z=2%。二次側短絡電流（定格電流の何倍か）は?</p>
        <p>合成 %Z = 8 + 2 = 10%</p>
        <p>I_s / I_n = 100 / 10 = <strong>10倍</strong></p>
      </Box>
      <Box kind="example" label="例題イメージ（並列運転）">
        <p>変圧器A: 100 kVA, %Z=4%／B: 200 kVA, %Z=5%。合計負荷 240 kVA のとき各機分担は?</p>
        <p>P_n/%Z 比: A = 100/4 = 25／B = 200/5 = 40</p>
        <p>分担比 A:B = 25:40 = 5:8</p>
        <p>A = 240 × 5/13 = <strong>92.3 kVA</strong></p>
        <p>B = 240 × 8/13 = <strong>147.7 kVA</strong></p>
      </Box>

    </div>

        inputRef.current?.focus();
      }
    };
    window.addEventListener('keydown', k);
    return () => window.removeEventListener('keydown', k);
  }, []);
  return (
    <aside className={`sidebar${mobileOpen ? ' mobile-open' : ''}`}>
      <div className="brand" onClick={() => { onNav("home"); onCloseMobile?.(); }} style={{ cursor: 'pointer' }}>
        <div className="brand-mark">電</div>
        <div>
          <div className="brand-title">電力Wiki</div>
          <div className="brand-sub">DENKEN-3 / POWER</div>
        </div>
      </div>

      <div className="search">
        <span className="search-icon" aria-hidden>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="11" cy="11" r="7"/><path d="m20 20-3-3"/></svg>
        </span>
        <input ref={inputRef} type="text" placeholder="検索（ページ・用語）" value={searchQuery} onChange={(e) => onSearchChange(e.target.value)} />
        {!searchQuery && <span className="search-kbd">⌘K</span>}
        {searchQuery && searchResults.length > 0 && (
          <div className="search-results">
            {searchResults.map((r, i) => (
              <div key={i} className="search-result" onClick={() => { onSearchSelect(r); onCloseMobile?.(); }}>
                <div className="search-result-title" dangerouslySetInnerHTML={{ __html: r.titleHtml }} />
                <div className="search-result-meta">{r.kind} — {r.context}</div>
              </div>
            ))}
          </div>
        )}
        {searchQuery && searchResults.length === 0 && (
          <div className="search-results"><div className="search-result"><div className="search-result-meta">該当なし</div></div></div>
        )}
      </div>

      {chapters.map(ch => (
        <div key={ch.id} className="nav-group">
          <button className="nav-chapter" data-open={openChapters[ch.id]} onClick={() => toggle(ch.id)}>
            <svg className="nav-chapter-caret" viewBox="0 0 12 12" fill="currentColor"><path d="M3 4l3 4 3-4z"/></svg>
            {ch.title}
            <span className="nav-chapter-num">{ch.num}</span>
          </button>
          <ul className="nav-items" data-open={openChapters[ch.id]}>
            {ch.pages.map(p => (
              <li key={p.id} className={`nav-item${currentPage === p.id ? ' active' : ''}`}
                  onClick={() => { onNav(p.id); onCloseMobile?.(); }}>
                <span className="nav-item-num">{p.num}</span>
                <span style={{ flex: 1 }}>{p.title}</span>
                {p.featured && <span className="nav-badge">★</span>}
              </li>
            ))}
          </ul>
        </div>
      ))}

      <a href="https://kfurufuru.github.io/secretary-portal-public/" style={{display:'block',textAlign:'center',padding:'0.6rem 0',margin:'0.5rem 0.75rem',borderRadius:'6px',background:'var(--bg-sunken)',color:'var(--ink-mute)',textDecoration:'none',fontSize:'0.78rem',letterSpacing:'0.02em'}}>← ポータルに戻る</a>

      <div className="sidebar-footer">
        本Wikiは電験3種「電力」科目の独習用にまとめた教材集である。掲載する出題傾向データは編集者の集計によるものであり、本試験を保証するものではない。
      </div>
    </aside>
  );
};

/* ---------- TOC (right rail) ---------- */
const TOC = ({ page }) => {
  const [items, setItems] = useState([]);
  const [active, setActive] = useState(null);
  useEffect(() => {
    let cancelled = false;
    const update = () => {
      if (cancelled) return;
      const heads = document.querySelectorAll('.content h2[id], .content h3[id]');
      const next = [...heads].map(h => ({
        id: h.id,
        text: h.textContent.replace(/^§\d+\s*/, '').trim(),
        level: h.tagName === 'H2' ? 2 : 3,
      }));
      setItems(prev => {
        if (prev.length === next.length && prev.every((p, i) => p.id === next[i].id)) return prev;
        return next;
      });
    };
    update();
    const t = setTimeout(update, 200);
    return () => { cancelled = true; clearTimeout(t); };
  }, [page]);
  useEffect(() => {
    const onScroll = () => {
      const heads = [...document.querySelectorAll('.content h2[id], .content h3[id]')];
      let cur = null;
      for (const h of heads) {
        if (h.getBoundingClientRect().top < 80) cur = h.id;
      }
      setActive(prev => prev === cur ? prev : cur);
    };
    window.addEventListener('scroll', onScroll, { passive: true });
    onScroll();
    return () => window.removeEventListener('scroll', onScroll);
  }, [page]);
  if (items.length === 0) return <aside className="toc" />;
  return (
    <aside className="toc">
      <div className="toc-label">On this page</div>
      <ul>
        {items.map(it => (
          <li key={it.id} className={it.level === 3 ? 'h3' : ''}>
            <a href={`#${it.id}`} className={active === it.id ? 'active' : ''}>{it.text}</a>
          </li>
        ))}
      </ul>
    </aside>
  );
};

/* ---------- Search index ---------- */
function buildSearchIndex(data) {
  const items = [];
  data.chapters.forEach(ch => {
    ch.pages.forEach(p => {
      items.push({ kind: "ページ", title: p.title, id: p.id, context: `${ch.title} / ${p.num}`, terms: `${p.title} ${p.num}` });
    });
  });
  data.glossary.forEach(g => {
    items.push({ kind: "用語", title: g.term, id: "glossary", context: g.def.slice(0, 40) + "…", terms: `${g.term} ${g.reading} ${g.def}` });
  });
  return items;
}

function searchIndex(idx, q) {
  if (!q || !q.trim()) return [];
  const lower = q.toLowerCase();
  return idx.filter(i => i.terms.toLowerCase().includes(lower)).slice(0, 12).map(i => {
    const re = new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'i');
    return { ...i, titleHtml: i.title.replace(re, '<mark>$1</mark>') };
  });
}

/* ---------- App ---------- */
const App = () => {
  const data = window.WIKI_DATA;
  const [tweaks, setTweak] = window.useTweaks ? window.useTweaks(TWEAK_DEFAULTS) : [TWEAK_DEFAULTS, () => {}];

  const [page, setPage] = useState(() => {
    const h = location.hash.replace(/^#/, '');
    return h && pageIds().includes(h) ? h : 'home';
  });
  const [mobileOpen, setMobileOpen] = useState(false);
  const [searchQuery, setSearchQuery] = useState('');
  const searchIdx = useMemo(() => buildSearchIndex(data), [data]);
  const searchResults = useMemo(() => searchIndex(searchIdx, searchQuery), [searchIdx, searchQuery]);

  // Apply tweaks to root
  useEffect(() => {
    document.documentElement.dataset.theme = tweaks.theme;
    document.documentElement.dataset.accent = tweaks.accent;
    document.documentElement.dataset.difficulty = tweaks.difficulty;
    document.documentElement.style.setProperty('--fs-base', tweaks.fontSize + 'px');
    document.documentElement.style.setProperty('--lh-base', tweaks.lineHeight);
  }, [tweaks]);

  const navigate = (id) => {
    setPage(id);
    location.hash = id;
    window.scrollTo({ top: 0, behavior: 'auto' });
  };
  useEffect(() => {
    const onHash = () => {
      const h = location.hash.replace(/^#/, '');
      if (h && pageIds().includes(h)) setPage(h);
    };
    window.addEventListener('hashchange', onHash);
    return () => window.removeEventListener('hashchange', onHash);
  }, []);

  function pageIds() {
    return ['home', ...data.chapters.flatMap(c => c.pages.map(p => p.id))];
  }

  const renderPage = () => {
    const props = { data, onNav: navigate };
    if (page === 'home')          return <HomePage {...props} />;
    if (page === 'haiden')        return <HaidenPage {...props} />;
    if (page === 'jikayou-chiraku') return <JikayouChirakuPage {...props} />;
    if (page === 'kakuu-souden')  return <KakuuSoudenPage {...props} />;
    if (page === 'karyoku')       return <KaryokuPage {...props} />;
    if (page === 'henatsuki')     return <HenatsukiPage {...props} />;
    if (page === 'suiryoku')      return <SuiryokuPage {...props} />;
    if (page === 'denki-zairyou') return <DenkiZairyouPage {...props} />;
    if (page === 'genshiryoku')   return <GenshiryokuPage {...props} />;
    if (page === 'shin-energy')   return <ShinEnergyPage {...props} />;
    if (page === 'henatsuki-loss') return <HenatsukiLossPage {...props} />;
    if (page === 'keiki-hensei')   return <KeikiHenseiPage {...props} />;
    if (page === 'shadanki')       return <ShadankiPage {...props} />;
    if (page === 'hogo-keiden')    return <HogoKeidenPage {...props} />;
    if (page === 'kaihei-hogo')    return <KaiheiHogoPage {...props} />;
    if (page === 'chichuu-souden') return <ChichuuSoudenPage {...props} />;
    if (page === 'yudo-shougai')  return <YudoShougaiPage {...props} />;
    if (page === 'denryoku-keitou') return <DenryokuKeitouPage {...props} />;
    if (page === 'kakomon-by-year')  return <KakomonByYearPage {...props} />;
    if (page === 'kakomon-by-field') return <KakomonByFieldPage {...props} />;
    if (page === 'kakomon-wave')     return <KakomonWavePage {...props} />;
    if (page === 'strategy-last3days') return <StrategyLast3DaysPage {...props} />;
    if (page === 'strategy-bmondai')   return <StrategyBMondaiPage {...props} />;
    if (page === 'strategy-traps')     return <StrategyTrapsPage {...props} />;
    if (page === 'calc-patterns')    return <CalcPatternsPage {...props} />;
    if (page === 'numbers')          return <NumbersPage {...props} />;
    if (page === 'glossary')         return <GlossaryPage {...props} />;
    if (page === 'emoji-legend')     return <EmojiLegendPage {...props} />;
    // 移行シェル: 未移植の単元は UnitStubPage（準備中）。本文移植時はここに
    // 専用 component の if を追加する（例: if (page === 'karyoku') return <KaryokuPage {...props} />;）。
    return <UnitStubPage id={page} data={data} onNav={navigate} />;
  };

  return (
    <>
      <div className="app">
        <Sidebar chapters={data.chapters} currentPage={page} onNav={navigate}
                 mobileOpen={mobileOpen} onCloseMobile={() => setMobileOpen(false)}
                 searchQuery={searchQuery} onSearchChange={setSearchQuery}
                 searchResults={searchResults}
                 onSearchSelect={(r) => { navigate(r.id); setSearchQuery(''); }} />
        <main className="main" key={page}>{renderPage()}</main>
        <TOC key={`toc-${page}`} page={page} />
      </div>
      <button className="mobile-menu-btn" onClick={() => setMobileOpen(o => !o)} aria-label="メニュー">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
          <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
      </button>

      {window.TweaksPanel && (
        <window.TweaksPanel title="Tweaks">
          <window.TweakSection title="表示">
            <window.TweakRadio label="テーマ" value={tweaks.theme} onChange={(v) => setTweak('theme', v)}
              options={[{ value: 'light', label: 'ライト' }, { value: 'dark', label: 'ダーク' }]} />
            <window.TweakRadio label="アクセント" value={tweaks.accent} onChange={(v) => setTweak('accent', v)}
              options={[
                { value: 'deeporange', label: 'ディープオレンジ' },
                { value: 'indigo', label: 'インディゴ' },
                { value: 'forest', label: 'フォレスト' },
                { value: 'rust', label: 'ラスト' },
                { value: 'aubergine', label: 'オーベルジン' },
              ]} />
          </window.TweakSection>
          <window.TweakSection title="タイポグラフィ">
            <window.TweakSlider label="フォントサイズ" value={tweaks.fontSize} onChange={(v) => setTweak('fontSize', v)}
              min={13} max={19} step={1} suffix="px" />
            <window.TweakSlider label="行間" value={tweaks.lineHeight} onChange={(v) => setTweak('lineHeight', v)}
              min={1.5} max={2.2} step={0.05} />
          </window.TweakSection>
          <window.TweakSection title="コンテンツ">
            <window.TweakRadio label="難易度フィルタ" value={tweaks.difficulty} onChange={(v) => setTweak('difficulty', v)}
              options={[
                { value: 'basic', label: '基礎' },
                { value: 'standard', label: '標準' },
                { value: 'advanced', label: '応用' },
              ]} />
          </window.TweakSection>
        </window.TweaksPanel>
      )}
    </>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);

</script>
</body>
</html>
