<!DOCTYPE html>
<html lang="ja" data-theme="light" data-accent="deeporange" data-difficulty="standard">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>電験3種 電力Wiki — 受験対策・要点まとめ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700&family=Noto+Serif+JP:wght@500;600;700&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
  <style>
/* ============================================================
   電験3種 電力Wiki — Stylesheet
   ============================================================ */

:root {
  --bg: oklch(0.985 0.005 85);
  --bg-elev: oklch(0.995 0.003 85);
  --bg-sunken: oklch(0.96 0.006 85);
  --ink: oklch(0.22 0.02 260);
  --ink-soft: oklch(0.42 0.018 260);
  --ink-mute: oklch(0.58 0.014 260);
  --rule: oklch(0.88 0.008 260);
  --rule-soft: oklch(0.93 0.006 260);
  --accent: oklch(0.45 0.12 260);
  --accent-soft: oklch(0.92 0.04 260);
  --accent-ink: oklch(0.32 0.13 260);
  --warn: oklch(0.55 0.14 50);
  --warn-soft: oklch(0.95 0.04 70);
  --ok: oklch(0.55 0.10 155);
  --ok-soft: oklch(0.94 0.04 155);
  --danger: oklch(0.55 0.16 25);
  --danger-soft: oklch(0.95 0.03 25);

  --font-serif: "Noto Serif JP", "Hiragino Mincho ProN", "Yu Mincho", serif;
  --font-sans: "Noto Sans JP", "Hiragino Sans", "Yu Gothic", system-ui, sans-serif;
  --font-mono: "JetBrains Mono", "SF Mono", "Menlo", monospace;

  --fs-base: 15px;
  --lh-base: 1.85;

  --sidebar-w: 280px;
  --toc-w: 220px;
  --content-max: 760px;
}

[data-theme="dark"] {
  --bg: oklch(0.18 0.012 260);
  --bg-elev: oklch(0.22 0.012 260);
  --bg-sunken: oklch(0.14 0.012 260);
  --ink: oklch(0.94 0.008 85);
  --ink-soft: oklch(0.78 0.012 260);
  --ink-mute: oklch(0.60 0.014 260);
  --rule: oklch(0.32 0.014 260);
  --rule-soft: oklch(0.26 0.012 260);
  --accent: oklch(0.72 0.12 260);
  --accent-soft: oklch(0.30 0.06 260);
  --accent-ink: oklch(0.85 0.10 260);
  --warn: oklch(0.78 0.14 70);
  --warn-soft: oklch(0.32 0.05 70);
  --ok: oklch(0.78 0.12 155);
  --ok-soft: oklch(0.28 0.05 155);
  --danger: oklch(0.78 0.14 25);
  --danger-soft: oklch(0.32 0.05 25);
}

[data-accent="indigo"]  { --accent: oklch(0.45 0.12 260); --accent-soft: oklch(0.92 0.04 260); --accent-ink: oklch(0.32 0.13 260); }
[data-accent="forest"]  { --accent: oklch(0.45 0.10 155); --accent-soft: oklch(0.92 0.04 155); --accent-ink: oklch(0.32 0.11 155); }
[data-accent="rust"]    { --accent: oklch(0.50 0.13 35);  --accent-soft: oklch(0.93 0.04 50);  --accent-ink: oklch(0.38 0.14 35);  }
[data-accent="aubergine"] { --accent: oklch(0.40 0.10 320); --accent-soft: oklch(0.92 0.04 320); --accent-ink: oklch(0.30 0.11 320); }
[data-accent="deeporange"] { --accent: oklch(0.55 0.17 42); --accent-soft: oklch(0.93 0.05 50); --accent-ink: oklch(0.44 0.16 40); }

[data-theme="dark"][data-accent="indigo"]  { --accent: oklch(0.74 0.12 260); --accent-soft: oklch(0.30 0.06 260); --accent-ink: oklch(0.85 0.10 260); }
[data-theme="dark"][data-accent="forest"]  { --accent: oklch(0.78 0.12 155); --accent-soft: oklch(0.28 0.05 155); --accent-ink: oklch(0.86 0.10 155); }
[data-theme="dark"][data-accent="rust"]    { --accent: oklch(0.78 0.13 50);  --accent-soft: oklch(0.30 0.06 50);  --accent-ink: oklch(0.85 0.12 50);  }
[data-theme="dark"][data-accent="aubergine"] { --accent: oklch(0.74 0.10 320); --accent-soft: oklch(0.28 0.05 320); --accent-ink: oklch(0.85 0.10 320); }
[data-theme="dark"][data-accent="deeporange"] { --accent: oklch(0.80 0.15 52); --accent-soft: oklch(0.32 0.07 45); --accent-ink: oklch(0.87 0.12 52); }

* { box-sizing: border-box; }

html, body {
  margin: 0;
  padding: 0;
  background: var(--bg);
  color: var(--ink);
  font-family: var(--font-sans);
  font-size: var(--fs-base);
  line-height: var(--lh-base);
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}

a { color: var(--accent-ink); text-decoration: none; }
a:hover { text-decoration: underline; text-underline-offset: 3px; }

/* ============================================================ Layout */

.app {
  display: grid;
  grid-template-columns: var(--sidebar-w) 1fr var(--toc-w);
  min-height: 100vh;
}

@media (max-width: 1100px) {
  .app { grid-template-columns: var(--sidebar-w) 1fr; }
  .toc { display: none; }
}

@media (max-width: 760px) {
  .app { grid-template-columns: 1fr; }
  .sidebar { display: none; }
}

/* ============================================================ Sidebar */

.sidebar {
  position: sticky;
  top: 0;
  height: 100vh;
  border-right: 1px solid var(--rule);
  background: var(--bg-sunken);
  overflow-y: auto;
  padding: 22px 18px 60px;
}

.brand {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 4px 4px 18px;
  border-bottom: 1px solid var(--rule);
  margin-bottom: 16px;
}

.brand-mark {
  width: 36px;
  height: 36px;
  border-radius: 6px;
  background: var(--ink);
  color: var(--bg);
  display: grid;
  place-items: center;
  font-family: var(--font-serif);
  font-weight: 700;
  font-size: 18px;
  letter-spacing: -0.02em;
  flex-shrink: 0;
}

.brand-title {
  font-family: var(--font-serif);
  font-size: 16px;
  font-weight: 600;
  line-height: 1.3;
  letter-spacing: 0.01em;
}
.brand-sub {
  font-size: 11px;
  color: var(--ink-mute);
  letter-spacing: 0.05em;
  text-transform: uppercase;
}

.search {
  position: relative;
  margin-bottom: 18px;
}
.search input {
  width: 100%;
  padding: 8px 10px 8px 32px;
  border: 1px solid var(--rule);
  background: var(--bg-elev);
  border-radius: 5px;
  color: var(--ink);
  font-family: var(--font-sans);
  font-size: 13px;
}
.search input::placeholder { color: var(--ink-mute); }
.search input:focus { outline: 2px solid var(--accent); outline-offset: -1px; border-color: transparent; }
.search-icon {
  position: absolute;
  left: 10px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--ink-mute);
  pointer-events: none;
}

.search-kbd {
  position: absolute;
  right: 8px;
  top: 50%;
  transform: translateY(-50%);
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--ink-mute);
  border: 1px solid var(--rule);
  padding: 1px 5px;
  border-radius: 3px;
  background: var(--bg);
}

.search-results {
  position: absolute;
  top: calc(100% + 4px);
  left: 0;
  right: 0;
  background: var(--bg-elev);
  border: 1px solid var(--rule);
  border-radius: 6px;
  max-height: 360px;
  overflow-y: auto;
  z-index: 30;
  box-shadow: 0 12px 32px -12px oklch(0.2 0.02 260 / 0.25);
}
.search-result {
  padding: 9px 12px;
  border-bottom: 1px solid var(--rule-soft);
  cursor: pointer;
  font-size: 13px;
}
.search-result:last-child { border-bottom: 0; }
.search-result:hover, .search-result.active { background: var(--accent-soft); }
.search-result-title { font-weight: 600; color: var(--ink); }
.search-result-meta { font-size: 11px; color: var(--ink-mute); margin-top: 2px; }
.search-result mark { background: var(--accent-soft); color: var(--accent-ink); padding: 0 2px; border-radius: 2px; }

.nav-group {
  margin-bottom: 4px;
}

.nav-chapter {
  display: flex;
  align-items: center;
  gap: 6px;
  width: 100%;
  background: transparent;
  border: 0;
  padding: 6px 4px;
  text-align: left;
  cursor: pointer;
  font-family: var(--font-sans);
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--ink-mute);
}
.nav-chapter:hover { color: var(--ink); }
.nav-chapter-caret {
  width: 10px;
  height: 10px;
  transition: transform 0.15s;
}
.nav-chapter[data-open="false"] .nav-chapter-caret { transform: rotate(-90deg); }
.nav-chapter-num {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--ink-mute);
  margin-left: auto;
}

.nav-items {
  list-style: none;
  padding: 0;
  margin: 0 0 6px;
  border-left: 1px solid var(--rule);
  margin-left: 8px;
}
.nav-items[data-open="false"] { display: none; }

.nav-item {
  display: flex;
  align-items: baseline;
  gap: 8px;
  padding: 4px 10px 4px 14px;
  margin-left: -1px;
  border-left: 2px solid transparent;
  font-size: 13px;
  color: var(--ink-soft);
  cursor: pointer;
  transition: all 0.12s;
  line-height: 1.4;
}
.nav-item:hover { color: var(--ink); background: var(--rule-soft); }
.nav-item.active {
  color: var(--accent-ink);
  border-left-color: var(--accent);
  background: var(--accent-soft);
  font-weight: 600;
}
.nav-item-num {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--ink-mute);
  flex-shrink: 0;
  font-weight: 400;
}
.nav-item.active .nav-item-num { color: var(--accent); }

.nav-badge {
  margin-left: auto;
  font-family: var(--font-mono);
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 0.05em;
  padding: 1px 5px;
  border-radius: 3px;
  background: var(--warn-soft);
  color: var(--warn);
}

.sidebar-footer {
  margin-top: 20px;
  padding-top: 16px;
  border-top: 1px solid var(--rule);
  font-size: 11px;
  color: var(--ink-mute);
  line-height: 1.6;
}

/* ============================================================ Main Content */

.main {
  padding: 36px 48px 120px;
  min-width: 0;
}

@media (max-width: 760px) { .main { padding: 24px 18px 80px; } }

.crumbs {
  font-size: 12px;
  color: var(--ink-mute);
  margin-bottom: 22px;
  display: flex;
  align-items: center;
  gap: 6px;
  flex-wrap: wrap;
}
.crumbs a { color: var(--ink-mute); }
.crumbs a:hover { color: var(--ink); }
.crumbs .sep { color: var(--rule); }

.page-header {
  border-bottom: 2px solid var(--rule);
  padding-bottom: 18px;
  margin-bottom: 32px;
}
.page-eyebrow {
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--accent-ink);
  margin-bottom: 8px;
}
.page-title {
  font-family: var(--font-serif);
  font-size: 36px;
  font-weight: 700;
  line-height: 1.25;
  letter-spacing: -0.01em;
  margin: 0 0 10px;
  color: var(--ink);
}
.page-deck {
  font-size: 15px;
  color: var(--ink-soft);
  line-height: 1.75;
  max-width: 640px;
}

.page-meta {
  display: flex;
  flex-wrap: wrap;
  gap: 18px;
  margin-top: 16px;
  font-size: 12px;
  color: var(--ink-mute);
}
.page-meta-item { display: flex; align-items: center; gap: 6px; }
.page-meta-item strong { color: var(--ink-soft); font-weight: 600; }

.content { max-width: var(--content-max); }

.content h2 {
  font-family: var(--font-serif);
  font-size: 24px;
  font-weight: 700;
  letter-spacing: -0.005em;
  line-height: 1.35;
  margin: 48px 0 16px;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--rule);
  scroll-margin-top: 24px;
}
.content h2 .h-num {
  font-family: var(--font-mono);
  font-size: 13px;
  color: var(--accent);
  font-weight: 600;
  margin-right: 10px;
  letter-spacing: 0.05em;
}
.content h3 {
  font-family: var(--font-serif);
  font-size: 18px;
  font-weight: 600;
  margin: 32px 0 10px;
  scroll-margin-top: 24px;
}
.content h4 {
  font-size: 14px;
  font-weight: 700;
  letter-spacing: 0.02em;
  margin: 22px 0 8px;
  color: var(--ink);
}
.content p {
  margin: 0 0 14px;
  text-wrap: pretty;
}
.content p strong { color: var(--ink); font-weight: 700; }

/* 論述で問われるポイント — 黄色マーカー */
.marker {
  background: linear-gradient(transparent 55%, oklch(0.92 0.18 95) 55%);
  padding: 0 2px;
  font-weight: 600;
  color: var(--ink);
}
[data-theme="dark"] .marker {
  background: linear-gradient(transparent 55%, oklch(0.55 0.16 95 / 0.55) 55%);
  color: var(--ink);
}
.content ul, .content ol { padding-left: 22px; margin: 6px 0 16px; }
.content li { margin-bottom: 6px; line-height: 1.75; }
.content code {
  font-family: var(--font-mono);
  font-size: 0.88em;
  background: var(--bg-sunken);
  padding: 1px 5px;
  border-radius: 3px;
  border: 1px solid var(--rule-soft);
}

/* ============================================================ Callouts / boxes */

.box {
  border: 1px solid var(--rule);
  border-radius: 6px;
  padding: 16px 18px;
  margin: 18px 0;
  background: var(--bg-elev);
}
.box-label {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  font-weight: 700;
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.box-label::before {
  content: "";
  width: 14px;
  height: 1px;
  background: currentColor;
}

.box-formula  { background: var(--accent-soft); border-color: color-mix(in oklab, var(--accent) 30%, transparent); }
.box-formula .box-label { color: var(--accent-ink); }
.box-warn     { background: var(--warn-soft); border-color: color-mix(in oklab, var(--warn) 30%, transparent); }
.box-warn .box-label { color: var(--warn); }
.box-tip      { background: var(--ok-soft); border-color: color-mix(in oklab, var(--ok) 30%, transparent); }
.box-tip .box-label { color: var(--ok); }
.box-mistake  { background: var(--danger-soft); border-color: color-mix(in oklab, var(--danger) 30%, transparent); }
.box-mistake .box-label { color: var(--danger); }
.box-example  { background: var(--bg-sunken); }
.box-example .box-label { color: var(--ink-soft); }

.box .katex { font-size: 1.05em; }
.box p:last-child { margin-bottom: 0; }

/* ============================================================ Formula card */

.formula-card {
  display: grid;
  grid-template-columns: 80px 1fr;
  gap: 18px;
  align-items: center;
  border: 1px solid var(--rule);
  border-left: 3px solid var(--accent);
  background: var(--bg-elev);
  padding: 16px 20px;
  margin: 16px 0;
  border-radius: 0 5px 5px 0;
}
.formula-card .num {
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.1em;
  color: var(--ink-mute);
}
.formula-card .body { font-size: 14px; color: var(--ink-soft); line-height: 1.6; }
.formula-card .body strong { color: var(--ink); display: block; font-size: 13px; margin-bottom: 4px; font-family: var(--font-sans); }
.formula-card .eq { font-size: 1.15em; margin: 6px 0; }

/* ============================================================ Tables */

.table-wrap { overflow-x: auto; margin: 16px 0; }
table.data {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
}
table.data th, table.data td {
  border: 1px solid var(--rule);
  padding: 8px 12px;
  text-align: left;
  vertical-align: top;
}
table.data th {
  background: var(--bg-sunken);
  font-weight: 700;
  font-size: 12px;
  letter-spacing: 0.02em;
}
table.data td.num, table.data th.num { font-family: var(--font-mono); text-align: right; }
table.data tr:nth-child(even) td { background: color-mix(in oklab, var(--bg-sunken) 50%, transparent); }
table.data caption {
  caption-side: top;
  text-align: left;
  font-size: 12px;
  font-weight: 600;
  margin-bottom: 6px;
  color: var(--ink-soft);
}
/* data-table は data の別名（JSX側で className="data-table" を統一使用） */
table.data-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
}
table.data-table th, table.data-table td {
  border: 1px solid var(--rule);
  padding: 8px 12px;
  text-align: left;
  vertical-align: top;
}
table.data-table th {
  background: var(--bg-sunken);
  font-weight: 700;
  font-size: 12px;
  letter-spacing: 0.02em;
}
table.data-table td.num, table.data-table th.num { font-family: var(--font-mono); text-align: right; }
table.data-table tr:nth-child(even) td { background: color-mix(in oklab, var(--bg-sunken) 50%, transparent); }

/* ============================================================ TOC (right rail) */

.toc {
  position: sticky;
  top: 0;
  height: 100vh;
  padding: 36px 22px 36px 8px;
  border-left: 1px solid var(--rule);
  font-size: 12px;
  overflow-y: auto;
}
.toc-label {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--ink-mute);
  margin-bottom: 10px;
  font-weight: 700;
}
.toc ul { list-style: none; padding: 0; margin: 0; }
.toc li { margin: 0; }
.toc a {
  display: block;
  padding: 4px 10px;
  border-left: 2px solid var(--rule-soft);
  color: var(--ink-mute);
  font-size: 12px;
  line-height: 1.5;
  transition: all 0.12s;
}
.toc a:hover { color: var(--ink); border-color: var(--ink-mute); text-decoration: none; }
.toc a.active { color: var(--accent-ink); border-color: var(--accent); font-weight: 600; }
.toc li.h3 a { padding-left: 22px; font-size: 11px; }

/* ============================================================ Difficulty badges & filter */

.diff-badge {
  display: inline-block;
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.05em;
  padding: 1px 6px;
  border-radius: 3px;
  font-weight: 700;
  vertical-align: middle;
  margin-left: 6px;
}
.diff-basic    { background: var(--ok-soft);     color: var(--ok); }
.diff-standard { background: var(--accent-soft); color: var(--accent-ink); }
.diff-advanced { background: var(--warn-soft);   color: var(--warn); }

[data-difficulty="basic"]    .diff-only-standard,
[data-difficulty="basic"]    .diff-only-advanced,
[data-difficulty="standard"] .diff-only-advanced {
  display: none !important;
}

/* ============================================================ Cards on home */

.card-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 14px;
  margin: 22px 0 32px;
}

.card {
  background: var(--bg-elev);
  border: 1px solid var(--rule);
  border-radius: 6px;
  padding: 16px 18px;
  cursor: pointer;
  transition: all 0.15s;
  display: flex;
  flex-direction: column;
  min-height: 120px;
}
.card:hover {
  border-color: var(--accent);
  transform: translateY(-1px);
  box-shadow: 0 6px 18px -10px color-mix(in oklab, var(--accent) 60%, transparent);
}
.card-num {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.12em;
  color: var(--ink-mute);
  margin-bottom: 4px;
}
.card-title {
  font-family: var(--font-serif);
  font-size: 17px;
  font-weight: 600;
  color: var(--ink);
  margin-bottom: 6px;
  line-height: 1.3;
}
.card-deck { font-size: 12px; color: var(--ink-soft); line-height: 1.55; flex-grow: 1; }
.card-foot {
  margin-top: 10px;
  padding-top: 8px;
  border-top: 1px solid var(--rule-soft);
  display: flex;
  align-items: center;
  justify-content: space-between;
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--ink-mute);
  letter-spacing: 0.05em;
}
.card-freq { color: var(--accent); font-weight: 700; }

/* ============================================================ Stat strip (home) */

.stat-strip {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 0;
  border: 1px solid var(--rule);
  border-radius: 6px;
  background: var(--bg-elev);
  margin: 18px 0 28px;
  overflow: hidden;
}
@media (max-width: 720px) { .stat-strip { grid-template-columns: repeat(2, 1fr); } }
.stat {
  padding: 14px 18px;
  border-right: 1px solid var(--rule);
}
.stat:last-child { border-right: 0; }
.stat-label {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--ink-mute);
  margin-bottom: 4px;
}
.stat-value {
  font-family: var(--font-serif);
  font-size: 22px;
  font-weight: 700;
  line-height: 1;
  color: var(--ink);
}
.stat-sub { font-size: 11px; color: var(--ink-mute); margin-top: 4px; }

/* ============================================================ Frequency chart */

.freq-chart {
  display: grid;
  grid-template-columns: 100px 1fr 60px;
  gap: 10px;
  align-items: center;
  font-size: 12px;
  margin: 4px 0;
}
.freq-chart .label { color: var(--ink-soft); font-weight: 500; }
.freq-chart .bar { background: var(--bg-sunken); height: 18px; border-radius: 2px; overflow: hidden; }
.freq-chart .bar-fill {
  height: 100%;
  background: var(--accent);
  display: flex;
  align-items: center;
  padding: 0 6px;
  color: var(--bg);
  font-family: var(--font-mono);
  font-size: 10px;
  font-weight: 700;
}
.freq-chart .pct { font-family: var(--font-mono); color: var(--ink-mute); font-size: 11px; text-align: right; }

/* ============================================================ Diagrams */

.diagram {
  background: var(--bg-elev);
  border: 1px solid var(--rule);
  border-radius: 6px;
  padding: 18px;
  margin: 18px 0;
  text-align: center;
}
.diagram svg { max-width: 100%; height: auto; }
.diagram-caption {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--ink-mute);
  margin-top: 10px;
  letter-spacing: 0.04em;
}

.diagram-stroke    { stroke: var(--ink); }
.diagram-fill      { fill: var(--ink); }
.diagram-stroke-soft { stroke: var(--ink-mute); }
.diagram-fill-soft { fill: var(--ink-mute); }
.diagram-fill-bg   { fill: var(--bg-elev); }
.diagram-accent    { stroke: var(--accent); fill: var(--accent); }
.diagram-warn      { stroke: var(--warn); fill: var(--warn); }
.diagram-text      { fill: var(--ink); font-family: var(--font-sans); font-size: 11px; }
.diagram-text-mono { fill: var(--ink-soft); font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.04em; }

/* ============================================================ Past-question rows */

.past-q-row {
  display: grid;
  grid-template-columns: 70px 1fr 90px;
  gap: 14px;
  padding: 10px 12px;
  border-bottom: 1px solid var(--rule-soft);
  font-size: 13px;
  align-items: baseline;
}
.past-q-row:last-child { border-bottom: 0; }
.past-q-row:hover { background: var(--bg-sunken); }
.past-q-year {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--ink-mute);
  letter-spacing: 0.04em;
}
.past-q-topic { color: var(--ink); }
.past-q-tag {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--ink-soft);
  text-align: right;
  letter-spacing: 0.04em;
}

/* ============================================================ Pagination footer */

.page-nav {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-top: 64px;
  padding-top: 24px;
  border-top: 1px solid var(--rule);
}
.page-nav-link {
  display: block;
  padding: 14px 18px;
  border: 1px solid var(--rule);
  border-radius: 5px;
  background: var(--bg-elev);
  cursor: pointer;
  transition: all 0.15s;
  text-decoration: none !important;
}
.page-nav-link:hover { border-color: var(--accent); }
.page-nav-link.next { text-align: right; }
.page-nav-dir {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--ink-mute);
  margin-bottom: 4px;
}
.page-nav-title {
  font-family: var(--font-serif);
  font-size: 15px;
  font-weight: 600;
  color: var(--ink);
}

/* ============================================================ Glossary */

.glossary-toolbar {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin: 18px 0;
}
.glossary-toolbar button {
  font-family: var(--font-mono);
  font-size: 11px;
  padding: 4px 10px;
  border: 1px solid var(--rule);
  background: var(--bg-elev);
  color: var(--ink-soft);
  border-radius: 3px;
  cursor: pointer;
  letter-spacing: 0.05em;
}
.glossary-toolbar button:hover { color: var(--ink); border-color: var(--ink-mute); }
.glossary-toolbar button.active { background: var(--accent); color: var(--bg); border-color: var(--accent); }

.glossary-section { margin-bottom: 24px; }
.glossary-section h3 {
  font-family: var(--font-mono);
  font-size: 14px;
  letter-spacing: 0.1em;
  color: var(--accent);
  border-bottom: 1px solid var(--rule);
  padding-bottom: 4px;
  margin: 16px 0 10px;
}
.glossary-entry {
  display: grid;
  grid-template-columns: 200px 1fr;
  gap: 16px;
  padding: 8px 4px;
  border-bottom: 1px solid var(--rule-soft);
  font-size: 13px;
  line-height: 1.6;
}
.glossary-term { font-weight: 600; color: var(--ink); }
.glossary-reading { font-size: 11px; color: var(--ink-mute); font-family: var(--font-mono); margin-top: 2px; }
.glossary-def { color: var(--ink-soft); }
@media (max-width: 720px) {
  .glossary-entry { grid-template-columns: 1fr; gap: 4px; }
}

/* ============================================================ KaTeX overrides */

.katex { font-size: 1em; }
.katex-display { margin: 8px 0; overflow-x: auto; overflow-y: hidden; }

/* ============================================================ Mobile toggle */

.mobile-menu-btn {
  display: none;
  position: fixed;
  bottom: 20px;
  right: 20px;
  width: 48px;
  height: 48px;
  border-radius: 50%;
  background: var(--ink);
  color: var(--bg);
  border: 0;
  z-index: 50;
  cursor: pointer;
  box-shadow: 0 4px 14px -2px oklch(0.2 0.02 260 / 0.4);
}
@media (max-width: 760px) {
  .mobile-menu-btn { display: grid; place-items: center; }
  .sidebar.mobile-open {
    display: block;
    position: fixed;
    inset: 0;
    z-index: 100;
    width: 100%;
    height: 100%;
  }
}

/* Scrollbar */
::-webkit-scrollbar { width: 10px; height: 10px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--rule); border-radius: 5px; border: 2px solid var(--bg); }
::-webkit-scrollbar-thumb:hover { background: var(--ink-mute); }

// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel"
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">{children}</div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

function TweakColor({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <input type="color" className="twk-swatch" value={value}
             onChange={(e) => onChange(e.target.value)} />
    </div>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});

      <p>配電線路は、配電用変電所で <strong>6.6 kV</strong> に降圧された電力を、柱上変圧器でさらに <strong>100/200 V</strong> に落として各需要家へ届ける「最後の1マイル」。送電線路との本質的な違いは <strong>距離が短い・分岐が多い・負荷が不均一</strong> の3点で、そのため電圧降下と電力損失を最小化しながら安定供給することが主要課題になる。</p>

          <li><strong>電力損失</strong> — 線路抵抗で失う <Eq tex="3I^2R" /> を抑える（電流の2乗で効く）</li>
          <li><strong>力率改善</strong> — 進相コンデンサで電流そのものを減らす</li>
        </ul>
      </Box>

      <h2 id="houshiki"><span className="h-num">2.</span>配電方式の比較</h2>
      <div className="table-wrap"><table className="data">
        <thead><tr><th>方式</th><th>構成</th><th>信頼性</th><th>主な用途</th></tr></thead>
        <tbody>
          <tr><td>放射状</td><td>変電所から放射状に1本の幹線</td><td>低（1点故障で全停電）</td><td>農村・郊外</td></tr>
          <tr><td>ループ</td><td>幹線をリング状に接続・常時開路</td><td>中（区間切替で復旧可）</td><td>都市部・住宅密集地</td></tr>
          <tr><td>スポットネットワーク</td><td>複数回線を並列・NW変圧器経由</td><td>高（多重化・無停電切替）</td><td>都市の重要施設・大ビル</td></tr>
          <tr><td>バンキング</td><td>複数の柱上変圧器を低圧側で並列</td><td>中高（1台故障でも継続）</td><td>都市部住宅地</td></tr>
        </tbody>
      </table></div>
      <Box kind="example" label="スポットネットワーク方式の急所（穴埋・論説頻出）">
        <p>各回線に <strong>ネットワークプロテクタ</strong>（逆潮流防止装置）付きの変圧器を接続する。受電側から電源側への逆潮流が生じると自動的に開放し、1回線が停電しても残りの回線だけで全負荷を無停電供給できる。供給信頼性は最高だが、設備コストが大きいのが欠点。</p>
      </Box>

      <h2 id="shihyo"><span className="h-num">3.</span>負荷の指標（需要率・負荷率・不等率）</h2>
      <div className="table-wrap"><table className="data">
        <thead><tr><th>指標</th><th>定義</th><th>値の範囲</th><th>意味</th></tr></thead>
        <tbody>
          <tr><td><strong>需要率</strong></td><td>最大需要電力 / 設備容量 × 100</td><td>0〜100%</td><td>設備がどれだけフル稼働に近いか</td></tr>
          <tr><td><strong>負荷率</strong></td><td>平均需要電力 / 最大需要電力 × 100</td><td>0〜100%</td><td>高いほど設備利用効率が良い</td></tr>
          <tr><td><strong>不等率</strong></td><td>Σ(各需要家の最大需要) / 合成最大需要</td><td><strong>1以上</strong></td><td>同時性が低いほど大きい＝設備節減効果</td></tr>
        </tbody>
      </table></div>
      <Box kind="warn" label="不等率は「1以上」— 1以下と思い込む引っかけ">
        <p>各需要家の最大需要は同時刻に発生しない（A工場は朝、C家庭は夕方など時間帯がずれる）。よって合成最大は「各最大の単純な和」より必ず小さくなり、<Eq tex="\text{不等率} = \dfrac{\sum (\text{各最大})}{\text{合成最大}} \geq 1" /> となる。「率」から100%以下と誤解しやすいが、不等率だけは1以上。分子と分母を逆にする誤りも頻出。</p>
      </Box>

      <h2 id="formula"><span className="h-num">4.</span>公式マップ（最重要）</h2>
      <p>方式で電圧降下の係数が変わる。<strong>単相2線=2 / 単相3線=1 / 三相3線=√3</strong> を取り違えないこと。</p>
      <FormulaCard num="01" name="電圧降下（単相2線式）" eq="\Delta V = 2I(R\cos\theta + X\sin\theta)\,[\text{V}]"
        note="電流が往路・復路の2本を流れ、各線で R cosθ + X sinθ の降下が生じるため2倍。" />
      <FormulaCard num="02" name="電圧降下（三相3線式）" eq="\Delta V = \sqrt{3}\,I(R\cos\theta + X\sin\theta)\,[\text{V}]"
        note="相電圧基準の降下 I(Rcosθ+Xsinθ) を、線間電圧基準に換算すると √3 倍。" />
      <FormulaCard num="03" name="電力損失（三相3線式）" eq="P_{\text{loss}} = 3I^2R\,[\text{W}]"
        note="3本の線それぞれに I が流れ、1本あたり I²R。力率が低いと同じ電力でも I が増え、損失は2乗で増える。" />
      <FormulaCard num="04" name="力率改善のコンデンサ容量" eq="Q_c = P(\tan\phi_1 - \tan\phi_2)\,[\text{kvar}]"
        note="有効電力 P は不変。無効電力の差 Q1−Q2 = P(tanφ1−tanφ2) をコンデンサで補償する。" />
      <FormulaCard num="05" name="力率改善後の損失軽減率" eq="1 - \left(\dfrac{\cos\phi_1}{\cos\phi_2}\right)^2"
        note="電流が cosφ1/cosφ2 倍に減り、損失は電流の2乗。力率0.8→1.0で損失は0.64倍（36%減）。" />
      <Box kind="example" label="力率改善が「電流削減」である理由">
        <p>同じ有効電力 P を送るとき線電流は <Eq tex="I = \dfrac{P}{\sqrt{3}\,V\cos\phi}" />。力率が上がると電流が減り、<strong>(1)</strong> 電圧降下 <Eq tex="\sqrt{3}\,I(R\cos\theta+X\sin\theta)" /> が減少、<strong>(2)</strong> 電力損失 <Eq tex="3I^2R" /> が電流の2乗で減少、<strong>(3)</strong> 線路容量に余裕が生まれる。「コンデンサ→電圧上昇」は結果であって、主効果は電流削減。</p>
      </Box>

      <h2 id="kaiho"><span className="h-num">5.</span>解法パターン</h2>
      <Box kind="tip" label="① 電圧降下の計算">
        <ol>
          <li>方式（単相2線／単相3線／三相3線）を確認して係数を選ぶ（2／1／√3）</li>
          <li><Eq tex="\sin\theta = \sqrt{1-\cos^2\theta}" /> を求める</li>
          <li>該当公式に代入</li>
        </ol>
      </Box>
      <Box kind="tip" label="② 力率改善のコンデンサ容量">
        <ol>
          <li><Eq tex="\tan\phi = \dfrac{\sin\phi}{\cos\phi}" /> を改善前・改善後それぞれ計算</li>
          <li><Eq tex="Q_c = P(\tan\phi_1 - \tan\phi_2)" /> [kvar]</li>
          <li><Eq tex="Q_c > 0" /> になることを確認（改善後の力率角は小さい）</li>
        </ol>
      </Box>

      <h2 id="trap"><span className="h-num">6.</span>引っかけ・誤答ポイント</h2>
      <Box kind="warn" label="頻出の3トラップ">
        <ul>
          <li><strong>「配電線」=三相3線と即断</strong> — 低圧配電（100/200V）には単相2線・単相3線が多い。問題文の方式を必ず確認してから係数を選ぶ。</li>
          <li><strong>単相2線の電圧降下を三相より小さいと誤認</strong> — 往復2本分で係数2倍。同条件なら単相2線の方が大きい。</li>
          <li><strong>力率改善の主効果を「電圧上昇」と誤解</strong> — 本質は電流削減。電圧改善・損失低減はその結果。</li>
        </ul>
      </Box>

      <h2 id="seigo"><span className="h-num">7.</span>正誤判定の急所</h2>
      <div className="table-wrap"><table className="data">
        <thead><tr><th>命題</th><th>判定</th><th>理由</th></tr></thead>
        <tbody>
          <tr><td>不等率は常に1以下である</td><td><strong>誤</strong></td><td>Σ各最大 / 合成最大 ≥ 1</td></tr>
          <tr><td>進相コンデンサ設置で線路電流が減少する</td><td><strong>正</strong></td><td>無効電流を補償し有効電流のみに</td></tr>
          <tr><td>スポットネットワーク方式は供給信頼性が高い</td><td><strong>正</strong></td><td>複数回線並列で1回線停電でも無停電</td></tr>
          <tr><td>単相2線式の電圧降下は三相3線式より小さい</td><td><strong>誤</strong></td><td>往復2本分で係数2倍・大きい</td></tr>
          <tr><td>需要率が100%に近いほど設備に余裕がない</td><td><strong>正</strong></td><td>設備容量いっぱいの最大需要が発生</td></tr>
          <tr><td>力率改善で電力損失は力率の2乗に反比例して減る</td><td><strong>正</strong></td><td>Ploss ∝ I² ∝ (1/cosφ)²</td></tr>
        </tbody>
      </table></div>

      <h2 id="kakomon"><span className="h-num">8.</span>出題実績（約85問・科目最多）</h2>
      <p>計算・論説・穴埋めのすべてで出題。特に電圧降下・力率改善の計算は毎年のように問われる。</p>

      </table></div>
      <Box kind="example" label="逆フラッシオーバーの物理（接地抵抗を下げる理由）">
        <p>通常は「導体（高電位）→がいし→鉄塔（接地）」へ絶縁破壊が進む。だが鉄塔の<strong>接地抵抗が高い</strong>と、落雷時に塔基部の電位が <Eq tex="V = I_{\text{雷}} \times R_{\text{接地}}" /> だけ上昇し、塔電位が導体電位を上回って「鉄塔→がいし→導体」へ逆向きに破壊が進む。だから対策は<strong>接地抵抗の低減</strong>。コロナは逆に、導体が細いほど表面電界（1/r で減衰）が高くなり発生しやすいので、多導体で等価半径を大きくして電界を下げる。</p>
      </Box>

      <h2 id="formula"><span className="h-num">5.</span>公式マップ（最重要）</h2>
      <FormulaCard num="01" name="電圧降下（三相3線式）" eq="\Delta V = \sqrt{3}\,I(R\cos\theta + X\sin\theta)\,[\text{V}]"
        note="√3 は (Rcosθ+Xsinθ) の外側全体にかかる。Vs = Vr + ΔV。" />
      <FormulaCard num="02" name="電圧降下（単相2線式）" eq="\Delta V = 2I(R\cos\theta + X\sin\theta)\,[\text{V}]"
        note="往復2線分で係数は2。三相の √3 と取り違えない。" />
      <FormulaCard num="03" name="電力損失（三相3線式）" eq="P_{\text{loss}} = 3I^2R\,[\text{W}]"
        note="cosθ は式に現れないが、力率が低いと I が増えて損失は増える（力率は I に織込み済み）。" />
      <FormulaCard num="04" name="送電効率" eq="\eta = \dfrac{P_r}{P_r + P_{\text{loss}}} \times 100\,[\%]"
        note="Pr=受電端電力、Ploss=線路損失。" />
      <FormulaCard num="05" name="百分率電圧降下率" eq="\delta = \dfrac{\Delta V}{V_r} \times 100\,[\%]"
        note="Vr は線間/相のどちらかに統一して使う。" />
      <Box kind="warn" label="フェランチ効果 — 軽負荷時に受電端電圧が上がる">
        <p>長い送電線や地中ケーブルは対地静電容量 B が大きく、軽負荷・無負荷でも<strong>進み電流（充電電流）</strong>が流れる。これがリアクタンス X を通ると電圧上昇（+jX）方向に作用し、受電端電圧が送電端より<strong>高くなる</strong>。対策は<strong>分路リアクトル</strong>で進み電流を吸収。「重負荷時」「電圧が下がる」と書いた選択肢は誤り。</p>
      </Box>

      <h2 id="kaiho"><span className="h-num">6.</span>解法パターン（三相電圧降下）</h2>
      <Box kind="example" label="例題: Vr=66kV・20MW・力率0.8(遅れ)・R=10Ω・X=15Ω → 送電端電圧は？">
        <p>① 線電流を求める：</p>
        <p><Eq tex="I = \dfrac{20\times10^{6}}{\sqrt{3}\cdot 66\times10^{3}\cdot 0.8} \approx 218.7\,\text{A}" display /></p>
        <p>② <Eq tex="\sin\theta = \sqrt{1-0.8^2} = 0.6" /> を使って電圧降下：</p>
        <p><Eq tex="\Delta V = \sqrt{3}\cdot 218.7\cdot(10\cdot0.8 + 15\cdot0.6) = \sqrt{3}\cdot 218.7\cdot 17 \approx 6.44\,\text{kV}" display /></p>
        <p>③ 送電端電圧：<Eq tex="V_s = V_r + \Delta V = 66 + 6.44 \approx 72.4\,\text{kV}" /></p>
      </Box>
      <Box kind="warn" label="R の定義を誤解する引っかけ">
        <p>R は「1線あたりの抵抗」。「1kmあたり0.1Ω・線路長50km」なら R = 5Ω。三相3線式で往復分を足してはいけない（<Eq tex="3I^2R" /> の「3」が既に3線分）。Δ結線では線電流 <Eq tex="I_L = \sqrt{3}\,I_P" /> に変換してから使う。</p>
      </Box>

      <h2 id="seigo"><span className="h-num">7.</span>正誤判定の急所</h2>
      <div className="table-wrap"><table className="data">
        <thead><tr><th>命題</th><th>判定</th><th>理由</th></tr></thead>
        <tbody>
          <tr><td>送電線の電力損失は電流の2乗に比例する</td><td><strong>正</strong></td><td>Ploss = 3I²R</td></tr>
          <tr><td>コロナ障害は電線表面の電界が低い場合に発生する</td><td><strong>誤</strong></td><td>臨界電界を超える「高電界」で発生</td></tr>
          <tr><td>三相3線式の電圧降下は √3 I R cosθ である</td><td><strong>誤</strong></td><td>X sinθ 項が抜け。√3 I(Rcosθ+Xsinθ)</td></tr>
          <tr><td>フェランチ効果は重負荷時に発生しやすい</td><td><strong>誤</strong></td><td>軽負荷・無負荷時（充電電流が支配的）</td></tr>
          <tr><td>微風振動対策にストックブリッジダンパが使われる</td><td><strong>正</strong></td><td>振動エネルギーをダンパで吸収</td></tr>
          <tr><td>逆フラッシオーバー防止に接地抵抗低減が有効</td><td><strong>正</strong></td><td>雷撃時の塔電位上昇を抑制</td></tr>
        </tbody>
      </table></div>

      <h2 id="kakomon"><span className="h-num">8.</span>出題実績（送電分野 最頻出・論説中心）</h2>
      <p>架空送電は論説が中心で、構成要素・雷害・振動・コロナ・塩害が循環的に出題される。計算は電圧降下・電力損失が主体。</p>
      <div className="table-wrap"><table className="data">
        <thead><tr><th>年度</th><th>問</th><th>テーマ</th><th>形式</th></tr></thead>
        <tbody>
          <tr><td>R07下</td><td>問8</td><td>架空送電線路の振動及び落雷に関連する設備</td><td>論説</td></tr>

        <p>R07で振動・雷害が連続出題。R08はコロナ（R05上以来未出）か塩害の論説が有力。計算は三相3線式の電圧降下が継続濃厚。</p>

        note="電圧は巻数に比例、電流は巻数に反比例。V1·I1=V2·I2（エネルギー保存）から導ける。" />
      <Box kind="tip" label="等価回路の換算は「方向で逆数」">
        <p>巻数比 <Eq tex="a = N_1/N_2 = V_1/V_2" />。インピーダンス換算は方向で <Eq tex="a^2" /> 倍と <Eq tex="1/a^2" /> 倍が逆転する：</p>
        <ul>
          <li><strong>二次→一次</strong>に換算した抵抗・リアクタンス： <Eq tex="R_2' = a^2 R_2,\ X_2' = a^2 X_2" />（<Eq tex="\times a^2" />）</li>
          <li><strong>一次→二次</strong>に換算した抵抗・リアクタンス： <Eq tex="R_1'' = R_1/a^2" />（<Eq tex="\times 1/a^2" />）</li>
        </ul>
        <p>理由：換算後 <Eq tex="V_1=aV_2,\ I_1=I_2/a" /> なので <Eq tex="Z_1 = V_1/I_1 = a^2 Z_2" />。「一次に換算した二次抵抗は <Eq tex="a^2" /> 倍＝正／二次に換算した一次抵抗は <Eq tex="1/a^2" /> 倍」— 主語と換算方向を必ず読む。</p>
      </Box>

      <h2 id="loss"><span className="h-num">2.</span>損失の分類（鉄損は一定・銅損は α²）</h2>
      <div className="table-wrap"><table className="data">
        <thead><tr><th>損失</th><th>別名</th><th>発生場所</th><th>負荷依存性</th></tr></thead>
        <tbody>
          <tr><td>鉄損 Pi</td><td>無負荷損</td><td>鉄心</td><td><strong>一定</strong>（電圧・周波数で決まる）</td></tr>
          <tr><td>銅損 Pc</td><td>負荷損</td><td>巻線抵抗</td><td><strong>電流²＝負荷率α²に比例</strong></td></tr>
        </tbody>
      </table></div>
      <Box kind="example" label="鉄損の内訳（論説頻出）— ヒステリシス損と渦電流損は別物">
        <ul>
          <li><strong>ヒステリシス損</strong> <Eq tex="P_h \propto f \cdot B_m^{1.6}" />（周波数1乗）→ 対策＝<strong>方向性珪素鋼板・アモルファス</strong></li>
          <li><strong>渦電流損</strong> <Eq tex="P_e \propto f^2 B_m^2 t^2 / \rho" />（周波数2乗・板厚² ・比抵抗に反比例）→ 対策＝<strong>薄板積層・珪素添加</strong></li>
        </ul>
        <p>「薄板化はヒステリシス損対策」は<strong>誤</strong>（薄板化は渦電流損対策）。板厚半分で渦電流損は約1/4。</p>
      </Box>
      <Box kind="tip" label="損失の分離測定">
        <p><strong>無負荷試験</strong>（定格電圧・二次開放）→ 励磁電流のみで銅損≈0、測定値≈<strong>鉄損 Pi</strong>。<strong>短絡試験</strong>（二次短絡・インピーダンス電圧で定格電流）→ 磁束密度数%で鉄損≈0、測定値≈<strong>定格銅損 Pc,full</strong> ＋ <Eq tex="\%Z = \dfrac{V_s}{V_n}\times100,\ \%R = \dfrac{P_s}{S_n}\times100,\ \%X = \sqrt{\%Z^2-\%R^2}" /> も得る。</p>
      </Box>

      <h2 id="eff"><span className="h-num">3.</span>効率と最大効率（鉄損＝銅損）</h2>
      <FormulaCard num="02" name="効率（皮相容量 Sn・負荷率 α 基準）" eq="\eta = \dfrac{\alpha S_n \cos\theta}{\alpha S_n \cos\theta + P_i + \alpha^2 P_{c,full}} \times 100\,[\%]"
        note="出力 Pout=α·Sn·cosθ。銅損は Pc(α)=α²·Pc,full。" />
      <FormulaCard num="03" name="最大効率条件・最大効率の負荷率" eq="P_i = \alpha^2 P_{c,full} \quad\Rightarrow\quad \alpha_m = \sqrt{\dfrac{P_i}{P_{c,full}}}"
        note="鉄損=銅損のとき効率最大。このとき損失合計＝2Pi。" />
      <Box kind="example" label="例題: 10kV·A・α=1・力率1.0・鉄損200W・定格銅損300W → 効率は？">
        <p><Eq tex="\eta = \dfrac{10{,}000}{10{,}000 + 200 + 300}\times100 = \dfrac{10{,}000}{10{,}500}\times100 \approx 95.2\%" display /></p>
        <p>最大効率の負荷率（Pi=100W・Pc,full=400W の場合）：<Eq tex="\alpha_m = \sqrt{100/400} = 0.5" /></p>
      </Box>

      <h2 id="henka"><span className="h-num">4.</span>電圧変動率</h2>
      <FormulaCard num="04" name="電圧変動率" eq="\varepsilon \approx \varepsilon_r \cos\theta + \varepsilon_x \sin\theta\,[\%]"
        note="εr=Pc,full/Sn×100（%抵抗）、εx=%リアクタンス。εr の分母は皮相 Sn（有効出力ではない）。" />
      <Box kind="example" label="例題: %r=2%・%x=4%・力率0.8(遅れ)">
        <p><Eq tex="\varepsilon = 2\times0.8 + 4\times0.6 = 1.6 + 2.4 = 4.0\%" /></p>
      </Box>

      <h2 id="heikou"><span className="h-num">5.</span>並行運転（分担は 1/%Z に比例）</h2>
      <p>並行運転の条件：<strong>変圧比・%Z・極性・相回転・位相変位・結線群</strong>の一致。違うと循環電流や偏った分担が起きる。</p>
      <Box kind="warn" label="%Z が違うと容量比どおりに分担されない">
        <p>分担電流はインピーダンスに反比例＝<strong>分担 ∝ 1/%Z</strong>。同容量で A(%Z=4%)・B(%Z=6%) を並列すると <Eq tex="I_A:I_B = \tfrac{1}{4}:\tfrac{1}{6} = 6:4" />。負荷100Aなら A=60A・B=40A で、容量比1:1なのに<strong>%Z の小さい A が過負荷</strong>。異容量機は基準容量を揃えて比較する。</p>
      </Box>

      <h2 id="ketsusen"><span className="h-num">6.</span>三相結線とV結線</h2>
      <div className="table-wrap"><table className="data">
        <thead><tr><th>結線</th><th>位相変位</th><th>第3高調波</th><th>特徴</th></tr></thead>
        <tbody>
          <tr><td>Y-Y</td><td>0°</td><td>吸収先なし→歪む</td><td>配電にほぼ不使用・第三巻線(Δ)で対策</td></tr>
          <tr><td>Δ-Δ</td><td>0°</td><td>Δループで循環吸収</td><td>中性点なし・1台故障でV結線運転可</td></tr>
          <tr><td>Y-Δ</td><td>−30°(遅れ)</td><td>二次Δで吸収</td><td>降圧用（送電端）</td></tr>
          <tr><td>Δ-Y</td><td>+30°(進み)</td><td>一次Δで吸収</td><td>昇圧用（発電所）</td></tr>
        </tbody>
      </table></div>
      <Box kind="example" label="V結線の3公式（H30問12型）">
        <p>単相1台容量を <Eq tex="S_n" /> とすると：三相出力 <Eq tex="S_V = \sqrt{3}\,S_n" />、利用率 <Eq tex="\dfrac{S_V}{2S_n} = \dfrac{\sqrt{3}}{2} \approx 0.866" />、容量効率 <Eq tex="\dfrac{S_V}{3S_n} = \dfrac{1}{\sqrt{3}} \approx 0.577" />。<strong>0.866(2台基準)と0.577(Δ3台基準)を取り違えない</strong>。Y-Δ と Δ-Y は位相が60°差で並行運転不可。</p>
      </Box>

      <h2 id="tanraku"><span className="h-num">7.</span>短絡電流（%Z 使用）</h2>
      <FormulaCard num="05" name="短絡電流" eq="I_s = I_n \times \dfrac{100}{\%Z}\,[\text{A}]"
        note="In=定格電流。%Z に反比例＝%Z が小さいほど短絡電流大→遮断器の遮断容量を大きく。" />
      <Box kind="example" label="例題: 500kV·A・6600/210V・%Z=5% の二次側三相短絡電流">
        <p><Eq tex="I_n = \dfrac{500\times10^3}{\sqrt{3}\times210} \approx 1375\,\text{A}" /></p>
        <p><Eq tex="I_s = 1375 \times \dfrac{100}{5} = 27{,}500\,\text{A} = 27.5\,\text{kA}" display /></p>
        <p>定格電流の20倍。電源側%Zが与えられたら 合成%Z=変圧器%Z+電源%Z で計算。</p>
      </Box>

      <h2 id="seigo"><span className="h-num">8.</span>正誤判定の急所</h2>
      <div className="table-wrap"><table className="data">
        <thead><tr><th>命題</th><th>判定</th><th>理由</th></tr></thead>
        <tbody>
          <tr><td>変圧器の鉄損は負荷電流の2乗に比例する</td><td><strong>誤</strong></td><td>鉄損は一定。2乗比例は銅損</td></tr>
          <tr><td>二次側に換算した一次抵抗は a² 倍</td><td><strong>誤</strong></td><td>1/a² 倍（一次に換算した二次抵抗が a²倍）</td></tr>
          <tr><td>無負荷試験では銅損も測定できる</td><td><strong>誤</strong></td><td>励磁電流のみ→測定値は実質 鉄損</td></tr>
          <tr><td>短絡試験は定格電圧をかけて行う</td><td><strong>誤</strong></td><td>インピーダンス電圧（数%）で定格電流</td></tr>
          <tr><td>ヒステリシス損は周波数の2乗に比例する</td><td><strong>誤</strong></td><td>Ph∝f（1乗）。2乗は渦電流損</td></tr>
          <tr><td>短絡電流は %Z に比例して大きくなる</td><td><strong>誤</strong></td><td>Is=In×100/%Z で %Z に反比例</td></tr>
          <tr><td>Y-Y結線は第3高調波電流を吸収できる</td><td><strong>誤</strong></td><td>吸収はΔ結線。Y-Yは歪む</td></tr>
          <tr><td>無電圧切換は変圧器を停止させずに行える</td><td><strong>誤</strong></td><td>停止が必要。停止不要は負荷時タップ切換</td></tr>
        </tbody>
      </table></div>

      <h2 id="kakomon"><span className="h-num">9.</span>出題実績（基礎ハブ・約27問＋変電周辺）</h2>
      <p>効率・最大効率・並行運転・短絡（遮断器選定）の計算が頻出。論説は結線方式・タップ切換・種類。深い全日効率は損失深掘りページへ。</p>
      <div className="table-wrap"><table className="data">
        <thead><tr><th>年度</th><th>問</th><th>論点</th><th>形式</th></tr></thead>
        <tbody>
          <tr><td>R06上</td><td>問16</td><td>遮断器定格遮断電流と負荷分担</td><td>計算</td></tr>
          <tr><td>R05上</td><td>問13</td><td>変圧器並行運転時の過負荷容量</td><td>計算</td></tr>
          <tr><td>R05下</td><td>問6</td><td>Y-Y結線の特徴</td><td>論説</td></tr>
          <tr><td>R04下</td><td>問6</td><td>三相変圧器の百分率リアクタンス導出</td><td>計算</td></tr>
          <tr><td>R04下</td><td>問7</td><td>結線方式の違いと特性</td><td>論説</td></tr>
          <tr><td>H30</td><td>問12</td><td>V結線方式</td><td>計算</td></tr>
          <tr><td>H28</td><td>問16</td><td>事故時に流れる電流（短絡）</td><td>計算</td></tr>
        </tbody>
      </table></div>
      <Box kind="tip" label="R08予測">
        <p>効率・最大効率の単独計算、V結線（H30以来の周期）、並行運転負荷分担（R05上・R06上で連続）が有力。</p>
      </Box>

      <h2 id="intro"><span className="h-num">1.</span>直感的理解 — P=9.8QHη</h2>
      <p>「高い水を低い所へ落とす」だけ。位置E→運動E(水車)→電気E(発電機)。アナロジーで <strong>水≒電流、落差≒電圧</strong>（P=VI と同じ構造）。流量が多く落差が大きいほど大出力。</p>

        <p>水の比重量 <Eq tex="\rho g = 1000 \times 9.8 = 9800\,\text{N/m}^3 = 9.8\,\text{kN/m}^3" />。これに流量 Q[m³/s]・有効落差 H[m] を掛け、kW にまとめた係数が 9.8。単位確認：[kN/m³]×[m³/s]×[m]＝[kW]。</p>

      <h2 id="suisha"><span className="h-num">2.</span>水車の種類（衝動 vs 反動）</h2>

          <tr><td>適用落差</td><td><strong>高落差・小流量</strong>（300m級〜）</td><td>低〜中落差（カプランは低落差・大流量）</td></tr>

          <tr><td>キーワード</td><td>ノズル・バケット</td><td>フランシス＝混流／カプラン＝可動翼</td></tr>
        </tbody>
      </table></div>
      <div className="table-wrap"><table className="data">
        <thead><tr><th>発電所分類</th><th>特徴</th><th>調整単位</th></tr></thead>

      <h2 id="formula"><span className="h-num">3.</span>公式マップ（最重要）</h2>

        note="Q=流量[m³/s]、H=有効落差=総落差−損失水頭[m]、η=水車効率×発電機効率。" />
      <FormulaCard num="02" name="揚水入力（効率は割る）" eq="P_{\text{pump}} = \dfrac{9.8\,Q\,H_p}{\eta_{\text{pump}}}\,[\text{kW}]"

      <FormulaCard num="03" name="比速度" eq="N_s = \dfrac{N\sqrt{P}}{H^{5/4}}"

      <h2 id="kaiho"><span className="h-num">4.</span>解法パターン（例題つき）</h2>

      <h2 id="seigo"><span className="h-num">6.</span>正誤判定の急所</h2>

      <h2 id="kakomon"><span className="h-num">7.</span>出題実績（約37問）</h2>

const TOC = ({ page }) => {
  const [items, setItems] = useState([]);
  const [active, setActive] = useState(null);
  useEffect(() => {
    let cancelled = false;
    const update = () => {
      if (cancelled) return;
      const heads = document.querySelectorAll('.content h2[id], .content h3[id]');
      const next = [...heads].map(h => ({
        id: h.id,
        text: h.textContent.replace(/^§\d+\s*/, '').trim(),
        level: h.tagName === 'H2' ? 2 : 3,
      }));
      setItems(prev => {
        if (prev.length === next.length && prev.every((p, i) => p.id === next[i].id)) return prev;
        return next;
      });
    };
    update();
    const t = setTimeout(update, 200);
    return () => { cancelled = true; clearTimeout(t); };
  }, [page]);
  useEffect(() => {
    const onScroll = () => {
      const heads = [...document.querySelectorAll('.content h2[id], .content h3[id]')];
      let cur = null;
      for (const h of heads) {
        if (h.getBoundingClientRect().top < 80) cur = h.id;
      }
      setActive(prev => prev === cur ? prev : cur);
    };
    window.addEventListener('scroll', onScroll, { passive: true });
    onScroll();
    return () => window.removeEventListener('scroll', onScroll);
  }, [page]);
  if (items.length === 0) return <aside className="toc" />;
  return (
    <aside className="toc">
      <div className="toc-label">On this page</div>
      <ul>
        {items.map(it => (
          <li key={it.id} className={it.level === 3 ? 'h3' : ''}>
            <a href={`#${it.id}`} className={active === it.id ? 'active' : ''}>{it.text}</a>
          </li>
        ))}
      </ul>
    </aside>
  );
};

/* ---------- Search index ---------- */
function buildSearchIndex(data) {
  const items = [];
  data.chapters.forEach(ch => {
    ch.pages.forEach(p => {
      items.push({ kind: "ページ", title: p.title, id: p.id, context: `${ch.title} / ${p.num}`, terms: `${p.title} ${p.num}` });
    });
  });
  data.glossary.forEach(g => {
    items.push({ kind: "用語", title: g.term, id: "glossary", context: g.def.slice(0, 40) + "…", terms: `${g.term} ${g.reading} ${g.def}` });
  });
  return items;
}

function searchIndex(idx, q) {
  if (!q || !q.trim()) return [];
  const lower = q.toLowerCase();
  return idx.filter(i => i.terms.toLowerCase().includes(lower)).slice(0, 12).map(i => {
    const re = new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'i');
    return { ...i, titleHtml: i.title.replace(re, '<mark>$1</mark>') };
  });
}

  return (
    <>
      <div className="app">
        <Sidebar chapters={data.chapters} currentPage={page} onNav={navigate}
                 mobileOpen={mobileOpen} onCloseMobile={() => setMobileOpen(false)}
                 searchQuery={searchQuery} onSearchChange={setSearchQuery}
                 searchResults={searchResults}
                 onSearchSelect={(r) => { navigate(r.id); setSearchQuery(''); }} />
        <main className="main" key={page}>{renderPage()}</main>
        <TOC key={`toc-${page}`} page={page} />
      </div>
      <button className="mobile-menu-btn" onClick={() => setMobileOpen(o => !o)} aria-label="メニュー">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
          <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
      </button>

      {window.TweaksPanel && (
        <window.TweaksPanel title="Tweaks">
          <window.TweakSection title="表示">
            <window.TweakRadio label="テーマ" value={tweaks.theme} onChange={(v) => setTweak('theme', v)}
              options={[{ value: 'light', label: 'ライト' }, { value: 'dark', label: 'ダーク' }]} />
            <window.TweakRadio label="アクセント" value={tweaks.accent} onChange={(v) => setTweak('accent', v)}
              options={[
                { value: 'deeporange', label: 'ディープオレンジ' },
                { value: 'indigo', label: 'インディゴ' },
                { value: 'forest', label: 'フォレスト' },
                { value: 'rust', label: 'ラスト' },
                { value: 'aubergine', label: 'オーベルジン' },
              ]} />
          </window.TweakSection>
          <window.TweakSection title="タイポグラフィ">
            <window.TweakSlider label="フォントサイズ" value={tweaks.fontSize} onChange={(v) => setTweak('fontSize', v)}
              min={13} max={19} step={1} suffix="px" />
            <window.TweakSlider label="行間" value={tweaks.lineHeight} onChange={(v) => setTweak('lineHeight', v)}
              min={1.5} max={2.2} step={0.05} />
          </window.TweakSection>
          <window.TweakSection title="コンテンツ">
            <window.TweakRadio label="難易度フィルタ" value={tweaks.difficulty} onChange={(v) => setTweak('difficulty', v)}
              options={[
                { value: 'basic', label: '基礎' },
                { value: 'standard', label: '標準' },
                { value: 'advanced', label: '応用' },
              ]} />
          </window.TweakSection>
        </window.TweaksPanel>
      )}
    </>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);

</script>
</body>
</html>
